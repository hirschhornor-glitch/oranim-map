<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אורנים - תכנון עירוני</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
            overflow: hidden;
            height: 100vh;
        }

        #root { height: 100vh; display: flex; }

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: margin-right 0.3s ease;
            z-index: 1000;
            position: relative;
        }

        .sidebar.collapsed {
            margin-right: -320px;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }

        .sidebar-header h1 {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85em;
            color: #a0a0b0;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
        }

        .sidebar-section h3 {
            font-size: 0.9em;
            color: #e94560;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .layer-group-title {
            font-size: 0.8em;
            color: #8888aa;
            margin: 10px 0 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .layer-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }

        .layer-item:hover { background: #2a2a4a; }

        .layer-item input[type="checkbox"] {
            margin-left: 10px;
            accent-color: #e94560;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .layer-item label {
            cursor: pointer;
            font-size: 0.9em;
            flex: 1;
        }

        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        .leaflet-control-attribution {
            font-size: 10px !important;
            opacity: 0.5 !important;
        }

        .wms-overlay {
            transition: opacity 0.3s ease;
        }

        .toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: #1a1a2e;
            color: white;
            border: 2px solid #e94560;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-btn:hover { background: #e94560; }

        .leaflet-popup-content {
            direction: rtl;
            text-align: right;
            margin: 0 !important;
            width: 300px !important;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            padding: 0;
            overflow: hidden;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .leaflet-popup-tip { border-top-color: #1a1a2e; }

        .popup-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .popup-header-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 2px;
        }

        .popup-header-subtitle {
            font-size: 12px;
            color: #8899bb;
            font-family: monospace;
        }

        .popup-body {
            padding: 12px 16px;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .popup-row:last-child { border-bottom: none; }

        .popup-row-label {
            font-size: 12px;
            color: #8888aa;
        }

        .popup-row-value {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .popup-footer {
            padding: 10px 16px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .popup-link {
            display: block;
            text-align: center;
            color: #5dade2;
            font-size: 13px;
            text-decoration: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-link:hover { background: #2a2a4a; }

        .popup-btn-permit {
            display: block;
            text-align: center;
            background: #e94560;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-permit:hover { background: #c73650; }

        .popup-btn-back {
            display: block;
            text-align: center;
            background: transparent;
            color: #5dade2;
            font-size: 12px;
            padding: 6px;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-back:hover { background: #2a2a4a; }

        .popup-status-badge {
            display: inline-block;
            background: #0f3460;
            color: #5dade2;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .permit-detail-header {
            background: linear-gradient(135deg, #2d1a3e, #3d1a2e);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .leaflet-popup-close-button {
            color: #8888aa !important;
            font-size: 18px !important;
            top: 6px !important;
            right: auto !important;
            left: 8px !important;
        }

        .leaflet-popup-close-button:hover { color: #e94560 !important; }

        .layer-legend-btn {
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            margin-right: auto;
        }
        .layer-legend-btn:hover { color: #e94560; }

        .legend-popup {
            position: fixed;
            top: 50%;
            right: 330px;
            transform: translateY(-50%);
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 16px 20px;
            z-index: 2000;
            min-width: 220px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: #fff;
        }
        .legend-popup-title {
            font-size: 14px;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 12px;
            text-align: center;
        }
        .legend-popup-close {
            position: absolute;
            top: 8px;
            left: 8px;
            background: none;
            border: none;
            color: #8888aa;
            font-size: 18px;
            cursor: pointer;
        }
        .legend-popup-close:hover { color: #e94560; }
        .legend-popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
        }

        .scale-display {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(255,255,255,0.85);
            color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            z-index: 800;
            pointer-events: none;
        }

        .plan-search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .plan-search-input {
            width: 100%;
            padding: 10px 36px 10px 12px;
            border-radius: 8px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.95em;
            direction: rtl;
        }

        .plan-search-input::placeholder { color: #6a6a8a; }
        .plan-search-input:focus { outline: none; border-color: #e94560; }

        .plan-search-clear {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .plan-search-clear:hover { color: #e94560; }

        .plan-search-results {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: #1e1e36;
            border: 1px solid #3a3a5a;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1100;
            direction: rtl;
        }

        .plan-search-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.15s;
        }

        .plan-search-item:hover { background: #2a2a4a; }

        .plan-search-item-name {
            font-size: 13px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .plan-search-item-num {
            font-size: 11px;
            color: #6a6a8a;
            font-family: monospace;
        }

        .plan-search-empty {
            padding: 12px;
            text-align: center;
            color: #6a6a8a;
            font-size: 13px;
        }

        .opacity-slider {
            width: 100%;
            margin-top: 8px;
            accent-color: #e94560;
            cursor: pointer;
        }

        .opacity-label {
            font-size: 0.8em;
            color: #8888aa;
            display: flex;
            justify-content: space-between;
        }

        .loading-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            z-index: 1000;
            display: none;
        }

        .loading-indicator.visible { display: block; }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85em;
            white-space: nowrap;
            color: #fff;
        }

        .legend-color {
            width: 16px;
            min-width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-left: 8px;
            border: 1px solid #555;
        }

        .basemap-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            cursor: pointer;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            margin-bottom: 8px;
        }

        .search-input::placeholder { color: #6a6a8a; }
        .search-input:focus { outline: none; border-color: #e94560; }

        .status-bar {
            padding: 10px 20px;
            background: #0f0f1e;
            font-size: 0.75em;
            color: #6a6a8a;
            border-top: 1px solid #2a2a4a;
            margin-top: auto;
        }

        .btn-reset {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-reset:hover {
            background: #e94560;
            color: white;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Popup navigation for multiple features */
        .popup-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 6px 16px;
            background: #0f0f1e;
            border-bottom: 1px solid #2a2a4a;
            font-size: 12px;
            color: #8888aa;
        }
        .popup-nav-btn {
            background: #2a2a4a;
            border: none;
            color: #e0e0e0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .popup-nav-btn:hover { background: #e94560; }

        /* Map cursor — managed via .wms-pointer class toggled by JS probe */
        #map.wms-pointer,
        #map.wms-pointer *:not(.leaflet-control):not(.leaflet-control *):not(.leaflet-popup):not(.leaflet-popup *) {
            cursor: pointer !important;
        }

        #map.leaflet-dragging,
        #map.leaflet-dragging.wms-pointer,
        #map.leaflet-dragging *,
        #map.leaflet-dragging .leaflet-grab { cursor: grabbing !important; }

        /* Controls & popup elements */
        .leaflet-control-zoom a, .leaflet-control a { cursor: pointer !important; }
        .leaflet-popup-close-button { cursor: pointer !important; }
        .popup-link, .popup-btn-permit, .popup-btn-back { cursor: pointer !important; }

        /* Sidebar interactive elements */
        .layer-item, .layer-item label, .layer-item input[type="checkbox"] { cursor: pointer; }
        .layer-legend-btn { cursor: pointer; }
        .plan-search-item { cursor: pointer; }
        .plan-search-clear { cursor: pointer; }
        .btn-reset { cursor: pointer; }
        .basemap-select { cursor: pointer; }
        .toggle-btn { cursor: pointer; }

        /* ── Map Toolbar ── */
        .map-toolbar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            gap: 0;
            background: rgba(15, 15, 30, 0.94);
            backdrop-filter: blur(10px);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 4px 6px;
            direction: rtl;
        }
        .toolbar-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #8888aa;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
        }
        .toolbar-btn:hover { background: #2a2a4a; color: #e0e0ff; border-color: #3a3a5a; }
        .toolbar-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
        .toolbar-btn svg, .toolbar-btn .toolbar-icon { width: 20px; height: 20px; font-size: 20px; line-height: 1; }
        .toolbar-btn .toolbar-label { font-size: 10px; letter-spacing: 0.3px; }
        .toolbar-sep {
            width: 1px;
            background: #2a2a4a;
            margin: 6px 2px;
            align-self: stretch;
        }

        /* Toolbar dropdown (shared) */
        .toolbar-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 50%;
            transform: translateX(50%);
            background: #16162e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 4px 0;
            min-width: 170px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .toolbar-dropdown-item {
            padding: 9px 16px;
            color: #c0c0dd;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
            white-space: nowrap;
            font-family: inherit;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            direction: rtl;
        }
        .toolbar-dropdown-item:hover { background: #2a2a4a; color: #fff; }

        /* ── Comparison Side Panel ── */
        .compare-panel {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 360px;
            max-width: 45vw;
            background: #16162e;
            border-left: 2px solid #2a2a4a;
            z-index: 1002;
            display: flex; flex-direction: column;
            direction: rtl;
            box-shadow: -4px 0 20px rgba(0,0,0,0.4);
            animation: slideInRight 0.25s ease;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .compare-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; border-bottom: 1px solid #2a2a4a;
            background: linear-gradient(135deg, #16213e, #0f3460);
            flex-shrink: 0;
        }
        .compare-header h2 { margin: 0; font-size: 15px; color: #e0e0ff; display: flex; align-items: center; gap: 6px; }
        .compare-close {
            background: none; border: none; color: #8888aa; font-size: 22px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
        }
        .compare-close:hover { color: #e94560; background: #2a2a4a; }
        .compare-hint-bar {
            padding: 10px 16px; background: rgba(142,202,230,0.08);
            border-bottom: 1px solid #2a2a4a; color: #8ecae6;
            font-size: 12px; text-align: center; flex-shrink: 0;
        }
        .compare-body { padding: 0; overflow-y: auto; flex: 1; }
        .compare-hint {
            color: #8888aa; font-size: 13px; text-align: center;
            padding: 40px 20px;
        }
        /* Card-based layout for each plan in comparison */
        .compare-card {
            padding: 12px 16px; border-bottom: 1px solid #1e1e3e;
            position: relative;
        }
        .compare-card:hover { background: rgba(142,202,230,0.03); }
        .compare-card-title {
            font-size: 13px; font-weight: 600; color: #e0e0ff;
            margin-bottom: 6px; padding-left: 24px;
        }
        .compare-card-num {
            font-size: 11px; color: #8888aa; margin-bottom: 8px;
        }
        .compare-card-remove {
            position: absolute; top: 10px; left: 10px;
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 16px; padding: 2px 6px;
            border-radius: 4px;
        }
        .compare-card-remove:hover { color: #e94560; background: #2a2a4a; }
        .compare-card-rows {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 4px 12px; font-size: 12px;
        }
        .compare-card-row {
            display: flex; justify-content: space-between;
            padding: 3px 0;
        }
        .compare-card-row-label { color: #8888aa; }
        .compare-card-row-value { color: #c0c0dd; font-weight: 500; }
        .compare-card-status {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 11px; font-weight: 600;
        }
        .compare-actions {
            padding: 10px 16px; border-top: 1px solid #2a2a4a;
            display: flex; gap: 8px; justify-content: center;
            flex-shrink: 0;
        }
        .compare-action-btn {
            background: #2a2a4a; border: 1px solid #3a3a5a; color: #c0c0dd;
            padding: 6px 16px; border-radius: 7px; cursor: pointer;
            font-size: 12px; font-family: inherit; transition: all 0.15s;
        }
        .compare-action-btn:hover { background: #3a3a5a; color: #fff; }
        .compare-action-btn.primary { background: #e94560; border-color: #e94560; color: #fff; }
        .compare-action-btn.primary:hover { background: #d6375a; }

        /* ── Print Modal ── */
        .print-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .print-modal {
            background: #16162e; border: 1px solid #2a2a4a; border-radius: 14px;
            width: 420px; max-width: 90vw; direction: rtl;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .print-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #2a2a4a;
        }
        .print-header h2 { margin: 0; font-size: 16px; color: #e0e0ff; }
        .print-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .print-field label {
            display: block; color: #8888aa; font-size: 12px; margin-bottom: 4px;
        }
        .print-field input[type="text"] {
            width: 100%; background: #1a1a3a; border: 1px solid #2a2a4a;
            border-radius: 7px; padding: 8px 12px; color: #e0e0ff;
            font-size: 13px; font-family: inherit; direction: rtl;
        }
        .print-field input[type="text"]:focus {
            outline: none; border-color: #4a69d1;
        }
        .print-checkbox {
            display: flex; align-items: center; gap: 8px;
            color: #c0c0dd; font-size: 13px; cursor: pointer;
        }
        .print-checkbox input { cursor: pointer; accent-color: #e94560; }
        .print-actions {
            padding: 14px 20px; border-top: 1px solid #2a2a4a;
            display: flex; gap: 8px; justify-content: flex-start;
        }

        /* ── Units Summary Modal ── */
        .units-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);

            background: rgba(15, 15, 30, 0.9);
            border: 1px solid #4a69d1;
            border-radius: 6px;
            padding: 4px 10px;
            color: #8ecae6;
            font-size: 12px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;

            direction: rtl;

        /* Crosshair cursor when measuring */

        #map.measuring * { cursor: crosshair !important; }
        #map.measuring.leaflet-dragging,
        #map.measuring.leaflet-dragging * { cursor: grabbing !important; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const WMS_URL = 'https://wms.qgiscloud.com/OrHirschhorn/ORANIM/wms';

        // Layers that are always visible (no toggle)
        const ALWAYS_ON_LAYERS = ['district_oranim', 'sub_neighborhoods', 'MinhalKehilati'];

        const LAYER_CONFIG = {
            planning: {
                title: 'תכנון',
                layers: [
                    { id: 'plans', name: 'תב"ע', desc: 'תוכניות בניין עיר', on: true },

        const HEBREW_FIELD_NAMES = {

            'SHAPE_Area': 'שטח', 'SHAPE_Leng': 'היקף',
            'layer': 'שכבה', 'path': 'נתיב',
        };

        const BASEMAPS = {
            osm: {
                name: 'OpenStreetMap',
                desc: 'מפת רחובות ושמות',
                url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                attribution: '&copy; OpenStreetMap contributors'
            },
            cartoDark: {
                name: 'כהה',
                desc: 'מפת רקע כהה',
                url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                attribution: '&copy; CartoDB'
            },
            cartoLight: {
                name: 'בהיר',
                desc: 'מפת רקע בהירה',
                url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                attribution: '&copy; CartoDB'
            },
            satellite: {
                name: 'תצ"א',
                desc: 'תצלום אוויר',
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                attribution: '&copy; Esri, Maxar, Earthstar Geographics'
            },
            none: {
                name: 'ללא',
                desc: 'ללא מפת רקע',
                url: '',
                attribution: ''
            }
        };

        // Status colors matching QGIS Cloud WMS symbology
        const STATUS_COLORS = {
            'אישור': '#50d25a',
            'מאושרת': '#50d25a',
            'תבע מאושרת': '#50d25a',
            'תבע - טרום אישור': '#50d25a',
            'תחילת תוקף': '#50d25a',
            'בהליך אישור': '#50d25a',
            'דיון בהתנגדויות ותיקונים': '#fafa3c',
            'הפקדה להתנגדויות/השגות': '#f56e05',
            'במילוי תנאים להפקדה': '#f56e05',
            'נפתח תיק למתכנן': '#eb0000',
            'נפתח תיק תב"ע': '#eb0000',
            'בבדיקה תכנונית': '#eb0000',
            'תכנית עומדת בתנאי סף': '#eb0000',
            'נקלטה מקובץ מבאת': '#eb0000',
            'נגנזה': '#888888',
            'נדחתה': '#888888',
        };

        const STAGE_COLORS = {
            'ג-רישוי בתהליך': '#4ba1f0',
            'ג-רישוי  בתהליך': '#4ba1f0',
            'ד-היתר בנייה': '#4b85e0',
            'ה-בבנייה': '#4a69d1',
            'ו-גמר בנייה': '#494cc2',
        };

        // Helper: add ogc: namespace prefix to OGC filter fragments for use inside SLD
        function addOgcNamespace(fragment) {
            if (!fragment) return '';
            return fragment
                .replace(/<PropertyIsEqualTo>/g, '<ogc:PropertyIsEqualTo>')
                .replace(/<\/PropertyIsEqualTo>/g, '</ogc:PropertyIsEqualTo>')
                .replace(/<PropertyIsNotEqualTo>/g, '<ogc:PropertyIsNotEqualTo>')
                .replace(/<\/PropertyIsNotEqualTo>/g, '</ogc:PropertyIsNotEqualTo>')
                .replace(/<PropertyIsGreaterThan>/g, '<ogc:PropertyIsGreaterThan>')
                .replace(/<\/PropertyIsGreaterThan>/g, '</ogc:PropertyIsGreaterThan>')
                .replace(/<PropertyName>/g, '<ogc:PropertyName>')
                .replace(/<\/PropertyName>/g, '</ogc:PropertyName>')
                .replace(/<Literal>/g, '<ogc:Literal>')
                .replace(/<\/Literal>/g, '</ogc:Literal>')
                .replace(/<Or>/g, '<ogc:Or>').replace(/<\/Or>/g, '</ogc:Or>')
                .replace(/<And>/g, '<ogc:And>').replace(/<\/And>/g, '</ogc:And>');
        }

        // SLD for permits: solid opaque fill by STAGE, with border
        function buildPermitsSLD(minahakOgcFragment) {
            const stages = [
                { values: ['ג-רישוי בתהליך', 'ג-רישוי  בתהליך'], color: '#4ba1f0' },
                { values: ['ד-היתר בנייה'], color: '#4b85e0' },
                { values: ['ה-בבנייה'], color: '#4a69d1' },
                { values: ['ו-גמר בנייה'], color: '#494cc2' },
            ];
            let rules = '';
            stages.forEach(s => {
                const stageFilters = s.values.map(v =>
                    `<ogc:PropertyIsEqualTo><ogc:PropertyName>stage</ogc:PropertyName><ogc:Literal>${v}</ogc:Literal></ogc:PropertyIsEqualTo>`
                );
                let stageOgc = stageFilters.length === 1 ? stageFilters[0] : `<ogc:Or>${stageFilters.join('')}</ogc:Or>`;
                let filterBody;
                if (minahakOgcFragment) {
                    const nsMinahak = addOgcNamespace(minahakOgcFragment);
                    filterBody = `<ogc:And>${stageOgc}${nsMinahak}</ogc:And>`;
                } else {
                    filterBody = stageOgc;
                }
                rules += `<Rule><ogc:Filter>${filterBody}</ogc:Filter>` +
                    `<PolygonSymbolizer>` +
                    `<Fill><CssParameter name="fill">${s.color}</CssParameter><CssParameter name="fill-opacity">0.85</CssParameter></Fill>` +
                    `<Stroke><CssParameter name="stroke">${s.color}</CssParameter><CssParameter name="stroke-width">2</CssParameter></Stroke>` +
                    `</PolygonSymbolizer></Rule>`;
            });
            return `<?xml version="1.0" encoding="UTF-8"?>` +
                `<StyledLayerDescriptor version="1.0.0" xmlns="http://www.opengis.net/sld" xmlns:ogc="http://www.opengis.net/ogc" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">` +
                `<NamedLayer><Name>plans</Name><UserStyle><Title>permits_solid</Title>` +
                `<FeatureTypeStyle>${rules}</FeatureTypeStyle>` +
                `</UserStyle></NamedLayer></StyledLayerDescriptor>`;
        }

        // Build topic definitions: filter, color, style type
        function getTopicDefs(planningTopics) {
            const topics = [];
            if (planningTopics.overlapping) {
                topics.push({
                    ogcFilter: ogcGt('overlapping_plans', '0'),
                    color: '#3366ff',
                    style: 'hatch'
                });
            }
            if (planningTopics.densification) {
                const statusVals = ['תחילת תוקף','תבע מאושרת','מאושרת','אישור','בהליך אישור'];
                topics.push({
                    ogcFilter: ogcAnd([
                        ogcOr(statusVals.map(s => ogcEq('status_mavat', s))),
                        ogcGt('units_add', '0')
                    ]),
                    color: '#ff8c00',
                    style: 'hatch'
                });
            }
            if (planningTopics.objections) {
                topics.push({
                    ogcFilter: ogcEq('status_mavat', 'הפקדה להתנגדויות/השגות'),
                    color: '#dd0000',
                    style: 'outline'
                });
            }
            return topics;
        }

        // SLD for topics: solid fill (hatching via CSS mask) or outline-only
        // FILTER param pre-filters to only matching features, so no ElseFilter needed
        function buildTopicsSLD(topicDefs, minahakOgcFragment) {
            if (topicDefs.length === 0) return null;
            const nsMinahak = minahakOgcFragment ? addOgcNamespace(minahakOgcFragment) : null;
            let rules = '';
            topicDefs.forEach(t => {
                const nsFilter = addOgcNamespace(t.ogcFilter);
                let filterBody = nsMinahak ? `<ogc:And>${nsFilter}${nsMinahak}</ogc:And>` : nsFilter;
                if (t.style === 'outline') {
                    rules += `<Rule><ogc:Filter>${filterBody}</ogc:Filter>` +
                        `<PolygonSymbolizer>` +
                        `<Stroke><CssParameter name="stroke">${t.color}</CssParameter><CssParameter name="stroke-width">3</CssParameter></Stroke>` +
                        `</PolygonSymbolizer></Rule>`;
                } else {
                    // Solid fill — CSS mask-image will create the hatching pattern
                    rules += `<Rule><ogc:Filter>${filterBody}</ogc:Filter>` +
                        `<PolygonSymbolizer>` +
                        `<Fill><CssParameter name="fill">${t.color}</CssParameter><CssParameter name="fill-opacity">0.7</CssParameter></Fill>` +
                        `<Stroke><CssParameter name="stroke">${t.color}</CssParameter><CssParameter name="stroke-width">2</CssParameter></Stroke>` +
                        `</PolygonSymbolizer></Rule>`;
                }
            });
            return `<?xml version="1.0" encoding="UTF-8"?>` +
                `<StyledLayerDescriptor version="1.0.0" xmlns="http://www.opengis.net/sld" xmlns:ogc="http://www.opengis.net/ogc" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">` +
                `<NamedLayer><Name>plans</Name><UserStyle><Title>topics</Title>` +
                `<FeatureTypeStyle>${rules}</FeatureTypeStyle>` +
                `</UserStyle></NamedLayer></StyledLayerDescriptor>`;
        }

        // Build OGC FILTER for pre-filtering matching features (OR of all active topics)
        function buildTopicsFilter(topicDefs, minahakOgcFragment) {
            if (topicDefs.length === 0) return null;
            const parts = topicDefs.map(t => t.ogcFilter);
            let combined = parts.length === 1 ? parts[0] : ogcOr(parts);
            if (minahakOgcFragment) combined = ogcAnd([combined, minahakOgcFragment]);
            return `(${ogcFilter(combined)})`;
        }

        const PLANS_LEGEND = [
            { label: 'אישור / מאושרת', color: '#50d25a' },
            { label: 'בהליך אישור', color: '#50d25a' },
            { label: 'התנגדויות', color: '#fafa3c' },
            { label: 'הפקדה', color: '#f56e05' },
            { label: 'במילוי תנאים להפקדה', color: '#f56e05' },
            { label: 'פתיחת תיק / בבדיקה', color: '#eb0000' },
        ];

        const PERMITS_LEGEND = [
            { label: 'ג-רישוי בתהליך', color: '#4ba1f0' },
            { label: 'ד-היתר בנייה', color: '#4b85e0' },
            { label: 'ה-בבנייה', color: '#4a69d1' },
            { label: 'ו-גמר בנייה', color: '#494cc2' },
        ];

        const TOPICS_LEGEND = [
            { label: 'תבעות כפולות על אותו מרחב', color: '#3366ff', style: 'hatch' },
            { label: 'תכניות לעיבוי שטחים חומים', color: '#ff8c00', style: 'hatch' },
            { label: 'תכניות המופקדות להתנגדויות', color: '#dd0000', style: 'outline' },
        ];

        // Minahak -> sub-neighborhoods mapping (for tama38 filtering)
        const MINAHAK_SUBS = {
            'א.ת. תלפיות': ['א.ת. תלפיות', 'איתרי', 'תלפיות - תעשייה ומסחר'],
            'בית צפאפא': ['בית צפאפא', 'בית צפאפא,שרפת', 'גבעת השקד', 'טנטור'],
            'בקעה רבתי': ['ארנונה', 'בקעה', 'גבעת חנניה - אבו תור', 'מקור חיים', 'מתחם הרכבת', 'צפון תלפיות', 'שיכוני תלפיות', 'תלפיות', 'תלפיות ארנונה'],
            // 'גבעת המטוס': ['גבעת המטוס'], // no WMS layer available
            'גוננים': ['גוננים א-ו', 'פת', 'קטמונים', 'קטמונים ח-ט', 'רסקו', 'רסקו - גבעת הורדים'],
            'גינות העיר': ['המושבה היוונית', 'ניות', 'עמק רפאים - המושבה הגרמנית', 'קוממיות - טלביה', 'קטמון הישנה', 'רחביה'],
            'מינהל מוסדי מלחה': ['מרכז ספורט מנחת - מלחה'],
        };

        const CENTER = [31.7530, 35.2100];
        const DEFAULT_ZOOM = 15;

        // Helper: build OGC XML filter for a single property equality
        function ogcEq(prop, val) {
            return `<PropertyIsEqualTo><PropertyName>${prop}</PropertyName><Literal>${val}</Literal></PropertyIsEqualTo>`;
        }
        function ogcNeq(prop, val) {
            return `<PropertyIsNotEqualTo><PropertyName>${prop}</PropertyName><Literal>${val}</Literal></PropertyIsNotEqualTo>`;
        }
        function ogcGt(prop, val) {
            return `<PropertyIsGreaterThan><PropertyName>${prop}</PropertyName><Literal>${val}</Literal></PropertyIsGreaterThan>`;
        }
        function ogcOr(parts) { return parts.length === 1 ? parts[0] : `<Or>${parts.join('')}</Or>`; }
        function ogcAnd(parts) { return parts.length === 1 ? parts[0] : `<And>${parts.join('')}</And>`; }
        function ogcFilter(body) { return `<Filter>${body}</Filter>`; }

        // Build multi-layer FILTER param: (filter1)(filter2)... empty () means no filter
        function buildMultiFilter(layersCsv, filterMap) {
            const layers = layersCsv.split(',');
            const parts = layers.map(l => {
                const f = filterMap[l];
                return f ? `(${ogcFilter(f)})` : '()';
            });
            // If no filters at all, return null
            if (parts.every(p => p === '()')) return null;
            return parts.join('');
        }

        // Helper: build a WMS GetMap URL for the current map view
        // opts: { sldBody } for SLD_BODY styling
        function buildWmsUrl(baseUrl, layersCsv, bounds, size, ogcFilterStr, opts) {
            const sw = bounds.getSouthWest();
            const ne = bounds.getNorthEast();
            const params = new URLSearchParams({
                SERVICE: 'WMS',
                VERSION: '1.3.0',
                REQUEST: 'GetMap',
                LAYERS: layersCsv,
                CRS: 'EPSG:4326',
                BBOX: [sw.lat, sw.lng, ne.lat, ne.lng].join(','),
                WIDTH: Math.round(size.x),
                HEIGHT: Math.round(size.y),
                FORMAT: 'image/png',
                TRANSPARENT: 'true',
                DPI: 96
            });
            if (ogcFilterStr) {
                params.set('FILTER', ogcFilterStr);
            }
            if (opts && opts.sldBody) {
                // Keep FILTER if present - FILTER pre-filters features, SLD styles them
                params.set('SLD_BODY', opts.sldBody);
            }
            return baseUrl + '?' + params.toString();
        }

        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [layers, setLayers] = useState(() => {
                const initial = {};
                Object.values(LAYER_CONFIG).forEach(group => {
                    group.layers.forEach(l => { initial[l.id] = l.on; });
                });
                return initial;
            });
            const [opacity, setOpacity] = useState(0.85);
            const [basemap, setBasemap] = useState('cartoLight');
            const [loading, setLoading] = useState(false);
            const [loadingBuildings, setLoadingBuildings] = useState(false);
            const [cursorPos, setCursorPos] = useState(null);
            const [searchText, setSearchText] = useState('');
            const [planSearch, setPlanSearch] = useState('');
            const [planIndex, setPlanIndex] = useState([]);
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [planningTopics, setPlanningTopics] = useState({
                overlapping: false,   // תבעות כפולות על אותו מרחב
                densification: false, // תכניות לעיבוי שטחים חומים
                objections: false     // תכניות המופקדות להתנגדויות
            });
            const [legendPopup, setLegendPopup] = useState(null); // { title, items }
            const [mapScale, setMapScale] = useState('');
            const [measureMode, setMeasureMode] = useState(null); // null | 'distance' | 'area'
            const [measureDropdown, setMeasureDropdown] = useState(false);
            const [measureResult, setMeasureResult] = useState(null); // { type, value, unit }
            const measureRef = useRef({ points: [], layers: [], tooltip: null, guideLine: null });
            const [showCompare, setShowCompare] = useState(false);
            const [compareFeatures, setCompareFeatures] = useState([]); // array of feature props
            const [showPrint, setShowPrint] = useState(false);
            const [printTitle, setPrintTitle] = useState('');
            const [printShowLegend, setPrintShowLegend] = useState(true);
            const [printShowTitle, setPrintShowTitle] = useState(true);
            const [activeDropdown, setActiveDropdown] = useState(null); // 'measure' | null
            const [showUnits, setShowUnits] = useState(false);
            const [unitsData, setUnitsData] = useState(null); // { minahaks, byMinahak }
            const [unitsLoading, setUnitsLoading] = useState(false);
            const [unitsExpanded, setUnitsExpanded] = useState(null); // null | 'type' | 'status'
            const [unitsDrilldown, setUnitsDrilldown] = useState(null); // minahak name for drill-down view

            // Load plan search index
            useEffect(() => {
                fetch('plans_index.json')
                    .then(res => res.json())
                    .then(data => setPlanIndex(data))
                    .catch(err => console.error('Failed to load plan index:', err));
            }, []);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const wmsLayerRef = useRef(null);
            const baseTileRef = useRef(null);
            const layersRef = useRef(layers);
            const showCompareRef = useRef(showCompare);

            // Initialize map
            useEffect(() => {
                if (mapInstanceRef.current) return;

                const map = L.map('map', {
                    center: CENTER,
                    zoom: DEFAULT_ZOOM,
                    zoomControl: false,
                    maxZoom: 22,
                    minZoom: 13
                });

                L.control.zoom({ position: 'topleft' }).addTo(map);
                L.control.scale({ position: 'bottomleft', imperial: false }).addTo(map);

                map.on('mousemove', (e) => {
                    setCursorPos({ lat: e.latlng.lat.toFixed(5), lng: e.latlng.lng.toFixed(5) });
                });

                // Scale indicator
                const updateScale = () => {
                    const center = map.getCenter();
                    const metersPerPixel = 40075016.686 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, map.getZoom() + 8);
                    const dpi = 96;
                    const metersPerInch = metersPerPixel * dpi;
                    const scale = Math.round(metersPerInch * 39.3701);
                    setMapScale('1:' + scale.toLocaleString());
                };
                map.on('zoomend moveend', updateScale);
                setTimeout(updateScale, 200);

                mapInstanceRef.current = map;
                window.__map = map;

                // Ensure map fills container after initial render
                setTimeout(() => map.invalidateSize(), 100);

                return () => { map.remove(); mapInstanceRef.current = null; };
            }, []);

            // Update basemap
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                if (baseTileRef.current) {
                    map.removeLayer(baseTileRef.current);
                    baseTileRef.current = null;
                }

                const bm = BASEMAPS[basemap];
                if (bm.url) {
                    baseTileRef.current = L.tileLayer(bm.url, {
                        attribution: bm.attribution,
                        maxZoom: 22
                    }).addTo(map);
                    baseTileRef.current.bringToBack();
                }
            }, [basemap]);

            // Keep refs in sync
            useEffect(() => { layersRef.current = layers; }, [layers]);
            useEffect(() => { showCompareRef.current = showCompare; }, [showCompare]);

            // Cursor probe: throttled GetFeatureInfo on mousemove
            // Fires immediately on first move, then at most every 300ms.
            // Does NOT abort in-flight requests — uses a sequence counter
            // so only the latest response determines cursor state.
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const container = map.getContainer();
                let isDragging = false;
                let seq = 0;           // sequence counter — only latest response wins
                let lastFireTime = 0;  // timestamp of last probe fire
                let pendingEvent = null;
                let throttleTimer = null;

                function setCursorPointer(on) {
                    if (on) {
                        container.classList.add('wms-pointer');
                    } else {
                        container.classList.remove('wms-pointer');
                    }
                }

                function fireProbe(e) {
                    if (isDragging) return;
                    const ly = layersRef.current;
                    const hasPlans = ly['plans'];
                    const hasPermits = ly['permits'];
                    const hasTama38 = ly['tama38'];
                    if (!hasPlans && !hasPermits && !hasTama38) {
                        setCursorPointer(false);
                        return;
                    }

                    const size = map.getSize();
                    const bounds = map.getBounds();
                    const sw = bounds.getSouthWest();
                    const ne = bounds.getNorthEast();
                    const bboxStr = `${sw.lat},${sw.lng},${ne.lat},${ne.lng}`;
                    const queryLayers = [];
                    if (hasPlans || hasPermits) queryLayers.push('plans');
                    if (hasTama38) queryLayers.push('tama38');

                    const params = new URLSearchParams({
                        SERVICE: 'WMS', VERSION: '1.3.0', REQUEST: 'GetFeatureInfo',
                        CRS: 'EPSG:4326', BBOX: bboxStr,
                        WIDTH: size.x, HEIGHT: size.y,
                        I: Math.round(e.containerPoint.x),
                        J: Math.round(e.containerPoint.y),
                        INFO_FORMAT: 'application/json',
                        FEATURE_COUNT: 1,
                        LAYERS: queryLayers.join(','),
                        QUERY_LAYERS: queryLayers.join(',')
                    });

                    const mySeq = ++seq;
                    lastFireTime = Date.now();

                    fetch(`${WMS_URL}?${params.toString()}`)
                        .then(r => r.json())
                        .then(data => {
                            // Only apply if this is still the latest request
                            if (mySeq !== seq) return;
                            setCursorPointer(!!(data.features && data.features.length > 0));
                        })
                        .catch(() => {
                            if (mySeq !== seq) return;
                            setCursorPointer(false);
                        });
                }

                function onMouseMove(e) {
                    if (isDragging) return;
                    pendingEvent = e;
                    const now = Date.now();
                    const elapsed = now - lastFireTime;

                    if (elapsed >= 300) {
                        // Enough time passed — fire immediately
                        clearTimeout(throttleTimer);
                        fireProbe(e);
                    } else if (!throttleTimer) {
                        // Schedule a trailing fire
                        throttleTimer = setTimeout(() => {
                            throttleTimer = null;
                            if (pendingEvent && !isDragging) {
                                fireProbe(pendingEvent);
                            }
                        }, 300 - elapsed);
                    }
                }

                function onDragStart() {
                    isDragging = true;
                    clearTimeout(throttleTimer);
                    throttleTimer = null;
                    setCursorPointer(false);
                }
                function onDragEnd() { isDragging = false; }

                function onMouseOut() {
                    clearTimeout(throttleTimer);
                    throttleTimer = null;
                    pendingEvent = null;
                    ++seq; // invalidate any in-flight requests
                    setCursorPointer(false);
                }

                map.on('mousemove', onMouseMove);
                map.on('mouseout', onMouseOut);
                map.on('dragstart', onDragStart);
                map.on('dragend', onDragEnd);

                return () => {
                    map.off('mousemove', onMouseMove);
                    map.off('mouseout', onMouseOut);
                    map.off('dragstart', onDragStart);
                    map.off('dragend', onDragEnd);
                    clearTimeout(throttleTimer);
                    ++seq;
                    setCursorPointer(false);
                };
            }, []);

            // ── Measurement tool logic ──
            const clearMeasurement = useCallback(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const m = measureRef.current;
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);
            }, []);

            const stopMeasure = useCallback(() => {
                clearMeasurement();
                setMeasureMode(null);
                const map = mapInstanceRef.current;
                if (map) map.getContainer().classList.remove('measuring');
            }, [clearMeasurement]);

            // Format distance in m/km
            function fmtDist(m) {
                if (m >= 1000) return (m / 1000).toFixed(2) + ' ק"מ';
                return Math.round(m) + ' מ\'';
            }
            // Format area in dunam / sqm
            function fmtArea(sqm) {
                const dunam = sqm / 1000;
                if (dunam >= 1) return dunam.toFixed(2) + ' דונם' + ' (' + Math.round(sqm).toLocaleString() + ' מ"ר)';
                return Math.round(sqm).toLocaleString() + ' מ"ר';
            }
            // Compute total polyline distance
            function polylineDist(pts) {
                let d = 0;
                for (let i = 1; i < pts.length; i++) d += pts[i - 1].distanceTo(pts[i]);
                return d;
            }
            // Compute polygon area using Shoelace on projected coords
            function polygonArea(pts) {
                if (pts.length < 3) return 0;
                // Use L.GeometryUtil if available, otherwise Gauss's formula on EPSG:4326
                // Spherical excess method for better accuracy
                const toRad = Math.PI / 180;
                const R = 6378137;
                let area = 0;
                const n = pts.length;
                for (let i = 0; i < n; i++) {
                    const j = (i + 1) % n;
                    const k = (i + 2) % n;
                    area += (pts[j].lng * toRad - pts[i].lng * toRad) *
                        (2 + Math.sin(pts[i].lat * toRad) + Math.sin(pts[j].lat * toRad));
                }
                area = Math.abs(area * R * R / 2);
                return area;
            }

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const container = map.getContainer();

                if (!measureMode) {
                    container.classList.remove('measuring');
                    return;
                }

                container.classList.add('measuring');
                const m = measureRef.current;
                // Clear any previous measurement
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);

                const lineStyle = { color: '#e94560', weight: 2, dashArray: '6 4' };
                const fillStyle = { color: '#e94560', fillColor: 'rgba(233,69,96,0.15)', weight: 2, dashArray: '6 4' };
                const vertexStyle = { radius: 5, color: '#e94560', fillColor: '#fff', fillOpacity: 1, weight: 2 };

                function updateTooltip(latlng, text) {
                    if (m.tooltip) {
                        m.tooltip.setLatLng(latlng).setContent(text);
                    } else {
                        m.tooltip = L.tooltip({
                            permanent: true,
                            direction: 'top',
                            offset: [0, -10],
                            className: 'measure-tooltip'
                        }).setLatLng(latlng).setContent(text).addTo(map);
                    }
                }

                function onMapClick(e) {
                    // Ignore clicks on controls/popups
                    if (e.originalEvent && (
                        e.originalEvent.target.closest('.leaflet-control') ||
                        e.originalEvent.target.closest('.leaflet-popup') ||
                        e.originalEvent.target.closest('.map-toolbar') ||
                        e.originalEvent.target.closest('.measure-result')
                    )) return;

                    const pt = e.latlng;
                    m.points.push(pt);

                    // Add vertex marker
                    const marker = L.circleMarker(pt, vertexStyle).addTo(map);
                    m.layers.push(marker);

                    if (measureMode === 'distance') {
                        if (m.points.length > 1) {
                            const line = L.polyline(m.points, lineStyle).addTo(map);
                            // Remove old line if exists
                            if (m.mainLine) map.removeLayer(m.mainLine);
                            m.mainLine = line;
                            m.layers.push(line);
                        }
                        const dist = polylineDist(m.points);
                        if (dist > 0) {
                            updateTooltip(pt, fmtDist(dist));
                            setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        }
                    } else {
                        // Area mode
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        if (m.points.length >= 2) {
                            const poly = L.polygon(m.points, fillStyle).addTo(map);
                            m.mainPoly = poly;
                            m.layers.push(poly);
                        }
                        if (m.points.length >= 3) {
                            const area = polygonArea(m.points);
                            updateTooltip(pt, fmtArea(area));
                            setMeasureResult({ type: 'area', value: fmtArea(area) });
                        } else {
                            updateTooltip(pt, 'לחצו נקודות נוספות');
                        }
                    }
                }

                function onMouseMove(e) {
                    if (m.points.length === 0) return;
                    const lastPt = m.points[m.points.length - 1];
                    // Draw guide line from last point to cursor
                    if (m.guideLine) map.removeLayer(m.guideLine);
                    m.guideLine = L.polyline([lastPt, e.latlng], {
                        color: '#8888aa', weight: 1, dashArray: '4 4'
                    }).addTo(map);

                    // Show running measurement in tooltip
                    if (measureMode === 'distance') {
                        const totalDist = polylineDist(m.points) + lastPt.distanceTo(e.latlng);
                        updateTooltip(e.latlng, fmtDist(totalDist));
                    } else if (m.points.length >= 2) {
                        const tempPts = [...m.points, e.latlng];
                        const area = polygonArea(tempPts);
                        updateTooltip(e.latlng, fmtArea(area));
                    }
                }

                function onDblClick(e) {
                    L.DomEvent.stopPropagation(e);
                    L.DomEvent.preventDefault(e);
                    // Finish measurement
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }

                    if (measureMode === 'distance' && m.points.length >= 2) {
                        // Finalize line — solid
                        if (m.mainLine) map.removeLayer(m.mainLine);
                        const finalLine = L.polyline(m.points, { color: '#e94560', weight: 3 }).addTo(map);
                        m.layers.push(finalLine);
                        const dist = polylineDist(m.points);
                        setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        updateTooltip(m.points[m.points.length - 1], fmtDist(dist));
                    } else if (measureMode === 'area' && m.points.length >= 3) {
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        const finalPoly = L.polygon(m.points, {
                            color: '#e94560', fillColor: 'rgba(233,69,96,0.2)', weight: 3
                        }).addTo(map);
                        m.layers.push(finalPoly);
                        const area = polygonArea(m.points);
                        setMeasureResult({ type: 'area', value: fmtArea(area) });
                        updateTooltip(m.points[m.points.length - 1], fmtArea(area));
                    }

                    // Stop listening but keep result visible
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);
                    container.classList.remove('measuring');
                }

                function onKeyDown(e) {
                    if (e.key === 'Escape') {
                        stopMeasure();
                        document.removeEventListener('keydown', onKeyDown);
                    }
                }

                // Disable double-click zoom while measuring
                map.doubleClickZoom.disable();

                map.on('click', onMapClick);
                map.on('mousemove', onMouseMove);
                map.on('dblclick', onDblClick);
                document.addEventListener('keydown', onKeyDown);

                return () => {
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);
                    document.removeEventListener('keydown', onKeyDown);
                    map.doubleClickZoom.enable();
                    container.classList.remove('measuring');
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }
                };
            }, [measureMode, stopMeasure]);

            // ── Comparison table: add feature from popup ──
            const addToCompare = useCallback((props) => {
                setCompareFeatures(prev => {
                    if (prev.some(f => f.pl_number === props.pl_number)) return prev;
                    return [...prev, props];
                });
                setShowCompare(true);
            }, []);

            // Expose addToCompare globally so popup buttons can call it
            window.__addToCompare = addToCompare;

            // ── Print function ──
            const handlePrint = useCallback(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                // Build a print-friendly page
                const mapContainer = map.getContainer();
                const canvas = mapContainer.querySelector('canvas');

                // Use leaflet-image alternative: screenshot via html2canvas-like approach
                // For simplicity, use window.print() with a styled print view
                const title = printShowTitle ? (printTitle || 'מפת אורנים - תכנון עירוני') : '';

                // Build legend HTML
                let legendHtml = '';
                if (printShowLegend) {
                    legendHtml = '<div style="margin-top:12px;border:1px solid #ccc;border-radius:8px;padding:12px;background:#f9f9f9;direction:rtl">';
                    legendHtml += '<div style="font-weight:bold;font-size:14px;margin-bottom:8px;border-bottom:1px solid #ddd;padding-bottom:6px">מקרא</div>';
                    legendHtml += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
                    PLANS_LEGEND.forEach(item => {
                        legendHtml += `<div style="display:flex;align-items:center;gap:4px;font-size:11px">` +
                            `<span style="width:14px;height:14px;border-radius:3px;background:${item.color};display:inline-block;border:1px solid #aaa"></span>` +
                            `${item.label}</div>`;
                    });
                    legendHtml += '</div></div>';
                }

                const printWin = window.open('', '_blank');
                if (!printWin) { alert('נא לאפשר חלונות קופצים להדפסה'); return; }

                // Capture all tile/overlay images from the map
                const imgs = mapContainer.querySelectorAll('img');
                const mapRect = mapContainer.getBoundingClientRect();

                let imgsHtml = '';
                imgs.forEach(img => {
                    if (!img.src || img.style.display === 'none' || !img.offsetParent) return;
                    const r = img.getBoundingClientRect();
                    const left = r.left - mapRect.left;
                    const top = r.top - mapRect.top;
                    imgsHtml += `<img src="${img.src}" style="position:absolute;left:${left}px;top:${top}px;width:${r.width}px;height:${r.height}px;opacity:${img.style.opacity || 1}" crossorigin="anonymous" />`;
                });

                // Also capture SVG overlays (polylines etc)
                const svgs = mapContainer.querySelectorAll('svg.leaflet-zoom-animated');
                let svgHtml = '';
                svgs.forEach(svg => {
                    const r = svg.getBoundingClientRect();
                    const left = r.left - mapRect.left;
                    const top = r.top - mapRect.top;
                    svgHtml += `<div style="position:absolute;left:${left}px;top:${top}px;width:${r.width}px;height:${r.height}px">${svg.outerHTML}</div>`;
                });

                printWin.document.write(`<!DOCTYPE html><html lang="he" dir="rtl"><head>
                    <meta charset="UTF-8">
                    <title>${title || 'הדפסת מפה'}</title>
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; padding: 20px; }
                        @media print { body { padding: 10px; } .no-print { display: none !important; } @page { margin: 10mm; } }
                        .print-title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 12px; color: #1a1a2e; }
                        .print-date { font-size: 11px; color: #888; text-align: center; margin-bottom: 12px; }
                        .map-frame { position: relative; width: 100%; aspect-ratio: ${mapRect.width}/${mapRect.height}; overflow: hidden; border: 2px solid #333; border-radius: 4px; background: #f0f0f0; }
                        .print-actions { margin-top: 16px; text-align: center; }
                        .print-actions button { padding: 8px 24px; font-size: 14px; cursor: pointer; background: #e94560; color: #fff; border: none; border-radius: 6px; font-family: inherit; }
                    </style>
                </head><body>
                    ${title ? `<div class="print-title">${title}</div>` : ''}
                    <div class="print-date">${new Date().toLocaleDateString('he-IL')} | ${mapScale}</div>
                    <div class="map-frame">${imgsHtml}${svgHtml}</div>
                    ${legendHtml}
                    <div class="print-actions no-print">
                        <button onclick="window.print()">🖨️ הדפס</button>
                    </div>
                </body></html>`);
                printWin.document.close();
                setShowPrint(false);
            }, [printTitle, printShowLegend, printShowTitle, mapScale]);

            // ── Units summary: fetch plans + tama38 and aggregate by minahak ──
            // Map tama38 neighborho → minahak
            const NEIGHBORHOOD_TO_MINAHAK = {
                'טלביה': 'גינות העיר', 'רחביה': 'גינות העיר',
                'קטמון הישנה': 'גינות העיר', 'גבעת הורדים': 'גוננים',
                'גבעת הורדים - רסקו': 'גוננים',
                'עמק רפאים': 'גינות העיר', 'עמק רפאים - המושבה הגרמנית': 'גינות העיר',
                'עמק רפאים- המושבה הגרמנית': 'גינות העיר',
                'ארנונה': 'בקעה רבתי',
                'תלפיות': 'בקעה רבתי',
                'בית צפאפא': 'בית צפאפא',
                'מלחה': 'מינהל מוסדי מלחה',
            };

            const fetchUnitsData = useCallback(() => {
                if (unitsData) { setShowUnits(true); return; } // cached
                setUnitsLoading(true);
                setShowUnits(true);

                const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJU2Odzsa_d789A5545sSFnUGsrXuW2VTj3xCNEtV1sOM13VNVeepGhzraHoQgLWBaGTCitS-4j7Sy/pub?output=csv';

                // Parse CSV (handles quoted fields with commas)
                function parseCSV(text) {
                    const rows = [];
                    let row = []; let field = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const ch = text[i];
                        if (inQuotes) {
                            if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
                            else if (ch === '"') { inQuotes = false; }
                            else { field += ch; }
                        } else {
                            if (ch === '"') { inQuotes = true; }
                            else if (ch === ',') { row.push(field); field = ''; }
                            else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
                                row.push(field); field = '';
                                if (row.length > 1) rows.push(row);
                                row = [];
                                if (ch === '\r') i++;
                            } else { field += ch; }
                        }
                    }
                    if (field || row.length) { row.push(field); rows.push(row); }
                    return rows;
                }

                // Fetch plans from Google Sheets + tama38 from WMS grid
                const plansPromise = fetch(sheetUrl).then(r => r.text()).then(csv => {
                    const rows = parseCSV(csv);
                    const header = rows[0];
                    return rows.slice(1).map(r => {
                        const obj = {};
                        header.forEach((h, i) => { obj[h] = r[i] || ''; });
                        return obj;
                    });
                }).catch(() => []);

                // Tama38: still use WMS grid (no spreadsheet available)
                const bbox = '31.73,35.18,31.78,35.24';
                const W = 800, H = 800;
                const tamaFeatures = new Map();
                const points = [];
                for (let x = 25; x < W; x += 50) {
                    for (let y = 25; y < H; y += 50) {
                        points.push([x, y]);
                    }
                }
                const tamaPromise = new Promise(resolve => {
                    let bIdx = 0;
                    const batchSize = 20;
                    const batches = [];
                    for (let i = 0; i < points.length; i += batchSize) batches.push(points.slice(i, i + batchSize));
                    function runBatch() {
                        if (bIdx >= batches.length) { resolve(tamaFeatures); return; }
                        Promise.all(batches[bIdx].map(([i, j]) => {
                            const params = new URLSearchParams({
                                SERVICE: 'WMS', VERSION: '1.3.0', REQUEST: 'GetFeatureInfo',
                                CRS: 'EPSG:4326', BBOX: bbox, WIDTH: W, HEIGHT: H,
                                I: i, J: j, INFO_FORMAT: 'application/json',
                                FEATURE_COUNT: 100, LAYERS: 'tama38', QUERY_LAYERS: 'tama38'
                            });
                            return fetch(`${WMS_URL}?${params}`)
                                .then(r => r.json()).then(d => d.features || []).catch(() => []);
                        })).then(results => {
                            results.flat().forEach(f => {
                                const id = f.properties.fid;
                                if (id != null && !tamaFeatures.has(id)) tamaFeatures.set(id, f.properties);
                            });
                            bIdx++; runBatch();
                        });
                    }
                    runBatch();
                });

                Promise.all([plansPromise, tamaPromise]).then(([planRows, tamaMap]) => {
                    // Aggregate
                    const minahakOrder = ['גינות העיר', 'בית צפאפא', 'גוננים', 'בקעה רבתי', 'מינהל מוסדי מלחה', 'א.ת. תלפיות'];
                    const byMinahak = {};
                    const bySub = {}; // { minahak: { subNeighborhood: { ... } } }
                    const STATUS_GROUPS = [
                        { key: 'approved', label: 'אישור / מאושרת', color: '#4CAF50',
                          match: ['אישור','מאושרת','תבע מאושרת','תחילת תוקף'] },
                        { key: 'in_approval', label: 'בהליך אישור', color: '#66BB6A',
                          match: ['בהליך אישור','תבע - טרום אישור'] },
                        { key: 'objections', label: 'התנגדויות', color: '#FDD835',
                          match: ['דיון בהתנגדויות ותיקונים'] },
                        { key: 'deposit', label: 'הפקדה', color: '#FDD835',
                          match: ['הפקדה להתנגדויות/השגות'] },
                        { key: 'conditions', label: 'במילוי תנאים להפקדה', color: '#FF9800',
                          match: ['במילוי תנאים להפקדה','תכנית עומדת בתנאי סף'] },
                        { key: 'open', label: 'פתיחת תיק / בדיקה', color: '#F44336',
                          match: ['נפתח תיק למתכנן','נפתח תיק תבע','בבדיקה תכנונית','נקלטה מקובץ מבאת'] },
                    ];
                    function getStatusGroup(status) {
                        for (const g of STATUS_GROUPS) {
                            if (g.match.includes(status)) return g.key;
                        }
                        return null;
                    }
                    const emptyRow = () => ({ units_in: 0, units_add: 0, renewal: 0, densification: 0, byStatus: {} });
                    minahakOrder.forEach(m => {
                        byMinahak[m] = emptyRow();
                        bySub[m] = {};
                    });

                    // Plans (from Google Sheets CSV)
                    planRows.forEach(p => {
                        const m = (p.minahak || '').trim();
                        if (!byMinahak[m]) { byMinahak[m] = emptyRow(); bySub[m] = {}; }
                        // Skip rejected/archived plans for units_add
                        const status = (p.Status_Mavat || p.status_mavat || '').trim();
                        const isRejected = status === 'נגנזה/נדחתה' || status === 'נגנזה' || status === 'נדחתה';
                        const addVal = isRejected ? 0 : (parseInt(p.Units_add || p.units_add) || 0);
                        const inVal = parseInt(p.Units_in || p.units_in) || 0;
                        byMinahak[m].units_in += inVal;
                        byMinahak[m].units_add += addVal;

                        const pt = (p.plan_type || '').trim();
                        if (pt.includes('התחדשות')) {
                            byMinahak[m].renewal += addVal;
                        } else if (pt.includes('עיבוי')) {
                            byMinahak[m].densification += addVal;
                        }

                        // Per-status group breakdown
                        if (!isRejected && addVal > 0 && status) {
                            const grp = getStatusGroup(status);
                            if (grp) byMinahak[m].byStatus[grp] = (byMinahak[m].byStatus[grp] || 0) + addVal;
                        }

                        // Per sub-neighborhood breakdown
                        const sub = (p.sub_neighborhood || p.neighborhood || 'אחר').trim() || 'אחר';
                        if (!bySub[m][sub]) bySub[m][sub] = emptyRow();
                        bySub[m][sub].units_in += inVal;
                        bySub[m][sub].units_add += addVal;
                        if (pt.includes('התחדשות')) {
                            bySub[m][sub].renewal += addVal;
                        } else if (pt.includes('עיבוי')) {
                            bySub[m][sub].densification += addVal;
                        }
                        if (!isRejected && addVal > 0 && status) {
                            bySub[m][sub].byStatus[status] = (bySub[m][sub].byStatus[status] || 0) + addVal;
                        }
                    });

                    // Tama38 — add to units_add and to renewal (התחדשות עירונית)
                    tamaMap.forEach(p => {
                        const neighborho = (p.neighborho || '').trim();
                        const m = NEIGHBORHOOD_TO_MINAHAK[neighborho] || '';
                        if (!m) return;
                        if (!byMinahak[m]) { byMinahak[m] = emptyRow(); bySub[m] = {}; }
                        const tose = parseInt(p.units_tose) || 0;
                        byMinahak[m].units_add += tose;
                        byMinahak[m].renewal += tose; // tama38 = התחדשות עירונית

                        // Per sub-neighborhood: use neighborho as sub name
                        const sub = neighborho || 'אחר';
                        if (!bySub[m][sub]) bySub[m][sub] = emptyRow();
                        bySub[m][sub].units_add += tose;
                        bySub[m][sub].renewal += tose;
                    });

                    // Fixed units_in values provided by user
                    const fixedUnitsIn = {
                        'בית צפאפא': 4262,
                        'גוננים': 9235,
                        'בקעה רבתי': 11521,
                        'גינות העיר': 16569,
                        'מינהל מוסדי מלחה': 0,
                        'א.ת. תלפיות': 643,
                    };
                    Object.entries(fixedUnitsIn).forEach(([m, val]) => {
                        if (byMinahak[m]) byMinahak[m].units_in = val;
                    });

                    const minahaks = minahakOrder.filter(m => byMinahak[m]);
                    Object.keys(byMinahak).forEach(m => {
                        if (!minahaks.includes(m) && m) minahaks.push(m);
                    });

                    setUnitsData({ minahaks, byMinahak, bySub, statusGroups: STATUS_GROUPS });
                    setUnitsLoading(false);
                });
            }, [unitsData]);

            // WMS overlays split by priority:
            // 1. High priority: plans + always-on + non-buildings layers (loads first)
            // 2. Low priority: buildings layer (loads with 1s delay)
            // 3. Separate: permits (CQL filtered)
            // All use double-buffering to keep old image while new loads.
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                // Clean up previous
                if (wmsLayerRef.current) {
                    const r = wmsLayerRef.current;
                    [r.mainFront, r.mainBack, r.bldgFront, r.bldgBack, r.permitFront, r.permitBack, r.hatchFront, r.hatchBack]
                        .forEach(o => { if (o) map.removeLayer(o); });
                    map.off('moveend', r.handler);
                    clearTimeout(r.debounceTimer);
                    clearTimeout(r.bldgTimerRef.current);
                    wmsLayerRef.current = null;
                }

                // Expand combined layers (e.g. rakl -> rakl + rakl_src)
                const combinedMap = {};
                Object.values(LAYER_CONFIG).forEach(g =>
                    g.layers.forEach(l => { if (l.combined) combinedMap[l.id] = l.combined; })
                );
                const toggledLayers = Object.entries(layers)
                    .filter(([id, on]) => on && id !== 'permits' && id !== 'buildings')
                    .flatMap(([id]) => combinedMap[id] || [id]);
                const mainLayers = [...new Set([...ALWAYS_ON_LAYERS, ...toggledLayers])];
                const showBuildings = layers['buildings'];
                const showPermits = layers['permits'];

                if (mainLayers.length === 0 && !showBuildings && !showPermits) return;

                // --- Minahak spatial filter (OGC XML) ---
                const adminLayers = LAYER_CONFIG.admin.layers;
                const allAdminOn = adminLayers.every(l => layers[l.id]);
                const selectedMinahaks = adminLayers.filter(l => layers[l.id]).map(l => l.minahak);

                // Build OGC filter fragments for minahak
                let minahakPlansOgc = null;
                let minahakTama38Ogc = null;
                if (!allAdminOn && selectedMinahaks.length > 0) {
                    // OR of PropertyIsEqualTo for each selected minahak
                    minahakPlansOgc = ogcOr(selectedMinahaks.map(m => ogcEq('minahak', m)));
                    // For tama38: collect sub-neighborhoods

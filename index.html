<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אורנים - תכנון עירוני</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
            overflow: hidden;
            height: 100vh;
        }

        #root { height: 100vh; display: flex; }

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: margin-right 0.3s ease;
            z-index: 1000;
            position: relative;
        }

        .sidebar.collapsed {
            margin-right: -320px;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }

        .sidebar-header h1 {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85em;
            color: #a0a0b0;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
        }

        .sidebar-section h3 {
            font-size: 0.9em;
            color: #e94560;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .layer-group-title {
            font-size: 0.8em;
            color: #8888aa;
            margin: 10px 0 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .layer-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }

        .layer-item:hover { background: #2a2a4a; }

        .layer-item input[type="checkbox"] {
            margin-left: 10px;
            accent-color: #e94560;
            width: 16px;
            height: 16px;
            min-width: 16px;
            min-height: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: #1a1a3a;
            border: 2px solid #555;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .layer-item input[type="checkbox"]:checked {
            background: #e94560;
            border-color: #e94560;
        }
        .layer-item input[type="checkbox"]:checked::after {
            content: '✓';
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            line-height: 1;
        }

        .layer-item label {
            cursor: pointer;
            font-size: 0.9em;
            flex: 1;
        }

        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        .leaflet-control-attribution {
            font-size: 10px !important;
            opacity: 0.5 !important;
        }

        .wms-overlay {
            transition: opacity 0.3s ease;
        }

        .toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: #1a1a2e;
            color: white;
            border: 2px solid #e94560;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-btn:hover { background: #e94560; }

        .leaflet-popup-content {
            direction: rtl;
            text-align: right;
            margin: 0 !important;
            width: 300px !important;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            padding: 0;
            overflow: hidden;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .archived-popup .leaflet-popup-content-wrapper {
            background: #3a3a3a;
        }
        .archived-popup .popup-header {
            background: linear-gradient(135deg, #4a4a4a, #3a3a3a) !important;
        }

        /* shavaz-popup: header/body colors set inline per kayam/future + status */
        .shavaz-kayam-popup .leaflet-popup-content-wrapper { background: #2e1a0e !important; }
        .shavaz-kayam-popup .leaflet-popup-tip { background: #2e1a0e !important; }
        .shavaz-future-popup .leaflet-popup-content-wrapper { background: #3d2a1a !important; }
        .shavaz-future-popup .leaflet-popup-tip { background: #3d2a1a !important; }
        /* shavaz body/footer colors set via inline style per kayam/future */

        .leaflet-popup-tip { border-top-color: #1a1a2e; }

        .popup-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .popup-header-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 2px;
        }

        .popup-header-subtitle {
            font-size: 12px;
            color: #8899bb;
            font-family: monospace;
        }

        .popup-body {
            padding: 12px 16px;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .popup-row:last-child { border-bottom: none; }

        .popup-row-label {
            font-size: 12px;
            color: #8888aa;
        }

        .popup-row-value {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .popup-footer {
            padding: 10px 16px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .popup-link {
            display: block;
            text-align: center;
            color: #5dade2;
            font-size: 13px;
            text-decoration: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-link:hover { background: #2a2a4a; }

        .popup-btn-permit {
            display: block;
            text-align: center;
            background: #e94560;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-permit:hover { background: #c73650; }

        .popup-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            font-size: 13px;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: auto;
        }
        .popup-icon-btn:hover { border-color: #aaa; color: #fff; }
        .shavaz-popup .popup-icon-btn { border-color: #6b4226; color: #c4956a; }
        .shavaz-popup .popup-icon-btn:hover { border-color: #c4956a; color: #fff; }

        .popup-btn-back {
            display: block;
            text-align: center;
            background: transparent;
            color: #5dade2;
            font-size: 12px;
            padding: 6px;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-back:hover { background: #2a2a4a; }

        .popup-status-badge {
            display: inline-block;
            background: #0f3460;
            color: #5dade2;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .permit-detail-header {
            background: linear-gradient(135deg, #2d1a3e, #3d1a2e);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .leaflet-popup-close-button {
            color: #8888aa !important;
            font-size: 18px !important;
            top: 6px !important;
            right: auto !important;
            left: 8px !important;
        }

        .leaflet-popup-close-button:hover { color: #e94560 !important; }

        .layer-legend-btn {
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            margin-right: auto;
        }
        .layer-legend-btn:hover { color: #e94560; }

        .legend-popup {
            position: fixed;
            top: 50%;
            right: 330px;
            transform: translateY(-50%);
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 16px 20px;
            z-index: 2000;
            min-width: 220px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: #fff;
        }
        .legend-popup-title {
            font-size: 14px;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 12px;
            text-align: center;
        }
        .legend-popup-close {
            position: absolute;
            top: 8px;
            left: 8px;
            background: none;
            border: none;
            color: #8888aa;
            font-size: 18px;
            cursor: pointer;
        }
        .legend-popup-close:hover { color: #e94560; }
        .legend-popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
        }

        .scale-display {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(255,255,255,0.85);
            color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            z-index: 800;
            pointer-events: none;
        }

        .plan-search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .plan-search-input {
            width: 100%;
            padding: 10px 36px 10px 12px;
            border-radius: 8px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.95em;
            direction: rtl;
        }

        .plan-search-input::placeholder { color: #6a6a8a; }
        .plan-search-input:focus { outline: none; border-color: #e94560; }

        .plan-search-clear {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .plan-search-clear:hover { color: #e94560; }

        .plan-search-results {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: #1e1e36;
            border: 1px solid #3a3a5a;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1100;
            direction: rtl;
        }

        .plan-search-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.15s;
        }

        .plan-search-item:hover { background: #2a2a4a; }

        .plan-search-item-name {
            font-size: 13px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .plan-search-item-summary {
            font-size: 11px;
            color: #a0a0c0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .plan-search-item-num {
            font-size: 11px;
            color: #6a6a8a;
            font-family: monospace;
        }

        .plan-search-empty {
            padding: 12px;
            text-align: center;
            color: #6a6a8a;
            font-size: 13px;
        }

        .opacity-slider {
            width: 100%;
            margin-top: 8px;
            accent-color: #e94560;
            cursor: pointer;
        }

        .opacity-label {
            font-size: 0.8em;
            color: #8888aa;
            display: flex;
            justify-content: space-between;
        }

        .loading-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            z-index: 1000;
            display: none;
        }

        .loading-indicator.visible { display: block; }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85em;
            white-space: nowrap;
            color: #fff;
        }

        .legend-color {
            width: 16px;
            min-width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-left: 8px;
            border: 1px solid #555;
        }

        .basemap-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            cursor: pointer;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            margin-bottom: 8px;
        }

        .search-input::placeholder { color: #6a6a8a; }
        .search-input:focus { outline: none; border-color: #e94560; }

        .status-bar {
            padding: 10px 20px;
            background: #0f0f1e;
            font-size: 0.75em;
            color: #6a6a8a;
            border-top: 1px solid #2a2a4a;
            margin-top: auto;
        }

        .btn-reset {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-reset:hover {
            background: #e94560;
            color: white;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Popup navigation for multiple features */
        .popup-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 6px 16px;
            background: #0f0f1e;
            border-bottom: 1px solid #2a2a4a;
            font-size: 12px;
            color: #8888aa;
        }
        .popup-nav-btn {
            background: #2a2a4a;
            border: none;
            color: #e0e0e0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .popup-nav-btn:hover { background: #e94560; }

        /* GeoJSON layers get pointer cursor automatically via Leaflet */
        /* All panes pass clicks through; SVG containers too */
        .leaflet-pane {
            pointer-events: none !important;
        }
        /* SVG containers inside panes must also be none */
        .leaflet-pane svg {
            pointer-events: none !important;
        }
        /* Re-enable on actual interactive SVG paths */
        .leaflet-plans-pane path,
        .leaflet-permits-pane path,
        .leaflet-tama38-pane path,
        .leaflet-stations-pane path,
        .leaflet-archived-pane path {
            pointer-events: auto !important;
            cursor: pointer;
        }
        /* Topics pane: never interactive (hatch overlays only) */
        .leaflet-topics-pane path {
            pointer-events: none !important;
        }
        /* Popups and controls must be interactive */
        .leaflet-popup-pane,
        .leaflet-popup-pane * {
            pointer-events: auto !important;
        }
        .leaflet-control-container,
        .leaflet-control-container * {
            pointer-events: auto !important;
        }

        #map.leaflet-dragging,
        #map.leaflet-dragging *,
        #map.leaflet-dragging .leaflet-grab { cursor: grabbing !important; }

        /* Controls & popup elements */
        .leaflet-control-zoom a, .leaflet-control a { cursor: pointer !important; }
        .leaflet-popup-close-button { cursor: pointer !important; }
        .popup-link, .popup-btn-permit, .popup-btn-back { cursor: pointer !important; }

        /* Sidebar interactive elements */
        .layer-item, .layer-item label, .layer-item input[type="checkbox"] { cursor: pointer; }
        .layer-legend-btn { cursor: pointer; }
        .plan-search-item { cursor: pointer; }
        .plan-search-clear { cursor: pointer; }
        .btn-reset { cursor: pointer; }
        .basemap-select { cursor: pointer; }
        .toggle-btn { cursor: pointer; }

        /* ── Mobile sidebar close button (inside sidebar) ── */
        .sidebar-close-mobile {
            display: none;
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.3em;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sidebar-close-mobile:hover { background: #c73650; }

        /* ── Mobile overlay when sidebar is open ── */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        /* ── Mobile responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 85vw;
                max-width: 320px;
                min-width: unset;
                z-index: 1100;
                box-shadow: -4px 0 20px rgba(0,0,0,0.5);
                transition: transform 0.3s ease;
            }
            .sidebar.collapsed {
                margin-right: 0;
                transform: translateX(100%);
            }
            .sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            .sidebar-close-mobile {
                display: flex;
            }
            .sidebar-overlay.visible {
                display: block;
            }
            .toggle-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4em;
            }
            .map-toolbar {
                top: 60px;
                padding: 3px 4px;
            }
            .toolbar-btn {
                padding: 6px 8px !important;
            }
            .toolbar-label {
                font-size: 9px !important;
            }
        }

        /* ── Map Toolbar ── */
        .map-toolbar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            gap: 0;
            background: rgba(15, 15, 30, 0.94);
            backdrop-filter: blur(10px);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 4px 6px;
            direction: rtl;
        }
        .toolbar-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #8888aa;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
        }
        .toolbar-btn:hover { background: #2a2a4a; color: #e0e0ff; border-color: #3a3a5a; }
        .toolbar-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
        .toolbar-btn svg, .toolbar-btn .toolbar-icon { width: 20px; height: 20px; font-size: 20px; line-height: 1; }
        .toolbar-btn .toolbar-label { font-size: 10px; letter-spacing: 0.3px; }
        .toolbar-sep {
            width: 1px;
            background: #2a2a4a;
            margin: 6px 2px;
            align-self: stretch;
        }

        /* Toolbar dropdown (shared) */
        .toolbar-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 50%;
            transform: translateX(50%);
            background: #16162e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 4px 0;
            min-width: 170px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .toolbar-dropdown-item {
            padding: 9px 16px;
            color: #c0c0dd;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
            white-space: nowrap;
            font-family: inherit;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            direction: rtl;
        }
        .toolbar-dropdown-item:hover { background: #2a2a4a; color: #fff; }

        /* ── Shared modal styles ── */
        .modal-close {
            background: none; border: none; color: #8888aa; font-size: 22px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
        }
        .modal-close:hover { color: #e94560; background: #2a2a4a; }
        .modal-action-btn {
            background: #2a2a4a; border: 1px solid #3a3a5a; color: #c0c0dd;
            padding: 6px 16px; border-radius: 7px; cursor: pointer;

        /* ── Units Summary Modal ── */

        // GeoJSON data files
        // Find the best label point inside a polygon (visual center)
        function pointInPolygon(pt, ring) {
            let inside = false;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                const xi = ring[i][0], yi = ring[i][1];
                const xj = ring[j][0], yj = ring[j][1];
                if ((yi > pt[1]) !== (yj > pt[1]) && pt[0] < (xj - xi) * (pt[1] - yi) / (yj - yi) + xi)
                    inside = !inside;
            }
            return inside;
        }

        function visualCenter(geometry) {
            // For MultiPolygon, find the largest part by area
            let ring;
            if (geometry.type === 'MultiPolygon') {
                let maxArea = 0;
                try { ring = geometry.coordinates[0][0]; } catch(e) { return null; }
                if (!ring) return null;
                for (const poly of geometry.coordinates) {
                    const r = poly[0];
                    let a = 0;
                    for (let i = 0, j = r.length - 1; i < r.length; j = i++) {
                        a += r[j][0] * r[i][1] - r[i][0] * r[j][1];
                    }
                    a = Math.abs(a);
                    if (a > maxArea) { maxArea = a; ring = r; }
                }
            } else {
                ring = geometry.coordinates[0];
            }
            // Proper polygon centroid using signed area formula
            let area = 0, cx = 0, cy = 0;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                const a = ring[j][0] * ring[i][1] - ring[i][0] * ring[j][1];
                area += a;
                cx += (ring[j][0] + ring[i][0]) * a;
                cy += (ring[j][1] + ring[i][1]) * a;
            }
            area *= 0.5;
            if (Math.abs(area) > 1e-12) { cx /= (6 * area); cy /= (6 * area); }
            else { cx = ring[0][0]; cy = ring[0][1]; }
            if (pointInPolygon([cx, cy], ring)) return [cy, cx];
            // Bbox
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const c of ring) {
                if (c[0] < minX) minX = c[0]; if (c[1] < minY) minY = c[1];
                if (c[0] > maxX) maxX = c[0]; if (c[1] > maxY) maxY = c[1];
            }
            // Iterative grid search (polylabel-like): 4 rounds, each 12x12
            let bestPt = [cy, cx], bestDist = -1;
            let sMinX = minX, sMinY = minY, sMaxX = maxX, sMaxY = maxY;
            for (let round = 0; round < 4; round++) {
                const N = 12;
                const stepX = (sMaxX - sMinX) / N, stepY = (sMaxY - sMinY) / N;
                for (let xi = 0; xi < N; xi++) {
                    const gx = sMinX + (xi + 0.5) * stepX;
                    for (let yi = 0; yi < N; yi++) {
                        const gy = sMinY + (yi + 0.5) * stepY;
                        if (!pointInPolygon([gx, gy], ring)) continue;
                        let minEdgeDist = Infinity;
                        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                            const ax = ring[j][0], ay = ring[j][1];
                            const bx = ring[i][0], by = ring[i][1];
                            const abx = bx-ax, aby = by-ay;
                            const ab2 = abx*abx + aby*aby;
                            const t = ab2 > 0 ? Math.max(0, Math.min(1, ((gx-ax)*abx+(gy-ay)*aby)/ab2)) : 0;
                            const d = (gx-ax-t*abx)*(gx-ax-t*abx)+(gy-ay-t*aby)*(gy-ay-t*aby);
                            if (d < minEdgeDist) minEdgeDist = d;
                        }
                        if (minEdgeDist > bestDist) { bestDist = minEdgeDist; bestPt = [gy, gx]; }
                    }
                }
                // Zoom into area around best point for next round
                const r = Math.max(stepX, stepY);
                sMinX = bestPt[1] - r; sMaxX = bestPt[1] + r;
                sMinY = bestPt[0] - r; sMaxY = bestPt[0] + r;
            }
            return bestPt; // [lat, lng]
        }

        function leafletPip(layer, latlng) {
            const lng = latlng.lng, lat = latlng.lat;
            let coords;
            const geo = layer.feature.geometry;
            try {
                if (geo.type === 'MultiPolygon') coords = geo.coordinates[0][0];

            } catch(e) { return false; }
            let inside = false;
            for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
                const xi = coords[i][0], yi = coords[i][1];
                const xj = coords[j][0], yj = coords[j][1];
                if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi) {

            }
            return inside;

        function applyHatchToLayer(geoJsonLayer, map) {
            if (!geoJsonLayer || !map) return;
            // Instead of cloning paths, we modify the original path's fill
            // to use the pattern, and set the base color as the pattern background
            geoJsonLayer.eachLayer(layer => {
                const name = (layer.feature.properties.mavat_name || layer.feature.properties.Descr || '').trim();
                const hatchId = LANDUSE_HATCH[name];
                if (!hatchId || !layer._path) return;
                // Store original fill for reference
                const origFill = layer._path.getAttribute('fill');
                const origOpacity = layer._path.getAttribute('fill-opacity');
                // We'll use a layered approach: keep the base fill, add a second SVG path for the hatch

                const origSetStyle = layer.setStyle.bind(layer);
                layer._origPath = layer._path;
                layer._hatchId = hatchId;

                // Use MutationObserver to keep clone in sync with path changes
                const observer = new MutationObserver(() => {
                    if (layer._hatchClone && layer._path) {
                        layer._hatchClone.setAttribute('d', layer._path.getAttribute('d'));
                    }
                });

                // Create initial clone
                function createClone() {
                    if (layer._hatchClone) layer._hatchClone.remove();
                    if (!layer._path || !layer._path.parentNode) return;
                    const clone = layer._path.cloneNode(false);
                    clone.setAttribute('fill', 'url(#' + hatchId + ')');
                    clone.setAttribute('fill-opacity', '0.7');
                    clone.setAttribute('stroke', 'none');
                    clone.setAttribute('pointer-events', 'none');
                    clone.classList.add('hatch-overlay');
                    layer._path.parentNode.appendChild(clone);
                    layer._hatchClone = clone;
                    // Watch for path 'd' attribute changes
                    observer.observe(layer._path, { attributes: true, attributeFilter: ['d'] });
                }
                createClone();
            });

            let area = 0;
            const n = coords.length;
            for (let i = 0; i < n; i++) {
                const j = (i + 1) % n;
                const [lng1, lat1] = coords[i];
                const [lng2, lat2] = coords[j];
                area += (lng2 - lng1) * toRad * (2 + Math.sin(lat1 * toRad) + Math.sin(lat2 * toRad));
            }
            area = Math.abs(area) * R * R / 2;
            return area;
        }

        function getFeatureArea(f) {
            // Try legal_area/shape_area first
            const la = parseFloat(f.properties.legal_area || f.properties.shape_area || 0);
            if (la > 0) return la;
            // Calculate from geometry
            try {
                const g = f.geometry;
                let coords;
                if (g.type === 'Polygon') coords = g.coordinates[0];
                else if (g.type === 'MultiPolygon') coords = g.coordinates[0][0];
                else return 0;
                return calcPolygonAreaSqm(coords);
            } catch(e) { return 0; }
        }

        function analyzeLanduseComparison(polyCoords, planNames) {
            window.__landuseComparePolyCoords = polyCoords;
            const gd = window.__geoDataForLanduse || {};
            if (!gd.yiud_karka_kayam && !gd.landuse_xplan) return null;

            function pip(pt, ring) {
                const [x, y] = pt;
                let inside = false;
                for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                    const [xi, yi] = ring[i], [xj, yj] = ring[j];
                    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi))
                        inside = !inside;
                }
                return inside;
            }

            function centroid(f) {
                try {
                    const g = f.geometry;
                    let coords;
                    if (g.type === 'Polygon') coords = g.coordinates[0];
                    else if (g.type === 'MultiPolygon') coords = g.coordinates[0][0];
                    else return null;
                    let cx = 0, cy = 0, n = 0;
                    for (const c of coords) { if (c && c.length >= 2) { cx += c[0]; cy += c[1]; n++; } }
                    return n > 0 ? [cx / n, cy / n] : null;
                } catch(e) { return null; }
            }

            const existing = {}; // group -> total sqm
            const futureXplan = {}; // group -> total sqm (from xplan only)
            let totalExisting = 0, totalFutureXplan = 0;

            // Collect existing kayam features inside area
            const kayamInside = [];
            if (gd.yiud_karka_kayam && gd.yiud_karka_kayam.features) {
                gd.yiud_karka_kayam.features.forEach(f => {
                    const c = centroid(f);
                    if (!c || !pip(c, polyCoords)) return;
                    const name = (f.properties.Descr || '').trim();
                    const group = getLanduseGroup(name);
                    if (!group) return;
                    const area = getFeatureArea(f);
                    existing[group] = (existing[group] || 0) + area;
                    totalExisting += area;
                    kayamInside.push({ centroid: c, name, group, area });
                });
            }

            // Collect xplan future features inside area
            if (gd.landuse_xplan && gd.landuse_xplan.features) {
                gd.landuse_xplan.features.forEach(f => {
                    const c = centroid(f);
                    if (!c || !pip(c, polyCoords)) return;
                    const name = (f.properties.mavat_name || '').trim();
                    const group = getLanduseGroup(name);
                    if (!group) return;
                    const area = getFeatureArea(f);
                    futureXplan[group] = (futureXplan[group] || 0) + area;
                    totalFutureXplan += area;
                });
            }

            // Collect plan boundaries that have xplan coverage
            // A kayam feature is "covered" if its centroid falls inside a plan that has xplan data
            const plansWithXplan = [];
            if (gd.plans && gd.landuse_xplan) {
                const xplanPlanNumbers = new Set();
                gd.landuse_xplan.features.forEach(f => {
                    const c = centroid(f);
                    if (!c || !pip(c, polyCoords)) return;
                    const pn = (f.properties.pl_number || '').trim();
                    if (pn) xplanPlanNumbers.add(pn);
                });
                // Get polygon boundaries of plans that have xplan data
                gd.plans.features.forEach(f => {
                    const pn = (f.properties.plan_name || f.properties.TABA || '').trim();
                    if (!xplanPlanNumbers.has(pn)) return;
                    try {
                        const g = f.geometry;
                        let coords;
                        if (g.type === 'Polygon') coords = g.coordinates[0];
                        else if (g.type === 'MultiPolygon') coords = g.coordinates[0][0];
                        if (coords) plansWithXplan.push(coords);
                    } catch(e) {}
                });
            }

            // Build "future" column: xplan where plan has coverage, kayam where not
            const future = { ...futureXplan };
            let totalFuture = totalFutureXplan;

            kayamInside.forEach(k => {
                let coveredByPlan = false;
                for (const planCoords of plansWithXplan) {
                    if (pip(k.centroid, planCoords)) { coveredByPlan = true; break; }
                }
                if (!coveredByPlan) {
                    // This kayam area is outside any plan with xplan data - keep as-is in future
                    future[k.group] = (future[k.group] || 0) + k.area;
                    totalFuture += k.area;
                }
            });

            // Normalize future to same total as existing (same land area)
            // The xplan and kayam data may not perfectly align geometrically,
            // so we scale future proportionally to match existing total
            if (totalFuture > 0 && totalExisting > 0 && totalFuture !== totalExisting) {
                const scale = totalExisting / totalFuture;
                for (const g of Object.keys(future)) {
                    future[g] = future[g] * scale;
                }
                totalFuture = totalExisting;
            }

            // Merge all groups
            const allGroups = new Set([...Object.keys(existing), ...Object.keys(future)]);
            const rows = [];
            allGroups.forEach(g => {
                const ex = existing[g] || 0;
                const fu = future[g] || 0;
                if (ex > 0 || fu > 0) rows.push({ group: g, existing: ex, future: fu, diff: fu - ex });
            });
            rows.sort((a, b) => Math.max(b.existing, b.future) - Math.max(a.existing, a.future));

            return { rows, totalExisting, totalFuture, planNames: planNames || [] };
        }

        function showLanduseComparePanel(result) {
            const prev = document.getElementById('landuse-compare-result');
            if (prev) prev.remove();
            if (!result || result.rows.length === 0) return;

            const planLabel = result.planNames.length > 0

            // Use the larger total as the reference area for both columns
            const refArea = Math.max(result.totalExisting, result.totalFuture);

            // Store data on window for toggle

            function renderTable(unit) {

                        fuStr = r.future > 0 ? fuPct.toFixed(1) + '%' : '-';

                '<button id="landuse-area-summary-btn" style="background:#2d6a4f;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit">📊 סיכום יח"ד</button>' +

            document.getElementById('landuse-print-btn').addEventListener('click', function() {

                // Generate SVG maps directly from GeoJSON data (no screenshot needed)
                let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;

                    if (c[0] < minLng) minLng = c[0];
                    if (c[0] > maxLng) maxLng = c[0];
                });
                const pad = (maxLat - minLat) * 0.1;
                const padLng = (maxLng - minLng) * 0.1;
                const bMinLat = minLat - pad, bMaxLat = maxLat + pad;
                const bMinLng = minLng - padLng, bMaxLng = maxLng + padLng;
                const svgW = 320, svgH = 240;
                const scaleX = svgW / (bMaxLng - bMinLng);

                function toSvgPt(lng, lat) {

                function featureToPath(f) {

                        const g = f.geometry;
                        let rings;
                        if (g.type === 'Polygon') rings = g.coordinates;
                        else if (g.type === 'MultiPolygon') rings = g.coordinates[0];
                        else return '';
                        return rings.map(ring =>
                            'M' + ring.map(c => { const p = toSvgPt(c[0], c[1]); return p[0].toFixed(1)+','+p[1].toFixed(1); }).join('L') + 'Z'
                        ).join(' ');

                        else if (g.type === 'MultiPolygon') coords = g.coordinates[0][0];

                        let cx=0,cy=0,n=0;

                printWin.document.close();

        const STAGE_COLORS = {
            'ג-רישוי בתהליך': '#4ba1f0',

                    if (k && v !== undefined) params[k] = decodeURIComponent(v);

                return params;

                    // Diagonal hatch patterns - unique per hatch color
                    const hatchDefs = [
                        { id: 'hatch-blue', color: '#003fff', angle: -45 },
                        { id: 'hatch-green', color: '#009900', angle: -45 },
                        { id: 'hatch-pink', color: '#ff7f9f', angle: -45 },
                        { id: 'hatch-brown', color: '#b4643c', angle: -45 },

                    hatchDefs.forEach(h => {
                        const pat = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
                        pat.setAttribute('id', h.id);
                        pat.setAttribute('patternUnits', 'userSpaceOnUse');
                        pat.setAttribute('width', '8');
                        pat.setAttribute('height', '8');
                        pat.setAttribute('patternTransform', 'rotate(' + (h.angle || -45) + ')');
                        const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line1.setAttribute('x1', '0'); line1.setAttribute('y1', '0');
                        line1.setAttribute('x2', '0'); line1.setAttribute('y2', '8');
                        line1.setAttribute('stroke', h.color); line1.setAttribute('stroke-width', '2.5');
                        pat.appendChild(line1);
                        if (h.cross) {
                            const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line2.setAttribute('x1', '0'); line2.setAttribute('y1', '0');
                            line2.setAttribute('x2', '8'); line2.setAttribute('y2', '0');
                            line2.setAttribute('stroke', h.color); line2.setAttribute('stroke-width', '2.5');
                            pat.appendChild(line2);
                        }
                        defs.appendChild(pat);
                    });
                    window.__hatchPatternsReady = true;

                // Apply layer state from hash

                landuseP.style.zIndex = 295;

                // Load all GeoJSON data + CSV for plan_type enrichment
                const entries = Object.entries(GEOJSON_FILES);
                const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJU2Odzsa_d789A5545sSFnUGsrXuW2VTj3xCNEtV1sOM13VNVeepGhzraHoQgLWBaGTCitS-4j7Sy/pub?output=csv';

                    Promise.all(entries.map(([key, url]) =>

                    // Merge CSV plan_type into GeoJSON features
                    if (csvText && gd.plans) {
                        // CSV parser that handles quoted fields
                        function parseCSVRow(row) {
                            const cols = []; let cur = '', inQ = false;
                            for (let i = 0; i < row.length; i++) {
                                const c = row[i];
                                if (c === '"') { inQ = !inQ; }
                                else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
                                else { cur += c; }
                            }
                            cols.push(cur.trim());
                            return cols;

                        const rows = csvText.split('\n');
                        const headers = parseCSVRow(rows[0]);
                        const ptIdx = headers.findIndex(h => h === 'plan_type');
                        const nameIdx = headers.findIndex(h => h === 'plan_name');
                        if (ptIdx >= 0 && nameIdx >= 0) {
                            const csvMap = {};
                            for (let i = 1; i < rows.length; i++) {
                                if (!rows[i].trim()) continue;
                                const cols = parseCSVRow(rows[i]);
                                if (cols[nameIdx]) csvMap[cols[nameIdx]] = cols[ptIdx] || '';
                            }
                            gd.plans.features.forEach(f => {
                                const pn = f.properties.plan_name;
                                if (pn && csvMap[pn]) {
                                    f.properties.plan_type = csvMap[pn];
                                }

                    if (gd.plans && gd.plans.features) {

                        gd.plans.features.forEach(f => {
                            const pt = normalizePlanType(f.properties.plan_type || '');

                    }

                });

                return () => { map.remove(); mapInstanceRef.current = null; };
            }, []);

            // Update basemap
            useEffect(() => {
                const map = mapInstanceRef.current;

                if (baseTileRef.current) {
                    map.removeLayer(baseTileRef.current);

            // Update basemap opacity without recreating layer
            useEffect(() => {
                if (baseTileRef.current) {

            }, [basemapOpacity]);

            // Keep refs in sync
            useEffect(() => { layersRef.current = layers; updateHash(); }, [layers]);
            // GeoJSON layers have built-in pointer cursor on hover — no probe needed

            // ── Landuse compare: plan selection mode ──
            useEffect(() => {
                landuseCompareModeRef.current = landuseCompareMode;
                const map = mapInstanceRef.current;
                if (!map || landuseCompareMode !== 'plan') return;
                map.getContainer().classList.add('measuring');

                function onPlanClick(e) {
                    // Find clicked plan polygon
                    const plansLayer = geoLayersRef.current.plans;
                    if (!plansLayer) return;
                    const latlng = e.latlng;
                    let clickedFeature = null;
                    plansLayer.eachLayer(layer => {
                        if (clickedFeature) return;
                        try {
                            const geo = layer.feature.geometry;
                            let coords;
                            if (geo.type === 'Polygon') coords = geo.coordinates[0];
                            else if (geo.type === 'MultiPolygon') coords = geo.coordinates[0][0];
                            else return;
                            // pip test
                            const lng = latlng.lng, lat = latlng.lat;
                            let inside = false;
                            for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
                                const [xi, yi] = coords[i], [xj, yj] = coords[j];
                                if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)
                                    inside = !inside;
                            }
                            if (inside) clickedFeature = layer.feature;
                        } catch(ex) {}
                    });

                    if (clickedFeature) {
                        const geo = clickedFeature.geometry;
                        let coords;
                        try {
                            if (geo.type === 'Polygon') coords = geo.coordinates[0];
                            else if (geo.type === 'MultiPolygon') coords = geo.coordinates[0][0];
                        } catch(ex) { return; }
                        if (!coords) return;
                        const polyCoords = [...coords];
                        if (polyCoords[0][0] !== polyCoords[polyCoords.length-1][0]) polyCoords.push(polyCoords[0]);
                        const p = clickedFeature.properties;
                        const planId = p.plan_name || p.pl_number || p.TABA || '';
                        const planSummary = p.plan_summary || p.plan_name_he || '';
                        const planDisplay = planSummary ? planId + ' - ' + planSummary : planId;
                        const result = analyzeLanduseComparison(polyCoords, [planDisplay]);
                        showLanduseComparePanel(result);
                        setLanduseCompareMode(null);
                    }
                }

                map.on('click', onPlanClick);
                function onKeyDown(e) { if (e.key === 'Escape') { setLanduseCompareMode(null); } }
                document.addEventListener('keydown', onKeyDown);

                return () => {
                    map.off('click', onPlanClick);
                    document.removeEventListener('keydown', onKeyDown);
                    map.getContainer().classList.remove('measuring');
                };
            }, [landuseCompareMode]);

            // ── שצ"פ לנפש: one-time setup (always listening, controlled by ref) ──
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                function onShatzafClick(e) {
                    if (shatzafModeRef.current !== 'plan') return;
                    // Find clicked plan by PIP (same as landuse compare)
                    const plansLayer = geoLayersRef.current.plans;
                    if (!plansLayer) return;
                    const latlng = e.latlng;
                    let clickedFeature = null;
                    plansLayer.eachLayer(layer => {
                        if (clickedFeature) return;
                        try {
                            const geo = layer.feature.geometry;
                            let coords;
                            if (geo.type === 'Polygon') coords = geo.coordinates[0];
                            else if (geo.type === 'MultiPolygon') coords = geo.coordinates[0][0];
                            else return;
                            const lng = latlng.lng, lat = latlng.lat;
                            let inside = false;
                            for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
                                const [xi, yi] = coords[i], [xj, yj] = coords[j];
                                if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)
                                    inside = !inside;
                            }
                            if (inside) clickedFeature = layer.feature;
                        } catch(ex) {}
                    });
                    if (!clickedFeature) return;
                    processShatzafFeature(clickedFeature);
                }

                function processShatzafFeature(clickedFeature) {
                    const p = clickedFeature.properties;
                    const planId = p.plan_name || p.pl_number || p.TABA || '';
                    const planSummary = p.plan_summary || p.plan_name_he || '';
                    const planDisplay = planSummary ? planId + ' - ' + planSummary : planId;
                    const unitsTotal = parseInt(p.units_total) || 0;

                    // Calculate open space from xplan within plan boundary
                    const geo = clickedFeature.geometry;
                    let planCoords;
                    try {
                        if (geo.type === 'Polygon') planCoords = geo.coordinates[0];
                        else if (geo.type === 'MultiPolygon') planCoords = geo.coordinates[0][0];
                    } catch(ex) { return; }
                    if (!planCoords) return;

                    // Find xplan features inside this plan that are שטחים פתוחים
                    const gd = window.__geoDataForLanduse || {};
                    let openSpaceArea = 0;
                    const openSpaceNames = [];
                    if (gd.landuse_xplan) {
                        gd.landuse_xplan.features.forEach(f => {
                            const name = (f.properties.mavat_name || '').trim();
                            if (!name) return;
                            const group = getLanduseGroup(name);
                            if (group !== 'שטחים פתוחים' && group !== 'יער/חקלאי') return;
                            // Check if centroid is inside plan polygon
                            try {
                                let fCoords;
                                if (f.geometry.type === 'Polygon') fCoords = f.geometry.coordinates[0];
                                else if (f.geometry.type === 'MultiPolygon') fCoords = f.geometry.coordinates[0][0];
                                else return;
                                let cx = 0, cy = 0, n = 0;
                                for (const c of fCoords) { cx += c[0]; cy += c[1]; n++; }
                                cx /= n; cy /= n;
                                // PIP test against plan boundary
                                let inside = false;
                                for (let i = 0, j = planCoords.length - 1; i < planCoords.length; j = i++) {
                                    const [xi, yi] = planCoords[i], [xj, yj] = planCoords[j];
                                    if ((yi > cy) !== (yj > cy) && cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)
                                        inside = !inside;
                                }
                                if (inside) {
                                    openSpaceArea += getFeatureArea(f);
                                    if (!openSpaceNames.includes(name)) openSpaceNames.push(name);
                                }
                            } catch(ex) {}
                        });
                    }

                    // Also check kayam if no xplan open space found
                    if (openSpaceArea === 0 && gd.yiud_karka_kayam) {
                        gd.yiud_karka_kayam.features.forEach(f => {
                            const name = (f.properties.Descr || '').trim();
                            if (!name) return;
                            const group = getLanduseGroup(name);
                            if (group !== 'שטחים פתוחים' && group !== 'יער/חקלאי') return;
                            try {
                                let fCoords;
                                if (f.geometry.type === 'Polygon') fCoords = f.geometry.coordinates[0];
                                else if (f.geometry.type === 'MultiPolygon') fCoords = f.geometry.coordinates[0][0];
                                else return;
                                let cx = 0, cy = 0, n = 0;
                                for (const c of fCoords) { cx += c[0]; cy += c[1]; n++; }
                                cx /= n; cy /= n;
                                let inside = false;
                                for (let i = 0, j = planCoords.length - 1; i < planCoords.length; j = i++) {
                                    const [xi, yi] = planCoords[i], [xj, yj] = planCoords[j];
                                    if ((yi > cy) !== (yj > cy) && cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)
                                        inside = !inside;
                                }
                                if (inside) {
                                    openSpaceArea += getFeatureArea(f);
                                    if (!openSpaceNames.includes(name)) openSpaceNames.push(name);
                                }
                            } catch(ex) {}
                        });
                    }

                    shatzafModeRef.current = null;
                    setShatzafMode(false);
                    mapInstanceRef.current?.getContainer().classList.remove('measuring');

                    // Find which sub-neighborhood this plan is in
                    let planCx = 0, planCy = 0, pn = 0;
                    for (const c of planCoords) { planCx += c[0]; planCy += c[1]; pn++; }
                    planCx /= pn; planCy /= pn;
                    let subNeighName = null;
                    if (gd.sub_neighborhoods) {
                        gd.sub_neighborhoods.features.forEach(sf => {
                            if (subNeighName) return;
                            try {
                                const sg = sf.geometry;
                                const rings = sg.type === 'Polygon' ? [sg.coordinates[0]] : sg.type === 'MultiPolygon' ? sg.coordinates.map(c => c[0]) : [];
                                for (const ring of rings) {
                                    let inside = false;
                                    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                                        const [xi, yi] = ring[i], [xj, yj] = ring[j];
                                        if ((yi > planCy) !== (yj > planCy) && planCx < (xj - xi) * (planCy - yi) / (yj - yi) + xi)
                                            inside = !inside;
                                    }
                                    if (inside) { subNeighName = sf.properties.schn_nama; break; }
                                }
                            } catch(ex) {}
                        });
                    }

                    // Show dialog for household size
                    const panel = document.createElement('div');
                    panel.id = 'shatzaf-panel';
                    panel.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,26,46,0.97);border:1px solid #444;border-radius:12px;padding:20px;z-index:10000;min-width:340px;color:#e0e0e0;font-family:Assistant,sans-serif;direction:rtl;box-shadow:0 8px 32px rgba(0,0,0,0.6)';
                    panel.innerHTML =
                        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
                        '<h3 style="color:#4CAF50;margin:0;font-size:16px">🌳 שצ"פ לנפש — ' + planDisplay + '</h3>' +
                        '<button id="shatzaf-close" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer">&times;</button></div>' +
                        (subNeighName ? '<div style="font-size:11px;margin-bottom:6px;color:#888">שכונה: ' + subNeighName + '</div>' : '') +
                        '<div style="font-size:12px;margin-bottom:4px;color:#ccc">יח"ד בתכנית: <b>' + (unitsTotal > 0 ? unitsTotal.toLocaleString() : 'לא זמין') + '</b></div>' +
                        '<div style="font-size:12px;margin-bottom:4px;color:#ccc">שצ"פ בתכנית: <b>' + (openSpaceArea > 0 ? Math.round(openSpaceArea).toLocaleString() + ' מ"ר (' + (openSpaceArea/1000).toFixed(1) + ' דונם)' : 'לא נמצא') + '</b></div>' +
                        (openSpaceNames.length > 0 ? '<div style="font-size:10px;color:#888;margin-bottom:8px">ייעודים: ' + openSpaceNames.join(', ') + '</div>' : '') +
                        '<div style="margin-top:12px;margin-bottom:8px;font-size:13px">גודל משק בית ממוצע (נפשות):</div>' +
                        '<div style="display:flex;gap:8px;align-items:center">' +
                        '<input id="shatzaf-household" type="number" value="3.5" min="1" max="10" step="0.1" style="width:70px;padding:6px;border-radius:6px;border:1px solid #555;background:#1a1a2e;color:#fff;font-size:14px;text-align:center" />' +
                        '<button id="shatzaf-calc" style="flex:1;padding:8px;background:#4CAF50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit">חשב</button></div>' +
                        '<div id="shatzaf-result" style="margin-top:14px;display:none"></div>';
                    document.body.appendChild(panel);

                    // Pre-calculate sub-neighborhood ratio for comparison
                    let subRatioText = '';
                    if (subNeighName) {
                        // Find sub polygon coords
                        const subF = gd.sub_neighborhoods.features.find(f => f.properties.schn_nama === subNeighName);
                        if (subF) {
                            let sCoords;
                            try {
                                if (subF.geometry.type === 'Polygon') sCoords = subF.geometry.coordinates[0];
                                else if (subF.geometry.type === 'MultiPolygon') sCoords = subF.geometry.coordinates[0][0];
                            } catch(ex) {}
                            if (sCoords) {
                                let subOpenSpace = 0;
                                // Scan xplan + kayam fallback for sub-neighborhood open space
                                const scanLanduse = (features, nameField) => {
                                    features.forEach(f => {
                                        const nm = (f.properties[nameField] || '').trim();
                                        if (!nm) return;
                                        const grp = getLanduseGroup(nm);
                                        if (grp !== 'שטחים פתוחים' && grp !== 'יער/חקלאי') return;
                                        try {
                                            let fc;
                                            if (f.geometry.type === 'Polygon') fc = f.geometry.coordinates[0];
                                            else if (f.geometry.type === 'MultiPolygon') fc = f.geometry.coordinates[0][0];
                                            else return;
                                            let cx2=0,cy2=0,nn=0;
                                            for (const c of fc) { cx2+=c[0]; cy2+=c[1]; nn++; }
                                            cx2/=nn; cy2/=nn;
                                            let ins = false;
                                            for (let i=0,j=sCoords.length-1;i<sCoords.length;j=i++) {
                                                const [xi,yi]=sCoords[i],[xj,yj]=sCoords[j];
                                                if ((yi>cy2)!==(yj>cy2) && cx2<(xj-xi)*(cy2-yi)/(yj-yi)+xi) ins=!ins;
                                            }
                                            if (ins) subOpenSpace += getFeatureArea(f);
                                        } catch(ex) {}
                                    });
                                };
                                if (gd.landuse_xplan) scanLanduse(gd.landuse_xplan.features, 'mavat_name');
                                if (gd.yiud_karka_kayam) scanLanduse(gd.yiud_karka_kayam.features, 'Descr');
                                window.__subShatzafData = { subName: subNeighName, openSpace: subOpenSpace };
                            }
                        }
                    }

                    document.getElementById('shatzaf-close').onclick = () => panel.remove();
                    document.getElementById('shatzaf-calc').onclick = () => {
                        const hh = parseFloat(document.getElementById('shatzaf-household').value) || 3.5;
                        const totalPeople = unitsTotal * hh;
                        const sqmPerPerson = totalPeople > 0 ? (openSpaceArea / totalPeople) : 0;
                        const resultDiv = document.getElementById('shatzaf-result');
                        resultDiv.style.display = 'block';

                        // Calculate sub-neighborhood ratio
                        let subCompareHtml = '';
                        const sd = window.__subShatzafData;
                        if (sd && sd.subName) {
                            const ud = window.__unitsData;
                            let subUnits = 0;
                            if (ud && ud.bySub) {
                                // Collect all sub names that map to this sub polygon
                                const allNames = new Set([sd.subName]);
                                let parentM = null;
                                Object.entries(MINAHAK_SUBS).forEach(([m, ss]) => {
                                    if (ss.includes(sd.subName)) parentM = m;
                                });
                                if (parentM) {
                                    const gd3 = window.__geoDataForLanduse || {};
                                    const geojsonN = new Set();
                                    if (gd3.sub_neighborhoods) {
                                        gd3.sub_neighborhoods.features.forEach(f2 => {
                                            const nm2 = f2.properties.schn_nama || '';
                                            const norm2 = SUB_NORMALIZE[nm2] || nm2;
                                            if ((MINAHAK_SUBS[parentM]||[]).some(s2 => s2 === nm2 || s2 === norm2 || (SUB_NORMALIZE[s2]||s2) === norm2)) geojsonN.add(nm2);
                                        });
                                    }
                                    if (geojsonN.size <= 1) {
                                        (MINAHAK_SUBS[parentM]||[]).forEach(s2 => { allNames.add(s2); allNames.add(SUB_NORMALIZE[s2]||s2); });
                                        allNames.add(parentM);
                                    }
                                }
                                Object.keys(ud.bySub).forEach(m => {
                                    Object.keys(ud.bySub[m]).forEach(s => {
                                        if (allNames.has(s)) {
                                            subUnits += (ud.bySub[m][s].units_in || 0) + (ud.bySub[m][s].units_add || 0);

                                    });
                                });
                            }
                            const subPeople = subUnits * hh;
                            const subRatio = subPeople > 0 ? (sd.openSpace / subPeople) : 0;
                            if (subUnits > 0) {
                                subCompareHtml = '<div style="font-size:11px;color:#888;margin-top:6px;text-align:center">יחס בשכונת ' + sd.subName + ': <b style="color:#aaa">' + subRatio.toFixed(1) + ' מ"ר/נפש</b></div>';
                            }
                        }

                        resultDiv.innerHTML =
                            '<div style="border-top:1px solid #333;padding-top:12px">' +
                            '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>אוכלוסייה מוערכת:</span><b>' + Math.round(totalPeople).toLocaleString() + ' נפשות</b></div>' +
                            '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span>(' + unitsTotal.toLocaleString() + ' יח"ד × ' + hh + ' נפשות)</span></div>' +
                            '<div style="text-align:center;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px">' +
                            '<div style="font-size:32px;font-weight:bold;color:#e0e0e0">' + sqmPerPerson.toFixed(1) + '</div>' +
                            '<div style="font-size:12px;color:#aaa">מ"ר שצ"פ לנפש</div>' +
                            subCompareHtml +
                            '</div>' +
                            (unitsTotal === 0 ? '<div style="color:#e94560;font-size:11px;margin-top:8px;text-align:center">⚠ אין נתוני יח"ד לתכנית זו</div>' : '') +
                            (openSpaceArea === 0 ? '<div style="color:#e94560;font-size:11px;margin-top:8px;text-align:center">⚠ לא נמצא שצ"פ בתכנית זו</div>' : '') +
                            '</div>';
                    };
                    // Auto-calculate
                    document.getElementById('shatzaf-calc').click();
                }

                // Use DOM click on map container (plan layer swallows Leaflet click events)
                const container = map.getContainer();
                function onShatzafDomClick(e) {
                    if (shatzafModeRef.current !== 'plan') return;
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    const rect = container.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const pt = map.containerPointToLatLng([x, y]);
                    onShatzafClick({ latlng: pt });
                }
                container.addEventListener('click', onShatzafDomClick, true);

                // Sub-neighborhood shatzaf - hover highlight + click
                let subHoverLayer = null;
                let subSelectedLayer = null;

                function findSubAtPoint(pt) {
                    const gd = window.__geoDataForLanduse || {};
                    if (!gd.sub_neighborhoods) return null;
                    let found = null;
                    gd.sub_neighborhoods.features.forEach(f => {
                        if (found) return;
                        try {
                            const g = f.geometry;
                            const rings = g.type === 'Polygon' ? [g.coordinates[0]] : g.type === 'MultiPolygon' ? g.coordinates.map(c => c[0]) : [];
                            for (const ring of rings) {
                                let inside = false;
                                const lng = pt.lng, lat = pt.lat;
                                for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                                    const [xi, yi] = ring[i], [xj, yj] = ring[j];
                                    if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)
                                        inside = !inside;
                                }
                                if (inside) { found = f; break; }
                            }
                        } catch(ex) {}
                    });
                    return found;
                }

                function onShatzafSubMouseMove(e) {
                    if (shatzafModeRef.current !== 'sub') {
                        if (subHoverLayer) { map.removeLayer(subHoverLayer); subHoverLayer = null; }
                        return;
                    }
                    const pt = map.containerPointToLatLng([e.clientX - container.getBoundingClientRect().left, e.clientY - container.getBoundingClientRect().top]);
                    const found = findSubAtPoint(pt);
                    if (subHoverLayer) { map.removeLayer(subHoverLayer); subHoverLayer = null; }
                    if (found) {
                        subHoverLayer = L.geoJSON(found, {

                        }).addTo(map);

                        subHoverLayer.bindTooltip(found.properties.schn_nama, { sticky: true, direction: 'top', className: 'landuse-tooltip' }).openTooltip();
                    }
                }
                container.addEventListener('mousemove', onShatzafSubMouseMove);

                function onShatzafSubDomClick(e) {

                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    const pt = map.containerPointToLatLng([e.clientX - container.getBoundingClientRect().left, e.clientY - container.getBoundingClientRect().top]);
                    const found = findSubAtPoint(pt);
                    if (subHoverLayer) { map.removeLayer(subHoverLayer); subHoverLayer = null; }
                    if (found) {
                        shatzafModeRef.current = null;
                        setShatzafMode(false);
                        map.getContainer().classList.remove('measuring');
                        // Draw selected polygon
                        subSelectedLayer = L.geoJSON(found, {
                            style: { color: '#4CAF50', weight: 3, fillColor: '#4CAF50', fillOpacity: 0.15, dashArray: '' }
                        }).addTo(map);
                        calculateSubNeighborhoodShatzaf(found.properties.schn_nama);

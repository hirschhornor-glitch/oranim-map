                }
                container.addEventListener('click', onShatzafSubDomClick, true);

                function calculateSubNeighborhoodShatzaf(subName) {
                    const gd = window.__geoDataForLanduse || {};
                    const subFeature = gd.sub_neighborhoods.features.find(f => f.properties.schn_nama === subName);
                    if (!subFeature) return;

                    let subCoords;
                    try {
                        if (subFeature.geometry.type === 'Polygon') subCoords = subFeature.geometry.coordinates[0];
                        else if (subFeature.geometry.type === 'MultiPolygon') subCoords = subFeature.geometry.coordinates[0][0];
                    } catch(ex) { return; }
                    if (!subCoords) return;

                    // Ensure units data is loaded, then proceed
                    (window.__unitsData ? Promise.resolve(window.__unitsData) : new Promise(resolve => {
                        window.__unitsDataCallbacks = window.__unitsDataCallbacks || [];
                        window.__unitsDataCallbacks.push(resolve);
                        if (!window.__unitsFetching) {
                            window.__unitsFetching = true;
                            fetchUnitsDataInternal();
                        }
                    })).then(ud => {
                    let totalUnitsIn = 0;
                    let totalUnitsAdd = 0;
                    if (ud && ud.bySub) {
                        // Find which minahak this sub belongs to
                        let parentMinahak = null;
                        Object.entries(MINAHAK_SUBS).forEach(([m, subs]) => {
                            if (subs.includes(subName)) parentMinahak = m;
                        });
                        // Collect all sub names that map to the same geojson polygon via SUB_NORMALIZE
                        const allSubNames = new Set([subName]);
                        if (parentMinahak) {
                            // If this sub covers the whole minahak (single sub or main sub), sum all subs of that minahak
                            const minahakSubs = MINAHAK_SUBS[parentMinahak] || [];
                            // Check how many distinct geojson polygons this minahak has
                            const gd2 = window.__geoDataForLanduse || {};
                            const geojsonNames = new Set();
                            if (gd2.sub_neighborhoods) {
                                gd2.sub_neighborhoods.features.forEach(f => {
                                    const nm = f.properties.schn_nama || '';
                                    const normalized = SUB_NORMALIZE[nm] || nm;
                                    if (minahakSubs.some(s => s === nm || s === normalized || (SUB_NORMALIZE[s] || s) === normalized)) {
                                        geojsonNames.add(nm);
                                    }
                                });
                            }
                            // If only one geojson polygon for this minahak, sum all CSV sub names
                            if (geojsonNames.size <= 1) {
                                minahakSubs.forEach(s => { allSubNames.add(s); allSubNames.add(SUB_NORMALIZE[s] || s); });
                                allSubNames.add(parentMinahak);
                            }
                        }
                        Object.keys(ud.bySub).forEach(minahak => {
                            const subs = ud.bySub[minahak];
                            Object.keys(subs).forEach(s => {
                                if (allSubNames.has(s)) {
                                    totalUnitsIn += subs[s].units_in || 0;
                                    totalUnitsAdd += subs[s].units_add || 0;
                                }
                            });
                        });
                    }
                    const grandTotalUnits = totalUnitsIn + totalUnitsAdd;

                    // Calculate open space: xplan first, kayam as fallback
                    let openSpaceArea = 0;
                    const openSpaceNames = [];
                    // Try xplan
                    if (gd.landuse_xplan) {
                        gd.landuse_xplan.features.forEach(f => {
                            const name = (f.properties.mavat_name || '').trim();
                            if (!name) return;
                            const group = getLanduseGroup(name);
                            if (group !== 'שטחים פתוחים' && group !== 'יער/חקלאי') return;
                            try {
                                let fCoords;
                                if (f.geometry.type === 'Polygon') fCoords = f.geometry.coordinates[0];
                                else if (f.geometry.type === 'MultiPolygon') fCoords = f.geometry.coordinates[0][0];
                                else return;
                                let cx = 0, cy = 0, n = 0;
                                for (const c of fCoords) { cx += c[0]; cy += c[1]; n++; }
                                cx /= n; cy /= n;
                                let inside = false;
                                for (let i = 0, j = subCoords.length - 1; i < subCoords.length; j = i++) {
                                    const [xi, yi] = subCoords[i], [xj, yj] = subCoords[j];
                                    if ((yi > cy) !== (yj > cy) && cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)
                                        inside = !inside;
                                }
                                if (inside) {
                                    openSpaceArea += getFeatureArea(f);
                                    if (!openSpaceNames.includes(name)) openSpaceNames.push(name);
                                }
                            } catch(ex) {}
                        });
                    }
                    // Fallback to kayam
                    if (gd.yiud_karka_kayam) {
                        gd.yiud_karka_kayam.features.forEach(f => {
                            const name = (f.properties.Descr || '').trim();
                            if (!name) return;
                            const group = getLanduseGroup(name);
                            if (group !== 'שטחים פתוחים' && group !== 'יער/חקלאי') return;
                            try {
                                let fCoords;
                                if (f.geometry.type === 'Polygon') fCoords = f.geometry.coordinates[0];
                                else if (f.geometry.type === 'MultiPolygon') fCoords = f.geometry.coordinates[0][0];
                                else return;
                                let cx = 0, cy = 0, n = 0;
                                for (const c of fCoords) { cx += c[0]; cy += c[1]; n++; }
                                cx /= n; cy /= n;
                                // Only add kayam if not already covered by xplan in this area
                                let coveredByXplan = false;
                                if (gd.landuse_xplan) {
                                    gd.landuse_xplan.features.forEach(xf => {
                                        if (coveredByXplan) return;
                                        try {
                                            let xCoords;
                                            if (xf.geometry.type === 'Polygon') xCoords = xf.geometry.coordinates[0];
                                            else if (xf.geometry.type === 'MultiPolygon') xCoords = xf.geometry.coordinates[0][0];
                                            else return;
                                            let xInside = false;
                                            for (let i = 0, j = xCoords.length - 1; i < xCoords.length; j = i++) {
                                                const [xi, yi] = xCoords[i], [xj, yj] = xCoords[j];
                                                if ((yi > cy) !== (yj > cy) && cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)
                                                    xInside = !xInside;
                                            }
                                            if (xInside) coveredByXplan = true;
                                        } catch(ex) {}
                                    });
                                }
                                if (!coveredByXplan) {
                                    let inside = false;
                                    for (let i = 0, j = subCoords.length - 1; i < subCoords.length; j = i++) {
                                        const [xi, yi] = subCoords[i], [xj, yj] = subCoords[j];
                                        if ((yi > cy) !== (yj > cy) && cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)
                                            inside = !inside;
                                    }
                                    if (inside) {
                                        openSpaceArea += getFeatureArea(f);
                                        if (!openSpaceNames.includes(name)) openSpaceNames.push(name);
                                    }
                                }
                            } catch(ex) {}
                        });

                    // Show result dialog
                    const panel = document.createElement('div');

                    panel.innerHTML =

                        '<button id="shatzaf-close" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer">&times;</button></div>' +
                        '<div style="font-size:12px;margin-bottom:4px;color:#ccc">יח"ד קיימות: <b>' + totalUnitsIn.toLocaleString() + '</b></div>' +
                        '<div style="font-size:12px;margin-bottom:4px;color:#ccc">יח"ד תוספת: <b>' + totalUnitsAdd.toLocaleString() + '</b></div>' +

                        (openSpaceNames.length > 0 ? '<div style="font-size:10px;color:#888;margin-bottom:8px">ייעודים: ' + openSpaceNames.join(', ') + '</div>' : '') +
                        '<div style="margin-top:12px;margin-bottom:8px;font-size:13px">גודל משק בית ממוצע (נפשות):</div>' +
                        '<div style="display:flex;gap:8px;align-items:center">' +
                        '<input id="shatzaf-household" type="number" value="3.5" min="1" max="10" step="0.1" style="width:70px;padding:6px;border-radius:6px;border:1px solid #555;background:#1a1a2e;color:#fff;font-size:14px;text-align:center" />' +
                        '<button id="shatzaf-calc" style="flex:1;padding:8px;background:#4CAF50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit">חשב</button></div>' +
                        '<div id="shatzaf-result" style="margin-top:14px;display:none"></div>';

                            '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>אוכלוסייה מוערכת:</span><b>' + Math.round(totalPeople).toLocaleString() + ' נפשות</b></div>' +
                            '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span>(' + grandTotalUnits.toLocaleString() + ' יח"ד × ' + hh + ' נפשות)</span></div>' +
                            '<div style="text-align:center;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px">' +
                            '<div style="font-size:32px;font-weight:bold;color:#e0e0e0">' + sqmPerPerson.toFixed(1) + '</div>' +
                            '<div style="font-size:12px;color:#aaa">מ"ר שצ"פ לנפש</div>' +
                            '</div>' +
                            (grandTotalUnits === 0 ? '<div style="color:#e94560;font-size:11px;margin-top:8px;text-align:center">⚠ אין נתוני יח"ד</div>' : '') +
                            (openSpaceArea === 0 ? '<div style="color:#e94560;font-size:11px;margin-top:8px;text-align:center">⚠ לא נמצא שצ"פ באזור</div>' : '') +

                    }); // end .then(ud =>
                }

                };
            }, [dataLoaded]); // Run once when data loaded

            // ── Landuse compare: area mode finished → run analysis ──
            useEffect(() => {

                        let cx = 0, cy = 0, n = 0;

                        if (n === 0) return;
                        cx /= n; cy /= n;
                        // pip check
                        let inside = false;
                        for (let i = 0, j = polyCoords.length - 1; i < polyCoords.length; j = i++) {
                            const [xi, yi] = polyCoords[i], [xj, yj] = polyCoords[j];
                            if ((yi > cy) !== (yj > cy) && cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)
                                inside = !inside;
                        }
                        if (inside) {
                            const pid = f.properties.plan_name || f.properties.TABA || '';
                            const psum = f.properties.plan_summary || f.properties.plan_name_he || '';
                            planNames.push(psum ? pid + ' - ' + psum : pid);

                    });
                }

                const result = analyzeLanduseComparison(polyCoords, planNames);
                showLanduseComparePanel(result);
                // Mark that landuse handled this areaFinished - so regular area analysis skips it
                window.__landuseHandledArea = true;
                landuseCompareModeRef.current = null;
                setLanduseCompareMode(null);
            }, [areaFinished]);

            // ── Area select: drawing mode ──
            useEffect(() => {
                areaModeRef.current = areaMode;
                const map = mapInstanceRef.current;
                if (!map || !areaMode) return;
                const r = areaRef.current;
                r.points = []; r.markers = []; r.polygon = null;
                map.getContainer().classList.add('measuring');

                function onClick(e) {
                    r.points.push(e.latlng);

                    const m = L.circleMarker(e.latlng, { radius: 4, color: '#e94560', fillColor: '#e94560', fillOpacity: 1 }).addTo(map);
                    r.markers.push(m);
                    if (r.points.length > 1) {
                        if (r.polygon) map.removeLayer(r.polygon);
                        r.polygon = L.polygon(r.points, { color: '#e94560', weight: 2, fillColor: '#e94560', fillOpacity: 0.15, dashArray: '6,4' }).addTo(map);
                    }
                }

                function onKeyDown(e) {
                    if (e.key === 'Escape') {
                        // Clean up and exit
                        r.markers.forEach(m => map.removeLayer(m));
                        if (r.polygon) map.removeLayer(r.polygon);
                        r.points = []; r.markers = []; r.polygon = null;
                        map.getContainer().classList.remove('measuring');
                        setAreaMode(false);
                    }

                map.on('click', onClick);
                document.addEventListener('keydown', onKeyDown);
                return () => {
                    map.off('click', onClick);
                    document.removeEventListener('keydown', onKeyDown);
                    map.getContainer().classList.remove('measuring');
                };
            }, [areaMode]);

            // ── Area select: analyze results when drawing is finished ──
            useEffect(() => {
                if (!areaFinished || areaFinished.length < 3) return;
                // Skip regular area analysis if landuse compare handled this
                if (landuseCompareModeRef.current === 'area') return;
                if (window.__landuseHandledArea) { window.__landuseHandledArea = false; return; }
                const gd = geoDataRef.current;
                if (!gd || !gd.plans) return;

                // point-in-polygon test
                function pip(pt, ring) {
                    const [x, y] = pt;
                    let inside = false;
                    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                        const [xi, yi] = ring[i], [xj, yj] = ring[j];
                        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi))
                            inside = !inside;
                    }
                    return inside;
                }

                const polyCoords = areaFinished.map(p => [p.lng, p.lat]);
                polyCoords.push(polyCoords[0]);

                // Approved statuses to merge
                const APPROVED_STATUSES = ['אישור', 'תבע מאושרת', 'מאושרת', 'תחילת תוקף'];
                function groupStatus(s) {
                    return APPROVED_STATUSES.includes(s) ? 'תכניות מאושרות' : s;
                }

                // --- Plans (תב"ע) ---
                const plansInside = [];
                gd.plans.features.forEach(f => {
                    const p = f.properties;
                    const s = normalizeStatus((p.status_mavat || '').trim());
                    if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return;
                    if (['תשתיות','מוסתר'].includes(normalizePlanType(p.plan_type || ''))) return;
                    const geom = f.geometry;
                    if (!geom || !geom.coordinates) return;
                    let coords;
                    try {
                        if (geom.type === 'Polygon') coords = geom.coordinates[0];
                        else if (geom.type === 'MultiPolygon') coords = geom.coordinates[0][0];
                        else return;
                    } catch(ex) { return; }
                    if (!coords || !coords.length) return;
                    let cx = 0, cy = 0, n = 0;
                    for (const c of coords) { if (c && c.length >= 2) { cx += c[0]; cy += c[1]; n++; } }
                    if (n === 0) return;
                    cx /= n; cy /= n;
                    if (pip([cx, cy], polyCoords)) plansInside.push({ ...p, _source: 'plan' });
                });

                // --- TAMA 38 ---
                const tamaInside = [];
                if (gd.tama38 && gd.tama38.features) {
                    gd.tama38.features.forEach(f => {
                        const p = f.properties;
                        const geom = f.geometry;
                        if (!geom || !geom.coordinates) return;
                        let lng, lat;
                        try {
                            if (geom.type === 'Point') { lng = geom.coordinates[0]; lat = geom.coordinates[1]; }
                            else if (geom.type === 'MultiPoint') { lng = geom.coordinates[0][0]; lat = geom.coordinates[0][1]; }
                            else return;
                        } catch(ex) { return; }
                        if (pip([lng, lat], polyCoords)) tamaInside.push(p);
                    });
                }

                const totalPlanUnits = plansInside.reduce((s, p) => s + (parseFloat(p.units_add) || 0), 0);
                const totalTamaUnits = tamaInside.reduce((s, p) => s + (parseFloat(p.units_tose) || 0), 0);
                const totalUnits = totalPlanUnits + totalTamaUnits;

                // Status breakdown (plans only, with merged approved)
                const byStatus = {};
                plansInside.forEach(p => {
                    const st = groupStatus(normalizeStatus(p.status_mavat || ''));
                    byStatus[st] = (byStatus[st] || 0) + 1;
                });

                // Top plans by units_add
                const topPlans = [...plansInside].sort((a,b) => (parseFloat(b.units_add)||0) - (parseFloat(a.units_add)||0)).slice(0, 5);

                // Build all data rows for export
                const allRows = plansInside.map(p => ({

                    status: normalizeStatus(p.status_mavat || ''),

                })).concat(tamaInside.map(p => ({

                })));

                const div = document.createElement('div');
                div.id = 'area-select-result';

                div.innerHTML = '<button onclick="var el=document.getElementById(&quot;area-select-result&quot;);if(el)el.remove()" style="position:absolute;top:8px;left:8px;background:none;border:none;color:#888;font-size:22px;cursor:pointer">&times;</button>' +
                    '<h3 id="area-result-title" contenteditable="true" style="color:#e94560;margin:0 0 12px;font-size:16px;outline:none;border-bottom:1px dashed transparent;cursor:text" title="לחץ לעריכה" onfocus="this.style.borderBottomColor=\'#e94560\'" onblur="this.style.borderBottomColor=\'transparent\'">סיכום אזור נבחר</h3>' +
                    '<div style="display:flex;gap:24px;margin-bottom:14px">' +
                    '<div style="text-align:center"><div style="font-size:28px;font-weight:bold">' + plansInside.length + '</div><div style="font-size:11px;color:#aaa">תכניות תב"ע</div></div>' +
                    (tamaInside.length > 0 ? '<div style="text-align:center"><div style="font-size:28px;font-weight:bold;color:#FF9800">' + tamaInside.length + '</div><div style="font-size:11px;color:#aaa">תמ"א 38</div></div>' : '') +
                    '<div style="text-align:center"><div style="font-size:28px;font-weight:bold;color:#4CAF50">' + Math.round(totalUnits).toLocaleString() + '</div><div style="font-size:11px;color:#aaa">יח"ד תוספת</div></div></div>' +
                    (statusHtml ? '<div style="border-top:1px solid #333;padding-top:8px;margin-bottom:8px"><div style="font-size:12px;color:#888;margin-bottom:4px">פילוח סטטוס:</div>' + statusHtml + '</div>' : '') +
                    (topHtml ? '<div style="border-top:1px solid #333;padding-top:8px;margin-bottom:8px"><div style="font-size:12px;color:#888;margin-bottom:4px">תכניות מובילות:</div>' + topHtml + '</div>' : '') +
                    '<div style="border-top:1px solid #333;padding-top:10px;display:flex;gap:8px;justify-content:center">' +
                    '<button id="area-export-excel" style="background:#2d6a4f;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit">📊 ייצוא Excel</button>' +
                    '<button id="area-print" style="background:#1a5276;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit">🖨️ הדפסה</button>' +
                    '</div>';
                document.body.appendChild(div);

                // Store export data on the element for button handlers
                window.__areaExportData = allRows;

                // Excel export handler
                document.getElementById('area-export-excel').addEventListener('click', () => {

                    );
                    const bom = '\uFEFF';
                    const blob = new Blob([bom + header + '\n' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = title.replace(/\s+/g, '_') + '.csv';
                    document.body.appendChild(a); a.click(); a.remove();
                    URL.revokeObjectURL(url);
                });

                // Print handler
                document.getElementById('area-print').addEventListener('click', () => {
                    const el = document.getElementById('area-select-result');
                    if (!el) return;
                    const win = window.open('', '_blank');
                    win.document.write('<html dir="rtl"><head><meta charset="utf-8"><title>' + (document.getElementById('area-result-title')?.textContent || 'סיכום אזור') + '</title>');
                    win.document.write('<style>body{font-family:Assistant,Arial,sans-serif;padding:20px;color:#222}h3{color:#e94560}button{display:none!important}</style></head><body>');
                    win.document.write(el.innerHTML);
                    win.document.write('</body></html>');
                    win.document.close();
                    win.print();
                });

                // Clean up drawing layers
                const r = areaRef.current;
                const map = mapInstanceRef.current;
                if (map) {
                    r.markers.forEach(m => map.removeLayer(m));
                    if (r.polygon) map.removeLayer(r.polygon);
                }
                r.points = []; r.markers = []; r.polygon = null;
            }, [areaFinished]);

            // ── Measurement tool logic ──
            const clearMeasurement = useCallback(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const m = measureRef.current;
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);
            }, []);

            const stopMeasure = useCallback(() => {
                clearMeasurement();
                setMeasureMode(null);
                const map = mapInstanceRef.current;
                if (map) map.getContainer().classList.remove('measuring');
            }, [clearMeasurement]);

            // Format distance in m/km
            function fmtDist(m) {
                if (m >= 1000) return (m / 1000).toFixed(2) + ' ק"מ';
                return Math.round(m) + ' מ\'';
            }
            // Format area in dunam / sqm
            function fmtArea(sqm) {
                const dunam = sqm / 1000;
                if (dunam >= 1) return dunam.toFixed(2) + ' דונם' + ' (' + Math.round(sqm).toLocaleString() + ' מ"ר)';
                return Math.round(sqm).toLocaleString() + ' מ"ר';
            }
            // Compute total polyline distance
            function polylineDist(pts) {
                let d = 0;
                for (let i = 1; i < pts.length; i++) d += pts[i - 1].distanceTo(pts[i]);
                return d;
            }
            // Compute polygon area using Shoelace on projected coords
            function polygonArea(pts) {
                if (pts.length < 3) return 0;
                // Use L.GeometryUtil if available, otherwise Gauss's formula on EPSG:4326
                // Spherical excess method for better accuracy
                const toRad = Math.PI / 180;
                const R = 6378137;
                let area = 0;
                const n = pts.length;
                for (let i = 0; i < n; i++) {
                    const j = (i + 1) % n;
                    const k = (i + 2) % n;
                    area += (pts[j].lng * toRad - pts[i].lng * toRad) *
                        (2 + Math.sin(pts[i].lat * toRad) + Math.sin(pts[j].lat * toRad));
                }
                area = Math.abs(area * R * R / 2);
                return area;
            }

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const container = map.getContainer();

                if (!measureMode) {
                    container.classList.remove('measuring');
                    return;
                }

                container.classList.add('measuring');
                const m = measureRef.current;
                // Clear any previous measurement
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);

                const lineStyle = { color: '#e94560', weight: 2, dashArray: '6 4' };
                const fillStyle = { color: '#e94560', fillColor: 'rgba(233,69,96,0.15)', weight: 2, dashArray: '6 4' };
                const vertexStyle = { radius: 5, color: '#e94560', fillColor: '#fff', fillOpacity: 1, weight: 2 };

                function updateTooltip(latlng, text) {
                    if (m.tooltip) {
                        m.tooltip.setLatLng(latlng).setContent(text);
                    } else {
                        m.tooltip = L.tooltip({
                            permanent: true,
                            direction: 'top',
                            offset: [0, -10],
                            className: 'measure-tooltip'

                function onMapClick(e) {
                    // Ignore clicks on controls/popups
                    if (e.originalEvent && (

                        e.originalEvent.target.closest('.map-toolbar') ||
                        e.originalEvent.target.closest('.measure-result')

                    const pt = e.latlng;
                    m.points.push(pt);

                    // Add vertex marker
                    const marker = L.circleMarker(pt, vertexStyle).addTo(map);
                    m.layers.push(marker);

                    if (measureMode === 'distance') {
                        if (m.points.length > 1) {
                            const line = L.polyline(m.points, lineStyle).addTo(map);
                            // Remove old line if exists
                            if (m.mainLine) map.removeLayer(m.mainLine);
                            m.mainLine = line;
                            m.layers.push(line);
                        }
                        const dist = polylineDist(m.points);
                        if (dist > 0) {
                            updateTooltip(pt, fmtDist(dist));
                            setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        }
                    } else {
                        // Area mode
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        if (m.points.length >= 2) {
                            const poly = L.polygon(m.points, fillStyle).addTo(map);
                            m.mainPoly = poly;
                            m.layers.push(poly);
                        }
                        if (m.points.length >= 3) {
                            const area = polygonArea(m.points);
                            updateTooltip(pt, fmtArea(area));
                            setMeasureResult({ type: 'area', value: fmtArea(area) });
                        } else {
                            updateTooltip(pt, 'לחצו נקודות נוספות');
                        }
                    }
                }

                function onMouseMove(e) {
                    if (m.points.length === 0) return;
                    const lastPt = m.points[m.points.length - 1];
                    // Draw guide line from last point to cursor
                    if (m.guideLine) map.removeLayer(m.guideLine);
                    m.guideLine = L.polyline([lastPt, e.latlng], {
                        color: '#8888aa', weight: 1, dashArray: '4 4'
                    }).addTo(map);

                    // Show running measurement in tooltip
                    if (measureMode === 'distance') {
                        const totalDist = polylineDist(m.points) + lastPt.distanceTo(e.latlng);
                        updateTooltip(e.latlng, fmtDist(totalDist));
                    } else if (m.points.length >= 2) {
                        const tempPts = [...m.points, e.latlng];
                        const area = polygonArea(tempPts);
                        updateTooltip(e.latlng, fmtArea(area));
                    }
                }

                function onDblClick(e) {
                    L.DomEvent.stopPropagation(e);

                    // Finish measurement
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }

                    if (measureMode === 'distance' && m.points.length >= 2) {
                        // Finalize line — solid
                        if (m.mainLine) map.removeLayer(m.mainLine);
                        const finalLine = L.polyline(m.points, { color: '#e94560', weight: 3 }).addTo(map);
                        m.layers.push(finalLine);
                        const dist = polylineDist(m.points);
                        setMeasureResult({ type: 'distance', value: fmtDist(dist) });

                    } else if (measureMode === 'area' && m.points.length >= 3) {
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        const finalPoly = L.polygon(m.points, {
                            color: '#e94560', fillColor: 'rgba(233,69,96,0.2)', weight: 3
                        }).addTo(map);
                        m.layers.push(finalPoly);
                        const area = polygonArea(m.points);
                        setMeasureResult({ type: 'area', value: fmtArea(area) });
                        updateTooltip(m.points[m.points.length - 1], fmtArea(area));
                    }

                    // Stop listening but keep result visible
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);

                function onKeyDown(e) {

                map.on('click', onMapClick);
                map.on('mousemove', onMouseMove);
                map.on('dblclick', onDblClick);
                document.addEventListener('keydown', onKeyDown);

                return () => {
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);

            // ── Print function ──

                if (printScale !== 'current' && selectedScale && selectedScale.denom) {
                    // Calculate bounds for exact scale
                    // At this scale, 1 cm on paper = denom cm in reality
                    // Print area ~ A4 landscape = ~27cm x 17cm

                // Scale bar: compute a nice round distance
                function niceScaleBar(boundsWidthM, imgWidthPx) {

                    const nice = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000];
                    let bestM = nice[0];
                    for (const n of nice) { if (n <= targetM * 1.5) bestM = n; }
                    const barPx = Math.round(bestM / mPerPx);
                    const label = bestM >= 1000 ? (bestM / 1000) + ' ק"מ' : bestM + ' מ\'';
                    return { barPx, label };
                }
                const boundsWidthM = bSw.distanceTo(L.latLng(bSw.lat, bNe.lng));
                const scaleBar = niceScaleBar(boundsWidthM, printW);

            // ── Units summary: fetch plans + tama38 and aggregate by minahak ──
            // Map tama38 neighborho → minahak
            const NEIGHBORHOOD_TO_MINAHAK = {
                'טלביה': 'גינות העיר', 'רחביה': 'גינות העיר',

            // Fetch units data silently (for shatzaf etc.) - returns promise
            const ensureUnitsData = useCallback(() => {

                    window.__unitsDataCallbacks = window.__unitsDataCallbacks || [];

            const fetchUnitsDataInternal = useCallback(() => {

                const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJU2Odzsa_d789A5545sSFnUGsrXuW2VTj3xCNEtV1sOM13VNVeepGhzraHoQgLWBaGTCitS-4j7Sy/pub?output=csv';

                // Parse CSV (handles quoted fields with commas)
                function parseCSV(text) {
                    const rows = [];
                    let row = []; let field = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const ch = text[i];
                        if (inQuotes) {
                            if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
                            else if (ch === '"') { inQuotes = false; }
                            else { field += ch; }
                        } else {
                            if (ch === '"') { inQuotes = true; }
                            else if (ch === ',') { row.push(field); field = ''; }
                            else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
                                row.push(field); field = '';
                                if (row.length > 1) rows.push(row);
                                row = [];
                                if (ch === '\r') i++;
                            } else { field += ch; }
                        }
                    }
                    if (field || row.length) { row.push(field); rows.push(row); }
                    return rows;
                }

                // Fetch plans from Google Sheets + tama38 from WMS grid
                const plansPromise = fetch(sheetUrl).then(r => r.text()).then(csv => {
                    const rows = parseCSV(csv);
                    const header = rows[0];

                plansPromise.then(planRows => {

                    const STATUS_GROUPS = [

                                    <div className="plan-search-results">
                                        {addressResults.map((r, i) => (
                                            <div
                                                key={i}
                                                className="plan-search-item"
                                                onClick={() => {
                                                    const map = mapInstanceRef.current;
                                                    if (map) {
                                                        map.setView([r.lat, r.lng], 17);
                                                        // Drop a temporary marker
                                                        if (window.__addressMarker) map.removeLayer(window.__addressMarker);
                                                        window.__addressMarker = L.marker([r.lat, r.lng], {
                                                            icon: L.divIcon({
                                                                className: '',
                                                                html: '<div style="background:#e94560;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>',
                                                                iconSize: [12, 12],
                                                                iconAnchor: [6, 6]
                                                            })
                                                        }).addTo(map);
                                                        setTimeout(() => {
                                                            if (window.__addressMarker) { map.removeLayer(window.__addressMarker); window.__addressMarker = null; }
                                                        }, 10000);
                                                    }
                                                    setAddressResults([]);
                                                    setAddressSearch('');
                                                }}
                                            >
                                                <div className="plan-search-item-name" style={{fontSize:11}}>{r.name.split(',').slice(0, 3).join(', ')}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <h3>שכבות ({activeCount} פעילות)</h3>
                            <input
                                className="search-input"
                                type="text"
                                placeholder="חיפוש שכבה..."
                                value={searchText}
                                onChange={(e) => setSearchText(e.target.value)}
                            />

                            {Object.entries(filteredConfig).map(([groupKey, group]) => (
                                <div key={groupKey}>
                                    {group.titleToggle ? (
                                        <div className="layer-group-title" style={{cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',gap:4}}
                                             onClick={() => toggleLayer(group.layers[0].id)}>
                                            <input type="checkbox"
                                                checked={layers[group.layers[0].id] || false}
                                                onChange={() => toggleLayer(group.layers[0].id)}
                                                onClick={(e) => e.stopPropagation()}
                                                style={{ marginLeft: 2 }}
                                            />
                                            {group.title}
                                        </div>
                                    ) : (
                                    <div className="layer-group-title" onClick={() => setCollapsedGroups(prev => ({...prev, [groupKey]: !prev[groupKey]}))} style={{cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',gap:4}}>
                                        <span style={{fontSize:10,transition:'transform 0.2s',transform:collapsedGroups[groupKey]?'rotate(-90deg)':'rotate(0deg)',display:'inline-block'}}>▼</span>
                                        {(groupKey === 'admin' || groupKey === 'master_plans') && (
                                            <input type="checkbox"
                                                checked={group.layers.every(l => layers[l.id])}
                                                onChange={() => {
                                                    const allOn = group.layers.every(l => layers[l.id]);
                                                    setLayers(prev => {
                                                        const next = { ...prev };
                                                        group.layers.forEach(l => { next[l.id] = !allOn; });
                                                        return next;
                                                    });
                                                }}
                                                onClick={(e) => e.stopPropagation()}
                                                style={{ marginLeft: 6 }}
                                            />
                                        )}
                                        <span style={{flex:1}}>{group.title}</span>
                                        {groupKey === 'education' && (
                                            <button className="layer-legend-btn" title="מקרא מוסדות חינוך"
                                                onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא מוסדות חינוך', items: MOSADOT_LEGEND }); }}
                                                style={{fontSize:'14px',margin:0}}>⋯</button>
                                        )}
                                        {groupKey === 'shavaz' && (
                                            <button className="layer-legend-btn" title="מקרא מבני ציבור"
                                                onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא מבני ציבור', items: SHAVAZ_LEGEND }); }}
                                                style={{fontSize:'14px',margin:0}}>⋯</button>
                                        )}
                                        {groupKey === 'master_plans' && (
                                            <button className="layer-legend-btn" title="מקרא תכניות אב — צבעים נושאיים + תאימות"
                                                onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא תכניות אב', items: MASTER_PLAN_LEGEND }); }}
                                                style={{fontSize:'14px',margin:0}}>⋯</button>
                                        )}
                                    </div>
                                    )}
                                    {!collapsedGroups[groupKey] && !group.titleToggle && group.layers.map(layer => (
                                        <div key={layer.id}>
                                        <div className="layer-item"
                                             title={layer.desc || ''}>
                                            <input
                                                type="checkbox"
                                                checked={layers[layer.id] || false}
                                                onChange={() => toggleLayer(layer.id)}
                                                onClick={(e) => e.stopPropagation()}
                                            />
                                            <label onClick={() => toggleLayer(layer.id)}>{layer.name}</label>
                                            {layer.id === 'plans' && (
                                                <button className="layer-legend-btn" title="מקרא סטטוס"
                                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא תב"ע - סטטוס תכנית', items: PLANS_LEGEND }); }}>⋯</button>
                                            )}
                                            {layer.id === 'permits' && (
                                                <>
                                                    <button className="layer-legend-btn" title="מקרא שלבים"
                                                        onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא היתרים - שלב', items: PERMITS_LEGEND }); }}>⋯</button>
                                                    <button className="layer-legend-btn" title="דוח היתרים מול תב&quot;ע"
                                                        onClick={(e) => { e.stopPropagation(); setPermitsGapDrilldown(null); setShowPermitsGap(true); }}
                                                        style={{marginRight:6,fontSize:14}}>📊</button>
                                                </>
                                            )}
                                            {layer.id === 'tama38' && (
                                                <button className="layer-legend-btn" title="מקרא תמ&quot;א 38"
                                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא תמ"א 38 - סטטוס', items: TAMA38_LEGEND }); }}>⋯</button>
                                            )}
                                            {groupKey === 'master_plans' && (
                                                <button className="layer-legend-btn" title={"דוח סיכום — תכנית אב " + layer.name}
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        // Map layer id to MP name
                                                        const NAME_BY_ID = {
                                                            master_plan_moshavot: 'מושבות',
                                                            master_plan_rasko:    'רסקו',
                                                            master_plan_baka:     'בקעה',
                                                            master_plan_arnona:   'ארנונה',
                                                        };
                                                        setMasterPlanReport(NAME_BY_ID[layer.id] || layer.name);
                                                    }}
                                                    style={{marginRight:4,fontSize:11}}>📊</button>
                                            )}
                                            {layer.minahak && (
                                                <button className="layer-legend-btn" title={"דוח מינהל " + layer.minahak}
                                                    onClick={(e) => { e.stopPropagation(); setMinahakReport(layer.minahak); }}
                                                    style={{fontSize:'11px'}}>📊</button>
                                            )}
                                        </div>
                                        {layer.subLayers && layers[layer.id] && layer.subLayers.map(sub => (
                                            <div className="layer-item" key={sub.id} style={{paddingRight:24}}
                                                 title={sub.desc || ''}>
                                                <input
                                                    type="checkbox"
                                                    checked={layers[sub.id] || false}
                                                    onChange={() => toggleLayer(sub.id)}
                                                    onClick={(e) => e.stopPropagation()}
                                                />
                                                <label onClick={() => toggleLayer(sub.id)} style={{fontSize:'11px'}}>{sub.name}</label>
                                            </div>
                                        ))}
                                        </div>
                                    ))}
                                    {groupKey === 'education' && !collapsedGroups[groupKey] && (layers['mosadot_shchuna'] || layers['sara_march_2026']) && (
                                        <div style={{padding:'4px 8px 8px 8px',fontSize:11,direction:'rtl'}}>
                                            <div style={{fontWeight:'bold',marginBottom:4,color:'#aaa'}}>סינון:</div>
                                            <div style={{display:'flex',flexWrap:'wrap',gap:'2px 8px',marginBottom:4}}>
                                                <span style={{color:'#888',fontSize:10,width:'100%'}}>סוג מוסד:</span>
                                                {['יסודי','על יסודי','גני','מעון'].map(v => (
                                                    <label key={v} style={{display:'flex',alignItems:'center',gap:2,cursor:'pointer'}}>
                                                        <input type="checkbox"
                                                            checked={eduFilters.sugMosad.length === 0 || eduFilters.sugMosad.includes(v)}
                                                            onChange={e => {
                                                                setEduFilters(prev => {
                                                                    const all = ['יסודי','על יסודי','גני','מעון'];
                                                                    let next = prev.sugMosad.length === 0 ? [...all] : [...prev.sugMosad];
                                                                    if (e.target.checked) { if (!next.includes(v)) next.push(v); }
                                                                    else { next = next.filter(x => x !== v); }
                                                                    if (next.length === all.length) next = [];
                                                                    return {...prev, sugMosad: next};
                                                                });
                                                            }}
                                                            style={{margin:0}}
                                                        />
                                                        <span>{v}</span>
                                                    </label>
                                                ))}
                                            </div>
                                            <div style={{display:'flex',flexWrap:'wrap',gap:'2px 8px'}}>
                                                <span style={{color:'#888',fontSize:10,width:'100%'}}>פיקוח:</span>
                                                {['ממלכתי','ממלכתי דתי','ערבי','חרדי'].map(v => (
                                                    <label key={v} style={{display:'flex',alignItems:'center',gap:2,cursor:'pointer'}}>
                                                        <input type="checkbox"
                                                            checked={eduFilters.pikuach.length === 0 || eduFilters.pikuach.includes(v)}
                                                            onChange={e => {
                                                                setEduFilters(prev => {
                                                                    const all = ['ממלכתי','ממלכתי דתי','ערבי','חרדי'];
                                                                    let next = prev.pikuach.length === 0 ? [...all] : [...prev.pikuach];
                                                                    if (e.target.checked) { if (!next.includes(v)) next.push(v); }
                                                                    else { next = next.filter(x => x !== v); }
                                                                    if (next.length === all.length) next = [];
                                                                    return {...prev, pikuach: next};
                                                                });
                                                            }}
                                                            style={{margin:0}}
                                                        />
                                                        <span>{v}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}

                            <div className="layer-group-title" onClick={() => setCollapsedGroups(prev => ({...prev, topics: !prev.topics}))}
                                 style={{cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                <div style={{display:'flex',alignItems:'center',gap:4}}>
                                    <span style={{fontSize:10,transition:'transform 0.2s',transform:collapsedGroups.topics?'rotate(-90deg)':'rotate(0deg)',display:'inline-block'}}>▼</span>
                                    <span>נושאים תכנוניים</span>
                                </div>
                                <button className="layer-legend-btn" title="מקרא נושאים תכנוניים"
                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא נושאים תכנוניים', items: TOPICS_LEGEND }); }}
                                    style={{fontSize:'14px',margin:0}}>⋯</button>
                            </div>
                            {!collapsedGroups.topics && (<div>
                            <div className="layer-item"
                                 title='הצגת תוכניות שחופפות מרחבית לתוכניות אחרות'
                                 style={{display:'flex',alignItems:'center'}}
                                 onClick={() => setPlanningTopics(prev => ({...prev, overlapping: !prev.overlapping}))}>
                                <input type="checkbox" checked={planningTopics.overlapping} onChange={() => {}} />
                                <label style={{flex:1}}>תבעות כפולות על אותו מרחב</label>
                                <button className="layer-legend-btn" title="דוח תכניות כפולות"
                                    onClick={(e) => { e.stopPropagation(); setOverlapReport(true); }}
                                    style={{marginRight:4,fontSize:11}}>📊</button>

                                        const units = parseFloat(p.units_add) || 0;

                                        if (af.maxUnits !== '' && units > parseFloat(af.maxUnits)) return;

                        // Aggregate: per sub_neighborhood × stage × {count, units, permits[]}

                            const planType = (p.plan_type || '').trim();
                            if (planType === 'תשתיות' || planType === 'מוסתר') return;
                            const permits = getPermitsForTaba(taba);

                            const sub = (p.sub_neighborhood || p.neighborhood || 'לא ידוע').trim() || 'לא ידוע';
                            const minahak = (p.minahak || '').trim();

                                bySub[sub] = { minahak, total: { count: 0, units: 0 }, plans: 0 };
                                PERMIT_STAGES_ALL.forEach(st => bySub[sub][st] = { count: 0, units: 0, permits: [] });

                                    date: perm.status_date || '',
                                    units: u,
                                    desc: perm.request_description || '',
                                    cat: classifyPermitCategory(perm),
                                    plan: p.plan_summary || p.plan_name || taba,
                                    taba
                                });
                                bySub[sub].total.count++;
                                bySub[sub].total.units += u;
                            });
                        });

                    {masterPlanReport && (

                                <div style={{overflowY:'auto', flex:1}}>
                                <h2 style={{color:'#fff',fontSize:18,marginBottom:12}}>&#128202; דוח סיכום — תכנית אב {masterPlanReport}</h2>
                                {(() => {
                                    const gd = geoDataRef.current;
                                    const compliance = window.__masterPlanCompliance || {};
                                    if (!gd.plans) return <p>טוען...</p>;

                                    // Filter plans matching the current master plan + exclude rejected
                                    const rejected = new Set(['נגנזה','נדחתה','נגנזה/נדחתה']);
                                    const seen = new Set();
                                    const plansInMp = [];
                                    gd.plans.features.forEach(f => {
                                        const pn = f.properties.plan_name;
                                        if (!pn || seen.has(pn)) return;
                                        const c = compliance[pn];
                                        if (!c || c.mp_match !== masterPlanReport) return;
                                        const st = normalizeStatus((f.properties.status_mavat || '').trim());
                                        if (rejected.has(st)) return;
                                        seen.add(pn);
                                        plansInMp.push({ feat: f, c });
                                    });

                                    // KPIs: status counts
                                    const violations = plansInMp.filter(p => p.c.mp_status === 'violation').length;
                                    const warnings   = plansInMp.filter(p => p.c.mp_status === 'warning').length;
                                    const ok         = plansInMp.filter(p => p.c.mp_status === 'ok').length;

                                    // TMA-38: count separate tama38 features inside the MP boundary
                                    // (these are actual permits, not plans classified as tama38)
                                    const LAYER_BY_NAME = {
                                        'מושבות': 'master_plan_moshavot',
                                        'רסקו':    'master_plan_rasko',
                                        'בקעה':    'master_plan_baka',
                                        'ארנונה':  'master_plan_arnona',
                                    };
                                    const mpLayerKey = LAYER_BY_NAME[masterPlanReport];
                                    const mpFc = mpLayerKey && gd[mpLayerKey];
                                    const boundaryFeat = mpFc && (mpFc.features || []).find(ff => (ff.properties || {}).feature_type === 'boundary');
                                    const boundaryGeom = boundaryFeat ? boundaryFeat.geometry : null;

                                    // Inline point-in-polygon helpers (mirrors buildMasterPlanLayer)
                                    const ringContains = (lng, lat, ring) => {
                                        let inside = false;
                                        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                                            const xi = ring[i][0], yi = ring[i][1];
                                            const xj = ring[j][0], yj = ring[j][1];
                                            if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) inside = !inside;
                                        }
                                        return inside;
                                    };
                                    const pointInGeom = (lng, lat, geom) => {
                                        if (!geom) return false;
                                        const polys = geom.type === 'Polygon' ? [geom.coordinates]
                                                    : geom.type === 'MultiPolygon' ? geom.coordinates : [];
                                        for (const poly of polys) {
                                            if (poly[0] && ringContains(lng, lat, poly[0])) {
                                                let inHole = false;
                                                for (let h = 1; h < poly.length; h++) {
                                                    if (ringContains(lng, lat, poly[h])) { inHole = true; break; }
                                                }
                                                if (!inHole) return true;
                                            }
                                        }
                                        return false;
                                    };

                                    const tama38InsideMp = [];
                                    if (boundaryGeom && gd.tama38 && gd.tama38.features) {
                                        gd.tama38.features.forEach(tf => {
                                            if (!tf.geometry || !tf.geometry.coordinates) return;
                                            const c = tf.geometry.type === 'MultiPoint' ? tf.geometry.coordinates[0] : tf.geometry.coordinates;
                                            if (!c) return;
                                            if (pointInGeom(c[0], c[1], boundaryGeom)) tama38InsideMp.push(tf);
                                        });
                                    }
                                    const tamaCount = tama38InsideMp.length;
                                    const tamaUnitsAdd = tama38InsideMp.reduce((s, tf) => s + (parseFloat(tf.properties.units_tose) || 0), 0);

                                    // Master-plan context: subzone counts, floor range, conservation totals, no-densif zones
                                    const mpFeatures = (mpFc && mpFc.features) || [];
                                    const subzoneFeats = mpFeatures.filter(ff => (ff.properties || {}).feature_type === 'subzone' || (ff.properties || {}).feature_type === 'texture' || (ff.properties || {}).feature_type === 'building_height');
                                    const floorVals = subzoneFeats
                                        .map(ff => {
                                            const p = ff.properties;
                                            const raw = p.max_floors ?? p.floors_max ?? p.floors_max_int ?? p.floors_per_master_plan;
                                            // Pull the first integer out of "יקבע בהתאם..." / "4-5" / etc.
                                            const m = String(raw || '').match(/\d+/);
                                            return m ? parseInt(m[0], 10) : NaN;
                                        })
                                        .filter(v => v && isFinite(v) && v > 0);
                                    const floorsMinAllowed = floorVals.length ? Math.min(...floorVals) : null;
                                    const floorsMaxAllowed = floorVals.length ? Math.max(...floorVals) : null;
                                    const consPointCount = mpFeatures.filter(ff => (ff.properties || {}).feature_type === 'conservation_point').length;
                                    const noDensifZones = subzoneFeats.filter(ff => {
                                        const txt = Object.values(ff.properties).filter(v => typeof v === 'string').join(' ');
                                        return /לא לציפוף|אזור לא לציפוף/.test(txt);
                                    }).length;

                                    // Aggregate sqm + units (from Table 5 / existing fields)
                                    const agg = { units_add:0, commerce_in:0, employment:0, shavatz_out:0, hafrash:0 };
                                    plansInMp.forEach(({ feat }) => {
                                        const pr = feat.properties;
                                        agg.units_add   += parseFloat(pr.units_add) || 0;
                                        agg.commerce_in += parseFloat(pr.commerce_in) || 0;
                                        agg.employment  += parseFloat(pr.employment)  || 0;
                                        agg.shavatz_out += parseFloat(pr.shavatz_out_sqm) || 0;
                                        agg.hafrash     += parseFloat(pr.hafrash_sqm) || 0;
                                    });

                                    // Top-N violators — rank by severity
                                    // Score = (violation? 100 : warning? 10 : 0) + floors_over + 0.1*cons_a + 0.01*cons_b
                                    const scored = plansInMp
                                        .filter(p => p.c.mp_status !== 'ok')
                                        .map(p => {
                                            const planFloors = parseFloat(p.feat.properties.floors_max) || 0;

                                                    const lats = coords.map(c => c[1]), lons = coords.map(c => c[0]);
                                                    const bounds = [[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]];
                                                    const center = L.latLng((bounds[0][0]+bounds[1][0])/2, (bounds[0][1]+bounds[1][1])/2);
                                                    const props = JSON.parse(JSON.stringify(feat.properties));
                                                    setObjectionsReport(false);
                                                    setTimeout(() => {
                                                        mapInstanceRef.current.fitBounds(bounds, {padding:[50,50], maxZoom:17});
                                                        setTimeout(() => {
                                                            const mapped = mapPlanProps(props);
                                                            const popup = L.popup({maxWidth:340}).setLatLng(center).setContent(buildPlanPopup(mapped, {properties:mapped,type:'plan'}));
                                                            popup.openOn(mapInstanceRef.current);
                                                            bindPopupEvents(popup, [{properties:mapped,type:'plan'}], 0);
                                                        }, 600);
                                                    }, 100);
                                                }; }}>
                                                    <td style={{padding:'4px',color:'#888',fontSize:11}}>{i+1}</td>
                                                    <td style={{padding:'4px',color:'#64b5f6',textDecoration:'underline'}}>{p.plan_name || '-'}</td>
                                                    <td style={{padding:'4px',color:'#e0e0e0'}}>{p.plan_summary || p.plan_name_he || '-'}</td>
                                                    <td style={{textAlign:'center',padding:'4px',color:'#ffa726'}}>{p.mavat_date || '-'}</td>
                                                    <td style={{textAlign:'center',padding:'4px',color:'#ef5350'}}>{p.objection_end_date || '-'}</td>
                                                    <td style={{padding:'4px',color:'#81d4fa',fontSize:11}}>{(p.authority || '-').trim()}</td>
                                                    <td style={{padding:'4px',color:'#ce93d8'}}>{(p.minahak || '-').trim()}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                                        <button onClick={() => {
                                            const printWin = window.open('', '_blank');
                                            printWin.document.write('<html dir="rtl"><head><meta charset="utf-8"><title>דוח הפקדות להתנגדויות</title>');
                                            printWin.document.write('<style>body{font-family:Arial,sans-serif;padding:20px;direction:rtl}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{padding:6px 8px;text-align:right;border-bottom:1px solid #ddd}th{background:#f5f5f5;font-weight:700}tfoot td{border-top:2px solid #333;font-weight:700}.header{margin-bottom:16px}.header h2{margin:0 0 4px}.header p{color:#666;margin:0}@media print{.no-print{display:none!important}}</style>');
                                            printWin.document.write('</head><body>');
                                            printWin.document.write('<div class="no-print" style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">');
                                            printWin.document.write('<button onclick="window.print()" style="background:#e94560;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600">&#128424; הדפסה</button>');
                                            printWin.document.write('<button onclick="window.print()" style="background:#4CAF50;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600">&#128196; שמור PDF</button>');
                                            printWin.document.write('<button id="csvBtn" style="background:#2196F3;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600">&#128202; שמור CSV</button>');
                                            printWin.document.write('</div>');
                                            printWin.document.write('<div class="header"><h2>תכניות המופקדות להתנגדויות</h2>');
                                            printWin.document.write('<p>' + plans.length + ' תכניות</p></div>');
                                            printWin.document.write('<table><thead><tr><th>#</th><th>מספר תכנית</th><th>שם תכנית</th><th>תאריך סטטוס</th><th>תום הפקדה</th><th>מינה"ק</th></tr></thead><tbody>');
                                            plans.forEach((p, i) => {
                                                printWin.document.write('<tr><td>' + (i+1) + '</td><td>' + (p.plan_name||'') + '</td><td>' + (p.plan_summary||p.plan_name_he||'-') + '</td><td>' + (p.mavat_date||'-') + '</td><td>' + (p.objection_end_date||'-') + '</td><td>' + (p.minahak||'-').trim() + '</td></tr>');
                                            });
                                            printWin.document.write('</tbody></table>');
                                            const csvRows = ['"#","מספר תכנית","שם תכנית","תאריך סטטוס","תום הפקדה","מינה\\"ק"'];
                                            plans.forEach((p, i) => {
                                                csvRows.push('"' + (i+1) + '","' + (p.plan_name||'').replace(/"/g,'""') + '","' + (p.plan_summary||p.plan_name_he||'-').replace(/"/g,'""') + '","' + (p.mavat_date||'-') + '","' + (p.objection_end_date||'-') + '","' + (p.minahak||'-').trim().replace(/"/g,'""') + '"');
                                            });
                                            const csvContent = csvRows.join('\\n');
                                            printWin.document.write('<script>document.getElementById("csvBtn").addEventListener("click",function(){var b=new Blob(["\\uFEFF"+' + JSON.stringify(csvContent) + '],{type:"text/csv;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="הפקדות_להתנגדויות.csv";a.click()});<\/script>');
                                            printWin.document.write('</body></html>');
                                            printWin.document.close();
                                            printWin.focus();
                                        }} style={{background:'#e94560',color:'#fff',border:'none',borderRadius:6,padding:'8px 20px',cursor:'pointer',fontSize:13,fontWeight:600}}>
                                            &#128424; הדפסה / שמירה
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>);
                    })()}

                    {overlapReport && (() => {
                        const gd = geoDataRef.current;
                        const oMap = overlapMapRef.current;
                        const byTaba = window.__planByTaba;
                        if (!gd.plans || !oMap || !byTaba) return null;

                        // Minahak visibility (same rule as in the plans layer)
                        const adminLayers2 = Object.values(LAYER_CONFIG).flatMap(g => g.layers).filter(l => l.minahak);
                        const selectedMinahaks2 = adminLayers2.filter(l => layers[l.id]).map(l => l.minahak);
                        const allAdminOn2 = adminLayers2.every(l => layers[l.id]);
                        const checkMinahak = (props) => allAdminOn2 || selectedMinahaks2.includes(props.minahak || '');

                        // Same filter as plans layer: no archived/infra/consolidation-division
                        const isVisible = (p) => {
                            if (!checkMinahak(p)) return false;
                            const s = normalizeStatus((p.status_mavat || '').trim());
                            if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                            if (s === 'הכנת הודעה 77/78') return false;
                            if (['תשתיות','מוסתר'].includes(normalizePlanType(p.plan_type || ''))) return false;
                            if (normalizePlanType(p.plan_type || '') === 'איחוד וחלוקה') return false;
                            if ((p.plan_summary || '').trim().startsWith('איחוד וחלוקה')) return false;
                            const shk = window.__shouldHideKayam;
                            if (shk) {
                                const t = String(p.taba || '').trim();
                                if (t && shk(t)) return false;
                            }
                            const af = filters;
                            const units = parseFloat(p.units_add) || 0;
                            if (af.minUnits !== '' && units < parseFloat(af.minUnits)) return false;
                            if (af.maxUnits !== '' && units > parseFloat(af.maxUnits)) return false;
                            if (af.planTypes.length > 0) {
                                const pt = normalizePlanType(p.plan_type || '');
                                if (!af.planTypes.includes(pt)) return false;
                            }
                            if (af.statuses.length > 0) {
                                const sg = getFilterStatusGroup(s);
                                const stageVal = (p.stage || '').trim();
                                const sgStage = getFilterStatusGroup(stageVal);
                                if ((!sg || !af.statuses.includes(sg)) && (!sgStage || !af.statuses.includes(sgStage))) return false;
                            }
                            if (af.freeText) {
                                const q = af.freeText.toLowerCase();
                                const joined = [p.plan_summary||'', p.plan_name||'', p.architect||'', p.developer||''].join(' ').toLowerCase();
                                if (!joined.includes(q)) return false;
                            }
                            return true;
                        };

                        // Build visible-only subgraph
                        const visibleTabas = new Set();
                        for (const taba in byTaba) {
                            if (isVisible(byTaba[taba])) visibleTabas.add(taba);
                        }

                        // Connected components of overlapping visible plans
                        const groups = [];
                        const seen = new Set();
                        for (const taba of visibleTabas) {
                            if (seen.has(taba)) continue;
                            const partners = oMap.get(taba);
                            if (!partners) continue;
                            const comp = new Set();
                            const queue = [taba];
                            while (queue.length) {
                                const cur = queue.shift();
                                if (comp.has(cur) || !visibleTabas.has(cur)) continue;
                                comp.add(cur);
                                seen.add(cur);
                                const ps = oMap.get(cur) || new Set();
                                for (const p of ps) {
                                    if (visibleTabas.has(p) && !comp.has(p)) queue.push(p);
                                }
                            }
                            if (comp.size >= 2) {
                                const plans = [...comp].map(t => byTaba[t]).filter(Boolean);
                                const totalUnits = plans.reduce((s, p) => s + (parseFloat(p.units_add) || 0), 0);
                                groups.push({ plans, totalUnits });
                            }
                        }
                        groups.sort((a, b) => (b.plans.length - a.plans.length) || (b.totalUnits - a.totalUnits));

                        const totalPlansInReport = groups.reduce((s, g) => s + g.plans.length, 0);
                        const totalUnitsInReport = groups.reduce((s, g) => s + g.totalUnits, 0);

                        const jumpToPlan = (p) => {
                            const feat = gd.plans.features.find(f => f.properties.plan_name === p.plan_name || f.properties.taba === p.taba);
                            if (!feat || !feat.geometry || !mapInstanceRef.current) return;
                            const coords = [];
                            const g = feat.geometry;
                            if (g.type === 'MultiPolygon') g.coordinates.forEach(poly => poly.forEach(ring => coords.push(...ring)));
                            else if (g.type === 'Polygon') g.coordinates.forEach(ring => coords.push(...ring));
                            if (!coords.length) return;
                            const lats = coords.map(c => c[1]), lons = coords.map(c => c[0]);
                            const bounds = [[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]];
                            const center = L.latLng((bounds[0][0]+bounds[1][0])/2, (bounds[0][1]+bounds[1][1])/2);
                            const props = JSON.parse(JSON.stringify(feat.properties));
                            setOverlapReport(false);
                            setTimeout(() => {
                                mapInstanceRef.current.fitBounds(bounds, {padding:[50,50], maxZoom:17});
                                setTimeout(() => {
                                    const mapped = mapPlanProps(props);
                                    const popup = L.popup({maxWidth:340}).setLatLng(center).setContent(buildPlanPopup(mapped, {properties:mapped,type:'plan'}));
                                    popup.openOn(mapInstanceRef.current);
                                    bindPopupEvents(popup, [{properties:mapped,type:'plan'}], 0);
                                }, 600);
                            }, 100);
                        };

                        return (
                        <div className="units-overlay" onClick={() => setOverlapReport(false)}>
                            <div className="units-modal cell-report-modal" onClick={e => e.stopPropagation()} style={{maxWidth: 'min(900px, 95vw)', maxHeight: '85vh', display: 'flex', flexDirection: 'column'}}>
                                <button className="units-close" onClick={() => setOverlapReport(false)}>&times;</button>
                                <div className="cell-report-content" style={{overflowY: 'auto', flex: 1}}>
                                    <h2 style={{color:'#fff',fontSize:18,marginBottom:4}}>🔀 תכניות כפולות על אותו מרחב</h2>
                                    <p style={{color:'#aaa',fontSize:13,marginBottom:16}}>
                                        {groups.length} קבוצות · {totalPlansInReport} תכניות · סה"כ {Math.round(totalUnitsInReport)} יח"ד תוספת
                                    </p>
                                    {groups.length === 0 && (
                                        <p style={{color:'#888',fontSize:13}}>אין כפולות בקרב התכניות המוצגות כעת.</p>
                                    )}
                                    {(() => {
                                        // Pick a representative name for a group.
                                        // Words shared across plan_summary of most plans → common location.
                                        const STOPWORDS = new Set([
                                            'תוספת','בנייה','בניה','הגדלת','זכויות','תוכנית','תכנית','שינוי',
                                            'הקמת','הוספת','חדש','חדשה','שכונת','שכ','ירושלים','ב','של','על',
                                            'מס','סה','ד','יח','מבני','מבנה','מגורים','מסחר','תעסוקה','ותעסוקה',
                                            'קומות','קומה','בבניין','קיים','חדשים','חדשות','בכל','לבנייה','לבניה',
                                            'במתחם','במקום','ממ','הגדלה','איחוד','חלוקה','בהסכמת','ללא','עם',
                                            'בית','בתים','חברת','חב','תב','תב"ע'
                                        ]);
                                        const groupName = (plans) => {
                                            const wordCount = new Map();
                                            let n = 0;
                                            for (const p of plans) {
                                                const s = (p.plan_summary || '').trim();
                                                if (!s) continue;
                                                n++;
                                                const words = s.replace(/[.,\-–—:;()"'\/]+/g, ' ').split(/\s+/).filter(w =>
                                                    w.length >= 2 && !/^\d+$/.test(w) && !STOPWORDS.has(w));
                                                const uniq = new Set(words);
                                                for (const w of uniq) wordCount.set(w, (wordCount.get(w) || 0) + 1);
                                            }
                                            if (n === 0) return '';
                                            const threshold = Math.max(2, Math.ceil(n / 2));
                                            const common = [...wordCount.entries()]
                                                .filter(([, c]) => c >= threshold)
                                                .sort((a, b) => b[1] - a[1])
                                                .map(([w]) => w);
                                            return common.slice(0, 3).join(' ');
                                        };
                                        const toggleGroup = (idx) => setOverlapExpanded(prev => {
                                            const next = new Set(prev);
                                            if (next.has(idx)) next.delete(idx); else next.add(idx);
                                            return next;
                                        });
                                        const groupKey = (plans) => plans.map(p => String(p.taba || '')).sort().join('|');
                                        const saveName = (key, value) => {
                                            setOverlapNames(prev => {
                                                const next = { ...prev };
                                                if (value && value.trim()) next[key] = value.trim();
                                                else delete next[key];
                                                try { localStorage.setItem('oranim_overlap_names', JSON.stringify(next)); } catch {}
                                                return next;
                                            });
                                        };
                                        return groups.map((g, gi) => {
                                            const expanded = overlapExpanded.has(gi);
                                            const key = groupKey(g.plans);
                                            const autoName = groupName(g.plans) || 'קבוצה';
                                            const displayName = overlapNames[key] || autoName;
                                            const isEditing = overlapEditingKey === key;
                                            const minahaks = [...new Set(g.plans.map(p => (p.minahak||'').trim()).filter(Boolean))];
                                            const minahakText = minahaks.length === 1 ? minahaks[0] : (minahaks.length > 1 ? `${minahaks.length} מינהלים` : '-');
                                            return (
                                            <div key={gi} style={{marginBottom:10,border:'1px solid #2a2a4a',borderRadius:8,background:'rgba(51,102,255,0.06)',overflow:'hidden'}}>
                                                <div onClick={() => !isEditing && toggleGroup(gi)}
                                                     style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',cursor:isEditing ? 'default' : 'pointer',userSelect:'none'}}>
                                                    <span style={{color:'#9cf',fontSize:12,width:14}}>{expanded ? '▾' : '▸'}</span>
                                                    <span style={{flex:1,display:'flex',alignItems:'center',gap:6}}>
                                                        {isEditing ? (
                                                            <input autoFocus defaultValue={displayName}
                                                                onClick={e => e.stopPropagation()}
                                                                onKeyDown={e => {
                                                                    if (e.key === 'Enter') { saveName(key, e.target.value); setOverlapEditingKey(null); }
                                                                    else if (e.key === 'Escape') { setOverlapEditingKey(null); }
                                                                }}
                                                                onBlur={e => { saveName(key, e.target.value); setOverlapEditingKey(null); }}
                                                                style={{background:'rgba(255,255,255,0.08)',color:'#fff',border:'1px solid #4a5a8a',borderRadius:4,padding:'2px 6px',fontSize:14,fontWeight:700,minWidth:180,fontFamily:'inherit'}} />
                                                        ) : (
                                                            <>
                                                                <span style={{color:'#9cf',fontSize:14,fontWeight:700}}>{displayName}</span>
                                                                <button title="ערוך שם קבוצה"
                                                                    onClick={e => { e.stopPropagation(); setOverlapEditingKey(key); }}
                                                                    style={{background:'none',border:'none',cursor:'pointer',color:'#7788aa',fontSize:11,padding:'0 2px',opacity:0.6}}>✏️</button>
                                                                {overlapNames[key] && (
                                                                    <button title="שחזר שם אוטומטי"
                                                                        onClick={e => { e.stopPropagation(); saveName(key, ''); }}
                                                                        style={{background:'none',border:'none',cursor:'pointer',color:'#7788aa',fontSize:10,padding:'0 2px',opacity:0.5}}>↺</button>
                                                                )}
                                                            </>
                                                        )}
                                                        <span style={{color:'#7788aa',fontSize:12,fontWeight:400}}>· {g.plans.length} תכניות</span>
                                                    </span>
                                                    <span style={{color:'#ce93d8',fontSize:12}}>{minahakText}</span>
                                                    <span style={{color:'#ffa726',fontSize:12,minWidth:90,textAlign:'left'}}>{Math.round(g.totalUnits)} יח"ד תוספת</span>
                                                </div>
                                                {expanded && (
                                                    <div style={{padding:'0 12px 10px'}}>
                                                        <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                                                            <thead><tr style={{borderBottom:'1px solid #2a2a4a'}}>
                                                                <th style={{textAlign:'right',padding:'4px',color:'#bbb',fontWeight:600}}>מספר</th>
                                                                <th style={{textAlign:'right',padding:'4px',color:'#bbb',fontWeight:600}}>שם תכנית</th>
                                                                <th style={{textAlign:'right',padding:'4px',color:'#bbb',fontWeight:600}}>סטטוס</th>
                                                                <th style={{textAlign:'center',padding:'4px',color:'#bbb',fontWeight:600}}>תאריך</th>
                                                                <th style={{textAlign:'right',padding:'4px',color:'#bbb',fontWeight:600}}>מינה"ק</th>
                                                                <th style={{textAlign:'center',padding:'4px',color:'#bbb',fontWeight:600}}>יח"ד תוספת</th>
                                                            </tr></thead>
                                                            <tbody>
                                                                {g.plans.map((p, i) => {
                                                                    const s = normalizeStatus((p.status_mavat||'').trim());
                                                                    const statusColor = STATUS_COLORS[s] || '#aaa';
                                                                    return (
                                                                    <tr key={i} style={{borderBottom:'1px solid #1a1a2e',cursor:'pointer'}}
                                                                        onClick={() => jumpToPlan(p)}>
                                                                        <td style={{padding:'4px',color:'#64b5f6',textDecoration:'underline'}}>{p.plan_name || '-'}</td>
                                                                        <td style={{padding:'4px',color:'#e0e0e0'}}>{p.plan_summary || p.plan_name_he || '-'}</td>
                                                                        <td style={{padding:'4px',color:statusColor}}>{s || '-'}</td>
                                                                        <td style={{textAlign:'center',padding:'4px',color:'#ccc'}}>{p.mavat_date || '-'}</td>
                                                                        <td style={{padding:'4px',color:'#ce93d8'}}>{(p.minahak || '-').trim()}</td>
                                                                        <td style={{textAlign:'center',padding:'4px',color:'#ffa726'}}>{parseFloat(p.units_add) > 0 ? Math.round(parseFloat(p.units_add)) : '-'}</td>
                                                                    </tr>);
                                                                })}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                )}
                                            </div>);
                                        });
                                    })()}
                                </div>
                            </div>
                        </div>);
                    })()}

                    {legendPopup && (
                        <div className="legend-popup-overlay" onClick={() => setLegendPopup(null)}>
                            <div className="legend-popup" onClick={(e) => e.stopPropagation()}>
                                <button className="legend-popup-close" onClick={() => setLegendPopup(null)}>&times;</button>
                                <div className="legend-popup-title">{legendPopup.title}</div>
                                {legendPopup.items.map((item, i) => (
                                    <div className="legend-item" key={i}>
                                        {item.style === 'header' ? (
                                            <div style={{width:'100%',fontWeight:'bold',fontSize:12,marginTop:i>0?8:0,borderBottom:'1px solid #555',paddingBottom:2,color:'#ccc'}}>{item.label}</div>
                                        ) : item.style === 'svg' ? (
                                            <div className="legend-color" style={{display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',border:'none'}}
                                                dangerouslySetInnerHTML={{__html: item.svg}}></div>
                                        ) : item.style === 'hatch' ? (
                                            <div className="legend-color" style={{
                                                background: `repeating-linear-gradient(-45deg, transparent, transparent 3px, ${item.color} 3px, ${item.color} 4.5px)`,
                                                border: `2px solid ${item.color}`
                                            }}></div>
                                        ) : item.style === 'outline' ? (
                                            <div className="legend-color" style={{
                                                background: 'transparent',
                                                border: `3px solid ${item.color}`
                                            }}></div>
                                        ) : (
                                            <div className="legend-color" style={{background: item.color}}></div>
                                        )}
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        });
    }
    </script>
</body>
</html>

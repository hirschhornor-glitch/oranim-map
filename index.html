                        if (!minahaks.includes(m) && m) minahaks.push(m);
                    });

                    setUnitsData({ minahaks, byMinahak, bySub, statusGroups: STATUS_GROUPS });
                    setUnitsLoading(false);
                });
            }, [unitsData]);

            // GeoJSON rendering: add/remove L.geoJSON layers based on state
            useEffect(() => {
                const map = mapInstanceRef.current;
                const gd = geoDataRef.current;
                if (!map || !dataLoaded) return;

                // Remove all previous geo layers + label markers
                function cleanupLayer(ll) {
                    if (ll.eachLayer) ll.eachLayer(sub => {
                        if (sub._planNumMarker) map.removeLayer(sub._planNumMarker);
                        if (sub._labelMarker) map.removeLayer(sub._labelMarker);
                        if (sub._minahakLabel) map.removeLayer(sub._minahakLabel);
                        if (sub._subLabel) map.removeLayer(sub._subLabel);
                    });
                    map.removeLayer(ll);
                }
                Object.values(geoLayersRef.current).forEach(l => {
                    if (Array.isArray(l)) l.forEach(ll => cleanupLayer(ll));
                    else if (l) cleanupLayer(l);
                });
                geoLayersRef.current = {};

                // Minahak filter
                const adminLayers = LAYER_CONFIG.admin.layers;
                const selectedMinahaks = adminLayers.filter(l => layers[l.id]).map(l => l.minahak);
                const allAdminOn = adminLayers.every(l => layers[l.id]);
                const selectedSubs = selectedMinahaks.flatMap(m => MINAHAK_SUBS[m] || []);

                function planInMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedMinahaks.length === 0) return false;
                    const m = props.minahak || '';
                    return selectedMinahaks.includes(m);
                }
                function tama38InMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedSubs.length === 0) return false;
                    const n = (props.neighborho || '').trim();
                    return selectedSubs.includes(n);
                }

                // --- District outline + white mask outside (always on) ---
                if (gd.district_oranim) {
                    // Create an inverted polygon: world bounds with district as hole
                    const districtFeature = gd.district_oranim.features[0];
                    if (districtFeature) {
                        // World outer ring (covers entire map)
                        const worldRing = [[-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]];
                        // District inner ring (hole) — reverse winding
                        const distCoords = districtFeature.geometry.coordinates[0];
                        const holeRing = distCoords.map(c => [c[1], c[0]]); // GeoJSON [lng,lat] → Leaflet [lat,lng]
                        const maskPolygon = L.polygon([worldRing, holeRing], {
                            pane: 'districtPane',
                            color: 'transparent', weight: 0,
                            fillColor: '#ffffff', fillOpacity: 0.2
                        }).addTo(map);
                        geoLayersRef.current.districtMask = maskPolygon;
                    }
                }

                // --- Roads (show at z15 by default, toggle manually at other zooms) ---
                const showRoads = layers['roads'] && gd.roads;
                if (showRoads) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.roads = L.geoJSON(gd.roads, {
                        pane: 'roadsPane',
                        style: { color: '#666', weight: zoom >= 17 ? 1.5 : 1.0, opacity: 0.6 },
                        interactive: false
                    }).addTo(map);
                }

                // --- Sub-neighborhoods (always on) — green outline, green label ---
                if (gd.sub_neighborhoods) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.sub_neighborhoods = L.geoJSON(gd.sub_neighborhoods, {
                        pane: 'subNeighborhoodPane',
                        style: { color: 'rgba(17,199,64,1)', weight: zoom >= 18 ? 2.5 : zoom >= 17 ? 2.0 : 1.0, fillOpacity: 0, dashArray: '6,6' },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.schn_nama || f.properties.SCHN_NAMA || f.properties.Name || f.properties.name || '';
                            if (name) {
                                layer.bindTooltip(name, {
                                    permanent: true,
                                    direction: 'center',
                                    className: 'sub-tooltip',
                                    offset: [0, 15]
                                });
                            }
                        }
                    }).addTo(map);
                }

                // --- Minahak boundaries — green outline, white bold label ---
                const minahakLayers = [];
                adminLayers.forEach(l => {
                    if (!layers[l.id]) return;
                    const geoKey = MINAHAK_LAYER_MAP[l.id];
                    if (geoKey && gd[geoKey]) {
                        const ml = L.geoJSON(gd[geoKey], {
                            pane: 'minahakPane',
                            style: { color: 'rgba(17,199,64,1)', weight: 3, fillOpacity: 0 },
                            onEachFeature: (f, layer) => {
                                const name = f.properties.shem_1 || f.properties.SHEM_1 || f.properties.Name || l.name;
                                if (name && f.geometry) {
                                    const center = visualCenter(f.geometry);
                                    const marker = L.marker(center, {
                                        icon: L.divIcon({
                                            className: 'minahak-name-label',
                                            html: '<div class="label-inner">' + name + '</div>',
                                            iconSize: [0, 0],
                                            iconAnchor: [0, 0]
                                        }),
                                        interactive: false,
                                        pane: 'minahakLabelsPane'
                                    }).addTo(map);
                                    layer._minahakLabel = marker;
                                }
                            }
                        }).addTo(map);
                        minahakLayers.push(ml);
                    }
                });
                geoLayersRef.current.minahak = minahakLayers;

                // --- Plans layer ---
                if (layers['plans'] && gd.plans) {
                    const zoom = map.getZoom();
                    // Auto-wrap text at ~20 chars (QGIS autoWrapLength=20)
                    function autoWrap(txt, maxLen) {
                        if (!txt || txt.length <= maxLen) return txt;
                        const words = txt.split(/\s+/);
                        let line = '', lines = [];
                        for (const w of words) {
                            if (line && (line + ' ' + w).length > maxLen) {
                                lines.push(line);
                                line = w;
                            } else {
                                line = line ? line + ' ' + w : w;
                            }
                        }
                        if (line) lines.push(line);
                        return lines.join('\n');
                    }

                    // Zoom 16: show labels for all plans with 100+ units_add
                    const z16MinUnits = 100;

                    // Filter status group lookup
                    const FILTER_STATUS_MAP = {
                        'אישור': 'approved', 'מאושרת': 'approved', 'תבע מאושרת': 'approved', 'תחילת תוקף': 'approved',
                        'בהליך אישור': 'in_approval', 'תבע - טרום אישור': 'in_approval',
                        'דיון בהתנגדויות ותיקונים': 'objections',
                        'הפקדה להתנגדויות/השגות': 'deposit',
                        'במילוי תנאים להפקדה': 'conditions', 'תכנית עומדת בתנאי סף': 'conditions',
                        'נפתח תיק למתכנן': 'open', 'נפתח תיק תבע': 'open', 'בבדיקה תכנונית': 'open', 'נקלטה מקובץ מבאת': 'open',
                    };
                    function getFilterStatusGroup(status) {
                        if (FILTER_STATUS_MAP[status]) return FILTER_STATUS_MAP[status];
                        // Check construction-phase statuses by key directly
                        const constructionKeys = ['ו-גמר בנייה','ה-בבנייה','ד-היתר בנייה','ג-רישוי בתהליך'];
                        if (constructionKeys.includes(status)) return status;
                        return null;
                    }

                    // Track filtered count
                    let filteredPlanCount = 0;
                    const totalPlanCount = gd.plans.features.filter(f => {
                        if (!planInMinahak(f.properties)) return false;
                        const s = normalizeStatus((f.properties.status_mavat || '').trim());
                        if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                        if (normalizePlanType(f.properties.plan_type || '') === 'תשתיות') return false;
                        return true;
                    }).length;

                    const plansLayer = L.geoJSON(gd.plans, {
                        pane: 'plansPane',
                        renderer: L.svg({ pane: 'plansPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const s = normalizeStatus((f.properties.status_mavat || '').trim());
                            if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                            if (normalizePlanType(f.properties.plan_type || '') === 'תשתיות') return false;
                            // Advanced filters
                            const af = filters;
                            // Units range
                            const units = parseFloat(f.properties.units_add) || 0;
                            if (af.minUnits !== '' && units < parseFloat(af.minUnits)) return false;
                            if (af.maxUnits !== '' && units > parseFloat(af.maxUnits)) return false;
                            // Plan type filter
                            if (af.planTypes.length > 0) {
                                const pt = normalizePlanType(f.properties.plan_type || '');
                                if (!af.planTypes.includes(pt)) return false;
                            }
                            // Status filter
                            if (af.statuses.length > 0) {
                                const sg = getFilterStatusGroup(s);
                                if (!sg || !af.statuses.includes(sg)) return false;
                            }
                            // Free text search
                            if (af.freeText) {
                                const q = af.freeText.toLowerCase();
                                const searchFields = [
                                    f.properties.plan_summary || '',
                                    f.properties.plan_name || '',
                                    f.properties.architect || '',
                                    f.properties.developer || '',
                                ].join(' ').toLowerCase();
                                if (!searchFields.includes(q)) return false;
                            }
                            filteredPlanCount++;
                            return true;
                        },
                        style: f => {
                            const status = normalizeStatus(f.properties.status_mavat || '');
                            const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                            return { color: 'rgba(67,67,227,1)', weight: 1.5, fillColor: fillColor, fillOpacity: opacity * 0.3, dashArray: '4,2' };
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                // Find all overlapping plans at click point
                                const clickLatLng = e.latlng;
                                const allFeatures = [];
                                const plansLayer = geoLayersRef.current.plans;
                                if (plansLayer) {
                                    plansLayer.eachLayer(pl => {
                                        if (!pl.feature || !pl.getBounds) return;
                                        try {
                                            if (!pl.getBounds().contains(clickLatLng)) return;
                                            const contains = leafletPip(pl, clickLatLng);
                                            if (contains) {
                                                const m = mapPlanProps(pl.feature.properties);
                                                allFeatures.push({ properties: m, type: 'plan' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                // Also check tama38 nearby
                                const tama38Layer = geoLayersRef.current.tama38;
                                if (tama38Layer) {
                                    tama38Layer.eachLayer(tl => {
                                        try {
                                            if (tl.getLatLng && tl.feature && clickLatLng.distanceTo(tl.getLatLng()) < 30) {
                                                allFeatures.push({ properties: tl.feature.properties, type: 'tama38' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                if (allFeatures.length === 0) {
                                    const mapped = mapPlanProps(f.properties);
                                    allFeatures.push({ properties: mapped, type: 'plan' });
                                }
                                const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                                const first = allFeatures[0];
                                const content = first.type === 'tama38'
                                    ? buildTama38Popup(first.properties, navInfo)
                                    : buildPlanPopup(first.properties, { properties: first.properties }, navInfo);
                                const popup = L.popup({ maxWidth: 340, className: 'plan-popup' })
                                    .setLatLng(clickLatLng)
                                    .setContent(content);
                                popup.openOn(map);
                                bindPopupEvents(popup, allFeatures, 0);
                            });
                            layer.on('mouseover', () => {
                                layer.setStyle({ weight: 3, fillOpacity: opacity * 0.5 });
                            });
                            layer.on('mouseout', () => {
                                const status = normalizeStatus(f.properties.status_mavat || '');
                                const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                                layer.setStyle({ weight: 1.5, fillOpacity: opacity * 0.3, fillColor: fillColor });
                            });
                            // Labels: zoom-dependent with fit-in-polygon check
                            const shortName = f.properties.plan_summary || '';
                            const add = parseFloat(f.properties.units_add) || 0;
                            const zoom = map.getZoom();

                            // Zoom 15: no labels at all
                            if (zoom >= 16) {
                                // Zoom 16: only plans with 100+ units
                                if (zoom === 16 && add < z16MinUnits) {
                                    // skip label
                                } else if (shortName || add > 0) {
                                    const bounds = layer.getBounds();
                                    const sw = map.latLngToContainerPoint(bounds.getSouthWest());
                                    const ne = map.latLngToContainerPoint(bounds.getNorthEast());
                                    const pxW = Math.abs(ne.x - sw.x);
                                    const pxH = Math.abs(ne.y - sw.y);

                                    let labelText = '';
                                    if (zoom >= 17) {
                                        labelText = autoWrap(shortName, 20);
                                        if (add > 0) labelText += '\n+' + add + " יח\"ד";
                                    } else {
                                        // zoom 16: units on one line, יח"ד on next
                                        if (add > 0) labelText = '+' + add + "\nיח\"ד";
                                    }

                                    // Check if label fits inside polygon
                                    const lines = labelText.split('\n');
                                    const maxLineLen = Math.max(...lines.map(l => l.length));
                                    const fontSize = zoom >= 18 ? 11 : zoom === 16 ? 9 : 8;
                                    const charW = fontSize * 0.75; // approx px per char
                                    const lineH = fontSize * 1.5;
                                    const estLabelW = maxLineLen * charW;
                                    const estLabelH = lines.length * lineH;

                                    const fitRatio = zoom >= 18 ? 0.85 : zoom >= 17 ? 0.75 : 0.65;
                                    if (estLabelW <= pxW * fitRatio && estLabelH <= pxH * fitRatio) {
                                        let labelClass = 'plan-label-center';
                                        if (zoom >= 18) labelClass += ' plan-label-z18';
                                        if (add >= 30) labelClass += ' plan-label-large';
                                        else labelClass += ' plan-label-small';

                                        const center = f.geometry ? visualCenter(f.geometry) : layer.getBounds().getCenter();
                                        const labelMarker = L.marker(center, {
                                            icon: L.divIcon({
                                                className: labelClass,
                                                html: '<div class="label-inner">' + labelText.replace(/\n/g, '<br>') + '</div>',
                                                iconSize: [0, 0],
                                                iconAnchor: [0, 0]
                                            }),
                                            interactive: false,
                                            pane: 'labelsPane'
                                        }).addTo(map);
                                        layer._labelMarker = labelMarker;
                                    }
                                }
                            }
                            // Plan number along longest edge (in pixels), rotated to match
                            const planNum = f.properties.plan_name || '';
                            if (zoom >= 17 && planNum && f.geometry && f.geometry.coordinates) {
                                const coords = f.geometry.type === 'MultiPolygon'
                                    ? f.geometry.coordinates[0][0]
                                    : f.geometry.coordinates[0];
                                let maxPxLen = 0, bestMid = null, bestAngle = 0;
                                for (let ei = 0; ei < coords.length - 1; ei++) {
                                    const a = coords[ei], b = coords[ei + 1];
                                    // Convert to pixel coordinates for accurate length
                                    const pa = map.latLngToContainerPoint([a[1], a[0]]);
                                    const pb = map.latLngToContainerPoint([b[1], b[0]]);
                                    const pxLen = Math.sqrt((pb.x-pa.x)*(pb.x-pa.x) + (pb.y-pa.y)*(pb.y-pa.y));
                                    if (pxLen > maxPxLen) {
                                        maxPxLen = pxLen;
                                        bestMid = [(a[1]+b[1])/2, (a[0]+b[0])/2]; // [lat, lng]
                                        let ang = Math.atan2(pb.y-pa.y, pb.x-pa.x) * 180 / Math.PI;
                                        // Keep text readable (not upside down)
                                        if (ang > 90) ang -= 180;
                                        if (ang < -90) ang += 180;
                                        bestAngle = ang;
                                    }
                                }
                                const numCharW = (zoom >= 18 ? 9 : 7) * 0.75;
                                const numTextLen = planNum.length * numCharW;
                                const numH = 12; // approx text height in px
                                if (bestMid && maxPxLen >= 40 && numTextLen <= maxPxLen * 0.9) {
                                    const numMarker = L.marker(bestMid, {
                                        icon: L.divIcon({
                                            className: 'plan-number-label',
                                            html: '<span class="pn-text" style="transform:rotate(' + bestAngle + 'deg)">' + planNum + '</span>',
                                            iconSize: [Math.ceil(numTextLen), numH],
                                            iconAnchor: [Math.ceil(numTextLen/2), Math.ceil(numH/2)]
                                        }),
                                        interactive: false,
                                        pane: 'labelsPane'
                                    }).addTo(map);
                                    layer._planNumMarker = numMarker;
                                }
                            }
                        }
                    }).addTo(map);
                    geoLayersRef.current.plans = plansLayer;
                }

                // --- Topics overlay ---
                if (gd.plans && (planningTopics.overlapping || planningTopics.densification || planningTopics.objections || planningTopics.infrastructure || planningTopics.archived)) {
                    // Inject SVG hatch patterns into map's SVG defs
                    const svgEl = map.getRenderer(L.geoJSON())._container || map.getPane('overlayPane').querySelector('svg');
                    if (svgEl) {
                        let defs = svgEl.querySelector('defs');
                        if (!defs) { defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs'); svgEl.insertBefore(defs, svgEl.firstChild); }
                        // Blue hatch for overlapping
                        if (!defs.querySelector('#hatch-blue')) {
                            defs.innerHTML += `
                                <pattern id="hatch-blue" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#3366ff" stroke-width="2" stroke-opacity="0.6"/>
                                </pattern>
                                <pattern id="hatch-orange" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(-45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#ff8c00" stroke-width="2" stroke-opacity="0.6"/>
                                </pattern>`;
                        }
                    }

                    const topicsLayer = L.geoJSON(gd.plans, {
                        pane: 'topicsPane',
                        renderer: L.svg({ pane: 'topicsPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const p = f.properties;
                            if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0) return true;
                            if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') return true;
                            if (planningTopics.objections && (p.status_mavat || '').includes('הפקדה להתנגדויות')) return true;
                            return false;
                        },
                        style: f => {
                            const p = f.properties;
                            if (planningTopics.objections && (p.status_mavat || '').includes('הפקדה להתנגדויות'))
                                return { color: '#dd0000', weight: 3, fillOpacity: 0 };
                            if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים')
                                return { color: '#ff8c00', weight: 2, fillOpacity: 0 };
                            if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0)
                                return { color: '#3366ff', weight: 2, fillOpacity: 0 };
                            return {};
                        },
                        onEachFeature: (f, layer) => {
                            const p = f.properties;
                            // Apply SVG hatch pattern fill after rendering
                            layer.on('add', () => {
                                const el = layer.getElement();
                                if (!el) return;
                                if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0) {
                                    el.setAttribute('fill', 'url(#hatch-blue)');
                                    el.setAttribute('fill-opacity', '1');
                                } else if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') {
                                    el.setAttribute('fill', 'url(#hatch-orange)');
                                    el.setAttribute('fill-opacity', '1');
                                }
                            });
                        }
                    }).addTo(map);

                    // Apply hatch to already-rendered paths
                    topicsLayer.eachLayer(layer => {
                        const el = layer.getElement();
                        const p = layer.feature.properties;
                        if (!el) return;
                        if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0) {
                            el.setAttribute('fill', 'url(#hatch-blue)');
                            el.setAttribute('fill-opacity', '1');
                        } else if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') {
                            el.setAttribute('fill', 'url(#hatch-orange)');
                            el.setAttribute('fill-opacity', '1');
                        }
                    });

                    geoLayersRef.current.topics = topicsLayer;
                }

                // --- Infrastructure layer (below plans) ---
                if (gd.plans && planningTopics.infrastructure) {
                    const infraLayer = L.geoJSON(gd.plans, {
                        pane: 'infrastructurePane',
                        renderer: L.svg({ pane: 'infrastructurePane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            return normalizePlanType(f.properties.plan_type || '') === 'תשתיות';
                        },
                        style: () => ({ color: '#7b2d8e', weight: 2, fillColor: '#9b59b6', fillOpacity: 0.4 }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => { const el = layer.getElement(); if (el) el.style.pointerEvents = 'auto'; });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: 340 })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.infrastructure = infraLayer;
                }

                // --- Archived layer (below plans) ---
                if (gd.plans && planningTopics.archived) {
                    const archivedLayer = L.geoJSON(gd.plans, {
                        pane: 'archivedPane',
                        renderer: L.svg({ pane: 'archivedPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const st = (f.properties.status_mavat || '').trim();
                            return st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה';
                        },
                        style: () => ({ color: '#888', weight: 2, fillColor: '#999', fillOpacity: 0.5, dashArray: '4,4' }),
                        onEachFeature: (f, layer) => {
                            const p = f.properties;
                            const st = (p.status_mavat || '').trim();
                            const isArchived = st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה';
                            // Make individual path interactive (pane is pointer-events:none)
                            layer.on('add', () => {
                                const el = layer.getElement();
                                if (el) el.style.pointerEvents = 'auto';
                            });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(p);
                                const cls = isArchived ? 'plan-popup archived-popup' : 'plan-popup';
                                const popup = L.popup({ maxWidth: 340, className: cls })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.archived = archivedLayer;
                }

                // --- Permits overlay ---
                if (layers['permits'] && gd.plans) {
                    const permitsLayer = L.geoJSON(gd.plans, {
                        pane: 'permitsPane',
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const stage = (f.properties.stage || '').trim();
                            return stage !== '';
                        },
                        style: f => {
                            const stage = (f.properties.stage || '').trim().replace(/\s+/g, ' ');
                            const color = STAGE_COLORS[stage] || STAGE_COLORS[stage.replace(/ /g, '  ')] || '#5dade2';
                            return { color, weight: 2, fillColor: color, fillOpacity: 0.5 };
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: 340, className: 'plan-popup' })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.permits = permitsLayer;
                }

                // --- Tama38 ---
                if (layers['tama38'] && gd.tama38) {
                    const tama38Layer = L.geoJSON(gd.tama38, {
                        pane: 'tama38Pane',
                        filter: f => tama38InMinahak(f.properties),
                        pointToLayer: (f, latlng) => {
                            const rawStatus = (f.properties.status || '').trim();
                            // Normalize spaceless variants
                            const TAMA_STATUS_NORM = {
                                'תכנון-טרםכניסהלרישוי': 'תכנון - טרם כניסה לרישוי',
                                'נפתחתיקהיתר': 'נפתח תיק היתר',
                                'היתראושרבועדתרישוי': 'היתר אושר בועדת רישוי',
                                'הופקהוצאהיתר': 'הופק הוצא היתר',
                            };
                            const status = TAMA_STATUS_NORM[rawStatus] || rawStatus;
                            let fillColor = '#e94560';
                            if (status === 'תכנון - טרם כניסה לרישוי') fillColor = 'rgb(215,25,28)';
                            else if (status === 'נפתח תיק היתר') fillColor = 'rgb(253,174,97)';
                            else if (status === 'היתר אושר בועדת רישוי') fillColor = 'rgb(255,255,192)';
                            else if (status === 'הופק הוצא היתר') fillColor = 'rgb(166,217,106)';
                            return L.circleMarker(latlng, {
                                radius: 3, fillColor: fillColor, color: '#999', weight: 0.5, fillOpacity: 0.9
                            });
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', () => {
                                const p = f.properties;
                                const popup = L.popup({ maxWidth: 340, className: 'plan-popup' })
                                    .setLatLng(layer.getLatLng())
                                    .setContent(buildTama38Popup(p));
                                popup.openOn(map);
                            });
                            const addr = f.properties.address || '';
                            const tose = parseFloat(f.properties.units_tose) || 0;
                            if (addr && tose > 0) {
                                layer.bindTooltip(
                                    '<div style="color:#727272;font-size:7pt;font-weight:bold;font-family:Assistant,sans-serif">' + addr + '<br>+' + tose + ' יח"ד</div>',
                                    { permanent: false, direction: 'top', className: 'tama38-label', offset: [0, -5] }
                                );
                            }
                        }
                    }).addTo(map);
                    geoLayersRef.current.tama38 = tama38Layer;
                }

                // --- Rakal line colors ---
                const RAKAL_COLORS = {
                    '2': '#1a3ccc',  // כחול רווי
                    '3': '#42d4f4',  // תכלת
                    '4': '#3cb44b',  // ירוק
                    '5': '#1a3ccc',  // כחול רווי
                    '8': '#911eb4',  // סגול
                };

                // --- Rakal (light rail lines) ---
                if (layers['rakal'] && gd.rakal) {
                    // Black outline layer (drawn first = behind)
                    const rakalOutline = L.geoJSON(gd.rakal, {
                        pane: 'rakalPane',
                        renderer: window.__rakalRenderer,
                        filter: f => RAKAL_COLORS.hasOwnProperty(f.properties.line),
                        style: () => ({ color: '#000', weight: 9, opacity: 0.85 }),
                        interactive: false
                    }).addTo(map);
                    geoLayersRef.current.rakalOutline = rakalOutline;
                    // Colored inner layer (drawn second = on top)
                    const rakalLayer = L.geoJSON(gd.rakal, {
                        pane: 'rakalPane',
                        renderer: window.__rakalRenderer,
                        filter: f => RAKAL_COLORS.hasOwnProperty(f.properties.line),
                        style: f => {
                            const line = f.properties.line || '2';
                            return { color: RAKAL_COLORS[line] || '#4363d8', weight: 7, opacity: 0.85 };
                        },
                        interactive: false
                    }).addTo(map);
                    geoLayersRef.current.rakal = rakalLayer;
                }

                // --- Stations (colored by rakal line) ---
                if (layers['stations'] && gd.stations) {
                    // Build line lookup from rakal data for station coloring
                    const stationLineMap = {};
                    if (gd.rakal) {
                        // For each station, find nearest rakal line
                        // Simple approach: check which line passes closest
                    }
                    const stationsLayer = L.geoJSON(gd.stations, {
                        pointToLayer: (f, latlng) => {
                            const p = f.properties;
                            const colorMap = {
                                'ירוק': RAKAL_COLORS['4'],
                                'כחול': RAKAL_COLORS['2'],
                                'סגול': RAKAL_COLORS['8'],
                                'תכלת': RAKAL_COLORS['3'],
                            };
                            const mainColor = (p.color_main1 || '').trim();
                            const fillColor = colorMap[mainColor] || '#1a3ccc';
                            return L.marker(latlng, {
                                icon: L.divIcon({
                                    className: 'station-dot',
                                    html: '<div style="width:10px;height:10px;border-radius:50%;background:' + fillColor + ';border:1.5px solid #fff"></div>',
                                    iconSize: [10, 10],
                                    iconAnchor: [5, 5]
                                })
                            });
                        },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.Name || f.properties.name || '';
                            if (name) layer.bindTooltip(name, { permanent: true, direction: 'top', className: 'station-label' });
                        }
                    }).addTo(map);
                    geoLayersRef.current.stations = stationsLayer;
                }

                // Heat map layer
                if (showHeatMap && gd.plans) {
                    const heatPoints = [];
                    gd.plans.features.forEach(f => {
                        const add = parseFloat(f.properties.units_add) || 0;
                        const st = (f.properties.status_mavat || '').trim();
                        const minahak = (f.properties.minahak || '').trim();
                        if (add <= 0 || !f.geometry || st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה') return;
                        if (minahak === 'גבעת המטוס') return; // exclude from heat map
                        try {
                            const bounds = L.geoJSON(f).getBounds();
                            const center = bounds.getCenter();
                            heatPoints.push([center.lat, center.lng, add]);
                        } catch(e) {}
                    });
                    if (heatPoints.length > 0) {
                        geoLayersRef.current.heatmap = L.heatLayer(heatPoints, {
                            radius: 35, blur: 25, maxZoom: 17, max: 800,
                            gradient: { 0.1: '#ffffb2', 0.3: '#fecc5c', 0.5: '#fd8d3c', 0.7: '#f03b20', 0.9: '#bd0026', 1: '#800026' }
                        }).addTo(map);
                    }
                }

                console.log('[GeoJSON] Rendered layers:', Object.keys(geoLayersRef.current).join(', '));
            }, [layers, opacity, planningTopics, dataLoaded, zoomLevel, filters, showHeatMap]);

            // Build the plan popup HTML
            function getStatusColor(status) {
                return STATUS_COLORS[status] || '#5dade2';
            }

            function buildNavBar(navInfo) {
                if (!navInfo || navInfo.total <= 1) return '';
                return `<div class="popup-nav">` +
                    `<button class="popup-nav-btn" data-nav="prev">▶</button>` +
                    `<span>${navInfo.current + 1} / ${navInfo.total}</span>` +
                    `<button class="popup-nav-btn" data-nav="next">◀</button>` +
                    `</div>`;
            }

            function buildPlanPopup(props, featureData, navInfo) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const subtitle = props.plan_name || props.taba || '';
                const status = props.status_mavat || '';
                const statusColor = getStatusColor(status);
                const unitsIn = props.units_in || '-';
                const unitsTotal = props.units_total || '-';
                const unitsAdd = props.units_add != null ? props.units_add : '-';
                const unitsAddDisplay = unitsAdd !== '-' && unitsAdd !== 0 ? '+' + unitsAdd : unitsAdd;
                const mavatUrl = props.mavat_url || '';
                const hasPermit = props.stage && props.stage.trim() !== '';

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Header
                const planId = props.plan_name || '';
                const note = window.__annotations ? (window.__annotations[planId] || '') : '';
                html += '<div class="popup-header" style="position:relative">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '<button class="popup-btn-permit" data-action="add-note" data-plan="' + planId + '" style="position:absolute;bottom:6px;left:6px;background:transparent;border:none;color:' + (note ? '#ffeaa7' : '#666') + ';font-size:16px;padding:2px;min-width:auto;cursor:pointer" title="' + (note || 'הוסף הערה') + '">📝</button>';
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${status || '-'}</span></div>`;
                const mavatDate = props.mavat_date || '';
                if (mavatDate) html += `<div class="popup-row"><span class="popup-row-label">תאריך סטטוס</span><span class="popup-row-value">${mavatDate}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד נכנס</span><span class="popup-row-value">${unitsIn}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד יוצא</span><span class="popup-row-value">${unitsTotal}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsAddDisplay}</span></div>`;
                html += '</div>';
                // Timeline removed — not enough data fields
                // Footer
                html += '<div class="popup-footer">';
                if (mavatUrl) {
                    html += `<a class="popup-link" href="${mavatUrl}" target="_blank" rel="noopener">\u2190 צפה במבא"ת</a>`;
                }
                if (hasPermit) {
                    html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}'>להיתר \u2190</button>`;
                }
                html += '</div>';
                // Annotation display (if exists)
                if (note) html += '<div style="background:#ffeaa7;padding:6px;border-radius:4px;margin-top:6px;font-size:11px;color:#2d3436">📝 ' + note + '</div>';
                html += '</div>';
                return html;
            }

            // Build the permit details popup HTML
            function buildPermitPopup(props, featureData, navInfo) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const planName = props.plan_name || props.taba || '';
                const permitNum = props.building_permit || '-';
                const subtitle = [planName, permitNum !== '-' ? permitNum : null].filter(Boolean).join(' | ');
                const stage = props.stage || '-';
                const stageColor = STAGE_COLORS[stage] || '#5dade2';
                const requestType = props.request_type || props.mahut_bakasha || '-';
                const permitDate = props.permit_date || props.permit_date_data || '-';
                const permitAddition = props.permit_addition || '-';
                const permitAddDisplay = permitAddition !== '-' && permitAddition !== 0 ? '+' + permitAddition : permitAddition;

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Header
                html += '<div class="permit-detail-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">שלב</span><span class="popup-status-badge" style="background:${stageColor}33;color:${stageColor};border:1px solid ${stageColor}">${stage}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">מהות הבקשה</span><span class="popup-row-value" style="font-size:11px;max-width:180px;text-align:left">${requestType}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך היתר</span><span class="popup-row-value">${permitDate}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת בהיתר</span><span class="popup-row-value">${permitAddDisplay}</span></div>`;
                html += '</div>';
                // Footer - back button styled red with left arrow
                html += '<div class="popup-footer">';
                html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}' data-action="back-to-plan">\u2192 לתב"ע</button>`;
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Build the tama38 popup HTML
            function buildTama38Popup(props, navInfo) {
                const title = props.address || 'תמ"א 38';
                const subtitle = props.neighborho ? `שכונה: ${props.neighborho}` : '';
                const status = props.status || '';
                const status1 = props.status_1 || '';
                const displayStatus = status || status1 || '-';
                const harisaa = props.harisaa || '-';
                const unitsExist = props.units_exis != null ? props.units_exis : '-';
                const unitsTose = props.units_tose != null ? props.units_tose : '-';
                const tik = props.tik || '-';
                const dateOpen = props.open_ || '-';
                const dateApproval = props.date || '-';
                const comment = props.comment || '';

                // Status color for tama38
                const statusColor = displayStatus.includes('היתר') ? '#50d25a' :
                    displayStatus.includes('אושר') ? '#50d25a' :
                    displayStatus.includes('הופק') ? '#50d25a' :
                    displayStatus.includes('בנייה') ? '#4a69d1' :
                    displayStatus.includes('נפתח') ? '#f56e05' :
                    displayStatus.includes('בתהליך') ? '#4ba1f0' :
                    '#5dade2';

                let html = '<div>';
                html += buildNavBar(navInfo);
                html += '<div class="popup-header" style="border-right:4px solid #e94560">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += `<div class="popup-header-subtitle" style="font-size:10px;opacity:0.6">תמ"א 38</div>`;
                html += '</div>';
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${displayStatus}</span></div>`;
                if (status1 && status1 !== status && status1 !== '-') {
                    html += `<div class="popup-row"><span class="popup-row-label">סטטוס משני</span><span class="popup-row-value">${status1}</span></div>`;
                }
                html += `<div class="popup-row"><span class="popup-row-label">הריסה</span><span class="popup-row-value">${harisaa}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד קיימות</span><span class="popup-row-value">${unitsExist}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsTose !== '-' ? '+' + unitsTose : '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תיק</span><span class="popup-row-value">${tik}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך פתיחה</span><span class="popup-row-value">${dateOpen}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך אישור</span><span class="popup-row-value">${dateApproval}</span></div>`;
                if (comment) {
                    const shortComment = comment.length > 120 ? comment.substring(0, 120) + '...' : comment;
                    html += `<div class="popup-row" style="flex-direction:column;align-items:flex-start"><span class="popup-row-label" style="margin-bottom:4px">הערות</span><span class="popup-row-value" style="font-size:11px;line-height:1.4;text-align:right;white-space:pre-wrap;max-width:100%">${shortComment}</span></div>`;
                }
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Bind popup navigation and permit/back button events
            function bindPopupEvents(popup, allFeatures, startIdx) {
                let currentIdx = startIdx || 0;
                function buildForIndex(idx) {
                    const entry = allFeatures[idx];
                    const navInfo = allFeatures.length > 1 ? { current: idx, total: allFeatures.length } : null;
                    if (entry.type === 'permit') return buildPermitPopup(entry.properties, { properties: entry.properties }, navInfo);
                    if (entry.type === 'tama38') return buildTama38Popup(entry.properties, navInfo);
                    return buildPlanPopup(entry.properties, { properties: entry.properties }, navInfo);
                }
                const el = popup.getElement();
                if (!el) return;
                el.addEventListener('click', function(ev) {
                    const navBtn = ev.target.closest('.popup-nav-btn');
                    if (navBtn) {
                        ev.stopPropagation();
                        if (navBtn.dataset.nav === 'next') currentIdx = (currentIdx + 1) % allFeatures.length;
                        else currentIdx = (currentIdx - 1 + allFeatures.length) % allFeatures.length;
                        popup.setContent(buildForIndex(currentIdx));
                        return;
                    }
                    const permitBtn = ev.target.closest('.popup-btn-permit');
                    if (permitBtn && permitBtn.dataset.action === 'add-note') {
                        ev.stopPropagation();
                        const planId = permitBtn.dataset.plan;
                        const current = window.__annotations[planId] || '';
                        const note = prompt('\u05d4\u05e2\u05e8\u05d4 \u05dc\u05ea\u05db\u05e0\u05d9\u05ea:', current);
                        if (note !== null) {
                            window.__annotations[planId] = note;
                            localStorage.setItem('plan_annotations', JSON.stringify(window.__annotations));
                            popup.setContent(buildForIndex(currentIdx));
                        }
                        return;
                    }
                    if (permitBtn) {
                        ev.stopPropagation();
                        const fd = JSON.parse(permitBtn.dataset.feature);
                        const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                        if (permitBtn.dataset.action === 'back-to-plan') {
                            popup.setContent(buildPlanPopup(fd.properties, fd, navInfo));
                            setTimeout(() => setLayers(prev => ({
                                ...prev,
                                plans: !prev.plans ? true : prev.plans,
                                permits: false
                            })), 100);
                        } else {
                            popup.setContent(buildPermitPopup(fd.properties, fd, navInfo));
                            setTimeout(() => setLayers(prev => ({
                                ...prev,
                                permits: !prev.permits,
                                plans: prev.permits ? true : false
                            })), 100);
                        }
                    }
                });
            }

            const toggleLayer = (id) => {
                setLayers(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetView = () => {
                mapInstanceRef.current?.setView(CENTER, DEFAULT_ZOOM);
            };

            // Plan search results
            const searchResults = planSearch.length >= 2
                ? planIndex.filter(p =>
                    (p.t && p.t.includes(planSearch)) || (p.n && p.n.includes(planSearch))
                ).slice(0, 15)
                : [];

            const handleSearchSelect = (plan) => {
                const map = mapInstanceRef.current;
                if (!map) return;
                setPlanSearch('');
                setShowSearchResults(false);
                // Zoom to plan location and query for popup
                map.setView(plan.c, 18);
                setTimeout(() => {
                    const gd = geoDataRef.current;
                    if (!gd.plans) return;
                    const match = gd.plans.features.find(f =>
                        f.properties.plan_name === plan.n || f.properties.taba === plan.n
                    );
                    if (!match) return;
                    const mapped = mapPlanProps(match.properties);
                    const popup = L.popup({ maxWidth: 320, minWidth: 300, closeButton: true })
                        .setLatLng(plan.c)
                        .setContent(buildPlanPopup(mapped, { properties: mapped }))
                        .openOn(map);
                    bindPopupEvents(popup, [{ type: 'plan', properties: mapped }], 0);
                }, 500);
            };

            const activeCount = Object.values(layers).filter(Boolean).length;

            const filteredConfig = {};
            Object.entries(LAYER_CONFIG).forEach(([key, group]) => {
                const filtered = group.layers.filter(l =>
                    !searchText || l.name.includes(searchText) || l.id.includes(searchText)
                );
                if (filtered.length > 0) {
                    filteredConfig[key] = { ...group, layers: filtered };
                }
            });

            return (
                <>
                    {/* Mobile overlay — click to close sidebar */}
                    <div
                        className={`sidebar-overlay ${sidebarOpen ? 'visible' : ''}`}
                        onClick={() => { setSidebarOpen(false); setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350); }}
                    ></div>

                    <div className={`sidebar ${sidebarOpen ? '' : 'collapsed'}`}>
                        {/* Mobile close button */}
                        <button
                            className="sidebar-close-mobile"
                            onClick={() => { setSidebarOpen(false); setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350); }}
                        >&times;</button>
                        <div className="sidebar-header">
                            <h1>אורנים</h1>
                            <p>כלי תכנון עירוני - ירושלים</p>
                        </div>

                        <div className="sidebar-section">
                            <h3>חיפוש תוכניות</h3>
                            <div className="plan-search-wrap">
                                <input
                                    className="plan-search-input"
                                    type="text"
                                    placeholder='חיפוש תכנית או מספר...'
                                    value={planSearch}
                                    onChange={(e) => {
                                        setPlanSearch(e.target.value);
                                        setShowSearchResults(true);
                                    }}
                                    onFocus={() => planSearch.length >= 2 && setShowSearchResults(true)}

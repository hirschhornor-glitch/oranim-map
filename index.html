                                permitsLayer.eachLayer(otherLayer => {
                                    try {
                                        if (otherLayer.getBounds && leafletPip(otherLayer, clickLatLng)) {
                                            const op = otherLayer.feature || (otherLayer.options && otherLayer.options.feature);
                                            if (op && op.properties) {
                                                const p = _getPermits(op.properties.taba);
                                                if (p.length > 0) {
                                                    allPermits = allPermits.concat(p);
                                                    allPlans.push(op.properties);
                                                }
                                            }
                                        }
                                    } catch(ex) {}
                                });
                                // Fallback: if pip found nothing, use clicked feature
                                if (allPermits.length === 0) {
                                    allPermits = _getPermits(f.properties.taba);
                                    allPlans = allPermits.length > 0 ? [f.properties] : [];
                                }
                                const mapped = mapPlanProps(f.properties);
                                const fd = { properties: mapped, type: 'plan' };
                                const featureJson = JSON.stringify(fd).replace(/'/g, "&#39;");
                                if (allPermits.length > 0) {
                                    // Build combined title from all overlapping plans
                                    const title = allPlans.length > 1
                                        ? allPlans.length + ' תוכניות'
                                        : (mapped.plan_summary || mapped.plan_name_he || 'תוכנית');
                                    const subtitle = allPlans.map(p => p.plan_name || String(p.taba || '')).join(' | ');
                                    const popup = L.popup({ maxWidth: popupMaxWidth(), className: 'plan-popup' })
                                        .setLatLng(clickLatLng)
                                        .setContent(buildPermitsDetailPopup(allPermits, title, subtitle, null, 'back-to-plan', "data-feature='" + featureJson + "'", 0, 'plan:' + (mapped.taba || ''), allPlans.reduce((s,p) => s + (parsePlanUnits(p.units_total) || parsePlanUnits(p.units_add)), 0)));
                                    popup.openOn(map);
                                    bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                                } else if (!plansOff) {
                                    // Shouldn't normally happen (filter excludes no-permit plans),
                                    // but keep as fallback when plans layer is on
                                    const popup = L.popup({ maxWidth: popupMaxWidth(), className: 'plan-popup' })
                                        .setLatLng(layer.getBounds().getCenter())
                                        .setContent(buildPlanPopup(mapped, fd));
                                    popup.openOn(map);
                                    bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                                }
                            });
                            // Labels for plans with permits (when plans layer is off)
                            if (plansOff) {
                                const permits = _getPermits(f.properties.taba);
                                if (permits.length > 0) {
                                    const planUnits = parsePlanUnits(f.properties.units_total) || parsePlanUnits(f.properties.units_add);
                                    const totalUnits = sumIncludedPermitUnits(permits, 'plan:' + f.properties.taba, planUnits);
                                    if (totalUnits > 0) {
                                        const labelText = totalUnits + ' יח"ד\n' + permits.length + ' היתרים';
                                        try {
                                            const center = f.geometry ? visualCenter(f.geometry) : layer.getBounds().getCenter();
                                            const icon = L.divIcon({
                                                className: 'plan-label-center plan-label-small',
                                                html: '<div class="label-inner">' + labelText.replace(/\n/g, '<br>') + '</div>',
                                                iconSize: [0, 0], iconAnchor: [0, 0]
                                            });
                                            const labelMarker = L.marker(center, { icon: icon, pane: 'labelsPane', interactive: false });
                                            labelMarker.addTo(permitLabelsGroup);
                                            const tabaKey = String(f.properties.taba);
                                            window.__permitLabels[tabaKey] = { marker: labelMarker, permits: permits, planUnits: planUnits, taba: tabaKey };
                                        } catch(e) {}
                                    }
                                }
                            }
                        }
                    });
                    // Add tama38 points that have permits
                    if (gd.tama38 && window.__tama38Permits) {
                        // Add tama38 permit markers directly (not via L.geoJSON to avoid MultiPoint issues)
                        const tama38PermGroup = L.layerGroup().addTo(map);
                        gd.tama38.features.forEach(f => {
                            if (!tama38InMinahak(f.properties)) return;
                            const fid = String(f.properties.fid != null ? f.properties.fid : '');
                            const permits = getPermitsForTama38(fid);
                            if (permits.length === 0) return;
                            const coords = f.geometry && f.geometry.coordinates;
                            if (!coords || !coords[0]) return;
                            const c = f.geometry.type === 'MultiPoint' ? coords[0] : coords;
                            const latlng = L.latLng(c[1], c[0]);
                            const marker = L.circleMarker(latlng, {
                                pane: 'tama38Pane', radius: 6, color: '#5dade2', weight: 1.5,
                                fillColor: '#5dade2', fillOpacity: 0.8, bubblingMouseEvents: false
                            });
                            marker.on('click', () => {
                                // Detect tama type from permits or harisaa field
                                var tamaType = '';
                                var tt = permits.find(function(p) { return p.tama_type; });
                                if (tt) { tamaType = tt.tama_type; }
                                else if (f.properties.harisaa === 'כן') { tamaType = '38/2'; }
                                else if (f.properties.harisaa === 'לא') { tamaType = '38/1'; }
                                const addr = f.properties.address || 'תמ"א 38';
                                const title = addr + (tamaType ? ' - תמ"א ' + tamaType : '');
                                const unitsTose = f.properties.units_tose != null ? f.properties.units_tose : '';
                                const subtitle = [f.properties.tik || '', unitsTose ? '+' + unitsTose + ' יח"ד' : ''].filter(Boolean).join(' | ');
                                const popup = L.popup({ maxWidth: popupMaxWidth(), className: 'plan-popup' })
                                    .setLatLng(latlng)
                                    .setContent(buildPermitsDetailPopup(permits, title, subtitle, null, 'back-to-tama38', "data-fid='" + fid + "'", unitsTose ? Number(unitsTose) : 0, 'tama:' + fid, parsePlanUnits(unitsTose)));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: f.properties, type: 'tama38' }], 0);
                            });
                            marker.addTo(tama38PermGroup);
                        });
                        geoLayersRef.current.tama38Permits = tama38PermGroup;
                    }
                    // Bundle polygons + labels so toggling off removes both
                    geoLayersRef.current.permits = L.layerGroup([permitsLayer, permitLabelsGroup]).addTo(map);
                }

                // --- Tama38 ---
                if (layers['tama38'] && gd.tama38) {
                    const tama38Layer = L.geoJSON(gd.tama38, {
                        pane: 'tama38Pane',
                        filter: f => tama38InMinahak(f.properties),
                        pointToLayer: (f, latlng) => {
                            const rawStatus = (f.properties.status || '').trim();
                            // Normalize spaceless variants
                            const TAMA_STATUS_NORM = {
                                'תכנון-טרםכניסהלרישוי': 'תכנון - טרם כניסה לרישוי',
                                'נפתחתיקהיתר': 'נפתח תיק היתר',
                                'היתראושרבועדתרישוי': 'היתר אושר בועדת רישוי',
                                'הופקהוצאהיתר': 'הופק הוצא היתר',
                            };
                            const status = TAMA_STATUS_NORM[rawStatus] || rawStatus;
                            let fillColor = '#e94560';
                            if (status === 'תכנון - טרם כניסה לרישוי') fillColor = 'rgb(215,25,28)';
                            else if (status === 'נפתח תיק היתר') fillColor = 'rgb(253,174,97)';
                            else if (status === 'היתר אושר בועדת רישוי') fillColor = 'rgb(255,255,192)';
                            else if (status === 'הופק הוצא היתר') fillColor = 'rgb(166,217,106)';
                            const z = map.getZoom();
                            const r = z >= 16 ? 6 : z >= 14 ? 4 : z >= 13 ? 3 : 2;
                            return L.circleMarker(latlng, {
                                radius: r, fillColor: fillColor, color: '#999', weight: 0.5, fillOpacity: 0.9
                            });
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                const m = mapInstanceRef.current || map;
                                const p = f.properties;
                                const latlng = e.latlng || (layer.getLatLng ? layer.getLatLng() : e.target.getLatLng());
                                const popup = L.popup({ maxWidth: popupMaxWidth(), className: 'plan-popup' })
                                    .setLatLng(latlng)
                                    .setContent(buildTama38Popup(p));
                                popup.openOn(m);
                                bindPopupEvents(popup, [{ properties: p, type: 'tama38' }], 0);
                            });
                            const addr = f.properties.address || '';
                            const tose = parseFloat(f.properties.units_tose) || 0;
                            if (addr && tose > 0) {
                                layer.bindTooltip(
                                    '<div style="color:#727272;font-size:7pt;font-weight:bold;font-family:Assistant,sans-serif">' + addr + '<br>+' + tose + ' יח"ד</div>',
                                    { permanent: false, direction: 'right', className: 'tama38-label', offset: [5, 0] }
                                );
                            }
                        }
                    }).addTo(map);
                    geoLayersRef.current.tama38 = tama38Layer;
                    map.on('zoomend', () => {
                        const z = map.getZoom();
                        const r = z >= 16 ? 6 : z >= 14 ? 4 : z >= 13 ? 3 : 2;
                        tama38Layer.eachLayer(l => { if (l.setRadius) l.setRadius(r); });
                    });
                }

                // --- Rakal line colors ---
                const RAKAL_COLORS = {
                    '2': '#1a3ccc',  // כחול רווי
                    '3': '#42d4f4',  // תכלת
                    '4': '#3cb44b',  // ירוק
                    '5': '#1a3ccc',  // כחול רווי
                    '8': '#911eb4',  // סגול
                };

                // --- Rakal (light rail lines) ---
                if (layers['rakal'] && gd.rakal) {
                    // Black outline layer (drawn first = behind)
                    const rakalOutline = L.geoJSON(gd.rakal, {
                        pane: 'rakalPane',
                        renderer: window.__rakalRenderer,
                        filter: f => RAKAL_COLORS.hasOwnProperty(f.properties.line),
                        style: () => ({ color: '#000', weight: 9, opacity: 0.85 }),
                        interactive: false
                    }).addTo(map);
                    geoLayersRef.current.rakalOutline = rakalOutline;
                    // Colored inner layer (drawn second = on top)
                    const rakalLayer = L.geoJSON(gd.rakal, {
                        pane: 'rakalPane',
                        renderer: window.__rakalRenderer,
                        filter: f => RAKAL_COLORS.hasOwnProperty(f.properties.line),
                        style: f => {
                            const line = f.properties.line || '2';
                            return { color: RAKAL_COLORS[line] || '#4363d8', weight: 7, opacity: 0.85 };
                        },
                        interactive: false
                    }).addTo(map);
                    geoLayersRef.current.rakal = rakalLayer;
                }

                // --- Stations (colored by rakal line) ---
                if (layers['stations'] && gd.stations) {
                    // Build line lookup from rakal data for station coloring
                    const stationLineMap = {};
                    if (gd.rakal) {
                        // For each station, find nearest rakal line
                        // Simple approach: check which line passes closest
                    }
                    const stationsLayer = L.geoJSON(gd.stations, {
                        pointToLayer: (f, latlng) => {
                            const p = f.properties;
                            const colorMap = {
                                'ירוק': RAKAL_COLORS['4'],
                                'כחול': RAKAL_COLORS['2'],
                                'סגול': RAKAL_COLORS['8'],
                                'תכלת': RAKAL_COLORS['3'],
                            };
                            const mainColor = (p.color_main1 || '').trim();
                            const fillColor = colorMap[mainColor] || '#1a3ccc';
                            return L.marker(latlng, {
                                icon: L.divIcon({
                                    className: 'station-dot',
                                    html: '<div style="width:10px;height:10px;border-radius:50%;background:' + fillColor + ';border:1.5px solid #fff"></div>',
                                    iconSize: [10, 10],
                                    iconAnchor: [5, 5]
                                })
                            });
                        },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.Name || f.properties.name || '';
                            if (name) layer.bindTooltip(name, { permanent: true, direction: 'top', className: 'station-label' });
                        }
                    }).addTo(map);
                    geoLayersRef.current.stations = stationsLayer;
                }

                // Heat map layer — colored polygons by density (total units / dunam)
                if (showHeatMap && gd.plans) {
                    // Helper: compute polygon area in sq meters using geodesic formula
                    function geojsonAreaSqm(geom) {
                        const toRad = d => d * Math.PI / 180;
                        function ringArea(coords) {
                            let area = 0;
                            for (let i = 0; i < coords.length - 1; i++) {
                                const p1 = coords[i], p2 = coords[i + 1];
                                area += toRad(p2[0] - p1[0]) * (2 + Math.sin(toRad(p1[1])) + Math.sin(toRad(p2[1])));
                            }
                            return Math.abs(area * 6378137 * 6378137 / 2);
                        }
                        if (geom.type === 'Polygon') return ringArea(geom.coordinates[0]);
                        if (geom.type === 'MultiPolygon') return geom.coordinates.reduce((s, p) => s + ringArea(p[0]), 0);
                        return 0;
                    }
                    // Color scale: density → color
                    const densityColors = [
                        [0,   '#fee5d9'],
                        [5,   '#fcbba1'],
                        [15,  '#fc9272'],
                        [30,  '#fb6a4a'],
                        [50,  '#ef3b2c'],
                        [80,  '#cb181d'],
                        [110, '#99000d'],
                        [150, '#67000d']
                    ];
                    function densityToColor(d) {
                        for (let i = densityColors.length - 1; i >= 0; i--) {
                            if (d >= densityColors[i][0]) return densityColors[i][1];
                        }
                        return densityColors[0][1];
                    }
                    const heatLayer = L.geoJSON(gd.plans, {
                        pane: 'plansPane',
                        filter: f => {
                            const total = parseFloat(f.properties.units_total) || 0;
                            const st = normalizeStatus((f.properties.status_mavat || '').trim());
                            const minahak = (f.properties.minahak || '').trim();
                            if (total <= 0 || !f.geometry) return false;
                            if (st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה') return false;
                            if (!planInMinahak(f.properties)) return false;
                            return true;
                        },
                        style: f => {
                            const total = parseFloat(f.properties.units_total) || 0;
                            const areaSqm = geojsonAreaSqm(f.geometry);
                            const areaDunam = areaSqm / 1000;
                            const density = areaDunam > 0 ? total / areaDunam : 0;
                            return {
                                fillColor: densityToColor(density),
                                fillOpacity: 0.7,
                                color: '#333',
                                weight: 0.5
                            };
                        },
                        onEachFeature: (f, layer) => {
                            const total = parseFloat(f.properties.units_total) || 0;
                            const areaSqm = geojsonAreaSqm(f.geometry);
                            const areaDunam = areaSqm / 1000;
                            const density = areaDunam > 0 ? (total / areaDunam).toFixed(1) : '—';
                            const tip = `<b>${density}</b> יח"ד/דונם`;
                            layer.bindTooltip(tip, { sticky: true, className: 'heatmap-tip', direction: 'right', offset: [15, 0] });
                            // Click opens plan popup
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const mapped = mapPlanProps(f.properties);
                                const content = buildPlanPopup(mapped, { properties: mapped }, null);
                                L.popup({ maxWidth: popupMaxWidth(), className: 'plan-popup' })
                                    .setLatLng(e.latlng)
                                    .setContent(content)
                                    .openOn(map);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.heatmap = heatLayer;
                }

                // Commerce/Employment heat map — existing (landuse) + future (plans)
                if (showCommerceHeatMap) {
                    function geojsonAreaSqmC(geom) {
                        const toRad = d => d * Math.PI / 180;
                        function ringArea(coords) {
                            let area = 0;
                            for (let i = 0; i < coords.length - 1; i++) {
                                const p1 = coords[i], p2 = coords[i + 1];
                                area += toRad(p2[0] - p1[0]) * (2 + Math.sin(toRad(p1[1])) + Math.sin(toRad(p2[1])));
                            }
                            return Math.abs(area * 6378137 * 6378137 / 2);
                        }
                        if (geom.type === 'Polygon') return ringArea(geom.coordinates[0]);
                        if (geom.type === 'MultiPolygon') return geom.coordinates.reduce((s, p) => s + ringArea(p[0]), 0);
                        return 0;
                    }
                    const commerceColors = [
                        [0,    '#edf8fb'],
                        [50,   '#bfd3e6'],
                        [200,  '#9ebcda'],
                        [500,  '#8c96c6'],
                        [1000, '#8c6bb1'],
                        [2000, '#88419d'],
                        [5000, '#6e016b'],
                        [10000,'#4d004b']
                    ];
                    function commerceToColor(d) {
                        for (let i = commerceColors.length - 1; i >= 0; i--) {
                            if (d >= commerceColors[i][0]) return commerceColors[i][1];
                        }
                        return commerceColors[0][1];
                    }
                    const COMMERCE_KEYWORDS = ['מסחר', 'מסחרי', 'תעסוקה', 'משרדים', 'תעשיה', 'אחסנה'];
                    function isCommerceLanduse(name) {
                        if (!name) return false;
                        return COMMERCE_KEYWORDS.some(kw => name.includes(kw));
                    }

                    // Collect plan TABAs that have commerce data — to exclude overlapping landuse
                    const planCommerceTabas = new Set();
                    if (gd.plans) {
                        gd.plans.features.forEach(f => {
                            const cmOut = parseFloat(f.properties.commerce_out) || 0;
                            const emp = parseFloat(f.properties.employment) || 0;
                            if (cmOut + emp > 0) {
                                const taba = String(f.properties.taba || f.properties.plan_name || '').trim();
                                if (taba) planCommerceTabas.add(taba);
                            }
                        });
                    }

                    // Layer 1: Existing landuse — commerce/employment polygons from landuse_xplan
                    if (gd.landuse_xplan) {
                        const existingLayer = L.geoJSON(gd.landuse_xplan, {
                            pane: 'plansPane',
                            filter: f => {
                                const name = (f.properties.mavat_name || '').trim();
                                if (!isCommerceLanduse(name) || !f.geometry) return false;
                                // Exclude if the plan (pl_number) has a new plan with commerce data
                                const plNum = (f.properties.pl_number || '').trim();
                                if (plNum && planCommerceTabas.has(plNum)) return false;
                                return true;
                            },
                            style: f => {
                                const areaSqm = parseFloat(f.properties.shape_area) || geojsonAreaSqmC(f.geometry);
                                const areaDunam = areaSqm / 1000;
                                // Existing landuse: show area as density (sqm commerce per dunam = full coverage)
                                return {
                                    fillColor: '#8c96c6',
                                    fillOpacity: 0.55,
                                    color: '#4a4a8a',
                                    weight: 2.5,
                                    dashArray: null
                                };
                            },
                            onEachFeature: (f, layer) => {
                                const name = f.properties.mavat_name || '';
                                const areaSqm = parseFloat(f.properties.shape_area) || geojsonAreaSqmC(f.geometry);
                                const plan = f.properties.pl_number || '';
                                let tip = `<b>קיים</b> — ${name}`;
                                tip += `<br><span style="font-size:10px">שטח: ${Math.round(areaSqm).toLocaleString('he-IL')} מ"ר</span>`;
                                if (plan) tip += `<br><span style="font-size:10px">תכנית: ${plan}</span>`;
                                layer.bindTooltip(tip, { sticky: true, className: 'heatmap-tip', direction: 'right', offset: [15, 0] });
                            }
                        }).addTo(map);
                        geoLayersRef.current.commerceExisting = existingLayer;
                    }

                    // Layer 2: Future plans — commerce_out + employment per dunam
                    if (gd.plans) {
                        const commLayer = L.geoJSON(gd.plans, {
                            pane: 'plansPane',

                    html += `<div style="font-size:10px;color:#8888aa;margin-top:2px">נספרו <span data-permit-included-count>${countIncluded}</span> מתוך ${permits.length} היתרים <span style="opacity:0.7">(${defaultMode})</span></div>`;

            // Render a notice listing plans whose tree surveys were suppressed to avoid
            // double-counting. Returns '' if no suppressions.
            function renderSuppressedTreeNotice(suppressed) {
                if (!suppressed || suppressed.length === 0) return '';
                const items = suppressed.map(s => {
                    return '<li style="margin-bottom:3px"><span style="color:#aaa">' + s.name + '</span> <span style="color:#777;font-size:10px">(' + s.total + ' עצים, חופפת ל-' + s.suppressedBy + ')</span></li>';
                }).join('');
                return '<div style="margin-top:12px;padding:10px 12px;background:rgba(233,69,96,0.1);border-right:3px solid #e94560;border-radius:6px;font-size:11px;color:#e0e0e0">'
                    + '<div style="font-weight:bold;color:#e94560;margin-bottom:6px">⚠ ' + suppressed.length + ' סקר' + (suppressed.length === 1 ? '' : 'י עצים') + ' הוחרג' + (suppressed.length === 1 ? '' : 'ו') + ' כדי למנוע כפילות</div>'
                    + '<div style="color:#aaa;margin-bottom:4px;font-size:10px">תב"עות חופפות משמעותית (≥50%) לתב"ע אחרת עם יותר עצים בסקר:</div>'
                    + '<ul style="margin:0;padding-right:14px;font-size:11px">' + items + '</ul>'
                    + '</div>';
            }

            // Aggregate tree-survey stats across an array of plan property objects.
            // Returns { total, removed, pct, withData, plans: [..], suppressed: [..] }
            // `plans` sorted DESC by `removed`. `suppressed` lists plans dropped due to
            // significant spatial overlap with a larger-survey plan (to prevent double-counting).
            function aggregateTreeStats(planPropsArr) {
                const ts = window.__treeSurveys || {};
                const tsTama = window.__tama38TreeSurveys || {};
                // Step 1: collect candidate plans (with survey data), dedup by key
                const candidates = [];
                const seen = new Set();
                planPropsArr.forEach(p => {
                    if (!p) return;
                    const isTama = p._source === 'tama38';
                    const key = isTama ? (p.tik || '') : (p.taba || '');
                    if (!key) return;
                    const seenKey = (isTama ? 'tama:' : 'plan:') + key;
                    if (seen.has(seenKey)) return;
                    const rec = isTama ? tsTama[key] : ts[key];
                    if (!rec || !rec.total) return;
                    seen.add(seenKey);
                    let name, linkId;
                    if (isTama) {
                        const addr = p.address || '';
                        name = 'תמ"א 38' + (addr ? ': ' + addr : '') + (p.tik ? ' (' + p.tik + ')' : '');
                        linkId = 'tama:' + key;
                    } else {
                        name = p.plan_summary || p.plan_name_he || p.plan_name || key;
                        linkId = 'plan:' + key;
                    }
                    const r = (rec.krita || 0) + (rec.haataka || 0);
                    candidates.push({
                        taba: isTama ? '' : key,
                        tik: isTama ? key : '',
                        isTama,
                        linkId,
                        key,
                        name,
                        removed: r,
                        total: rec.total,
                        pct: rec.total > 0 ? Math.round((r / rec.total) * 100) : 0,
                        props: p,
                        suppressedBy: null,
                    });
                });
                // Step 2: dedup by significant spatial overlap — among taba-candidates with
                // overlapping geometries (≥50% area), keep the one with highest `total`.
                // Dropped candidates record which `suppressedBy` won. TAMA38 plans are not
                // cross-compared here (they use tik, not taba, and usually sit inside plans).
                const oMap = overlapMapRef.current;
                if (oMap && oMap.size) {
                    const tabaIndex = new Map();
                    candidates.forEach(c => { if (!c.isTama) tabaIndex.set(c.key, c); });
                    // Build connected components among candidates that overlap each other
                    const visited = new Set();
                    tabaIndex.forEach((c, taba) => {
                        if (visited.has(taba)) return;
                        const component = [];
                        const stack = [taba];
                        while (stack.length) {
                            const t = stack.pop();
                            if (visited.has(t)) continue;
                            visited.add(t);
                            const cc = tabaIndex.get(t);
                            if (!cc) continue;
                            component.push(cc);
                            const neighbors = oMap.get(t);
                            if (!neighbors) continue;
                            neighbors.forEach(nb => { if (!visited.has(nb) && tabaIndex.has(nb)) stack.push(nb); });
                        }
                        if (component.length > 1) {
                            // Winner: highest `total` (most trees surveyed). Tiebreaker: taba numeric asc.
                            component.sort((a, b) => b.total - a.total || String(a.key).localeCompare(String(b.key)));
                            const winner = component[0];
                            for (let i = 1; i < component.length; i++) {
                                component[i].suppressedBy = winner.key;
                            }
                        }
                    });
                }
                // Step 3: aggregate only non-suppressed
                let total = 0, removed = 0, withData = 0;
                const included = [];
                const suppressed = [];
                candidates.forEach(c => {
                    if (c.suppressedBy) { suppressed.push(c); return; }
                    total += c.total;
                    removed += c.removed;
                    withData += 1;
                    included.push(c);
                });
                included.sort((a, b) => b.removed - a.removed);
                return {
                    total,
                    removed,
                    pct: total > 0 ? Math.round((removed / total) * 100) : 0,
                    withData,
                    plans: included,
                    suppressed,
                };
            }

            // Fix reversed Hebrew text (chars reversed within each word by PDF extraction)
            function fixHebrewText(text) {
                if (!text) return text;
                if (!/[\u0590-\u05FF]/.test(text)) return text;
                const REVERSED = ['חטש','יחטש','ירוגמ','רחסמ','הקוסעת','ןוינח','תויונח','ךוניח','תוברת','הליהק','תואירב','ס"נתמ','ןועמ','תותיכ','ירפס','תדסומ','ןודעומ','םינבמ','רוביצ','תלצה','ןועמ'];
                const charsRev = REVERSED.some(m => text.includes(m));
                let result = text;
                if (charsRev) {
                    result = text.split(';').map(seg =>
                        seg.split(' ').map(w => w.split('').reverse().join('')).join(' ')
                    ).join('; ');
                    result = result.replace(/ס"נתמ/g, 'מתנ"ס').replace(/ד"חי/g, 'יח"ד');
                }
                const FINAL = new Set('םןףךץ');
                const words = result.trim().split(/\s+/);
                if (words.length >= 2) {
                    const fc = words[0].replace(/^[.,;:()\-]+/, '');
                    if ('.,;:'.includes(result.trim()[0])) {
                        result = [...words].reverse().join(' ');
                    } else if (fc && FINAL.has(fc[0])) {
                        result = [...words].reverse().join(' ');
                    }
                }
                return result;
            }

            // Build shavaz (public buildings) popup HTML
            function cleanNull(v) { return (v == null || v === 'NULL' || v === 'null' || v === 'None') ? '' : v; }

            function buildShavazPopup(props, isFuture, hasOriginPlan, navInfo, isHafrashah) {
                // Support both landuse_xplan properties (future) and shavaz_kayam properties (existing)
                const isXplan = !!props.pl_number;

                let title, subtitle, taba, lotNum, status, lotArea, buildingType = '';
                if (isXplan) {
                    // landuse_xplan source
                    title = cleanNull(props.pl_name) || cleanNull(props.mavat_name) || 'שב"צ עתידי';
                    subtitle = cleanNull(props.mavat_name) || '';
                    // Extract taba from pl_number: "101-0095612" → "95612"
                    const plNum = cleanNull(props.pl_number);
                    taba = plNum && plNum.includes('-') ? String(parseInt(plNum.split('-')[1])) : plNum;
                    lotNum = cleanNull(props.num) || '';
                    status = normalizeStatus(cleanNull(props.station_desc) || '');
                    lotArea = props.shape_area || props.legal_area || null;
                } else {
                    // shavaz_kayam / legacy future_shavaz source
                    const buildingName = cleanNull(props.building_name);
                    const buildingTypeRaw = cleanNull(props.building_type) || cleanNull(props.Descriptio) || '';
                    const SPORT_RE2 = /ספורט|מגרש כדור|מגרש כטר|בריכת שחי/;
                    buildingType = (function(raw) {
                        if (!raw) return '';
                        const items = raw.split(/[;,]/).map(s => s.trim()).filter(s => s && !SPORT_RE2.test(s));
                        const counts = {};
                        items.forEach(i => { counts[i] = (counts[i] || 0) + 1; });
                        return Object.entries(counts).map(([name, count]) => count === 1 ? name : count + ' ' + name).join('; ');
                    })(buildingTypeRaw);
                    const planNameHe = fixHebrewText(cleanNull(props.plan_name_he) || '');
                    const mavatName = fixHebrewText(cleanNull(props.MAVAT_NAME) || '');
                    if (isFuture) {
                        title = planNameHe || mavatName || 'שב"צ עתידי';
                        subtitle = planNameHe && mavatName ? mavatName : '';
                    } else {
                        const SPORT_RE = /ספורט|מגרש כדור|מגרש כטר|בריכת שחי/;
                        const cleanTitle = buildingName
                            ? buildingName.replace(/(?:מגרש ספורט|אולם ספורט|בריכת שחי\S*|מגרש כדור\S*|מגרש כטר\S*)[^"]*(?:"[^"]*")?\s*/g, '').trim()
                            : '';
                        title = fixHebrewText(cleanTitle || planNameHe || cleanNull(props.Descriptio) || mavatName || 'שב"צ');
                        subtitle = planNameHe || '';
                    }
                    taba = cleanNull(props.TABA) || cleanNull(props.taba) || '';
                    lotNum = cleanNull(props.MIGRASH) || cleanNull(props.migrash) || '';
                    status = normalizeStatus(props.Mavat_Status || props.status_mavat || '');
                    lotArea = props.POLY_AREA || props.LEGAL_AREA || props.area || null;
                }

                const statusColor = getStatusColor(status);
                const tabaLot = [taba, lotNum].filter(Boolean).join(' / ');
                const lotAreaDunam = lotArea ? (parseFloat(lotArea) / 1000).toFixed(2) : '-';
                const builtSqm = cleanNull(props.BUILD_AREA) || null;
                const builtDisplay = builtSqm ? Math.round(parseFloat(builtSqm)).toLocaleString() : '-';
                const planId = taba || '';
                const note = window.__annotations ? (window.__annotations['shavaz_' + planId + '_' + lotNum] || '') : '';

                // Format uses list: "שם (123)" → "שם - 123 מ"ר"
                const rawUses = (cleanNull(props.uses) || '').split(';').map(s => s.trim()).filter(Boolean);
                const formattedUses = rawUses.map(part => {
                    const m = part.match(/^(.*?)\s*\((\d+)\)\s*$/);
                    if (m) return `${m[1].trim()} - ${parseInt(m[2]).toLocaleString()} מ"ר`;
                    return part;
                });

                // Build HTML — colors come from CSS variables, no inline color styles needed
                const headerBorder = status ? statusColor : '#D2691E';
                const noteColor = note ? '#ffeaa7' : (isFuture ? '#5a3d2a' : '#886');
                let html = '<div>';
                html += buildNavBar(navInfo);
                html += `<div class="popup-header" style="position:relative;border-bottom:3px solid ${headerBorder}">`;
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) {
                    html += `<div class="popup-header-subtitle"${!isFuture ? ' style="font-weight:700"' : ''}>${subtitle}</div>`;
                }
                html += `<button class="popup-btn-permit" data-action="add-note" data-plan="shavaz_${planId}_${lotNum}" style="position:absolute;bottom:6px;left:6px;background:transparent;border:none;color:${noteColor};font-size:16px;padding:2px;min-width:auto;cursor:pointer" title="${note || 'הוסף הערה'}">📝</button>`;
                html += '</div>';
                if (status) {
                    html += '<div class="popup-status-row">';
                    html += `<span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor};font-size:11px">${status}</span>`;
                    html += '</div>';
                }
                html += '<div class="popup-body">';
                if (tabaLot) {
                    html += `<div class="popup-row"${!isFuture ? ' style="font-weight:700"' : ''}><span class="popup-row-label">תכנית / מגרש</span><span class="popup-row-value">${tabaLot}</span></div>`;
                }
                if (buildingType) {
                    html += `<div class="popup-row"><span class="popup-row-label">סוג מבנה</span><span class="popup-row-value">${buildingType}</span></div>`;
                }
                const serviceType = cleanNull(props.service_type) || '';
                if (serviceType) {
                    html += `<div class="popup-row"><span class="popup-row-label">סוג שירות</span><span class="popup-row-value">${serviceType}</span></div>`;
                }
                if (!isHafrashah) {
                    html += `<div class="popup-row"><span class="popup-row-label">שטח מגרש</span><span class="popup-row-value">${lotAreaDunam} דונם</span></div>`;
                }
                if (isFuture) {
                    html += `<div class="popup-row"><span class="popup-row-label">מ"ר בנוי</span><span class="popup-row-value">${builtDisplay}</span></div>`;
                }
                if (isFuture && formattedUses.length) {
                    html += `<div class="popup-row"><span class="popup-row-label">שימושים מותרים</span><span class="popup-row-value" style="font-size:11px;max-width:200px;word-wrap:break-word">${formattedUses.join('<br>')}</span></div>`;
                }
                // Hafrashah enrichment data from מטלות יזם
                if (isHafrashah) {
                    const hfSqm = cleanNull(props.hafrash_sqm);
                    const hfPrg = cleanNull(props.hafrash_prg);
                    if (hfSqm || hfPrg) {
                        html += '<div style="font-size:10px;color:#6a6a8a;padding-top:6px;border-top:1px solid #444">הפרשה מבונה</div>';
                        if (hfSqm) html += `<div class="popup-row"><span class="popup-row-label">מ"ר</span><span class="popup-row-value">${parseInt(hfSqm).toLocaleString()}</span></div>`;
                        if (hfPrg) html += `<div class="popup-row"><span class="popup-row-label">שימושים</span><span class="popup-row-value" style="font-size:11px;max-width:200px;word-wrap:break-word">${hfPrg}</span></div>`;
                    }
                }
                html += '</div>';
                // Footer — jump-to-plan with exact taba matching
                const tabaNum = taba.replace(/[^\d]/g, '');
                const hasPlan = taba && geoDataRef.current && geoDataRef.current.plans && geoDataRef.current.plans.features.some(f => {
                    const pt = (f.properties.taba || '').toString();
                    return pt === taba || pt === tabaNum;
                });
                if (hasPlan) {
                    html += '<div class="popup-footer" style="flex-direction:row">';
                    html += `<button class="popup-icon-btn" data-action="jump-to-plan" data-taba="${taba}" title="לתב״ע">🏠</button>`;
                    html += '</div>';
                }
                if (note) html += '<div style="background:#ffeaa7;padding:6px;border-radius:4px;margin-top:6px;font-size:11px;color:#2d3436">📝 ' + note + '</div>';
                html += '</div>';
                return html;
            }

            // Build the permit details popup HTML
            function buildPermitPopup(props, featureData, navInfo) {
                const title = (props.plan_summary && props.plan_summary.length < props.plan_name_he?.length) ? props.plan_summary : (props.plan_name_he || props.plan_summary || 'תוכנית');
                const planName = props.plan_name || props.taba || '';
                const permitNum = props.building_permit || '-';
                const subtitle = [planName, permitNum !== '-' ? permitNum : null].filter(Boolean).join(' | ');
                const stage = props.stage || '-';
                const stageColor = STAGE_COLORS[stage] || '#5dade2';
                const requestType = props.request_type || props.mahut_bakasha || '-';
                const permitDate = props.permit_date || props.permit_date_data || '-';
                const permitAddition = props.permit_addition || '-';
                const permitAddDisplay = permitAddition !== '-' && permitAddition !== 0 ? '+' + permitAddition : permitAddition;

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Header
                html += '<div class="permit-detail-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                html += `<div class="popup-header-subtitle">${subtitle}</div>`;

                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">שלב</span><span class="popup-status-badge" style="background:${stageColor}33;color:${stageColor};border:1px solid ${stageColor}">${stage}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">מהות הבקשה</span><span class="popup-row-value" style="font-size:11px;max-width:180px;text-align:left">${requestType}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך היתר</span><span class="popup-row-value">${permitDate}</span></div>`;

                // Footer - back button styled red with left arrow
                html += '<div class="popup-footer">';

            // Build the tama38 popup HTML
            function buildTama38Popup(props, navInfo) {
                const title = props.address || 'תמ"א 38';
                const subtitle = props.neighborho ? `שכונה: ${props.neighborho}` : '';
                const status = props.status || '';
                const status1 = props.status_1 || '';
                const displayStatus = status || status1 || '-';
                const harisaa = props.harisaa || '-';
                const unitsExist = props.units_exis != null ? props.units_exis : '-';
                const unitsTose = props.units_tose != null ? props.units_tose : '-';
                const tik = props.tik || '-';
                const dateOpen = props.open_ || '-';
                const dateApproval = props.date || '-';
                const comment = props.comment || '';

                // Status color for tama38
                const statusColor = displayStatus.includes('היתר') ? '#50d25a' :
                    displayStatus.includes('אושר') ? '#50d25a' :
                    displayStatus.includes('הופק') ? '#50d25a' :
                    displayStatus.includes('בנייה') ? '#4a69d1' :
                    displayStatus.includes('נפתח') ? '#f56e05' :
                    displayStatus.includes('בתהליך') ? '#4ba1f0' :
                    '#5dade2';

                let html = '<div>';
                html += buildNavBar(navInfo);
                html += '<div class="popup-header" style="border-right:4px solid #e94560">';
                html += `<div class="popup-header-title">${title}</div>`;
                html += `<div class="popup-header-subtitle" style="font-size:11px;opacity:0.7">${tik}</div>`;
                html += '</div>';
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${displayStatus}</span></div>`;
                if (status1 && status1 !== status && status1 !== '-') {
                    html += `<div class="popup-row"><span class="popup-row-label">סטטוס משני</span><span class="popup-row-value">${status1}</span></div>`;
                }
                html += `<div class="popup-row"><span class="popup-row-label">הריסה</span><span class="popup-row-value">${harisaa}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד קיימות</span><span class="popup-row-value">${unitsExist}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsTose !== '-' ? '+' + unitsTose : '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך פתיחה</span><span class="popup-row-value">${dateOpen}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך אישור</span><span class="popup-row-value">${dateApproval}</span></div>`;
                if (comment) {
                    const shortComment = comment.length > 120 ? comment.substring(0, 120) + '...' : comment;
                    html += `<div class="popup-row" style="flex-direction:column;align-items:flex-start"><span class="popup-row-label" style="margin-bottom:4px">הערות</span><span class="popup-row-value" style="font-size:11px;line-height:1.4;text-align:right;white-space:pre-wrap;max-width:100%">${shortComment}</span></div>`;
                }
                // ── Permits from tama38_permits.json ──
                const fid = props.fid != null ? props.fid : '';
                const tama38Permits = getPermitsForTama38(fid);
                if (tama38Permits.length > 0) {
                    html += buildPermitsSummaryHTML(tama38Permits, `data-fid='${fid}'`);
                }
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Bind popup navigation and permit/back button events
            // Bind shavaz popup events (notes + jump to plan)

            function bindShavazPopupEvents(popup, shavazProps, latlng, originPlanProps, allShavaz, currentShavazIdx) {
                let shavazIdx = currentShavazIdx || 0;
                const el = popup.getElement();
                if (!el) return;
                // Remove any previous handler
                if (el._popupHandler) el.removeEventListener('click', el._popupHandler);
                el._popupHandler = function handler(ev) {
                    // Nav buttons for paging between overlapping shavaz
                    const navBtn = ev.target.closest('.popup-nav-btn');
                    if (navBtn && allShavaz && allShavaz.length > 1) {
                        ev.stopPropagation();
                        if (navBtn.dataset.nav === 'next') shavazIdx = (shavazIdx + 1) % allShavaz.length;
                        else shavazIdx = (shavazIdx - 1 + allShavaz.length) % allShavaz.length;
                        const entry = allShavaz[shavazIdx];
                        const navInfo = { current: shavazIdx, total: allShavaz.length };
                        popup.options.className = shavazPopupClass(entry.isFuture);
                        popup.setContent(buildShavazPopup(entry.properties, entry.isFuture, !!originPlanProps, navInfo));
                        shavazProps = entry.properties;
                        return;
                    }
                    const btn = ev.target.closest('.popup-btn-permit') || ev.target.closest('.popup-icon-btn');
                    if (!btn) return;
                    ev.stopPropagation();
                    if (btn.dataset.action === 'add-note') {
                        const planId = btn.dataset.plan;
                        const current = window.__annotations[planId] || '';
                        window.showNoteModal(current).then(function(note) {
                            if (note !== null) {
                                window.__annotations[planId] = note;
                                localStorage.setItem('plan_annotations', JSON.stringify(window.__annotations));
                                const isFuture = allShavaz && allShavaz[shavazIdx] ? allShavaz[shavazIdx].isFuture : false;
                                const navInfo = allShavaz && allShavaz.length > 1 ? { current: shavazIdx, total: allShavaz.length } : null;
                                popup.setContent(buildShavazPopup(shavazProps, isFuture, !!originPlanProps, navInfo));
                            }
                        });
                        return;
                    }
                    if (btn.dataset.action === 'jump-to-plan') {
                        const taba = btn.dataset.taba;
                        if (!taba) return;
                        const gd = geoDataRef.current;
                        if (!gd.plans) return;
                        // Strip Hebrew letters for matching (e.g. "1013א" → "1013")
                        const tabaNum = taba.replace(/[^\d]/g, '');
                        const matching = gd.plans.features.filter(f => {
                            const pt = (f.properties.taba || f.properties.TABA || '').toString();
                            return pt === taba || pt === tabaNum;
                        });
                        if (matching.length > 0) {
                            const mapped = mapPlanProps(matching[0].properties);
                            const allFeatures = matching.map(f => ({ properties: mapPlanProps(f.properties), type: 'plan' }));
                            const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                            popup.setContent(buildPlanPopup(mapped, { properties: mapped }, navInfo, shavazProps));
                            popup.options.className = 'plan-popup';
                            bindPopupEvents(popup, allFeatures, 0, shavazProps);
                        }
                        return;
                    }
                    if (btn.dataset.action === 'back-to-plan' && originPlanProps) {
                        const gd = geoDataRef.current;
                        const taba = originPlanProps.taba || originPlanProps.TABA || '';
                        const matching = gd.plans ? gd.plans.features.filter(f => (f.properties.taba || f.properties.TABA || '') === taba) : [];
                        if (matching.length > 0) {
                            const mapped = mapPlanProps(matching[0].properties);
                            const allFeatures = matching.map(f => ({ properties: mapPlanProps(f.properties), type: 'plan' }));
                            const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                            popup.setContent(buildPlanPopup(mapped, { properties: mapped }, navInfo));
                            popup.options.className = 'plan-popup';
                            bindPopupEvents(popup, allFeatures, 0);
                        }
                        return;
                    }
                };
                el.addEventListener('click', el._popupHandler);
            }

            function bindPopupEvents(popup, allFeatures, startIdx, originShavazProps) {
                let currentIdx = startIdx || 0;
                function buildForIndex(idx) {
                    const entry = allFeatures[idx];
                    const navInfo = allFeatures.length > 1 ? { current: idx, total: allFeatures.length } : null;
                    if (entry.type === 'permit') return buildPermitPopup(entry.properties, { properties: entry.properties }, navInfo);
                    if (entry.type === 'tama38') return buildTama38Popup(entry.properties, navInfo);
                    return buildPlanPopup(entry.properties, { properties: entry.properties }, navInfo);
                }
                const el = popup.getElement();
                if (!el) return;
                if (el._popupHandler) el.removeEventListener('click', el._popupHandler);
                el._popupHandler = function(ev) {
                    // Let <a> links work normally
                    if (ev.target.closest('a[href]')) return;
                    const navBtn = ev.target.closest('.popup-nav-btn');
                    if (navBtn) {
                        ev.stopPropagation();
                        if (navBtn.dataset.nav === 'next') currentIdx = (currentIdx + 1) % allFeatures.length;
                        else currentIdx = (currentIdx - 1 + allFeatures.length) % allFeatures.length;
                        popup.setContent(buildForIndex(currentIdx));
                        return;
                    }
                    const permitBtn = ev.target.closest('.popup-btn-permit') || ev.target.closest('.popup-icon-btn');
                    if (permitBtn && permitBtn.dataset.action === 'add-note') {
                        ev.stopPropagation();
                        const planId = permitBtn.dataset.plan;
                        const current = window.__annotations[planId] || '';
                        window.showNoteModal(current).then(function(note) {
                            if (note !== null) {
                                window.__annotations[planId] = note;
                                localStorage.setItem('plan_annotations', JSON.stringify(window.__annotations));
                                popup.setContent(buildForIndex(currentIdx));
                            }
                        });
                        return;
                    }
                    if (permitBtn && permitBtn.dataset.action === 'show-mp-compliance') {
                        ev.stopPropagation();
                        const planName = permitBtn.dataset.plan;
                        const c = (window.__masterPlanCompliance || {})[planName];
                        if (!c) return;
                        const f = (geoDataRef.current.plans?.features || []).find(ff => ff.properties.plan_name === planName);
                        if (!f) return;
                        // Trigger the same renderer used by the master plan TBA polygon click,
                        // by simulating a click on the matching layer in the active master plan group
                        const mpKey = { 'מושבות':'master_plan_moshavot','רסקו':'master_plan_rasko','בקעה':'master_plan_baka','ארנונה':'master_plan_arnona' }[c.mp_match];
                        const grp = mpKey && geoLayersRef.current[mpKey];
                        if (grp && grp.__plansLayer) {
                            grp.__plansLayer.eachLayer(sub => {
                                if (sub.feature && sub.feature.properties && sub.feature.properties.plan_name === planName) {
                                    sub.fire('click', { latlng: popup.getLatLng() });
                                }
                            });
                        } else {
                            // Master plan layer not active — auto-enable it then fire click after layer rebuilds
                            setLayers(prev => ({ ...prev, [mpKey]: true }));
                        }
                        return;
                    }
                    if (permitBtn && permitBtn.dataset.action === 'jump-to-shavaz') {
                        ev.stopPropagation();
                        const taba = permitBtn.dataset.taba;
                        if (!taba) return;
                        const gd = geoDataRef.current;
                        const shavazFeatures = [];
                        [gd.shavaz_kayam, gd.future_shavaz].forEach((dataset, di) => {
                            if (!dataset) return;
                            dataset.features.forEach(f => {
                                const ft = f.properties.TABA || f.properties.taba || '';
                                if (ft === taba) shavazFeatures.push({ properties: f.properties, isFuture: di === 1 });
                            });
                        });
                        if (shavazFeatures.length > 0) {
                            const sf = shavazFeatures[0];
                            // Store current plan props for back navigation
                            const currentPlanProps = allFeatures[currentIdx] ? allFeatures[currentIdx].properties : null;
                            const navInfo = shavazFeatures.length > 1 ? { current: 0, total: shavazFeatures.length } : null;
                            popup.options.className = shavazPopupClass(sf.isFuture != null ? sf.isFuture : !!(originShavazProps && (originShavazProps.Mavat_Status || originShavazProps.MAVAT_NAME)));
                            popup.setContent(buildShavazPopup(sf.properties, sf.isFuture, true, navInfo));
                            bindShavazPopupEvents(popup, sf.properties, popup.getLatLng(), currentPlanProps, shavazFeatures, 0);
                            setLayers(prev => ({ ...prev, shavaz_kayam: true, future_shavaz: true }));
                        }
                        return;
                    }
                    if (permitBtn && permitBtn.dataset.action === 'back-to-shavaz' && originShavazProps) {
                        ev.stopPropagation();
                        const fut = !!(originShavazProps.Mavat_Status || originShavazProps.MAVAT_NAME);
                        popup.options.className = shavazPopupClass(fut);
                        popup.setContent(buildShavazPopup(originShavazProps, fut, false));
                        bindShavazPopupEvents(popup, originShavazProps, popup.getLatLng(), null, null, 0);
                        return;
                    }
                    // ── Show all permits for a plan/tama38 ──
                    if (permitBtn && permitBtn.dataset.action === 'show-permits') {
                        ev.stopPropagation();
                        const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                        const taba = permitBtn.dataset.taba;
                        const fid = permitBtn.dataset.fid;
                        if (taba) {
                            // Plan permits
                            const permits = getPermitsForTaba(taba);
                            const fd = JSON.parse(permitBtn.dataset.feature);
                            const title = fd.properties.plan_summary || fd.properties.plan_name_he || 'תוכנית';
                            const featureJson = JSON.stringify(fd).replace(/'/g, "&#39;");
                            popup.setContent(buildPermitsDetailPopup(permits, title, fd.properties.plan_name || taba, navInfo, 'back-to-plan', `data-feature='${featureJson}'`, 0, 'plan:' + taba, parsePlanUnits(fd.properties.units_total) || parsePlanUnits(fd.properties.units_add)));
                        } else if (fid !== undefined && fid !== '') {
                            // Tama38 permits
                            const permits = getPermitsForTama38(fid);
                            const entry = allFeatures[currentIdx];
                            var tamaT = '';
                            var ttP = permits.find(function(p) { return p.tama_type; });
                            if (ttP) { tamaT = ttP.tama_type; }
                            else if (entry.properties.harisaa === 'כן') { tamaT = '38/2'; }
                            else if (entry.properties.harisaa === 'לא') { tamaT = '38/1'; }
                            const title = (entry.properties.address || 'תמ"א 38') + (tamaT ? ' - תמ"א ' + tamaT : '');
                            const unitsTose = entry.properties.units_tose != null ? entry.properties.units_tose : '';
                            const tama38Sub = [entry.properties.tik || '', unitsTose ? '+' + unitsTose + ' יח"ד' : ''].filter(Boolean).join(' | ');
                            popup.setContent(buildPermitsDetailPopup(permits, title, tama38Sub, navInfo, 'back-to-tama38', `data-fid='${fid}'`, unitsTose ? Number(unitsTose) : 0, 'tama:' + fid, parsePlanUnits(unitsTose)));
                        }
                        return;
                    }
                    // ── Back to tama38 from permits detail ──
                    if (permitBtn && permitBtn.dataset.action === 'back-to-tama38') {
                        ev.stopPropagation();
                        const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                        popup.setContent(buildTama38Popup(allFeatures[currentIdx].properties, navInfo));
                        return;
                    }
                    if (permitBtn) {
                        ev.stopPropagation();
                        const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                        if (permitBtn.dataset.action === 'back-to-plan') {
                            const fd = permitBtn.dataset.feature ? JSON.parse(permitBtn.dataset.feature) : { properties: allFeatures[currentIdx].properties };
                            popup.setContent(buildPlanPopup(fd.properties, fd, navInfo));
                            setTimeout(() => setLayers(prev => ({
                                ...prev,
                                plans: !prev.plans ? true : prev.plans,
                                permits: false
                            })), 100);
                        } else if (permitBtn.dataset.feature) {
                            const fd = JSON.parse(permitBtn.dataset.feature);
                            popup.setContent(buildPermitPopup(fd.properties, fd, navInfo));
                            setTimeout(() => setLayers(prev => ({
                                ...prev,
                                permits: true
                            })), 100);
                        }
                    }
                };
                el.addEventListener('click', el._popupHandler);
                if (el._popupChangeHandler) el.removeEventListener('change', el._popupChangeHandler);
                el._popupChangeHandler = function(ev) {
                    const cb = ev.target.closest('input[data-permit-include]');
                    if (!cb) return;
                    setPermitOverride(cb.dataset.permitKey, cb.checked);
                    updatePopupPermitTotal(el);
                    const body = cb.closest('[data-permit-scope]');
                    const scope = body && body.dataset.permitScope;
                    if (scope && scope.indexOf('plan:') === 0) {
                        refreshPermitLabel(scope.substring(5));
                    }
                };
                el.addEventListener('change', el._popupChangeHandler);
            }

            const toggleLayer = (id) => {
                setLayers(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetView = () => {
                mapInstanceRef.current?.setView(CENTER, DEFAULT_ZOOM);
            };

            const goBackView = () => {
                const hist = viewHistoryRef.current;
                if (hist.length <= 1) return;
                hist.pop(); // remove current view
                const prev = hist[hist.length - 1];
                isGoingBackRef.current = true;
                mapInstanceRef.current.setView([prev.lat, prev.lng], prev.zoom, {animate: false});
                setViewHistoryLen(hist.length);
            };

            // Keep goBackView ref for stable access
            const goBackViewRef = useRef(goBackView);
            goBackViewRef.current = goBackView;

            // Plan search results — matches plan name/Hebrew/summary AND permit file numbers
            const searchResults = (() => {
                const q = planSearch.trim();
                if (q.length < 2) return [];
                const permitMatches = [];
                const matchedTabas = new Set();
                const allP = window.__allPermits || {};
                // Permit-number search: look for file_number containing q across all permits
                for (const taba of Object.keys(allP)) {
                    if (permitMatches.length >= 10) break;
                    const entry = allP[taba];
                    if (!entry || !entry.permits) continue;
                    const hit = entry.permits.find(p => p.file_number && p.file_number.includes(q));
                    if (hit) {
                        const plan = planIndex.find(pl => pl.ta === taba);
                        if (plan && !matchedTabas.has(taba)) {
                            matchedTabas.add(taba);
                            permitMatches.push({ ...plan, _permitNum: hit.file_number, _permitStatus: hit.status || '' });
                        }
                    }
                }
                const planMatches = planIndex
                    .filter(p => !matchedTabas.has(p.ta) && ((p.t && p.t.includes(q)) || (p.n && p.n.includes(q))))
                    .slice(0, 15);
                return [...permitMatches, ...planMatches].slice(0, 20);
            })();

            const handleSearchSelect = (plan) => {
                const map = mapInstanceRef.current;
                if (!map) return;
                setPlanSearch('');
                setShowSearchResults(false);
                // Zoom to plan location and query for popup
                map.setView(plan.c, 18);
                setTimeout(() => {
                    const gd = geoDataRef.current;
                    if (!gd.plans) return;
                    const match = gd.plans.features.find(f =>
                        f.properties.plan_name === plan.n || f.properties.taba === plan.n
                    );
                    if (!match) return;
                    const mapped = mapPlanProps(match.properties);
                    const popup = L.popup({ maxWidth: popupMaxWidth(), minWidth: Math.min(300, window.innerWidth * 0.85), closeButton: true })
                        .setLatLng(plan.c)
                        .setContent(buildPlanPopup(mapped, { properties: mapped }))
                        .openOn(map);
                    bindPopupEvents(popup, [{ type: 'plan', properties: mapped }], 0);
                }, 500);
            };

            const activeCount = Object.values(layers).filter(Boolean).length;

            const filteredConfig = {};
            Object.entries(LAYER_CONFIG).forEach(([key, group]) => {
                const filtered = group.layers.filter(l =>
                    !searchText || l.name.includes(searchText) || l.id.includes(searchText)
                );
                if (filtered.length > 0) {
                    filteredConfig[key] = { ...group, layers: filtered };
                }
            });

            return (
                <>
                    {/* Mobile overlay — click to close sidebar */}
                    <div
                        className={`sidebar-overlay ${sidebarOpen ? 'visible' : ''}`}
                        onClick={() => { setSidebarOpen(false); setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350); }}
                    ></div>

                    <div className={`sidebar ${sidebarOpen ? '' : 'collapsed'}`}>
                        {/* Mobile close button */}
                        <button
                            className="sidebar-close-mobile"
                            onClick={() => { setSidebarOpen(false); setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350); }}
                        >&times;</button>
                        <div className="sidebar-header">
                            <h1>אורנים</h1>
                            <p>כלי תכנון עירוני - ירושלים</p>
                        </div>

                        <div className="sidebar-section">
                            <h3>חיפוש תוכניות</h3>
                            <div className="plan-search-wrap">
                                <input
                                    className="plan-search-input"
                                    type="text"
                                    placeholder='חיפוש תכנית, מספר תכנית או מספר היתר...'
                                    value={planSearch}
                                    onChange={(e) => {
                                        setPlanSearch(e.target.value);
                                        setShowSearchResults(true);
                                    }}
                                    onFocus={() => planSearch.length >= 2 && setShowSearchResults(true)}
                                />
                                {planSearch && (
                                    <button
                                        className="plan-search-clear"
                                        onClick={() => { setPlanSearch(''); setShowSearchResults(false); }}
                                    >&times;</button>
                                )}
                                {showSearchResults && planSearch.length >= 2 && (
                                    <div className="plan-search-results">
                                        {searchResults.length > 0 ? searchResults.map((plan, i) => (
                                            <div
                                                key={i}
                                                className="plan-search-item"
                                                onClick={() => handleSearchSelect(plan)}
                                            >
                                                {plan._permitNum && (
                                                    <div style={{fontSize:10,color:'#f5b041',marginBottom:2}}>📑 היתר {plan._permitNum}{plan._permitStatus ? ' · ' + plan._permitStatus : ''}</div>
                                                )}
                                                <div className="plan-search-item-name">{plan.h}</div>
                                                {plan.s && <div className="plan-search-item-summary">{plan.s}</div>}
                                                <div className="plan-search-item-num">{plan.n}</div>
                                            </div>
                                        )) : (
                                            <div className="plan-search-empty">לא נמצאו תוצאות</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                                    placeholder='הקלד כתובת...'
                                    value={addressSearch}

                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && addressSearch.length >= 3) {
                                            setAddressLoading(true);
                                            setAddressResults([]);
                                            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addressSearch + ' ירושלים')}&limit=5&countrycodes=il&accept-language=he`)
                                                .then(r => r.json())
                                                .then(data => {
                                                    setAddressResults(data.map(d => ({
                                                        name: d.display_name,
                                                        lat: parseFloat(d.lat),
                                                        lng: parseFloat(d.lon)
                                                    })));
                                                    setAddressLoading(false);
                                                })
                                                .catch(() => setAddressLoading(false));
                                        }
                                    }}
                                />
                                {addressSearch && (
                                    <button
                                        className="plan-search-clear"
                                        onClick={() => { setAddressSearch(''); setAddressResults([]); }}
                                    >&times;</button>

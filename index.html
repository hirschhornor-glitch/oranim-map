                                                                <td className="note-cell">{note}</td>
                                                                <td>
                                                                    <div className="action-btns">
                                                                        <button className="edit-btn" title="ערוך" onClick={() => handleEditAnnotation(planId)}>&#9998;</button>
                                                                        <button className="delete-btn" title="מחק" onClick={() => handleDeleteAnnotation(planId)}>&#128465;</button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                    <div className="annotations-general-notes">
                                        <label>הערות כלליות / הסבר</label>
                                        <textarea
                                            placeholder="הוסף הערות כלליות כאן..."
                                            value={annotationGeneralNotes}
                                            onChange={e => setAnnotationGeneralNotes(e.target.value)}
                                        />
                                    </div>
                                    <div className="annotations-actions">
                                        <div className="action-group-right">
                                            <button className="modal-action-btn" style={{background:'#c0392b', borderColor:'#c0392b', color:'#fff'}} onClick={handleDeleteAll}>
                                                מחק את כל ההערות
                                            </button>
                                        </div>
                                        <div className="action-group-left">
                                            <div style={{position:'relative',display:'inline-block'}}>
                                                <button className="modal-action-btn primary" onClick={() => {
                                                    const el = document.getElementById('save-dropdown');
                                                    if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
                                                }}>
                                                    &#128190; שמירה &#9660;
                                                </button>
                                                <div id="save-dropdown" style={{display:'none',position:'absolute',bottom:'100%',left:0,background:'#1a1a2e',border:'1px solid #2a2a4a',borderRadius:8,overflow:'hidden',marginBottom:4,minWidth:140,zIndex:10}}>
                                                    <button style={{display:'block',width:'100%',padding:'8px 16px',background:'none',border:'none',color:'#e0e0e0',cursor:'pointer',textAlign:'right',fontSize:13}}
                                                        onMouseOver={e => e.target.style.background='#2a2a4a'}
                                                        onMouseOut={e => e.target.style.background='none'}
                                                        onClick={() => { document.getElementById('save-dropdown').style.display='none'; handleAnnotationPrint(); }}>
                                                        📄 שמור כ-PDF
                                                    </button>
                                                    <button style={{display:'block',width:'100%',padding:'8px 16px',background:'none',border:'none',color:'#e0e0e0',cursor:'pointer',textAlign:'right',fontSize:13}}
                                                        onMouseOver={e => e.target.style.background='#2a2a4a'}
                                                        onMouseOut={e => e.target.style.background='none'}
                                                        onClick={() => {
                                                            document.getElementById('save-dropdown').style.display='none';
                                                            // Export as XLS (CSV with BOM for Hebrew)
                                                            const annots = window.__annotations || {};
                                                            const gd = geoDataRef.current;
                                                            if (!gd.plans) return;
                                                            const rows = [['מס\' תכנית','שם','תוספת יח"ד','סטטוס','הערה']];
                                                            gd.plans.features.forEach(f => {
                                                                const id = f.properties.plan_name || '';
                                                                const note = annots[id];
                                                                if (!note) return;
                                                                rows.push([id, f.properties.plan_summary||'', f.properties.units_add||0, f.properties.status_mavat||'', note]);
                                                            });
                                                            const csv = '\uFEFF' + rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
                                                            const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
                                                            const url = URL.createObjectURL(blob);
                                                            const a = document.createElement('a');
                                                            a.href = url; a.download = 'הערות_אורנים.csv'; a.click();
                                                            URL.revokeObjectURL(url);
                                                        }}>
                                                        📊 שמור כ-Excel
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* ── Units Summary Modal ── */}
                    {showUnits && (
                        <div className="units-overlay" onClick={() => setShowUnits(false)}>
                            <div className="units-modal" onClick={e => e.stopPropagation()}>
                                <div className="units-watermark"><span>טבלה בעבודה</span></div>
                                <div className="units-header">
                                    {unitsDrilldown ? (
                                        <>
                                            <button className="units-back-btn" onClick={() => setUnitsDrilldown(null)}>
                                                → חזרה
                                            </button>
                                            <h2>🏠 {unitsDrilldown} — פירוט לפי תת שכונה</h2>
                                        </>
                                    ) : (
                                        <h2>🏠 תוספת יח"ד לפי מינהל קהילתי</h2>
                                    )}
                                    <button className="modal-close" onClick={() => { setShowUnits(false); setUnitsDrilldown(null); }}>&times;</button>
                                </div>
                                <div className="units-body">
                                    {unitsLoading || !unitsData ? (
                                        <div className="units-loading">
                                            <p style={{fontSize: '28px', marginBottom: '10px'}}>⏳</p>
                                            <p>טוען נתוני תוכניות...</p>
                                        </div>
                                    ) : unitsDrilldown ? (() => {
                                        const subData = unitsData.bySub[unitsDrilldown] || {};
                                        const subs = Object.keys(subData).sort();
                                        if (subs.length === 0) return <div className="units-loading"><p>אין נתוני תת-שכונות עבור {unitsDrilldown}</p></div>;
                                        return (
                                            <table className="units-table">
                                                <thead>
                                                    <tr>
                                                        <th></th>
                                                        {subs.map(s => <th key={s}>{s}</th>)}
                                                        <th style={{background: '#141440', color: '#e94560'}}>סה"כ</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr>
                                                        <td>יח"ד קיימות</td>
                                                        {subs.map(s => (
                                                            <td key={s}>
                                                                {(subData[s].units_in || 0).toLocaleString()}
                                                            </td>
                                                        ))}
                                                        <td style={{fontWeight: 700, background: '#141440'}}>
                                                            {Object.values(subData).reduce((sum, d) => sum + (d.units_in || 0), 0).toLocaleString()}
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td>יח"ד תוספת</td>
                                                        {subs.map(s => (
                                                            <td key={s} style={{color: '#8ecae6', fontWeight: 600}}>
                                                                {subData[s].units_add.toLocaleString()}
                                                            </td>
                                                        ))}
                                                        <td style={{color: '#8ecae6', fontWeight: 700, background: '#141440'}}>
                                                            {Object.values(subData).reduce((sum, d) => sum + d.units_add, 0).toLocaleString()}
                                                        </td>
                                                    </tr>
                                                    <tr className="units-toggle-row">
                                                        <td colSpan={subs.length + 2}>
                                                            <div className="units-toggle-btns">
                                                                <button className={`units-toggle-btn ${unitsExpanded === 'type' ? 'active' : ''}`}
                                                                    onClick={() => setUnitsExpanded(prev => prev === 'type' ? null : 'type')}>
                                                                    סוג
                                                                </button>
                                                                <button className={`units-toggle-btn ${unitsExpanded === 'status' ? 'active' : ''}`}
                                                                    onClick={() => setUnitsExpanded(prev => prev === 'status' ? null : 'status')}>
                                                                    סטטוס
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    {unitsExpanded === 'type' && (
                                                        <>
                                                            <tr className="units-sub-row">
                                                                <td>התחדשות עירונית</td>
                                                                {subs.map(s => <td key={s}>{subData[s].renewal.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.renewal, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                            <tr className="units-sub-row">
                                                                <td>עיבוי ובניה חדשה</td>
                                                                {subs.map(s => <td key={s}>{subData[s].densification.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.densification, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                        </>
                                                    )}
                                                    {unitsExpanded === 'status' && (
                                                        <>
                                                            <tr className="units-sub-row">
                                                                <td>פתיחת תיק</td>
                                                                {subs.map(s => <td key={s}>{subData[s].status_open.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.status_open, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                            <tr className="units-sub-row">
                                                                <td>מאושר</td>
                                                                {subs.map(s => <td key={s}>{subData[s].status_approved.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.status_approved, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                        </>
                                                    )}
                                                    <tr className="units-total-row">
                                                        <td>סה"כ</td>
                                                        {subs.map(s => (
                                                            <td key={s} style={{color: '#e94560', fontWeight: 700}}>
                                                                {((subData[s].units_in || 0) + subData[s].units_add).toLocaleString()}
                                                            </td>
                                                        ))}
                                                        <td style={{color: '#e94560', fontWeight: 700, background: '#141440'}}>
                                                            {Object.values(subData).reduce((sum, d) => sum + (d.units_in || 0) + d.units_add, 0).toLocaleString()}
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        );
                                    })() : (
                                        <table className="units-table">
                                            <thead>
                                                <tr>
                                                    <th></th>
                                                    {unitsData.minahaks.map(m => (
                                                        <th key={m}
                                                            className="units-minahak-clickable"
                                                            onClick={() => setUnitsDrilldown(m)}
                                                            title={`לחץ לפירוט תת-שכונות ${m}`}
                                                        >{m}</th>
                                                    ))}
                                                    <th style={{background: '#141440', color: '#e94560'}}>סה"כ</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {/* יח"ד קיימות */}
                                                <tr>
                                                    <td>יח"ד קיימות</td>
                                                    {unitsData.minahaks.map(m => (
                                                        <td key={m}>{unitsData.byMinahak[m].units_in.toLocaleString()}</td>
                                                    ))}
                                                    <td style={{background: '#141440'}}>
                                                        {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.units_in, 0).toLocaleString()}
                                                    </td>
                                                </tr>

                                                {/* יח"ד תוספת row */}
                                                <tr>
                                                    <td style={{verticalAlign: 'top'}}>
                                                        <div>יח"ד תוספת</div>
                                                        <div className="units-toggle-btns" style={{marginTop: 4}}>
                                                            <button className={`units-toggle-btn ${unitsExpanded === 'type' ? 'active' : ''}`}
                                                                onClick={() => setUnitsExpanded(prev => prev === 'type' ? null : 'type')}>
                                                                סוג
                                                            </button>
                                                            <button className={`units-toggle-btn ${unitsExpanded === 'status' ? 'active' : ''}`}
                                                                onClick={() => setUnitsExpanded(prev => prev === 'status' ? null : 'status')}>
                                                                סטטוס
                                                            </button>
                                                        </div>
                                                    </td>
                                                    {unitsData.minahaks.map(m => (
                                                        <td key={m} style={{color: '#8ecae6', fontWeight: 600}}>
                                                            {unitsData.byMinahak[m].units_add.toLocaleString()}
                                                        </td>
                                                    ))}
                                                    <td style={{color: '#8ecae6', fontWeight: 700, background: '#141440'}}>
                                                        {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.units_add, 0).toLocaleString()}
                                                    </td>
                                                </tr>

                                                {/* Sub-rows by type */}
                                                {unitsExpanded === 'type' && (
                                                    <>
                                                        <tr className="units-sub-row">
                                                            <td>התחדשות עירונית</td>
                                                            {unitsData.minahaks.map(m => (
                                                                <td key={m}>{unitsData.byMinahak[m].renewal.toLocaleString()}</td>
                                                            ))}
                                                            <td style={{background: '#12122a'}}>
                                                                {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.renewal, 0).toLocaleString()}
                                                            </td>
                                                        </tr>
                                                        <tr className="units-sub-row">
                                                            <td>עיבוי ובניה חדשה</td>
                                                            {unitsData.minahaks.map(m => (
                                                                <td key={m}>{unitsData.byMinahak[m].densification.toLocaleString()}</td>
                                                            ))}
                                                            <td style={{background: '#12122a'}}>
                                                                {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.densification, 0).toLocaleString()}
                                                            </td>
                                                        </tr>
                                                    </>
                                                )}

                                                {/* Sub-rows by status group */}
                                                {unitsExpanded === 'status' && unitsData.statusGroups && unitsData.statusGroups.map(g => (
                                                    <tr key={g.key} className="units-sub-row">
                                                        <td><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:g.color,marginLeft:6,verticalAlign:'middle'}}></span> {g.label}</td>
                                                        {unitsData.minahaks.map(m => (
                                                            <td key={m}>{(unitsData.byMinahak[m].byStatus[g.key] || 0).toLocaleString()}</td>
                                                        ))}
                                                        <td style={{background: '#12122a'}}>
                                                            {Object.values(unitsData.byMinahak).reduce((s, d) => s + (d.byStatus[g.key] || 0), 0).toLocaleString()}
                                                        </td>
                                                    </tr>
                                                ))}

                                                {/* סה"כ */}
                                                <tr className="total-row">
                                                    <td>סה"כ</td>
                                                    {unitsData.minahaks.map(m => {
                                                        const d = unitsData.byMinahak[m];
                                                        return <td key={m}>{(d.units_in + d.units_add).toLocaleString()}</td>;
                                                    })}
                                                    <td style={{background: '#141440'}}>
                                                        {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.units_in + d.units_add, 0).toLocaleString()}
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {minahakReport && (
                        <div className="units-overlay" onClick={() => setMinahakReport(null)}>
                            <div className="units-modal" onClick={e => e.stopPropagation()} style={{maxWidth: 600}}>
                                <button className="units-close" onClick={() => setMinahakReport(null)}>&times;</button>
                                <h2 style={{color:'#fff',fontSize:18,marginBottom:12}}>&#128202; דוח מינהל — {minahakReport}</h2>
                                {(() => {
                                    const gd = geoDataRef.current;
                                    if (!gd.plans) return <p>טוען...</p>;
                                    const rejectedStatuses = ['נגנזה/נדחתה','נגנזה','נדחתה'];
                                    const approvedStatuses = ['אישור','מאושרת','תבע מאושרת','תחילת תוקף'];
                                    const seenPlans = new Set();
                                    const plans = gd.plans.features.filter(f => {
                                        const m = f.properties.minahak || '';
                                        if (m !== minahakReport) return false;
                                        const st = (f.properties.status_mavat || '').trim();
                                        const planId = f.properties.plan_name || '';
                                        // Deduplicate MultiPolygon features (after minahak check)
                                        if (seenPlans.has(planId)) return false;
                                        seenPlans.add(planId);
                                        // Exclude rejected
                                        if (rejectedStatuses.includes(st)) return false;
                                        // Approved statuses: only from 2020+ (by mavat_date)
                                        if (approvedStatuses.includes(st)) {
                                            const dateStr = f.properties.mavat_date || '';
                                            if (dateStr) {
                                                const parts = dateStr.split('/');
                                                const year = parseInt(parts[parts.length - 1]) || 0;
                                                if (year < 2020) return false;
                                            }
                                        }
                                        return true;
                                    });
                                    const totalAdd = plans.reduce((s, f) => s + (parseFloat(f.properties.units_add) || 0), 0);
                                    const top10 = [...plans].sort((a, b) => (parseFloat(b.properties.units_add) || 0) - (parseFloat(a.properties.units_add) || 0)).slice(0, 10);
                                    const statusCounts = {};
                                    plans.forEach(f => {
                                        const s = normalizeStatus((f.properties.status_mavat || '').trim()) || 'לא ידוע';
                                        statusCounts[s] = (statusCounts[s] || 0) + 1;
                                    });
                                    const maxCount = Math.max(...Object.values(statusCounts), 1);
                                    return (
                                        <>
                                            <div style={{display:'flex',gap:30,margin:'16px 0',justifyContent:'center'}}>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:24,fontWeight:'bold',color:'#e94560'}}>{plans.length}</div>
                                                    <div style={{fontSize:12,color:'#aaa'}}>תכניות פעילות</div>
                                                </div>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:24,fontWeight:'bold',color:'#4CAF50'}}>{totalAdd.toLocaleString()}</div>
                                                    <div style={{fontSize:12,color:'#aaa'}}>יח"ד תוספת</div>
                                                </div>
                                            </div>
                                            <h3 style={{color:'#e94560',fontSize:14,marginBottom:8}}>10 תכניות מובילות</h3>
                                            <table style={{width:'100%',fontSize:11,borderCollapse:'collapse'}}>
                                                <thead><tr style={{borderBottom:'1px solid #2a2a4a'}}>
                                                    <th style={{textAlign:'right',padding:4,color:'#fff'}}>שם</th>
                                                    <th style={{textAlign:'center',padding:4,color:'#fff'}}>תוספת יח"ד</th>
                                                    <th style={{textAlign:'center',padding:4,color:'#fff'}}>סטטוס</th>
                                                </tr></thead>
                                                <tbody>
                                                    {top10.map((f, i) => (
                                                        <tr key={i} style={{borderBottom:'1px solid #1a1a2e'}}>
                                                            <td style={{padding:4,color:'#e0e0e0'}}>{f.properties.plan_summary || f.properties.plan_name_he || f.properties.plan_name}</td>
                                                            <td style={{textAlign:'center',padding:4,color:'#4CAF50'}}>{(parseFloat(f.properties.units_add)||0).toLocaleString()}</td>
                                                            <td style={{textAlign:'center',padding:4,color:'#aaa',fontSize:10}}>{f.properties.status_mavat}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            <h3 style={{color:'#e94560',fontSize:14,margin:'12px 0 8px'}}>פילוח לפי סטטוס</h3>
                                            {Object.entries(statusCounts).sort((a,b) => b[1]-a[1]).map(([s, c]) => (
                                                <div key={s} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                                                    <span style={{fontSize:10,color:'#aaa',minWidth:120,textAlign:'right'}}>{s}</span>
                                                    <div style={{flex:1,height:14,background:'#1a1a2e',borderRadius:3}}>
                                                        <div style={{width:(c/maxCount*100)+'%',height:'100%',background:'#e94560',borderRadius:3}}></div>
                                                    </div>
                                                    <span style={{fontSize:10,color:'#e0e0e0',minWidth:20}}>{c}</span>
                                                </div>
                                            ))}
                                        </>
                                    );
                                })()}
                            </div>
                        </div>
                    )}

                    {legendPopup && (
                        <div className="legend-popup-overlay" onClick={() => setLegendPopup(null)}>
                            <div className="legend-popup" onClick={(e) => e.stopPropagation()}>
                                <button className="legend-popup-close" onClick={() => setLegendPopup(null)}>&times;</button>
                                <div className="legend-popup-title">{legendPopup.title}</div>
                                {legendPopup.items.map((item, i) => (
                                    <div className="legend-item" key={i}>
                                        {item.style === 'hatch' ? (
                                            <div className="legend-color" style={{
                                                background: `repeating-linear-gradient(-45deg, transparent, transparent 3px, ${item.color} 3px, ${item.color} 4.5px)`,
                                                border: `2px solid ${item.color}`
                                            }}></div>
                                        ) : item.style === 'outline' ? (
                                            <div className="legend-color" style={{
                                                background: 'transparent',
                                                border: `3px solid ${item.color}`
                                            }}></div>
                                        ) : (
                                            <div className="legend-color" style={{background: item.color}}></div>
                                        )}
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

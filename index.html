                // --- Infrastructure layer (below plans) ---
                if (gd.plans && planningTopics.infrastructure) {
                    const infraLayer = L.geoJSON(gd.plans, {
                        pane: 'infrastructurePane',
                        renderer: L.svg({ pane: 'infrastructurePane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            return normalizePlanType(f.properties.plan_type || '') === 'תשתיות';
                        },
                        style: () => ({ color: '#7b2d8e', weight: 2, fillColor: '#9b59b6', fillOpacity: 0.4 }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => { const el = layer.getElement(); if (el) el.style.pointerEvents = 'auto'; });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: popupMaxWidth() })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.infrastructure = infraLayer;
                }

                // --- Plan 77/78 layer (below plans) ---
                if (gd.plans && planningTopics.plan7778) {
                    const plan7778Layer = L.geoJSON(gd.plans, {
                        pane: 'plan7778Pane',
                        renderer: L.svg({ pane: 'plan7778Pane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const st = normalizeStatus(f.properties.status_mavat || '');
                            return st === 'הכנת הודעה 77/78';
                        },
                        style: () => ({ color: '#c0392b', weight: 2, fillColor: '#e74c3c', fillOpacity: 0.4, dashArray: '6 4' }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => { const el = layer.getElement(); if (el) el.style.pointerEvents = 'auto'; });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: popupMaxWidth() })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.plan7778 = plan7778Layer;
                }

                // --- Archived layer (below plans) ---
                if (gd.plans && planningTopics.archived) {
                    const archivedLayer = L.geoJSON(gd.plans, {
                        pane: 'archivedPane',
                        renderer: L.svg({ pane: 'archivedPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const st = (f.properties.status_mavat || '').trim();
                            return st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה';
                        },
                        style: () => ({ color: '#888', weight: 2, fillColor: '#999', fillOpacity: 0.5, dashArray: '4,4' }),
                        interactive: false
                    }).addTo(map);
                    geoLayersRef.current.archived = archivedLayer;
                }

                // --- Consolidation layer (איחוד וחלוקה) ---
                if (gd.plans && planningTopics.consolidation) {
                    const consolidationLayer = L.geoJSON(gd.plans, {
                        pane: 'consolidationPane',
                        renderer: L.svg({ pane: 'consolidationPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            return normalizePlanType(f.properties.plan_type || '') === 'איחוד וחלוקה';
                        },
                        style: () => ({ color: '#00aa00', weight: 2, fillColor: '#00cc00', fillOpacity: 0.35 }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => { const el = layer.getElement(); if (el) el.style.pointerEvents = 'auto'; });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: popupMaxWidth() })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.consolidation = consolidationLayer;
                }

                // --- Shavaz demolition overlay (public buildings overlapping active plans) ---
                if (planningTopics.shavaz_demolition && gd.shavaz_kayam && gd.plans) {
                    const activePlans = gd.plans.features.filter(f => {
                        const s = normalizeStatus((f.properties.status_mavat || '').trim());
                        return s !== 'נגנזה' && s !== 'נדחתה' && s !== 'נגנזה/נדחתה';
                    });
                    function pipCheck(coords, lng, lat) {
                        let inside = false;
                        for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
                            const xi = coords[i][0], yi = coords[i][1];
                            const xj = coords[j][0], yj = coords[j][1];
                            if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi) inside = !inside;
                        }
                        return inside;
                    }
                    function getOuterRing(geo) {
                        if (geo.type === 'MultiPolygon') return geo.coordinates[0][0];
                        if (geo.type === 'Polygon') return geo.coordinates[0];
                        return null;
                    }
                    function shavazOverlapsPlan(sf) {
                        const sb = L.geoJSON(sf).getBounds();
                        const sCoords = getOuterRing(sf.geometry);
                        if (!sCoords) return false;
                        const sc = sb.getCenter();
                        for (const plan of activePlans) {
                            try {
                                const pb = L.geoJSON(plan).getBounds();
                                if (!sb.intersects(pb)) continue;
                                const pCoords = getOuterRing(plan.geometry);
                                if (!pCoords) continue;
                                const pc = pb.getCenter();
                                if (pipCheck(sCoords, pc.lng, pc.lat)) return true;
                                if (pipCheck(pCoords, sc.lng, sc.lat)) return true;
                            } catch(ex) {}
                        }
                        return false;
                    }
                    const overlapping = { type: 'FeatureCollection', features: gd.shavaz_kayam.features.filter(shavazOverlapsPlan) };
                    const demolitionLayer = L.geoJSON(overlapping, {
                        pane: 'topicsPane',
                        renderer: L.svg({ pane: 'topicsPane' }),
                        style: () => ({ color: '#ff4444', weight: 2, fillOpacity: 0 }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => {
                                const el = layer.getElement();
                                if (el) { el.setAttribute('fill', 'url(#hatch-red)'); el.setAttribute('fill-opacity', '1'); el.style.pointerEvents = 'auto'; }
                            });
                            layer.on('click', () => {
                                const popup = L.popup({ maxWidth: popupMaxWidth(), className: shavazPopupClass(false) })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildShavazPopup(f.properties, false));
                                popup.openOn(map);
                                bindShavazPopupEvents(popup, f.properties, layer.getBounds().getCenter());
                            });
                        }
                    }).addTo(map);
                    demolitionLayer.eachLayer(layer => {
                        const el = layer.getElement();
                        if (el) { el.setAttribute('fill', 'url(#hatch-red)'); el.setAttribute('fill-opacity', '1'); }
                    });
                    geoLayersRef.current.shavaz_demolition = demolitionLayer;
                }

                // Helper: find all overlapping shavaz features at a click point
                function findOverlappingShavaz(clickLatLng) {
                    const allShavaz = [];
                    const checkLayer = (layerGroup, isFut) => {
                        if (!layerGroup) return;
                        layerGroup.eachLayer(sl => {
                            if (!sl.feature || !sl.getBounds) return;
                            try {
                                if (!sl.getBounds().contains(clickLatLng)) return;
                                const contains = leafletPip(sl, clickLatLng);
                                if (contains) allShavaz.push({ properties: sl.feature.properties, isFuture: isFut });
                            } catch(ex) {}
                        });
                    };
                    checkLayer(geoLayersRef.current.shavaz_kayam, false);
                    checkLayer(geoLayersRef.current.future_shavaz, true);
                    return allShavaz;
                }

                function shavazPopupClass(isFuture) {
                    return 'plan-popup shavaz-popup ' + (isFuture ? 'shavaz-future-popup' : 'shavaz-kayam-popup');
                }

                function openShavazPopup(allShavaz, latlng, startIdx) {
                    const idx = startIdx || 0;
                    const entry = allShavaz[idx];
                    const navInfo = allShavaz.length > 1 ? { current: idx, total: allShavaz.length } : null;
                    const popup = L.popup({ maxWidth: popupMaxWidth(), className: shavazPopupClass(entry.isFuture) })
                        .setLatLng(latlng)
                        .setContent(buildShavazPopup(entry.properties, entry.isFuture, false, navInfo));
                    popup.openOn(map);
                    bindShavazPopupEvents(popup, entry.properties, latlng, null, allShavaz, idx);
                }

                // --- Shavaz Kayam (existing public buildings) ---
                if (layers['shavaz_kayam'] && gd.shavaz_kayam) {
                    const shavazKayamLayer = L.geoJSON(gd.shavaz_kayam, {
                        pane: 'shavazPane',
                        style: () => ({ fillColor: '#8B4513', fillOpacity: 0.8, color: '#8B4513', weight: 1 }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const allShavaz = findOverlappingShavaz(e.latlng);
                                if (allShavaz.length === 0) allShavaz.push({ properties: f.properties, isFuture: false });
                                openShavazPopup(allShavaz, e.latlng, 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.shavaz_kayam = shavazKayamLayer;
                }

                // --- Sport Kayam (existing sport facilities as points) ---
                if (layers['sport_kayam'] && gd.sport_kayam) {
                    const sportKayamLayer = L.geoJSON(gd.sport_kayam, {
                        pane: 'stationsPane',
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                            radius: 6, fillColor: '#4CAF50', fillOpacity: 0.9,
                            color: '#1a7a3a', weight: 2
                        }),
                        onEachFeature: (f, layer) => {
                            const name = f.properties.name || f.properties.type || 'מגרש ספורט';
                            layer.bindTooltip(name, { sticky: true, direction: 'right', offset: [8, 0] });
                        }
                    }).addTo(map);
                    geoLayersRef.current.sport_kayam = sportKayamLayer;
                }

                // --- Master plans (Moshavot/Rasko/Baka) — combined per-plan layers ---
                const MASTER_PLAN_CONFIGS = {
                    master_plan_moshavot: { color: '#7e57c2', label: 'תכנית אב מושבות' },
                    master_plan_rasko:    { color: '#1976d2', label: 'תכנית אב רסקו' },
                    master_plan_baka:     { color: '#388e3c', label: 'תכנית אב בקעה' },
                    master_plan_arnona:   { color: '#e65100', label: 'תכנית אב ארנונה' },
                };
                const ZONE_FILL_COLORS = {
                    A: '#ef5350', B: '#42a5f5', C: '#66bb6a', D: '#ffa726',
                    D1: '#ffa726', D2: '#ff7043', E: '#ab47bc', F: '#8d6e63', G: '#78909c',
                };
                const GRADE_COLORS = {
                    'מבנים לשימור א': '#d32f2f',
                    'מבנים לשימור ב': '#f57c00',
                    'מבנים לשימור ג': '#388e3c',
                    'שימור מלא': '#d32f2f',
                    'שימור עם תוספות': '#f57c00',
                    'מבנן לשימור': '#7b1fa2',
                };
                const MERKAM_COLORS = {
                    'אזור שימור מרקמי': '#ffd54f',
                    'שיכונים והתחדשות עירונית': '#90caf9',
                    'שטח ציבורי פתוח מאושר': '#a5d6a7',
                    'שטח ציבורי': '#c5e1a5',
                };
                function buildMasterPlanPopup(p) {
                    const skip = new Set(['feature_type', 'plan_short']);
                    const labels = {
                        plan_name: 'שם תכנית', plan_number: 'מס תכנית', plan_year: 'שנה',
                        area_dunam: 'שטח (דונם)', plan_type: 'סוג', architect: 'אדריכל',
                        adopted_date: 'אומצה', existing_units_total: 'יח״ד קיימות',

                        max_floors: 'מקס׳ קומות', min_floors: 'מינ׳ קומות',
                        far_pct: 'אחוזי בנייה', far_pct_min: 'אחוזי בנייה (מינ׳)', far_pct_max: 'אחוזי בנייה (מקס׳)',
                        coverage_pct: 'תכסית', max_height_m: 'גובה מקסימלי (מ׳)',
                        commercial_frontage: 'חזית מסחרית',
                        existing_units: 'יח״ד קיימות', realistic_units: 'יח״ד ריאלי', realization_pct: 'אחוז מימוש',
                        floors_per_master_plan: 'קומות לפי תכנית אב', real_height_m: 'גובה בפועל (מ׳)',
                        building_floors_existing: 'קומות קיימות', building_year: 'שנת בנייה',
                        street: 'רחוב', house_no: 'מס׳ בית', status: 'סטטוס מבנה',
                        merkam: 'מרקם', conservation_grade: 'דרגת שימור', grade_meaning: 'משמעות',
                        sog: 'סוג / שימור', conservation_level: 'רמת שימור',
                        focus_id: 'מס׳ מוקד', description: 'תיאור', conservation_type: 'סוג שימור',
                        is_strict: 'מחמיר', tama38_units_realistic: 'יח״ד תמ״א 38 (ריאלי)',
                        pinui_binui_units_realistic: 'יח״ד פינוי-בינוי (ריאלי)',
                        related_tba: 'תב״עות קשורות', area_description: 'תיאור אזור',
                        small_units_pct: 'יח״ד קטנות', review_trigger: 'מועד עדכון',
                    };
                    const rows = Object.entries(p)
                        .filter(([k, v]) => !skip.has(k) && v !== '' && v !== null && v !== undefined)
                        .map(([k, v]) => {
                            const label = labels[k] || k;
                            const val = (typeof v === 'boolean') ? (v ? 'כן' : 'לא') : v;
                            return `<div style="margin:2px 0"><b>${label}:</b> ${val}</div>`;
                        }).join('');
                    const heading = p.plan_name || p.zone_name || p.merkam || p.conservation_grade ||
                        ({boundary: 'גבול תכנית', subzone: 'תת-מתחם', building_height: 'גובה מבנה',
                          texture: 'מרקם', conservation_point: 'מבנה לשימור', conservation: 'שימור',
                          special_focus: 'מוקד מיוחד'}[p.feature_type] || 'פרטים');
                    return `<div style="font-family:Assistant;direction:rtl;max-width:300px">` +
                        `<div style="font-weight:bold;font-size:14px;margin-bottom:6px;border-bottom:1px solid #333;padding-bottom:4px">${heading}</div>` +
                        rows + `</div>`;
                }
                // Thematic color palette — same color for the same theme across ALL master plans
                // (e.g. "שימור מחמיר" is dark red whether it's in Moshavot or Baka)
                function masterPlanThemeColor(props) {
                    const ft = props.feature_type;
                    if (ft === 'special_focus') return '#ffeb3b';
                    if (ft === 'conservation') {
                        if (props.is_strict || (props.conservation_type || '').includes('מחמיר')) return '#b71c1c';
                        return '#ef6c00';
                    }
                    const text = (props.character || props.sog || props.merkam || props['אזור'] ||
                                  props.conservation_type || props.zone_name || '').trim();
                    if (!text) return '#bdbdbd';
                    if (/מחמיר|שימור מלא/.test(text)) return '#b71c1c';                                     // strict preservation
                    if (/שימור מרקמי|מרקם היסטורי לשימור|מתחם לשימור|מתחם שימור/.test(text)) return '#fbc02d'; // texture preservation
                    if (/שימור/.test(text)) return '#ef6c00';                                                // general preservation
                    if (/אזור לא לציפוף/.test(text)) return '#90caf9';                                        // no-densification
                    if (/התחדשות|פינוי[\s-]?בינוי|שיכונים/.test(text)) return '#7b1fa2';                       // urban renewal
                    if (/שצ"?פ|שטח ציבורי פתוח|שטח פרטי פטוח|שטח פרטי פתוח/.test(text)) return '#66bb6a';      // open public space
                    if (/מבני ציבור|שב"?צ|מוסדות/.test(text)) return '#2e7d32';                              // public buildings
                    if (/חזית מסחר|מסחרי|מסחר/.test(text)) return '#6d4c41';                                  // commercial frontage
                    if (/דרך|שביל|תנועה|מיתון/.test(text)) return '#757575';                                  // road/path
                    if (/אזורי ליבה|ללא תוספת|תכנית מאושרת/.test(text)) return '#9e9e9e';                     // approved core
                    if (/עד \d+ קומות|מתחם בנייה|מספר קומות/.test(text)) return '#80deea';                    // building zone
                    if (/הנחיות מיוחדות|מתחם מיוחד/.test(text)) return '#ffeb3b';                             // special
                    if (/תוספת מתונה|עיבוי מרקם/.test(text)) return '#ffb74d';                                // moderate addition
                    if (/מגורים/.test(text)) return '#80cbc4';                                                // residential default
                    return '#bdbdbd';
                }

                // Master plan name (Hebrew) per layer key — matches mp_match in compliance JSON
                const MP_NAME_BY_KEY = {
                    master_plan_moshavot: 'מושבות',
                    master_plan_rasko: 'רסקו',
                    master_plan_baka: 'בקעה',
                    master_plan_arnona: 'ארנונה',
                };
                // Feature types we display at zone level (NOT individual buildings)
                const ZONE_FEATURE_TYPES = new Set(['boundary', 'subzone', 'special_focus', 'texture', 'conservation']);
                const COMPLIANCE_FILL = { violation: '#d32f2f', warning: '#f57c00', ok: '#43a047' };

                function buildMasterPlanLayer(layerKey, geojson) {
                    const cfg = MASTER_PLAN_CONFIGS[layerKey];
                    const mpName = MP_NAME_BY_KEY[layerKey];

                    // Zone-level features only (skip building_height + conservation_point)
                    const zoneFc = {
                        type: 'FeatureCollection',
                        features: geojson.features.filter(f => ZONE_FEATURE_TYPES.has(f.properties.feature_type))
                    };

                    const zoneLayer = L.geoJSON(zoneFc, {
                        pane: 'masterPlanPane',
                        style: f => {
                            const ft = f.properties.feature_type;
                            if (ft === 'boundary') {
                                return { color: cfg.color, weight: 3, fillOpacity: 0, dashArray: '6,4' };
                            }
                            const c = masterPlanThemeColor(f.properties);
                            return { color: c, weight: 1, fillColor: c, fillOpacity: 0.85 };
                        },
                        onEachFeature: (f, lyr) => {
                            const html = buildMasterPlanPopup(f.properties);
                            lyr.bindPopup(html, { maxWidth: 320 });
                        }
                    });

                    // Plans (TBA + TMA) being promoted INSIDE this master plan,
                    // colored by compliance (red=violation, orange=warning, green=ok).
                    // Exclude archived/rejected plans (נגנזה / נדחתה) — same as regular plans layer.
                    const compliance = window.__masterPlanCompliance || {};
                    const insidePlans = (gd.plans && gd.plans.features || []).filter(f => {
                        const c = compliance[f.properties.plan_name];
                        if (!c || c.mp_match !== mpName) return false;
                        const status = normalizeStatus((f.properties.status_mavat || '').trim());
                        if (status === 'נגנזה' || status === 'נדחתה' || status === 'נגנזה/נדחתה') return false;
                        return true;
                    });
                    const plansLayer = L.geoJSON({ type: 'FeatureCollection', features: insidePlans }, {
                        pane: 'masterPlanTbaPane',
                        style: f => {
                            const c = compliance[f.properties.plan_name];
                            const fc = COMPLIANCE_FILL[c.mp_status] || '#9e9e9e';
                            return { color: '#111', weight: 1.5, fillColor: fc, fillOpacity: 0.95, dashArray: '' };
                        },
                        onEachFeature: (f, lyr) => {
                            const c = compliance[f.properties.plan_name];
                            const issuesHtml = (c.mp_issues && c.mp_issues.length)
                                ? c.mp_issues.map(i => {
                                    const isViol = i.startsWith('הפרה');
                                    const isWarn = i.startsWith('אזהרה');
                                    const col = isViol ? '#ef5350' : isWarn ? '#ffb74d' : '#90caf9';
                                    return `<div style="font-size:10px;color:${col};margin:2px 0">• ${i}</div>`;
                                }).join('')
                                : '<div style="font-size:11px;color:#9ccc9c">• לא סותר תכנית אב</div>';
                            const sl = { violation: 'הפרה', warning: 'אזהרה', ok: 'לא סותר תכנית אב' }[c.mp_status] || c.mp_status;
                            const sc = COMPLIANCE_FILL[c.mp_status] || '#888';
                            const planType = (f.properties.plan_type || '').trim();
                            const isTama = c.mp_is_tama38 ? '<span style="background:#5dade2;color:white;padding:1px 6px;border-radius:8px;font-size:10px;margin-right:4px">תמ״א 38</span>' : '';
                            const planStatusRaw = (f.properties.status_mavat || '').trim();
                            const planStatus = normalizeStatus(planStatusRaw);
                            const planStatusColor = STATUS_COLORS[planStatus] || '#888';
                            const planNameForNote = f.properties.plan_name || '';
                            const existingNote = (window.__annotations || {})[planNameForNote] || '';
                            // "Why" explanation: tie the rule (from master plan) to the plan's own value
                            const unitsAddRaw = parseFloat(f.properties.units_add) || 0;
                            const ruleParts = [];
                            if (c.mp_is_no_densification) {
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>כלל בתכנית אב:</b> אזור לא לציפוף — אסור להוסיף יח״ד</div>`);
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>מצב בתכנית:</b> תוספת ${Math.round(unitsAddRaw)} יח״ד</div>`);
                            }
                            if (c.mp_cons_a > 0) {
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>כלל בתכנית אב:</b> מבני שימור דרגה א׳ — אסור הריסה ואסור תוספת מעבר למאושר</div>`);
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>נמצא בגבול התכנית:</b> ${c.mp_cons_a} מבני שימור דרגה א׳</div>`);
                            }
                            if (c.mp_cons_b > 0) {
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>כלל בתכנית אב:</b> שימור עם תוספות (דרגה ב׳) — שימור חזית/מסה</div>`);
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>נמצא בגבול התכנית:</b> ${c.mp_cons_b} מבני שימור דרגה ב׳</div>`);
                            }
                            if (c.mp_is_tama38 && (c.mp_cons_a > 0 || c.mp_cons_b > 0)) {
                                ruleParts.push(`<div style="font-size:11px;color:#aaa"><b>כלל תמ״א 38:</b> בתכנית אב זו — מותר רק באגף אחורי, לא על מבנה שימור</div>`);
                            }
                            const ruleBlock = ruleParts.length
                                ? `<div style="margin-top:6px;background:#1a1a2e;padding:6px;border-radius:4px">${ruleParts.join('')}</div>`
                                : '';
                            const planNameSafe = (f.properties.plan_name || '').replace(/"/g, '&quot;');
                            const noteBlock = existingNote
                                ? `<div style="background:#fff4cc;color:#2d3436;padding:6px 8px;border-radius:4px;margin-top:8px;font-size:11px;border-right:3px solid #ffb300">📝 ${existingNote}</div>`
                                : '';
                            // ── New popup design — hierarchy: status banner → identity → context → why → actions ──
                            const tamaBadge = c.mp_is_tama38 ? `<span style="background:#5dade2;color:white;padding:1px 7px;border-radius:8px;font-size:10px;margin-right:6px;vertical-align:middle">תמ״א 38</span>` : '';
                            const statusBanner =
                                `<div style="background:${sc};color:white;padding:6px 10px;display:flex;align-items:center;gap:8px;border-radius:4px 4px 0 0">` +
                                  `<span style="font-size:14px;font-weight:bold">${sl}</span>` +
                                  tamaBadge +
                                  `<span style="font-size:11px;opacity:0.85;margin-right:auto">תכנית אב ${c.mp_match}</span>` +
                                `</div>`;
                            const titleBlock =
                                `<div style="padding:10px 12px 6px 12px;border-bottom:1px solid #2a2a3e">` +
                                  `<div style="font-weight:bold;font-size:14px;line-height:1.3">${f.properties.plan_summary || f.properties.plan_name_he || f.properties.plan_name || 'תכנית'}</div>` +
                                  `<div style="font-size:10px;color:#888;margin-top:3px">${f.properties.plan_name || ''}${planType ? ' · '+planType : ''}` +
                                    (planStatusRaw ? ` · <span style="color:${planStatusColor};font-weight:bold">${planStatusRaw}</span>` : '') +
                                  `</div>` +
                                `</div>`;
                            // Context: master plan area — now also shows what the plan proposes
                            // (floors_max/height_max from Table 5) next to master-plan limits.
                            // The violation check itself lives in compute_master_plan_compliance.py
                            // and arrives here via c.mp_status / c.mp_issues.
                            const planFloorsNum = parseFloat(f.properties.floors_max) || 0;
                            const planHeightNum = parseFloat(f.properties.height_max) || 0;
                            const planValsText =
                                (planFloorsNum > 0 ? `קומות: ${planFloorsNum}` : '') +
                                (planFloorsNum > 0 && planHeightNum > 0 ? ' · ' : '') +
                                (planHeightNum > 0 ? `גובה: ${planHeightNum} מ'` : '');
                            const contextBlock = (c.mp_subzone || c.mp_subzone_max_floors || c.mp_subzone_far_pct || planValsText) ? (
                                `<div style="padding:8px 12px;background:#1a1a2e">` +
                                  `<div style="font-size:10px;color:#7a8a9a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">📍 לפי תכנית האב</div>` +
                                  (c.mp_subzone ? `<div style="font-size:11px;color:#cdd;margin:2px 0">${c.mp_subzone}</div>` : '') +
                                  (c.mp_subzone_max_floors || c.mp_subzone_far_pct ? `<div style="display:flex;gap:14px;font-size:11px;color:#aab;margin-top:4px">` +
                                      (c.mp_subzone_max_floors ? `<span><b>קומות מקס׳:</b> ${c.mp_subzone_max_floors}</span>` : '') +
                                      (c.mp_subzone_far_pct ? `<span><b>FAR:</b> ${c.mp_subzone_far_pct}%</span>` : '') +
                                    `</div>` : '') +
                                  (planValsText ? `<div style="font-size:11px;color:#aab;margin-top:4px"><b>התכנית (טבלה 5):</b> ${planValsText}</div>` : '') +
                                `</div>`
                            ) : '';
                            // Why block — reasons for the determination
                            const whyBlock = (c.mp_issues && c.mp_issues.length) || ruleParts.length ? (
                                `<div style="padding:8px 12px">` +
                                  `<div style="font-size:10px;color:#7a8a9a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">⚖ נימוק</div>` +
                                  issuesHtml +
                                  (ruleParts.length ? `<div style="margin-top:6px;padding:6px 8px;background:#15152a;border-right:2px solid #555;border-radius:3px">${ruleParts.join('')}</div>` : '') +
                                `</div>`
                            ) : '';
                            const actionsBlock =
                                `<div style="padding:8px 12px 10px 12px;display:flex;gap:6px;justify-content:stretch">` +
                                  `<button class="popup-btn-permit" data-action="open-plan-from-mp" data-plan="${planNameSafe}" style="flex:1">פתח תב״ע</button>` +
                                  `<button class="popup-btn-permit" data-action="add-note" data-plan="${planNameSafe}" title="הוסף/עדכן הערה" style="flex:0 0 auto">📝</button>` +
                                `</div>`;
                            const html = `<div style="font-family:Assistant,sans-serif;direction:rtl;width:300px;background:#0f0f20;border-radius:4px;overflow:hidden">` +
                                statusBanner +
                                titleBlock +
                                contextBlock +
                                whyBlock +
                                (existingNote ? `<div style="padding:0 12px">${noteBlock.replace('margin-top:8px','margin-top:0;margin-bottom:8px')}</div>` : '') +
                                actionsBlock +
                                `</div>`;
                            // Open popup directly on click and stop bubbling so the underlying
                            // regular plans layer doesn't replace it with its own popup.
                            // We re-build the popup HTML (so the latest annotation is shown).
                            const renderHtml = () => {
                                const note = (window.__annotations || {})[planNameForNote] || '';
                                return html.replace(
                                    /<div style="background:#ffeaa7[^]*?<\/div>/,
                                    note ? `<div style="background:#ffeaa7;padding:6px;border-radius:4px;margin-top:6px;font-size:11px;color:#2d3436">📝 ${note}</div>` : ''
                                ).replace(
                                    /(<div style="font-family:Assistant)/,
                                    note ? '$1' : '$1'
                                );
                            };
                            lyr.on('click', (e) => {
                                L.DomEvent.stopPropagation(e);
                                const popup = L.popup({ maxWidth: 360, className: 'plan-popup' })
                                    .setLatLng(e.latlng)
                                    .setContent(html)
                                    .openOn(map);
                                setTimeout(() => {
                                    const el = popup.getElement();
                                    if (!el) return;
                                    el.addEventListener('click', (evt) => {
                                        const btn = evt.target.closest('[data-action]');
                                        if (!btn) return;
                                        const action = btn.dataset.action;
                                        if (action === 'open-plan-from-mp') {
                                            evt.stopPropagation();
                                            popup.setContent(buildPlanPopup(f.properties, { properties: f.properties }));
                                            bindPopupEvents(popup, [{ properties: f.properties, type: 'plan' }], 0);
                                        } else if (action === 'add-note') {
                                            evt.stopPropagation();
                                            const planId = btn.dataset.plan;
                                            const current = (window.__annotations || {})[planId] || '';
                                            window.showNoteModal(current).then(function(noteVal) {
                                                if (noteVal !== null) {
                                                    if (!window.__annotations) window.__annotations = {};
                                                    window.__annotations[planId] = noteVal;
                                                    try { localStorage.setItem('plan_annotations', JSON.stringify(window.__annotations)); } catch(e){}
                                                    popup.setContent(renderHtml());
                                                }
                                            });
                                        }
                                    });
                                }, 30);
                            });
                        }
                    });

                    // === TMA-38 points inside this master plan ===
                    // Geometry helpers (kept inline — small)
                    const ringContains = (lng, lat, ring) => {
                        let inside = false;
                        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                            const xi = ring[i][0], yi = ring[i][1];
                            const xj = ring[j][0], yj = ring[j][1];
                            if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
                                inside = !inside;
                            }
                        }
                        return inside;
                    };
                    const pointInGeom = (lng, lat, geom) => {
                        if (!geom) return false;
                        const polys = geom.type === 'Polygon' ? [geom.coordinates] :
                                       geom.type === 'MultiPolygon' ? geom.coordinates : [];
                        for (const poly of polys) {
                            if (poly[0] && ringContains(lng, lat, poly[0])) {
                                let inHole = false;
                                for (let h = 1; h < poly.length; h++) {
                                    if (ringContains(lng, lat, poly[h])) { inHole = true; break; }
                                }
                                if (!inHole) return true;
                            }
                        }
                        return false;
                    };
                    const distM = (a, b) => {
                        const R = 6371000, toRad = d => d * Math.PI / 180;
                        const dLat = toRad(b[1] - a[1]), dLon = toRad(b[0] - a[0]);
                        const x = Math.sin(dLat/2)**2 + Math.cos(toRad(a[1])) * Math.cos(toRad(b[1])) * Math.sin(dLon/2)**2;
                        return 2 * R * Math.asin(Math.sqrt(x));
                    };
                    const gradeOf = (props) => {
                        const g = (props.conservation_grade || '').trim();
                        if (/מחמיר|שימור מלא/.test(g)) return 'א';
                        if (/^מבנה לשימור א/.test(g)) return 'א';
                        if (/^מבנה לשימור ב/.test(g) || /שימור עם תוספות/.test(g) || /מבנן לשימור/.test(g)) return 'ב';
                        if (/^מבנה לשימור ג/.test(g)) return 'ג';
                        if (/^שימור מלא/.test(g)) return 'א';
                        return '';
                    };

                    const boundaryFeat = (geojson.features || []).find(ff => ff.properties.feature_type === 'boundary');
                    const boundaryGeom = boundaryFeat ? boundaryFeat.geometry : null;
                    const consPts = (geojson.features || [])
                        .filter(ff => ff.properties.feature_type === 'conservation_point' && ff.geometry && ff.geometry.coordinates);
                    const tamaInside = [];
                    if (boundaryGeom && gd.tama38 && gd.tama38.features) {
                        gd.tama38.features.forEach(tf => {
                            if (!tf.geometry || !tf.geometry.coordinates) return;
                            const c = tf.geometry.type === 'MultiPoint' ? tf.geometry.coordinates[0] : tf.geometry.coordinates;
                            if (!c) return;
                            const lng = c[0], lat = c[1];
                            if (!pointInGeom(lng, lat, boundaryGeom)) return;
                            // Find nearest conservation point within 30m
                            let nearest = '';
                            let nearestDist = Infinity;
                            for (const cp of consPts) {
                                const cc = cp.geometry.coordinates;
                                const d = distM([lng, lat], cc);
                                if (d < nearestDist && d <= 30) {
                                    nearestDist = d;
                                    nearest = gradeOf(cp.properties);
                                }
                            }
                            let status = 'ok', issue = '';
                            if (nearest === 'א') { status = 'violation'; issue = 'תמ״א 38 על מבנה שימור דרגה א׳ — אסור הריסה ואין הרחבת מעטפת'; }
                            else if (nearest === 'ב') { status = 'warning'; issue = 'תמ״א 38 על/ליד מבנה שימור דרגה ב׳ — מותר רק באגף אחורי, לא בחזית'; }
                            tamaInside.push({ feature: tf, latlng: [lat, lng], status, issue, gradeNearby: nearest });
                        });
                    }

                    const tamaLayer = L.layerGroup();
                    tamaInside.forEach(({ feature, latlng, status, issue, gradeNearby }) => {
                        const fc = COMPLIANCE_FILL[status] || '#888';
                        const m = L.circleMarker(latlng, {
                            pane: 'masterPlanTbaPane',
                            radius: 4, fillColor: fc, fillOpacity: 0.95, color: '#000', weight: 1
                        });
                        m.on('click', (ev) => {
                            L.DomEvent.stopPropagation(ev);
                            const sl = { violation:'הפרה', warning:'אזהרה', ok:'לא סותר תכנית אב' }[status];
                            const sc = COMPLIANCE_FILL[status];
                            const p = feature.properties;
                            const addr = (p.address || '').trim() || 'תמ״א 38';
                            const tik = (p.tik || '').trim();
                            const unitsExis = p.units_exis || '';
                            const unitsTose = p.units_tose || '';
                            const html =
                                `<div style="font-family:Assistant;direction:rtl;max-width:280px;padding:8px 10px">` +
                                `<div style="font-weight:bold;font-size:13px;margin-bottom:4px">תמ״א 38 — ${addr}</div>` +
                                (tik ? `<div style="font-size:11px;color:#999;margin-bottom:6px">תיק ${tik}</div>` : '') +
                                `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">` +
                                  `<span style="background:${sc};color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold">${sl}</span>` +
                                  `<span style="font-size:10px;color:#bbb">תכנית אב ${mpName}</span>` +
                                `</div>` +
                                (unitsExis ? `<div style="font-size:11px;color:#aaa"><b>יח״ד קיימות:</b> ${unitsExis}</div>` : '') +
                                (unitsTose ? `<div style="font-size:11px;color:#aaa"><b>תוספת יח״ד:</b> ${unitsTose}</div>` : '') +
                                (gradeNearby ? `<div style="font-size:11px;color:#aaa"><b>מבנה שימור סמוך:</b> דרגה ${gradeNearby}׳</div>` : '') +
                                (issue ? `<div style="margin-top:6px;font-size:11px;color:${status==='violation'?'#ef5350':'#ffb74d'}">• ${issue}</div>` : `<div style="margin-top:6px;font-size:11px;color:#9ccc9c">• לא סותר תכנית אב</div>`) +
                                `</div>`;
                            L.popup({ maxWidth: 300 }).setLatLng(ev.latlng).setContent(html).openOn(map);
                        });
                        m.addTo(tamaLayer);
                    });

                    const group = L.layerGroup([zoneLayer, plansLayer, tamaLayer]).addTo(map);
                    // Stash the inner plansLayer so popup actions can find sublayers by plan_name
                    group.__plansLayer = plansLayer;
                    group.__tamaCount = tamaInside.length;
                    return group;
                }
                ['master_plan_moshavot', 'master_plan_rasko', 'master_plan_baka', 'master_plan_arnona'].forEach(key => {
                    if (layers[key] && gd[key]) {
                        geoLayersRef.current[key] = buildMasterPlanLayer(key, gd[key]);
                    }
                });

                // --- Future Shavaz (planned public buildings) — sourced from landuse_xplan ---
                if (layers['future_shavaz'] && gd.landuse_xplan) {
                    const SHAVAZ_CODES = new Set([400, 410, 450, 460]);
                    const futureShavazLayer = L.geoJSON(gd.landuse_xplan, {
                        pane: 'shavazPane',
                        filter: f => SHAVAZ_CODES.has(f.properties.mavat_code),
                        style: () => ({ fillColor: '#D2B48C', fillOpacity: 0.4, color: '#8B4513', weight: 1 }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const allShavaz = findOverlappingShavaz(e.latlng);
                                if (allShavaz.length === 0) allShavaz.push({ properties: f.properties, isFuture: true });
                                openShavazPopup(allShavaz, e.latlng, 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.future_shavaz = futureShavazLayer;
                }

                // --- Hafrashah from landuse_xplan (mixed-use parcels with public buildings) ---
                const HAFRASHAH_CODES = new Set([1250, 1300, 1410, 1480, 1492, 1550, 1576, 1578, 1604, 1670]);
                if (layers['hafrashah_future'] && gd.landuse_xplan) {
                    // Get district ring for spatial filtering
                    const distRing = gd.district_oranim && gd.district_oranim.features[0]
                        ? (gd.district_oranim.features[0].geometry.type === 'MultiPolygon'
                            ? gd.district_oranim.features[0].geometry.coordinates[0][0]
                            : gd.district_oranim.features[0].geometry.coordinates[0])
                        : null;
                    const hafrashah = gd.landuse_xplan.features.filter(f => {
                        if (!HAFRASHAH_CODES.has(f.properties.mavat_code)) return false;
                        if (!distRing) return true;
                        // Check centroid inside district
                        const ring = f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates[0][0] : f.geometry.coordinates[0];
                        const cx = ring.reduce((s,c) => s+c[0], 0) / ring.length;
                        const cy = ring.reduce((s,c) => s+c[1], 0) / ring.length;
                        return pointInPolygon([cx, cy], distRing);
                    });
                    // Convert polygons to centroid points
                    const pointFeatures = hafrashah.map(f => {
                        const ring = f.geometry.type === 'MultiPolygon'
                            ? f.geometry.coordinates[0][0]
                            : f.geometry.coordinates[0];
                        // Signed-area centroid — more accurate than bbox center for concave polygons
                        let cx = 0, cy = 0, signedArea = 0;
                        for (let i = 0; i < ring.length - 1; i++) {
                            const a = ring[i][0] * ring[i+1][1] - ring[i+1][0] * ring[i][1];
                            signedArea += a;
                            cx += (ring[i][0] + ring[i+1][0]) * a;
                            cy += (ring[i][1] + ring[i+1][1]) * a;
                        }
                        signedArea *= 0.5;
                        let centroid;
                        if (Math.abs(signedArea) < 1e-10) {
                            centroid = [ring[0][0], ring[0][1]];
                        } else {
                            centroid = [cx / (6 * signedArea), cy / (6 * signedArea)];
                        }
                        return { type: 'Feature', properties: f.properties, geometry: { type: 'Point', coordinates: centroid } };
                    });
                    const pointCollection = { type: 'FeatureCollection', features: pointFeatures };
                    const hafrashaLayer = L.geoJSON(pointCollection, {
                        pane: 'shavazPane',
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                            radius: 5, fillColor: '#9C27B0', fillOpacity: 0.8, color: '#6A1B9A', weight: 1
                        }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', () => {
                                if (areaModeRef.current) return;
                                const popup = L.popup({ maxWidth: popupMaxWidth(), className: shavazPopupClass(true) })
                                    .setLatLng(layer.getLatLng())
                                    .setContent(buildShavazPopup(f.properties, true, false, null, true));
                                popup.openOn(map);
                                const singleShavaz = [{ properties: f.properties, isFuture: true }];
                                bindShavazPopupEvents(popup, f.properties, layer.getLatLng(), null, singleShavaz, 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.hafrashah_future = hafrashaLayer;
                }

                // --- Shared education icon builder ---
                // Shape = סוג מוסד: גני=triangle, יסודי=circle, על יסודי/חט"ב/תיכון=square, מעון=diamond
                // Outline = פיקוח: ממלכתי=blue, ממלכתי דתי=green, ערבי=orange, חרדי=purple
                // Fill = status: yellow=existing/authorized, red=no authorization
                const pikuachStrokes = { 'ממלכתי': '#0d47a1', 'ממלכתי דתי': '#d63384', 'ערבי': '#7b1fa2', 'חרדי': '#1a1a2e' };
                const eduSz = zoomLevel >= 17 ? 18 : 14;
                function eduIcon(sugMosad, pikuach, fill, label) {
                    const stroke = pikuachStrokes[pikuach] || '#555';
                    const sz = eduSz, cx = sz/2, cy = sz/2, sw = zoomLevel >= 17 ? 2 : 1.5;
                    let shape;
                    if (sugMosad === 'גני' || sugMosad === 'גנים') {
                        const m = sw/2+1;
                        const pts = `${cx},${m} ${m},${sz-m} ${sz-m},${sz-m}`;
                        shape = `<polygon points="${pts}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/><polygon points="${pts}" fill="none" stroke="white" stroke-width="1" transform="scale(0.75) translate(${sz*0.167},${sz*0.167})"/>`;
                    } else if (sugMosad === 'על יסודי') {
                        const m = sw/2+1;
                        shape = `<rect x="${m}" y="${m}" width="${sz-2*m}" height="${sz-2*m}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" rx="1"/><rect x="${m+sw}" y="${m+sw}" width="${sz-2*m-2*sw}" height="${sz-2*m-2*sw}" fill="none" stroke="white" stroke-width="1" rx="0"/>`;
                    } else if (sugMosad === 'מעון') {
                        const m = sw/2+1;
                        const pts = `${cx},${m} ${sz-m},${cy} ${cx},${sz-m} ${m},${cy}`;
                        shape = `<polygon points="${pts}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/><polygon points="${cx},${m+sw+1} ${sz-m-sw-1},${cy} ${cx},${sz-m-sw-1} ${m+sw+1},${cy}" fill="none" stroke="white" stroke-width="1"/>`;
                    } else {
                        const r = cx-sw;
                        shape = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/><circle cx="${cx}" cy="${cy}" r="${r-sw}" fill="none" stroke="white" stroke-width="1"/>`;
                    }
                    const showLabel = zoomLevel >= 16 && label;
                    if (showLabel) {
                        const labelH = 16;
                        const totalH = sz + labelH;
                        const labelDiv = `<div style="text-align:center;white-space:nowrap;font-size:11px;font-weight:bold;font-family:Assistant,Arial,sans-serif;color:#000;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,0 -1px 0 #fff,0 1px 0 #fff,-1px 0 0 #fff,1px 0 0 #fff;line-height:${labelH}px;pointer-events:none">${label}</div>`;
                        const svgDiv = `<div style="display:flex;justify-content:center"><svg width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">${shape}</svg></div>`;
                        const html = labelDiv + svgDiv;
                        return L.divIcon({ html, className: '', iconSize: [200, totalH], iconAnchor: [100, totalH - cy] });
                    }
                    const html = `<svg width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">${shape}</svg>`;
                    return L.divIcon({ html, className: '', iconSize: [sz, sz], iconAnchor: [cx, cy] });
                }
                function getSugMosad(p) {
                    // From mosadot_shchuna
                    const shalav = (p['שלב חינוך'] || '').trim();
                    const sug = (p['סוג חינוך'] || '').trim();
                    if (sug === 'גני' || sug === 'גנים') return 'גני';
                    if (shalav === 'על יסודי') return 'על יסודי';
                    return 'יסודי';
                }
                function getSugMosadSara(p) {
                    const sug = (p['סוג מוסד'] || '').trim();
                    if (sug === 'גני') return 'גני';
                    if (sug === 'מעון') return 'מעון';
                    const sugGil = (p['סוג מוסד + שכבת גיל'] || '').trim();
                    if (sugGil.includes('על יסודי') || sugGil.includes('חט"ב') || sugGil.includes('חטיבת') || sugGil.includes('תיכון')) return 'על יסודי';
                    return 'יסודי';
                }
                function getPikuach(p) {
                    const pik = (p['פיקוח'] || '').trim();
                    if (pik) return pik;
                    const zrem = (p['זרם'] || '').trim();
                    if (zrem.includes('ערב')) return 'ערבי';
                    if (zrem.includes('חרד')) return 'חרדי';
                    if (zrem === 'ממ"ד' || zrem.includes('דתי')) return 'ממלכתי דתי';
                    return 'ממלכתי';
                }

                // --- Education declutter: offset overlapping markers ---
                function declutterPoints(geojsonData) {
                    if (!geojsonData || !geojsonData.features) return;
                    const seen = {};
                    const offset = 0.00025; // ~25m
                    geojsonData.features.forEach(f => {
                        if (!f.geometry || f.geometry.type !== 'Point') return;
                        const key = f.geometry.coordinates[0].toFixed(5) + ',' + f.geometry.coordinates[1].toFixed(5);
                        if (!seen[key]) { seen[key] = 0; }
                        else {
                            seen[key]++;
                            const angle = (seen[key] * 2.094); // ~120° apart then spiral
                            f.geometry.coordinates = [
                                f.geometry.coordinates[0] + offset * Math.cos(angle),
                                f.geometry.coordinates[1] + offset * Math.sin(angle)
                            ];
                        }
                    });
                }
                // Declutter both layers
                if (gd.mosadot_shchuna) declutterPoints(gd.mosadot_shchuna);
                if (gd.sara_march_2026) declutterPoints(gd.sara_march_2026);
                // Also declutter across both layers
                if (gd.mosadot_shchuna && gd.sara_march_2026) {
                    const seen = {};
                    const offset = 0.00025;
                    const allFeatures = [...(gd.mosadot_shchuna.features || []), ...(gd.sara_march_2026.features || [])];
                    allFeatures.forEach(f => {
                        if (!f.geometry || f.geometry.type !== 'Point') return;
                        const key = f.geometry.coordinates[0].toFixed(4) + ',' + f.geometry.coordinates[1].toFixed(4);
                        if (!seen[key]) { seen[key] = 0; }
                        else {
                            seen[key]++;
                            const angle = (seen[key] * 1.047); // 60° steps
                            f.geometry.coordinates = [
                                f.geometry.coordinates[0] + offset * Math.cos(angle),
                                f.geometry.coordinates[1] + offset * Math.sin(angle)
                            ];
                        }
                    });
                }

                // --- Education filter helper ---
                function passesEduFilter(sugMosad, pikuach) {
                    const ef = eduFilters;
                    if (ef.sugMosad.length > 0 && !ef.sugMosad.includes(sugMosad)) return false;
                    if (ef.pikuach.length > 0 && !ef.pikuach.includes(pikuach)) return false;
                    return true;
                }

                // --- Mosadot Shchuna (existing education institutions) ---
                if (layers['mosadot_shchuna'] && gd.mosadot_shchuna) {
                    // Strip null geometries before passing to Leaflet
                    const mosadotClean = { ...gd.mosadot_shchuna, features: gd.mosadot_shchuna.features.filter(f => f.geometry && f.geometry.coordinates) };
                    const mosadotLayer = L.geoJSON(mosadotClean, {
                        pane: 'stationsPane',
                        filter: f => f.geometry && passesEduFilter(getSugMosad(f.properties), getPikuach(f.properties)),
                        pointToLayer: (f, latlng) => {
                            const p = f.properties;
                            return L.marker(latlng, { icon: eduIcon(getSugMosad(p), getPikuach(p), '#4CAF50', p['שם מוסד']) });
                        },
                        onEachFeature: (f, layer) => {
                            const p = f.properties;
                            const name = p['שם מוסד'] || '';
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                // Build mosad popup (styled like plans popup)
                                let html = '<div>';
                                html += `<div class="popup-header" style="border-bottom:3px solid #27ae60"><div class="popup-header-title">${name}</div>`;
                                if (p['כתובת'] && p['כתובת'] !== 'None') html += `<div class="popup-header-subtitle">${p['כתובת']}</div>`;
                                html += '</div>';
                                html += '<div class="popup-body" style="padding:8px 16px">';
                                const info = [p['שלב חינוך'], p['פיקוח'], p['סוג חינוך']].filter(v => v && v !== 'None').join(' · ');
                                if (info) html += `<div class="popup-row"><span class="popup-label">סוג</span><span class="popup-value">${info}</span></div>`;
                                const talmidim = p['מספר תלמידים'] && p['מספר תלמידים'] !== 'None' ? Math.round(parseFloat(p['מספר תלמידים'])) : null;
                                if (talmidim) html += `<div class="popup-row"><span class="popup-label">תלמידים</span><span class="popup-value">${talmidim}</span></div>`;
                                const kitotReg = p['כיתות רגילות'] && p['כיתות רגילות'] !== 'None' ? Math.round(parseFloat(p['כיתות רגילות'])) : null;
                                const kitotMek = p['כיתות מקדמות'] && p['כיתות מקדמות'] !== 'None' ? Math.round(parseFloat(p['כיתות מקדמות'])) : null;
                                const totalKitot = (kitotReg || 0) + (kitotMek || 0);
                                if (totalKitot > 0) {
                                    let kitotStr = `${totalKitot}`;
                                    if (kitotMek) kitotStr += ` (${kitotMek} משלבות)`;
                                    html += `<div class="popup-row"><span class="popup-label">כיתות</span><span class="popup-value">${kitotStr}</span></div>`;
                                }
                                if (talmidim && totalKitot > 0) {
                                    const avg = Math.round(talmidim / totalKitot);
                                    html += `<div class="popup-row"><span class="popup-label">ממוצע לכיתה</span><span class="popup-value">${avg}</span></div>`;
                                }
                                html += '</div>';
                                // Check for matching sara projects nearby
                                if (gd.sara_march_2026) {
                                    const latlng = e.latlng;
                                    const nearby = gd.sara_march_2026.features.filter(sf => {
                                        if (!sf.geometry) return false;
                                        const c = sf.geometry.coordinates;
                                        return Math.abs(c[1] - latlng.lat) < 0.0003 && Math.abs(c[0] - latlng.lng) < 0.0003;
                                    });
                                    nearby.forEach(sf => {
                                        const sp = sf.properties;
                                        const sStatus = (sp['סטטוס פרויקט'] || '').trim();
                                        const sHarsha = (sp['סטטוס הרשאה'] || '').trim();
                                        const isN = sStatus.includes('נמסר');
                                        const hasA = sHarsha.includes('מלאה') || sHarsha.includes('חלקית');
                                        const hdrColor = isN ? '#388E3C' : hasA ? '#d4ac0d' : '#c0392b';
                                        html += `<div class="popup-header" style="border-bottom:3px solid ${hdrColor}"><div class="popup-header-title" style="font-size:13px">${sp['שם הפרויקט'] || ''}</div></div>`;
                                        html += '<div class="popup-body" style="padding:6px 16px">';
                                        if (sStatus) html += `<div class="popup-row"><span class="popup-label">סטטוס</span><span class="popup-value">${sStatus}</span></div>`;
                                        if (sHarsha && sHarsha !== 'None') html += `<div class="popup-row"><span class="popup-label">הרשאה</span><span class="popup-value">${sHarsha}</span></div>`;
                                        if (sp['מס כיתות בפרויקט']) html += `<div class="popup-row"><span class="popup-label">כיתות</span><span class="popup-value">${sp['מס כיתות בפרויקט']}</span></div>`;
                                        html += '</div>';
                                    });
                                }
                                html += '</div>';
                                L.popup({ maxWidth: popupMaxWidth(), className: 'plans-popup' }).setLatLng(e.latlng).setContent(html).openOn(map);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.mosadot_shchuna = mosadotLayer;
                }

                // --- Sara March 2026 (education construction projects) ---
                if (layers['sara_march_2026'] && gd.sara_march_2026) {
                    const saraClean = { ...gd.sara_march_2026, features: gd.sara_march_2026.features.filter(f => f.geometry && f.geometry.coordinates) };
                    const saraLayer = L.geoJSON(saraClean, {
                        pane: 'stationsPane',
                        filter: f => f.geometry && passesEduFilter(getSugMosadSara(f.properties), getPikuach(f.properties)),
                        pointToLayer: (f, latlng) => {
                            const p = f.properties;
                            const status = (p['סטטוס פרויקט'] || '').trim();
                            const isNimsar = status.includes('נמסר');
                            const harsha = (p['סטטוס הרשאה'] || '').trim();
                            const hasAuth = harsha.includes('מלאה') || harsha.includes('חלקית') || harsha.includes('לא נדרשת');
                            const fill = isNimsar ? '#4CAF50' : hasAuth ? '#f1c40f' : '#e74c3c';
                            return L.marker(latlng, { icon: eduIcon(getSugMosadSara(p), getPikuach(p), fill, p['שם הפרויקט']) });
                        },
                        onEachFeature: (f, layer) => {
                            const p = f.properties;
                            const name = p['שם הפרויקט'] || '';
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const status = (p['סטטוס פרויקט'] || '').trim();
                                const isNimsar = status.includes('נמסר');
                                const harsha = (p['סטטוס הרשאה'] || '').trim();
                                const hasAuth = harsha.includes('מלאה') || harsha.includes('חלקית') || harsha.includes('לא נדרשת');
                                const headerColor = isNimsar ? '#388E3C' : hasAuth ? '#d4ac0d' : '#c0392b';
                                let html = '<div>';
                                html += `<div class="popup-header" style="border-bottom:3px solid ${headerColor}"><div class="popup-header-title">${name}</div>`;
                                const summary = [p['שכונה'], p['סוג מוסד'], p['מס כיתות בפרויקט'] ? p['מס כיתות בפרויקט'] + ' כיתות' : ''].filter(v => v && v !== 'None').join(' · ');
                                if (summary) html += `<div class="popup-header-subtitle">${summary}</div>`;
                                html += '</div>';
                                html += '<div class="popup-body" style="padding:8px 16px">';
                                if (status) html += `<div class="popup-row"><span class="popup-label">סטטוס</span><span class="popup-value" style="color:${headerColor}">${status}</span></div>`;
                                if (harsha && harsha !== 'None') html += `<div class="popup-row"><span class="popup-label">הרשאה</span><span class="popup-value">${harsha}</span></div>`;
                                const rish = (p['סטטוס רישוי'] || '').trim();
                                if (rish && rish !== 'None') html += `<div class="popup-row"><span class="popup-label">רישוי</span><span class="popup-value">${rish}</span></div>`;
                                if (p['כתובת'] && p['כתובת'] !== 'None' && p['כתובת'] !== '0') html += `<div class="popup-row"><span class="popup-label">כתובת</span><span class="popup-value">${p['כתובת']}</span></div>`;
                                const taba = p['תב"ע'], migrash = p['מגרש'];
                                if (taba && taba !== 'None') html += `<div class="popup-row"><span class="popup-label">תב"ע</span><span class="popup-value">${taba}${migrash && migrash !== 'None' ? ' / ' + migrash : ''}</span></div>`;
                                if (p['גורם מבצע'] && p['גורם מבצע'] !== 'None') html += `<div class="popup-row"><span class="popup-label">מבצע</span><span class="popup-value">${p['גורם מבצע']}</span></div>`;
                                html += '</div>';
                                // Check for matching mosadot nearby
                                if (gd.mosadot_shchuna) {
                                    const latlng = e.latlng;
                                    const nearbyM = gd.mosadot_shchuna.features.filter(mf => {
                                        if (!mf.geometry) return false;
                                        const c = mf.geometry.coordinates;
                                        return Math.abs(c[1] - latlng.lat) < 0.0003 && Math.abs(c[0] - latlng.lng) < 0.0003;
                                    });
                                    nearbyM.forEach(mf => {
                                        const mp = mf.properties;
                                        html += `<div class="popup-header" style="border-bottom:3px solid #27ae60"><div class="popup-header-title" style="font-size:13px">${mp['שם מוסד'] || ''}</div></div>`;
                                        html += '<div class="popup-body" style="padding:6px 16px">';
                                        const mInfo = [mp['שלב חינוך'], mp['פיקוח']].filter(v => v && v !== 'None').join(' · ');
                                        if (mInfo) html += `<div class="popup-row"><span class="popup-label">סוג</span><span class="popup-value">${mInfo}</span></div>`;
                                        if (mp['מספר תלמידים'] && mp['מספר תלמידים'] !== 'None') html += `<div class="popup-row"><span class="popup-label">תלמידים</span><span class="popup-value">${mp['מספר תלמידים']}</span></div>`;
                                        html += '</div>';
                                    });
                                }
                                html += '</div>';
                                L.popup({ maxWidth: popupMaxWidth(), className: 'plans-popup' }).setLatLng(e.latlng).setContent(html).openOn(map);
                            });
                        }

                    geoLayersRef.current.sara_march_2026 = saraLayer;
                }

                // --- Yiud Karka Kayam (existing land use - Jerusalem municipality) ---
                if (layers['yiud_karka_kayam'] && gd.yiud_karka_kayam) {
                    const xplanAlsoOn = layers['landuse_xplan'];
                    const plansAlsoOn = layers['plans'];
                    const yiudKayamLayer = L.geoJSON(gd.yiud_karka_kayam, {

                // --- Landuse XPLAN (land use from MAVAT/XPLAN) ---
                if (layers['landuse_xplan'] && gd.landuse_xplan) {
                    const bothLanduseOn = layers['yiud_karka_kayam'];
                    // When plans layer is also on, hide parcel outlines — user wants plot
                    // subdivisions visible only when the land-use view is shown alone.
                    const plansAlsoOn = layers['plans'];
                    const xplanLayer = L.geoJSON(gd.landuse_xplan, {
                        pane: 'landusePane',

                            const name = (f.properties.mavat_name || '').trim();

                    }).addTo(map);

                }

                // --- Permits overlay ---
                if (layers['permits'] && gd.plans) {
                    const plansOff = !layers['plans'];
                    // Helper: get permits for a taba (same filtering as getPermitsForTaba)
                    function _getPermits(taba) {
                        return getPermitsForTaba(taba);
                    }
                    // Reset label registry — labels are about to be (re)created
                    window.__permitLabels = {};
                    // Group for permit labels (so they toggle with the permits layer)
                    const permitLabelsGroup = L.layerGroup();
                    const permitsLayer = L.geoJSON(gd.plans, {
                        pane: 'permitsPane',

                            if (!planInMinahak(f.properties)) return false;

                            return _getPermits(f.properties.taba).length > 0;
                        },
                        style: f => {
                            const stage = (f.properties.stage || '').trim();
                            const shavazActive = layers['shavaz_kayam'] || layers['future_shavaz'];
                            const stageColor = STAGE_COLORS[stage] || STAGE_COLORS[stage.replace(/ /g, '  ')] || '#5dade2';

                                let allPermits = [];

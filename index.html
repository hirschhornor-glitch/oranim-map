<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אורנים - תכנון עירוני</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
            overflow: hidden;
            height: 100vh;
        }

        #root { height: 100vh; display: flex; }

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: margin-right 0.3s ease;
            z-index: 1000;
            position: relative;
        }

        .sidebar.collapsed {
            margin-right: -320px;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }

        .sidebar-header h1 {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85em;
            color: #a0a0b0;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
        }

        .sidebar-section h3 {
            font-size: 0.9em;
            color: #e94560;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .layer-group-title {
            font-size: 0.8em;
            color: #8888aa;
            margin: 10px 0 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .layer-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }

        .layer-item:hover { background: #2a2a4a; }

        .layer-item input[type="checkbox"] {
            margin-left: 10px;
            accent-color: #e94560;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .layer-item label {
            cursor: pointer;
            font-size: 0.9em;
            flex: 1;
        }

        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; right: 0; bottom: 0; cursor: grab; }
        #map:active { cursor: grabbing; }
        #map .leaflet-interactive { cursor: pointer; }

        .leaflet-control-attribution {
            font-size: 10px !important;
            opacity: 0.5 !important;
        }

        .wms-overlay {
            transition: opacity 0.3s ease;
        }

        .toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: #1a1a2e;
            color: white;
            border: 2px solid #e94560;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-btn:hover { background: #e94560; }

        .leaflet-popup-content {
            direction: rtl;
            text-align: right;
            margin: 0 !important;
            width: 300px !important;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            padding: 0;
            overflow: hidden;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .leaflet-popup-tip { border-top-color: #1a1a2e; }

        .popup-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .popup-header-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 2px;
        }

        .popup-header-subtitle {
            font-size: 12px;
            color: #8899bb;
            font-family: monospace;
        }

        .popup-body {
            padding: 12px 16px;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .popup-row:last-child { border-bottom: none; }

        .popup-row-label {
            font-size: 12px;
            color: #8888aa;
        }

        .popup-row-value {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .popup-footer {
            padding: 10px 16px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .popup-link {
            display: block;
            text-align: center;
            color: #5dade2;
            font-size: 13px;
            text-decoration: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-link:hover { background: #2a2a4a; }

        .popup-btn-permit {
            display: block;
            text-align: center;
            background: #e94560;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-permit:hover { background: #c73650; }

        .popup-btn-back {
            display: block;
            text-align: center;
            background: transparent;
            color: #5dade2;
            font-size: 12px;
            padding: 6px;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;

        .popup-btn-back:hover { background: #2a2a4a; }

        .popup-status-badge {

            color: #5dade2;
            font-size: 12px;
            padding: 2px 8px;

        .permit-detail-header {
            background: linear-gradient(135deg, #2d1a3e, #3d1a2e);

        }

        .leaflet-popup-close-button {

            font-size: 18px !important;
            top: 6px !important;
            right: auto !important;
            left: 8px !important;
        }

        .leaflet-popup-close-button:hover { color: #e94560 !important; }

        .layer-legend-btn {
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            margin-right: auto;
        }
        .layer-legend-btn:hover { color: #e94560; }

        .legend-popup {

            top: 50%;
            right: 330px;
            transform: translateY(-50%);
            background: #1a1a2e;
            border: 1px solid #3a3a5a;

            color: #e94560;
            margin-bottom: 12px;
            text-align: center;
        }
        .legend-popup-close {

            top: 8px;
            left: 8px;
            background: none;
            border: none;
            color: #8888aa;
            font-size: 18px;
            cursor: pointer;
        }
        .legend-popup-close:hover { color: #e94560; }
        .legend-popup-overlay {

            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);

            bottom: 30px;

        }

        .plan-search-input {

            border-radius: 8px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.95em;

        .plan-search-input::placeholder { color: #6a6a8a; }
        .plan-search-input:focus { outline: none; border-color: #e94560; }

        .plan-search-clear {

            left: 8px;
            top: 50%;
            transform: translateY(-50%);

            border: none;
            color: #6a6a8a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;

        .plan-search-clear:hover { color: #e94560; }

        .plan-search-results {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: #1e1e36;
            border: 1px solid #3a3a5a;
            border-top: none;
            border-radius: 0 0 8px 8px;

            overflow-y: auto;
            z-index: 1100;

        .plan-search-item {

            border-bottom: 1px solid #2a2a4a;

            overflow: hidden;

            color: #6a6a8a;
            font-family: monospace;

        .plan-search-empty {

            text-align: center;
            color: #6a6a8a;
            font-size: 13px;
        }

        .opacity-slider {
            width: 100%;
            margin-top: 8px;
            accent-color: #e94560;
            cursor: pointer;
        }

        .opacity-label {
            font-size: 0.8em;
            color: #8888aa;
            display: flex;
            justify-content: space-between;
        }

        .loading-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            z-index: 1000;
            display: none;
        }

        .loading-indicator.visible { display: block; }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85em;
            white-space: nowrap;
            color: #fff;
        }

        .legend-color {
            width: 16px;
            min-width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-left: 8px;
            border: 1px solid #555;
        }

        .basemap-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            cursor: pointer;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            margin-bottom: 8px;
        }

        .search-input::placeholder { color: #6a6a8a; }
        .search-input:focus { outline: none; border-color: #e94560; }

        .status-bar {
            padding: 10px 20px;
            background: #0f0f1e;
            font-size: 0.75em;
            color: #6a6a8a;
            border-top: 1px solid #2a2a4a;
            margin-top: auto;
        }

        .btn-reset {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-reset:hover {
            background: #e94560;
            color: white;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Map cursor overrides */
        .leaflet-container { cursor: grab !important; }
        .leaflet-container:active { cursor: grabbing !important; }
        .leaflet-container.leaflet-drag-target { cursor: grabbing !important; }
        .leaflet-grab { cursor: grab !important; }
        .leaflet-dragging .leaflet-grab { cursor: grabbing !important; }
        .leaflet-control-zoom a, .leaflet-control a { cursor: pointer !important; }
        .leaflet-popup-close-button { cursor: pointer !important; }

    </style>
</head>

                    { id: 'talpiot', name: 'א.ת. תלפיות', on: true, minahak: 'א.ת. תלפיות' },

            }

        const HEBREW_FIELD_NAMES = {

            'area': 'שטח', 'address': 'כתובת', 'street': 'רחוב',
            'number': 'מספר', 'plan_id': 'מס תוכנית', 'plan_name': 'שם תוכנית',
            'description': 'תיאור', 'date': 'תאריך', 'units': 'יחידות',

            'TAVLA': 'תבלי"ת', 'MISPAR': 'מספר', 'SEMEL': 'סמל',
            'SHEM_YESHU': 'שם ישוב', 'MS_TOCHNIT': 'מס תוכנית',
            'SEM_TOCHNIT': 'שם תוכנית', 'MATARA': 'מטרה',
            'TOCHNIT_MATAT': 'תוכנית מתאר', 'STATUS': 'סטטוס',
            'MAVAT_CODE': 'קוד מבא"ת', 'gush': 'גוש', 'helka': 'חלקה',
            'combinedke': 'מפתח משולב', 'created_da': 'תאריך יצירה',
            'created_us': 'נוצר ע"י', 'descr_rova': 'תיאור רובע',
            'fid': 'מזהה', 'last_edi_1': 'עריכה אחרונה',
            'last_edite': 'נערך ע"י', 'name_rova': 'מספר רובע',
            'qc_id': 'מזהה QC', 'supervis_1': 'טלפון פיקוח',
            'supervis_2': 'דוא"ל פיקוח', 'supervisor': 'מפקח',
            'shape_area': 'שטח', 'shape_leng': 'היקף',
            'SHAPE_Area': 'שטח', 'SHAPE_Leng': 'היקף',
            'layer': 'שכבה', 'path': 'נתיב',
        };

        const BASEMAPS = {

                name: 'OpenStreetMap',
                desc: 'מפת רחובות ושמות',

            },

                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

        // Status colors matching QGIS Cloud WMS symbology
        const STATUS_COLORS = {
            'אישור': '#50d25a',
            'מאושרת': '#50d25a',
            'תבע מאושרת': '#50d25a',
            'תבע - טרום אישור': '#50d25a',

            'בהליך אישור': '#50d25a',

            'הפקדה להתנגדויות/השגות': '#f56e05',
            'במילוי תנאים להפקדה': '#f56e05',
            'נפתח תיק למתכנן': '#eb0000',
            'נפתח תיק תב"ע': '#eb0000',
            'בבדיקה תכנונית': '#eb0000',
            'תכנית עומדת בתנאי סף': '#eb0000',
            'נקלטה מקובץ מבאת': '#eb0000',
            'נגנזה': '#888888',
            'נדחתה': '#888888',
        };

        const STAGE_COLORS = {
            'ג-רישוי בתהליך': '#4ba1f0',
            'ג-רישוי  בתהליך': '#4ba1f0',
            'ד-היתר בנייה': '#4b85e0',
            'ה-בבנייה': '#4a69d1',
            'ו-גמר בנייה': '#494cc2',
        };

        // Helper: add ogc: namespace prefix to OGC filter fragments for use inside SLD
        function addOgcNamespace(fragment) {
            if (!fragment) return '';
            return fragment
                .replace(/<PropertyIsEqualTo>/g, '<ogc:PropertyIsEqualTo>')
                .replace(/<\/PropertyIsEqualTo>/g, '</ogc:PropertyIsEqualTo>')
                .replace(/<PropertyIsNotEqualTo>/g, '<ogc:PropertyIsNotEqualTo>')
                .replace(/<\/PropertyIsNotEqualTo>/g, '</ogc:PropertyIsNotEqualTo>')
                .replace(/<PropertyIsGreaterThan>/g, '<ogc:PropertyIsGreaterThan>')
                .replace(/<\/PropertyIsGreaterThan>/g, '</ogc:PropertyIsGreaterThan>')
                .replace(/<PropertyName>/g, '<ogc:PropertyName>')
                .replace(/<\/PropertyName>/g, '</ogc:PropertyName>')
                .replace(/<Literal>/g, '<ogc:Literal>')
                .replace(/<\/Literal>/g, '</ogc:Literal>')
                .replace(/<Or>/g, '<ogc:Or>').replace(/<\/Or>/g, '</ogc:Or>')
                .replace(/<And>/g, '<ogc:And>').replace(/<\/And>/g, '</ogc:And>');
        }

        // SLD for permits: solid opaque fill by STAGE, with border
        function buildPermitsSLD(minahakOgcFragment) {
            const stages = [
                { values: ['ג-רישוי בתהליך', 'ג-רישוי  בתהליך'], color: '#4ba1f0' },
                { values: ['ד-היתר בנייה'], color: '#4b85e0' },
                { values: ['ה-בבנייה'], color: '#4a69d1' },
                { values: ['ו-גמר בנייה'], color: '#494cc2' },
            ];
            let rules = '';
            stages.forEach(s => {
                const stageFilters = s.values.map(v =>
                    `<ogc:PropertyIsEqualTo><ogc:PropertyName>stage</ogc:PropertyName><ogc:Literal>${v}</ogc:Literal></ogc:PropertyIsEqualTo>`
                );
                let stageOgc = stageFilters.length === 1 ? stageFilters[0] : `<ogc:Or>${stageFilters.join('')}</ogc:Or>`;
                let filterBody;
                if (minahakOgcFragment) {
                    const nsMinahak = addOgcNamespace(minahakOgcFragment);
                    filterBody = `<ogc:And>${stageOgc}${nsMinahak}</ogc:And>`;
                } else {
                    filterBody = stageOgc;
                }
                rules += `<Rule><ogc:Filter>${filterBody}</ogc:Filter>` +
                    `<PolygonSymbolizer>` +
                    `<Fill><CssParameter name="fill">${s.color}</CssParameter><CssParameter name="fill-opacity">0.85</CssParameter></Fill>` +
                    `<Stroke><CssParameter name="stroke">${s.color}</CssParameter><CssParameter name="stroke-width">2</CssParameter></Stroke>` +
                    `</PolygonSymbolizer></Rule>`;
            });
            return `<?xml version="1.0" encoding="UTF-8"?>` +
                `<StyledLayerDescriptor version="1.0.0" xmlns="http://www.opengis.net/sld" xmlns:ogc="http://www.opengis.net/ogc" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">` +
                `<NamedLayer><Name>plans</Name><UserStyle><Title>permits_solid</Title>` +
                `<FeatureTypeStyle>${rules}</FeatureTypeStyle>` +
                `</UserStyle></NamedLayer></StyledLayerDescriptor>`;
        }

        // Build topic definitions: filter, color, style type
        function getTopicDefs(planningTopics) {
            const topics = [];
            if (planningTopics.overlapping) {
                topics.push({
                    ogcFilter: ogcGt('overlapping_plans', '0'),
                    color: '#3366ff',
                    style: 'hatch'
                });
            }
            if (planningTopics.densification) {
                const statusVals = ['תחילת תוקף','תבע מאושרת','מאושרת','אישור','בהליך אישור'];
                topics.push({
                    ogcFilter: ogcAnd([
                        ogcOr(statusVals.map(s => ogcEq('status_mavat', s))),
                        ogcGt('units_add', '0')
                    ]),
                    color: '#ff8c00',
                    style: 'hatch'
                });
            }
            if (planningTopics.objections) {
                topics.push({
                    ogcFilter: ogcEq('status_mavat', 'הפקדה להתנגדויות/השגות'),
                    color: '#dd0000',
                    style: 'outline'
                });
            }
            return topics;
        }

        // SLD for topics: solid fill (hatching via CSS mask) or outline-only
        // FILTER param pre-filters to only matching features, so no ElseFilter needed
        function buildTopicsSLD(topicDefs, minahakOgcFragment) {
            if (topicDefs.length === 0) return null;
            const nsMinahak = minahakOgcFragment ? addOgcNamespace(minahakOgcFragment) : null;
            let rules = '';
            topicDefs.forEach(t => {
                const nsFilter = addOgcNamespace(t.ogcFilter);
                let filterBody = nsMinahak ? `<ogc:And>${nsFilter}${nsMinahak}</ogc:And>` : nsFilter;
                if (t.style === 'outline') {
                    rules += `<Rule><ogc:Filter>${filterBody}</ogc:Filter>` +
                        `<PolygonSymbolizer>` +
                        `<Stroke><CssParameter name="stroke">${t.color}</CssParameter><CssParameter name="stroke-width">3</CssParameter></Stroke>` +
                        `</PolygonSymbolizer></Rule>`;
                } else {
                    // Solid fill — CSS mask-image will create the hatching pattern
                    rules += `<Rule><ogc:Filter>${filterBody}</ogc:Filter>` +
                        `<PolygonSymbolizer>` +
                        `<Fill><CssParameter name="fill">${t.color}</CssParameter><CssParameter name="fill-opacity">0.7</CssParameter></Fill>` +
                        `<Stroke><CssParameter name="stroke">${t.color}</CssParameter><CssParameter name="stroke-width">2</CssParameter></Stroke>` +
                        `</PolygonSymbolizer></Rule>`;
                }
            });
            return `<?xml version="1.0" encoding="UTF-8"?>` +
                `<StyledLayerDescriptor version="1.0.0" xmlns="http://www.opengis.net/sld" xmlns:ogc="http://www.opengis.net/ogc" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">` +
                `<NamedLayer><Name>plans</Name><UserStyle><Title>topics</Title>` +
                `<FeatureTypeStyle>${rules}</FeatureTypeStyle>` +
                `</UserStyle></NamedLayer></StyledLayerDescriptor>`;
        }

        // Build OGC FILTER for pre-filtering matching features (OR of all active topics)
        function buildTopicsFilter(topicDefs, minahakOgcFragment) {
            if (topicDefs.length === 0) return null;
            const parts = topicDefs.map(t => t.ogcFilter);
            let combined = parts.length === 1 ? parts[0] : ogcOr(parts);
            if (minahakOgcFragment) combined = ogcAnd([combined, minahakOgcFragment]);
            return `(${ogcFilter(combined)})`;
        }

        const PLANS_LEGEND = [
            { label: 'אישור / מאושרת', color: '#50d25a' },
            { label: 'בהליך אישור', color: '#50d25a' },
            { label: 'התנגדויות', color: '#fafa3c' },
            { label: 'הפקדה', color: '#f56e05' },
            { label: 'במילוי תנאים להפקדה', color: '#f56e05' },
            { label: 'פתיחת תיק / בבדיקה', color: '#eb0000' },
        ];

        const PERMITS_LEGEND = [
            { label: 'ג-רישוי בתהליך', color: '#4ba1f0' },
            { label: 'ד-היתר בנייה', color: '#4b85e0' },
            { label: 'ה-בבנייה', color: '#4a69d1' },
            { label: 'ו-גמר בנייה', color: '#494cc2' },
        ];

        const TOPICS_LEGEND = [
            { label: 'תבעות כפולות על אותו מרחב', color: '#3366ff', style: 'hatch' },
            { label: 'תכניות לעיבוי שטחים חומים', color: '#ff8c00', style: 'hatch' },
            { label: 'תכניות המופקדות להתנגדויות', color: '#dd0000', style: 'outline' },
        ];

        // Minahak -> sub-neighborhoods mapping (for tama38 filtering)
        const MINAHAK_SUBS = {
            'א.ת. תלפיות': ['א.ת. תלפיות', 'איתרי', 'תלפיות - תעשייה ומסחר'],
            'בית צפאפא': ['בית צפאפא', 'בית צפאפא,שרפת', 'גבעת השקד', 'טנטור'],
            'בקעה רבתי': ['ארנונה', 'בקעה', 'גבעת חנניה - אבו תור', 'מקור חיים', 'מתחם הרכבת', 'צפון תלפיות', 'שיכוני תלפיות', 'תלפיות', 'תלפיות ארנונה'],
            // 'גבעת המטוס': ['גבעת המטוס'], // no WMS layer available
            'גוננים': ['גוננים א-ו', 'פת', 'קטמונים', 'קטמונים ח-ט', 'רסקו', 'רסקו - גבעת הורדים'],
            'גינות העיר': ['המושבה היוונית', 'ניות', 'עמק רפאים - המושבה הגרמנית', 'קוממיות - טלביה', 'קטמון הישנה', 'רחביה'],
            'מינהל מוסדי מלחה': ['מרכז ספורט מנחת - מלחה'],
        };

        const CENTER = [31.7530, 35.2100];
        const DEFAULT_ZOOM = 15;

        // Helper: build OGC XML filter for a single property equality
        function ogcEq(prop, val) {
            return `<PropertyIsEqualTo><PropertyName>${prop}</PropertyName><Literal>${val}</Literal></PropertyIsEqualTo>`;
        }
        function ogcNeq(prop, val) {
            return `<PropertyIsNotEqualTo><PropertyName>${prop}</PropertyName><Literal>${val}</Literal></PropertyIsNotEqualTo>`;
        }
        function ogcGt(prop, val) {
            return `<PropertyIsGreaterThan><PropertyName>${prop}</PropertyName><Literal>${val}</Literal></PropertyIsGreaterThan>`;
        }
        function ogcOr(parts) { return parts.length === 1 ? parts[0] : `<Or>${parts.join('')}</Or>`; }
        function ogcAnd(parts) { return parts.length === 1 ? parts[0] : `<And>${parts.join('')}</And>`; }
        function ogcFilter(body) { return `<Filter>${body}</Filter>`; }

        // Build multi-layer FILTER param: (filter1)(filter2)... empty () means no filter
        function buildMultiFilter(layersCsv, filterMap) {
            const layers = layersCsv.split(',');
            const parts = layers.map(l => {
                const f = filterMap[l];
                return f ? `(${ogcFilter(f)})` : '()';
            });
            // If no filters at all, return null
            if (parts.every(p => p === '()')) return null;
            return parts.join('');
        }

        // Helper: build a WMS GetMap URL for the current map view
        // opts: { sldBody } for SLD_BODY styling
        function buildWmsUrl(baseUrl, layersCsv, bounds, size, ogcFilterStr, opts) {
            const sw = bounds.getSouthWest();
            const ne = bounds.getNorthEast();
            const params = new URLSearchParams({
                SERVICE: 'WMS',
                VERSION: '1.3.0',
                REQUEST: 'GetMap',
                LAYERS: layersCsv,
                CRS: 'EPSG:4326',
                BBOX: [sw.lat, sw.lng, ne.lat, ne.lng].join(','),
                WIDTH: Math.round(size.x),
                HEIGHT: Math.round(size.y),
                FORMAT: 'image/png',
                TRANSPARENT: 'true',
                DPI: 96
            });
            if (ogcFilterStr) {
                params.set('FILTER', ogcFilterStr);
            }
            if (opts && opts.sldBody) {
                // Keep FILTER if present - FILTER pre-filters features, SLD styles them
                params.set('SLD_BODY', opts.sldBody);
            }
            return baseUrl + '?' + params.toString();
        }

        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [layers, setLayers] = useState(() => {
                const initial = {};
                Object.values(LAYER_CONFIG).forEach(group => {
                    group.layers.forEach(l => { initial[l.id] = l.on; });
                });
                return initial;
            });
            const [opacity, setOpacity] = useState(0.85);
            const [basemap, setBasemap] = useState('cartoLight');
            const [loading, setLoading] = useState(false);
            const [loadingBuildings, setLoadingBuildings] = useState(false);
            const [cursorPos, setCursorPos] = useState(null);
            const [searchText, setSearchText] = useState('');
            const [planSearch, setPlanSearch] = useState('');
            const [planIndex, setPlanIndex] = useState([]);
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [planningTopics, setPlanningTopics] = useState({
                overlapping: false,   // תבעות כפולות על אותו מרחב
                densification: false, // תכניות לעיבוי שטחים חומים
                objections: false     // תכניות המופקדות להתנגדויות
            });
            const [legendPopup, setLegendPopup] = useState(null); // { title, items }
            const [mapScale, setMapScale] = useState('');

            // Load plan search index
            useEffect(() => {
                fetch('plans_index.json')
                    .then(res => res.json())
                    .then(data => setPlanIndex(data))
                    .catch(err => console.error('Failed to load plan index:', err));
            }, []);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const wmsLayerRef = useRef(null);
            const baseTileRef = useRef(null);

            // Initialize map
            useEffect(() => {
                if (mapInstanceRef.current) return;

                const map = L.map('map', {
                    center: CENTER,
                    zoom: DEFAULT_ZOOM,
                    zoomControl: false,
                    maxZoom: 22,
                    minZoom: 13
                });

                L.control.zoom({ position: 'topleft' }).addTo(map);
                L.control.scale({ position: 'bottomleft', imperial: false }).addTo(map);

                map.on('mousemove', (e) => {
                    setCursorPos({ lat: e.latlng.lat.toFixed(5), lng: e.latlng.lng.toFixed(5) });
                });

                // Scale indicator
                const updateScale = () => {
                    const center = map.getCenter();
                    const metersPerPixel = 40075016.686 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, map.getZoom() + 8);
                    const dpi = 96;
                    const metersPerInch = metersPerPixel * dpi;
                    const scale = Math.round(metersPerInch * 39.3701);
                    setMapScale('1:' + scale.toLocaleString());
                };
                map.on('zoomend moveend', updateScale);
                setTimeout(updateScale, 200);

                mapInstanceRef.current = map;
                window.__map = map;

                // Ensure map fills container after initial render
                setTimeout(() => map.invalidateSize(), 100);

                return () => { map.remove(); mapInstanceRef.current = null; };
            }, []);

            // Update basemap
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                if (baseTileRef.current) {
                    map.removeLayer(baseTileRef.current);
                    baseTileRef.current = null;
                }

                const bm = BASEMAPS[basemap];
                if (bm.url) {
                    baseTileRef.current = L.tileLayer(bm.url, {
                        attribution: bm.attribution,
                        maxZoom: 22
                    }).addTo(map);
                    baseTileRef.current.bringToBack();
                }
            }, [basemap]);

            // WMS overlays split by priority:
            // 1. High priority: plans + always-on + non-buildings layers (loads first)
            // 2. Low priority: buildings layer (loads with 1s delay)
            // 3. Separate: permits (CQL filtered)
            // All use double-buffering to keep old image while new loads.
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                // Clean up previous
                if (wmsLayerRef.current) {
                    const r = wmsLayerRef.current;
                    [r.mainFront, r.mainBack, r.bldgFront, r.bldgBack, r.permitFront, r.permitBack, r.hatchFront, r.hatchBack]
                        .forEach(o => { if (o) map.removeLayer(o); });
                    map.off('moveend', r.handler);
                    clearTimeout(r.debounceTimer);
                    clearTimeout(r.bldgDelayTimer);
                    wmsLayerRef.current = null;
                }

                // Expand combined layers (e.g. rakl -> rakl + rakl_src)
                const combinedMap = {};
                Object.values(LAYER_CONFIG).forEach(g =>
                    g.layers.forEach(l => { if (l.combined) combinedMap[l.id] = l.combined; })
                );
                const toggledLayers = Object.entries(layers)
                    .filter(([id, on]) => on && id !== 'permits' && id !== 'buildings')
                    .flatMap(([id]) => combinedMap[id] || [id]);
                const mainLayers = [...new Set([...ALWAYS_ON_LAYERS, ...toggledLayers])];
                const showBuildings = layers['buildings'];
                const showPermits = layers['permits'];

                if (mainLayers.length === 0 && !showBuildings && !showPermits) return;

                // --- Minahak spatial filter (OGC XML) ---
                const adminLayers = LAYER_CONFIG.admin.layers;
                const allAdminOn = adminLayers.every(l => layers[l.id]);
                const selectedMinahaks = adminLayers.filter(l => layers[l.id]).map(l => l.minahak);

                // Build OGC filter fragments for minahak
                let minahakPlansOgc = null;
                let minahakTama38Ogc = null;
                if (!allAdminOn && selectedMinahaks.length > 0) {
                    // OR of PropertyIsEqualTo for each selected minahak
                    minahakPlansOgc = ogcOr(selectedMinahaks.map(m => ogcEq('minahak', m)));
                    // For tama38: collect sub-neighborhoods
                    const subs = selectedMinahaks.flatMap(m => MINAHAK_SUBS[m] || []);
                    if (subs.length > 0) {
                        minahakTama38Ogc = ogcOr(subs.map(s => ogcEq('neighborho', s)));
                    }
                } else if (selectedMinahaks.length === 0) {
                    // None selected - impossible filter to hide all
                    minahakPlansOgc = ogcEq('minahak', '__NONE__');
                    minahakTama38Ogc = ogcEq('neighborho', '__NONE__');
                }

                // Plans OGC filter: only minahak spatial filter (topics are separate hatching overlay)
                const plansOgc = minahakPlansOgc || null;
                const tama38Ogc = minahakTama38Ogc;

                // Build multi-layer FILTER param
                const filterMap = {};
                if (plansOgc) filterMap['plans'] = plansOgc;
                if (tama38Ogc) filterMap['tama38'] = tama38Ogc;
                const mainOgcFilter = buildMultiFilter(mainLayers.join(','), filterMap);

                const mainCsv = mainLayers.join(',');
                let size = map.getSize();
                // Skip if map not yet sized (initial render)
                if (size.x === 0 || size.y === 0) {
                    const retry = setTimeout(() => {
                        map.invalidateSize();
                        // Trigger re-render by firing moveend
                        map.fire('moveend');
                    }, 300);
                    return () => clearTimeout(retry);
                }
                const bounds = map.getBounds();

                console.log('[WMS] Main layers:', mainCsv);
                console.log('[WMS] OGC FILTER:', mainOgcFilter || '(none)');
                if (showPermits) console.log('[WMS] Permits ON with SLD_BODY');

                // --- High priority: main layers (plans, always-on, roads, etc.) ---
                let mainFront = null, mainBack = null;
                if (mainLayers.length > 0) {
                    mainFront = L.imageOverlay(
                        buildWmsUrl(WMS_URL, mainCsv, bounds, size, mainOgcFilter), bounds,
                        { opacity, interactive: false, className: 'wms-overlay' }
                    ).addTo(map);
                }

                // --- Low priority: buildings (delayed 1s) ---
                let bldgFront = null, bldgBack = null, bldgDelayTimer = null;
                if (showBuildings) {
                    setLoadingBuildings(true);
                    bldgDelayTimer = setTimeout(() => {
                        bldgFront = L.imageOverlay(
                            buildWmsUrl(WMS_URL, 'buildings', bounds, size), bounds,
                            { opacity, interactive: false, className: 'wms-overlay' }
                        ).addTo(map);
                        bldgFront.bringToBack();
                        const el = bldgFront.getElement();
                        if (el) {
                            el.onload = () => setLoadingBuildings(false);
                            el.onerror = () => setLoadingBuildings(false);
                        }
                    }, 1000);
                }

                // --- Topics overlay (zIndex 450, above plans, below permits) ---
                // Uses FILTER to pre-filter features + SLD for coloring + CSS mask for hatching
                let hatchFront = null, hatchBack = null;
                const topicDefs = getTopicDefs(planningTopics);
                const topicsSLD = buildTopicsSLD(topicDefs, minahakPlansOgc);
                const topicsFilter = buildTopicsFilter(topicDefs, minahakPlansOgc);
                const hasHatchTopics = topicDefs.some(t => t.style === 'hatch');
                if (topicsSLD) {
                    console.log('[WMS] Topics ON, FILTER:', topicsFilter);
                    hatchFront = L.imageOverlay(
                        buildWmsUrl(WMS_URL, 'plans', bounds, size, topicsFilter, { sldBody: topicsSLD }),
                        bounds, { opacity: 1, interactive: false, className: 'wms-overlay wms-hatch', zIndex: 450 }
                    ).addTo(map);
                    const hatchEl = hatchFront.getElement();
                    if (hatchEl) {
                        hatchEl.style.zIndex = '450';
                        if (hasHatchTopics) {
                            hatchEl.style.maskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                            hatchEl.style.webkitMaskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                        }
                    }
                }

                // --- Permits overlay (solid opaque fill via SLD_BODY, above everything, zIndex 500) ---
                let permitFront = null, permitBack = null;
                const permitSLD = buildPermitsSLD(minahakPlansOgc);
                if (showPermits) {
                    console.log('[WMS] Permits ON with SLD solid fill');
                    permitFront = L.imageOverlay(
                        buildWmsUrl(WMS_URL, 'plans', bounds, size, null, { sldBody: permitSLD }),
                        bounds, { opacity: 1, interactive: false, className: 'wms-overlay wms-permits', zIndex: 500 }
                    ).addTo(map);
                    const permitEl = permitFront.getElement();
                    if (permitEl) permitEl.style.zIndex = '500';
                }

                let debounceTimer = null;

                // Helper: double-buffer swap for an overlay pair
                function swapOverlay(url, b, frontRef, backRef, onSwapped) {
                    if (backRef.current) map.removeLayer(backRef.current);
                    backRef.current = L.imageOverlay(url, b, {
                        opacity: 0, interactive: false, className: 'wms-overlay'
                    }).addTo(map);
                    const el = backRef.current.getElement();
                    if (el) {
                        el.onload = () => {
                            backRef.current.setOpacity(opacity);
                            if (frontRef.current) map.removeLayer(frontRef.current);
                            frontRef.current = backRef.current;
                            backRef.current = null;
                            onSwapped();
                        };
                        el.onerror = () => {
                            if (backRef.current) map.removeLayer(backRef.current);
                            backRef.current = null;
                            onSwapped();
                        };
                    }
                }

                // Mutable refs for the swap helper
                const mf = { current: mainFront }, mb = { current: mainBack };
                const bf = { current: bldgFront }, bb = { current: bldgBack };
                const pf = { current: permitFront }, pb = { current: permitBack };
                const hf = { current: hatchFront }, hb = { current: hatchBack };

                function onMoveEnd() {
                    clearTimeout(debounceTimer);
                    clearTimeout(bldgDelayTimer);
                    debounceTimer = setTimeout(() => {
                        const b = map.getBounds();
                        const s = map.getSize();
                        if (s.x === 0 || s.y === 0) return;

                        let pending = 0;
                        const checkDone = () => { if (--pending <= 0) setLoading(false); };
                        setLoading(true);

                        // High priority: main layers
                        if (mainLayers.length > 0) {
                            pending++;
                            swapOverlay(buildWmsUrl(WMS_URL, mainCsv, b, s, mainOgcFilter), b, mf, mb, checkDone);
                        }

                        // Topics overlay (zIndex 450, FILTER+SLD+CSS mask)
                        if (topicsSLD) {
                            pending++;
                            swapOverlay(
                                buildWmsUrl(WMS_URL, 'plans', b, s, topicsFilter, { sldBody: topicsSLD }),
                                b, hf, hb, () => {
                                    if (hf.current) {
                                        const el = hf.current.getElement();
                                        if (el) {
                                            el.style.zIndex = '450';
                                            if (hasHatchTopics) {
                                                el.style.maskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                                                el.style.webkitMaskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                                            }
                                        }
                                        hf.current.setOpacity(1);
                                    }
                                    checkDone();
                                }
                            );
                        }

                        // Permits (solid fill above everything, zIndex 500)
                        if (showPermits) {
                            pending++;
                            swapOverlay(
                                buildWmsUrl(WMS_URL, 'plans', b, s, null, { sldBody: permitSLD }),
                                b, pf, pb, () => {
                                    if (pf.current) {
                                        const el = pf.current.getElement();
                                        if (el) el.style.zIndex = '500';
                                        pf.current.setOpacity(1);
                                    }
                                    checkDone();
                                }
                            );
                        }

                        if (pending === 0) setLoading(false);

                        // Low priority: buildings with 1s delay
                        if (showBuildings) {
                            setLoadingBuildings(true);
                            bldgDelayTimer = setTimeout(() => {
                                swapOverlay(
                                    buildWmsUrl(WMS_URL, 'buildings', b, s), b, bf, bb,
                                    () => setLoadingBuildings(false)
                                );
                                if (bf.current) bf.current.bringToBack();
                            }, 1000);
                        }
                    }, 300);
                }

                map.on('moveend', onMoveEnd);

                wmsLayerRef.current = {
                    get mainFront() { return mf.current; },
                    get mainBack() { return mb.current; },
                    get bldgFront() { return bf.current; },
                    get bldgBack() { return bb.current; },
                    get permitFront() { return pf.current; },
                    get permitBack() { return pb.current; },
                    get hatchFront() { return hf.current; },
                    get hatchBack() { return hb.current; },
                    handler: onMoveEnd,
                    debounceTimer,
                    bldgDelayTimer
                };
            }, [layers, opacity, planningTopics]);

            // Build the plan popup HTML
            function getStatusColor(status) {
                return STATUS_COLORS[status] || '#5dade2';
            }

            function buildPlanPopup(props, featureData) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const subtitle = props.plan_name || props.taba || '';
                const status = props.status_mavat || '';
                const statusColor = getStatusColor(status);
                const unitsIn = props.units_in || '-';
                const unitsTotal = props.units_total || '-';
                const unitsAdd = props.units_add != null ? props.units_add : '-';
                const unitsAddDisplay = unitsAdd !== '-' && unitsAdd !== 0 ? '+' + unitsAdd : unitsAdd;
                const mavatUrl = props.mavat_url || '';
                const hasPermit = props.stage && props.stage.trim() !== '';

                let html = '<div>';
                // Header
                html += '<div class="popup-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${status || '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד נכנס</span><span class="popup-row-value">${unitsIn}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד יוצא</span><span class="popup-row-value">${unitsTotal}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsAddDisplay}</span></div>`;
                html += '</div>';
                // Footer
                html += '<div class="popup-footer">';
                if (mavatUrl) {
                    html += `<a class="popup-link" href="${mavatUrl}" target="_blank" rel="noopener">\u2190 צפה במבא"ת</a>`;
                }
                if (hasPermit) {
                    html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}'>להיתר \u2190</button>`;
                }
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Build the permit details popup HTML
            function buildPermitPopup(props, featureData) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const planName = props.plan_name || props.taba || '';
                const permitNum = props.building_permit || '-';
                const subtitle = [planName, permitNum !== '-' ? permitNum : null].filter(Boolean).join(' | ');
                const stage = props.stage || '-';
                const stageColor = STAGE_COLORS[stage] || '#5dade2';
                const requestType = props.request_type || props.mahut_bakasha || '-';
                const permitDate = props.permit_date || props.permit_date_data || '-';
                const permitAddition = props.permit_addition || '-';
                const permitAddDisplay = permitAddition !== '-' && permitAddition !== 0 ? '+' + permitAddition : permitAddition;

                let html = '<div>';
                // Header
                html += '<div class="permit-detail-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">שלב</span><span class="popup-status-badge" style="background:${stageColor}33;color:${stageColor};border:1px solid ${stageColor}">${stage}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">מהות הבקשה</span><span class="popup-row-value" style="font-size:11px;max-width:180px;text-align:left">${requestType}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך היתר</span><span class="popup-row-value">${permitDate}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת בהיתר</span><span class="popup-row-value">${permitAddDisplay}</span></div>`;
                html += '</div>';
                // Footer - back button styled red with left arrow
                html += '<div class="popup-footer">';
                html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}' data-action="back-to-plan">\u2192 לתב"ע</button>`;
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Build the tama38 popup HTML
            function buildTama38Popup(props) {
                const title = props.address || 'תמ"א 38';
                const subtitle = props.neighborho ? `שכונה: ${props.neighborho}` : '';
                const status = props.status || '';
                const status1 = props.status_1 || '';
                const displayStatus = status || status1 || '-';
                const harisaa = props.harisaa || '-';
                const unitsExist = props.units_exis != null ? props.units_exis : '-';
                const unitsTose = props.units_tose != null ? props.units_tose : '-';
                const tik = props.tik || '-';
                const dateOpen = props.open_ || '-';
                const dateApproval = props.date || '-';
                const comment = props.comment || '';

                // Status color for tama38
                const statusColor = displayStatus.includes('היתר') ? '#50d25a' :
                    displayStatus.includes('אושר') ? '#50d25a' :
                    displayStatus.includes('הופק') ? '#50d25a' :
                    displayStatus.includes('בנייה') ? '#4a69d1' :
                    displayStatus.includes('נפתח') ? '#f56e05' :
                    displayStatus.includes('בתהליך') ? '#4ba1f0' :
                    '#5dade2';

                let html = '<div>';
                html += '<div class="popup-header" style="border-right:4px solid #e94560">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += `<div class="popup-header-subtitle" style="font-size:10px;opacity:0.6">תמ"א 38</div>`;
                html += '</div>';
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${displayStatus}</span></div>`;
                if (status1 && status1 !== status && status1 !== '-') {
                    html += `<div class="popup-row"><span class="popup-row-label">סטטוס משני</span><span class="popup-row-value">${status1}</span></div>`;
                }
                html += `<div class="popup-row"><span class="popup-row-label">הריסה</span><span class="popup-row-value">${harisaa}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד קיימות</span><span class="popup-row-value">${unitsExist}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsTose !== '-' ? '+' + unitsTose : '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תיק</span><span class="popup-row-value">${tik}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך פתיחה</span><span class="popup-row-value">${dateOpen}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך אישור</span><span class="popup-row-value">${dateApproval}</span></div>`;
                if (comment) {
                    const shortComment = comment.length > 120 ? comment.substring(0, 120) + '...' : comment;
                    html += `<div class="popup-row" style="flex-direction:column;align-items:flex-start"><span class="popup-row-label" style="margin-bottom:4px">הערות</span><span class="popup-row-value" style="font-size:11px;line-height:1.4;text-align:right;white-space:pre-wrap;max-width:100%">${shortComment}</span></div>`;
                }
                html += '</div>';
                html += '</div>';
                return html;
            }

            const handleMapClick = useCallback((e, map) => {
                const size = map.getSize();
                const bounds = map.getBounds();
                const sw = bounds.getSouthWest();
                const ne = bounds.getNorthEast();
                const showPlans = layers['plans'];
                const showPermits = layers['permits'];
                const showTama38 = layers['tama38'];

                // Global rule: only query layers that are toggled ON
                if (!showPlans && !showPermits && !showTama38) return;

                const bboxStr = `${sw.lat},${sw.lng},${ne.lat},${ne.lng}`;
                const commonParams = {
                    SERVICE: 'WMS',
                    VERSION: '1.3.0',
                    REQUEST: 'GetFeatureInfo',
                    CRS: 'EPSG:4326',
                    BBOX: bboxStr,
                    WIDTH: size.x,
                    HEIGHT: size.y,
                    I: Math.round(e.containerPoint.x),
                    J: Math.round(e.containerPoint.y),
                    INFO_FORMAT: 'application/json',
                    FEATURE_COUNT: 10
                };

                // Build fetch promises only for active layers
                const fetches = [];

                if (showPlans || showPermits) {
                    const params = new URLSearchParams({ ...commonParams, LAYERS: 'plans', QUERY_LAYERS: 'plans' });
                    fetches.push(
                        fetch(`${WMS_URL}?${params.toString()}`).then(r => r.json()).then(d => ({ layer: 'plans', data: d }))
                    );
                }

                if (showTama38) {
                    const params = new URLSearchParams({ ...commonParams, LAYERS: 'tama38', QUERY_LAYERS: 'tama38' });
                    fetches.push(
                        fetch(`${WMS_URL}?${params.toString()}`).then(r => r.json()).then(d => ({ layer: 'tama38', data: d }))
                    );
                }

                Promise.all(fetches)
                    .then(results => {
                        const plansResult = results.find(r => r.layer === 'plans');
                        const tama38Result = results.find(r => r.layer === 'tama38');

                        const plansFeatures = (plansResult && plansResult.data.features) || [];
                        const tama38Features = (tama38Result && tama38Result.data.features) || [];

                        // Log for debugging
                        console.log('[GetFeatureInfo] plans:', plansFeatures.length, 'tama38:', tama38Features.length);
                        if (tama38Features.length > 0) {
                            console.log('[tama38 Feature 0] ALL FIELDS:', JSON.stringify(tama38Features[0].properties));
                        }

                        let html = null;
                        let featureData = null;

                        // Priority: permits > plans > tama38
                        // Only show popup for layers that are ON
                        if (showPermits && plansFeatures.length > 0) {
                            const feature = plansFeatures.find(f => f.properties.stage && f.properties.stage.trim()) || plansFeatures[0];
                            const props = feature.properties;
                            featureData = { properties: props };
                            if (props.stage && props.stage.trim()) {
                                html = buildPermitPopup(props, featureData);
                            } else if (showPlans) {
                                html = buildPlanPopup(props, featureData);
                            }
                        } else if (showPlans && plansFeatures.length > 0) {
                            const feature = plansFeatures[0];
                            const props = feature.properties;
                            featureData = { properties: props };
                            html = buildPlanPopup(props, featureData);
                        } else if (showTama38 && tama38Features.length > 0) {
                            const props = tama38Features[0].properties;
                            html = buildTama38Popup(props);
                        }

                        if (!html) return;

                        const popup = L.popup({
                            maxWidth: 320,
                            minWidth: 300,
                            className: 'dark-popup',
                            closeButton: true
                        })
                            .setLatLng(e.latlng)
                            .setContent(html)
                            .openOn(map);

                        // Bind click for permit/back buttons
                        popup.getElement().addEventListener('click', function(ev) {
                            const permitBtn = ev.target.closest('.popup-btn-permit');
                            if (permitBtn) {
                                ev.stopPropagation();
                                const fd = JSON.parse(permitBtn.dataset.feature);
                                if (permitBtn.dataset.action === 'back-to-plan') {
                                    popup.setContent(buildPlanPopup(fd.properties, fd));
                                    setTimeout(() => setLayers(prev => ({ ...prev, permits: false })), 100);
                                } else {
                                    popup.setContent(buildPermitPopup(fd.properties, fd));
                                    setTimeout(() => setLayers(prev => ({ ...prev, permits: true })), 100);
                                }
                            }
                        });
                    })
                    .catch(err => console.error('GetFeatureInfo error:', err));
            }, [layers]);

            // Re-bind click handler when layers change
            const clickHandlerRef = useRef(null);
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                // Remove only our previous handler, not all click handlers
                if (clickHandlerRef.current) {
                    map.off('click', clickHandlerRef.current);
                }
                const handler = (e) => handleMapClick(e, map);
                clickHandlerRef.current = handler;
                map.on('click', handler);
                return () => { map.off('click', handler); };
            }, [handleMapClick]);

            const toggleLayer = (id) => {
                setLayers(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetView = () => {
                mapInstanceRef.current?.setView(CENTER, DEFAULT_ZOOM);
            };

            // Plan search results
            const searchResults = planSearch.length >= 2
                ? planIndex.filter(p =>
                    p.h.includes(planSearch) || p.n.includes(planSearch)
                ).slice(0, 15)
                : [];

            const handleSearchSelect = (plan) => {
                const map = mapInstanceRef.current;
                if (!map) return;
                setPlanSearch('');
                setShowSearchResults(false);
                // Zoom to plan location and query for popup
                map.setView(plan.c, 18);
                // After map settles, trigger GetFeatureInfo at the plan center
                setTimeout(() => {
                    const size = map.getSize();
                    const bounds = map.getBounds();
                    const sw = bounds.getSouthWest();
                    const ne = bounds.getNorthEast();
                    const point = map.latLngToContainerPoint(plan.c);
                    const params = new URLSearchParams({
                        SERVICE: 'WMS', VERSION: '1.3.0', REQUEST: 'GetFeatureInfo',
                        LAYERS: 'plans', QUERY_LAYERS: 'plans', CRS: 'EPSG:4326',
                        BBOX: `${sw.lat},${sw.lng},${ne.lat},${ne.lng}`,
                        WIDTH: size.x, HEIGHT: size.y,
                        I: Math.round(point.x), J: Math.round(point.y),
                        INFO_FORMAT: 'application/json', FEATURE_COUNT: 5
                    });
                    fetch(`${WMS_URL}?${params.toString()}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!data.features || data.features.length === 0) return;
                            const feature = data.features[0];
                            const props = feature.properties;
                            const featureData = { properties: props };
                            const html = buildPlanPopup(props, featureData);
                            const popup = L.popup({ maxWidth: 320, minWidth: 300, closeButton: true })
                                .setLatLng(plan.c)
                                .setContent(html)
                                .openOn(map);
                            popup.getElement().addEventListener('click', function(ev) {
                                const permitBtn = ev.target.closest('.popup-btn-permit');
                                if (permitBtn) {
                                    ev.stopPropagation();
                                    const fd = JSON.parse(permitBtn.dataset.feature);
                                    if (permitBtn.dataset.action === 'back-to-plan') {
                                        popup.setContent(buildPlanPopup(fd.properties, fd));
                                        setTimeout(() => setLayers(prev => ({ ...prev, permits: false })), 100);
                                    } else {
                                        popup.setContent(buildPermitPopup(fd.properties, fd));
                                        setTimeout(() => setLayers(prev => ({ ...prev, permits: true })), 100);
                                    }
                                }
                            });
                        })
                        .catch(err => console.error('Search popup error:', err));
                }, 1000);
            };

            const activeCount = Object.values(layers).filter(Boolean).length;

            const filteredConfig = {};
            Object.entries(LAYER_CONFIG).forEach(([key, group]) => {
                const filtered = group.layers.filter(l =>
                    !searchText || l.name.includes(searchText) || l.id.includes(searchText)
                );
                if (filtered.length > 0) {
                    filteredConfig[key] = { ...group, layers: filtered };
                }
            });

            return (
                <>
                    <div className={`sidebar ${sidebarOpen ? '' : 'collapsed'}`}>
                        <div className="sidebar-header">
                            <h1>אורנים</h1>
                            <p>כלי תכנון עירוני - ירושלים</p>
                        </div>

                        <div className="sidebar-section">
                            <h3>חיפוש תוכניות</h3>
                            <div className="plan-search-wrap">
                                <input
                                    className="plan-search-input"
                                    type="text"
                                    placeholder='חיפוש תכנית או מספר...'
                                    value={planSearch}
                                    onChange={(e) => {
                                        setPlanSearch(e.target.value);
                                        setShowSearchResults(true);
                                    }}
                                    onFocus={() => planSearch.length >= 2 && setShowSearchResults(true)}
                                />
                                {planSearch && (
                                    <button
                                        className="plan-search-clear"
                                        onClick={() => { setPlanSearch(''); setShowSearchResults(false); }}
                                    >&times;</button>
                                )}
                                {showSearchResults && planSearch.length >= 2 && (
                                    <div className="plan-search-results">
                                        {searchResults.length > 0 ? searchResults.map((plan, i) => (
                                            <div
                                                key={i}
                                                className="plan-search-item"
                                                onClick={() => handleSearchSelect(plan)}
                                            >
                                                <div className="plan-search-item-name">{plan.h}</div>
                                                <div className="plan-search-item-num">{plan.n}</div>
                                            </div>
                                        )) : (
                                            <div className="plan-search-empty">לא נמצאו תוצאות</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <h3>שכבות ({activeCount} פעילות)</h3>
                            <input
                                className="search-input"
                                type="text"
                                placeholder="חיפוש שכבה..."
                                value={searchText}
                                onChange={(e) => setSearchText(e.target.value)}
                            />

                            {Object.entries(filteredConfig).map(([groupKey, group]) => (
                                <div key={groupKey}>
                                    <div className="layer-group-title">{group.title}</div>
                                    {group.layers.map(layer => (
                                        <div className="layer-item" key={layer.id}
                                             title={layer.desc || ''}>
                                            <input
                                                type="checkbox"
                                                checked={layers[layer.id] || false}
                                                onChange={() => toggleLayer(layer.id)}
                                                onClick={(e) => e.stopPropagation()}
                                            />
                                            <label onClick={() => toggleLayer(layer.id)}>{layer.name}</label>
                                            {layer.id === 'plans' && (
                                                <button className="layer-legend-btn" title="מקרא סטטוס"
                                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא תב"ע - סטטוס תכנית', items: PLANS_LEGEND }); }}>⋯</button>
                                            )}
                                            {layer.id === 'permits' && (
                                                <button className="layer-legend-btn" title="מקרא שלבים"
                                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא היתרים - שלב', items: PERMITS_LEGEND }); }}>⋯</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            <div className="layer-group-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                <span>נושאים תכנוניים</span>
                                <button className="layer-legend-btn" title="מקרא נושאים תכנוניים"
                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא נושאים תכנוניים', items: TOPICS_LEGEND }); }}
                                    style={{fontSize:'14px',margin:0}}>⋯</button>
                            </div>
                            <div className="layer-item"
                                 title='הצגת תוכניות שחופפות מרחבית לתוכניות אחרות'
                                 onClick={() => setPlanningTopics(prev => ({...prev, overlapping: !prev.overlapping}))}>
                                <input type="checkbox" checked={planningTopics.overlapping} onChange={() => {}} />
                                <label>תבעות כפולות על אותו מרחב</label>
                            </div>
                            <div className="layer-item"
                                 title='תוכניות לעיבוי שטחים חומים - תוספת יח"ד בשטחים מאושרים'
                                 onClick={() => setPlanningTopics(prev => ({...prev, densification: !prev.densification}))}>
                                <input type="checkbox" checked={planningTopics.densification} onChange={() => {}} />
                                <label>תכניות לעיבוי שטחים חומים</label>
                            </div>
                            <div className="layer-item"
                                 title='תוכניות בשלב הפקדה להתנגדויות'
                                 onClick={() => setPlanningTopics(prev => ({...prev, objections: !prev.objections}))}>
                                <input type="checkbox" checked={planningTopics.objections} onChange={() => {}} />
                                <label>תכניות המופקדות להתנגדויות</label>
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <h3>שקיפות שכבות</h3>
                            <input
                                className="opacity-slider"
                                type="range"
                                min="0"
                                max="1"
                                step="0.05"
                                value={opacity}
                                onChange={(e) => setOpacity(parseFloat(e.target.value))}
                            />
                            <div className="opacity-label">
                                <span>שקוף</span>
                                <span>{Math.round(opacity * 100)}%</span>
                                <span>אטום</span>
                            </div>

                            <div style={{marginTop: '12px'}}>
                                <div className="opacity-label" style={{marginBottom: '6px'}}><span>מפת רקע</span></div>
                                <select
                                    className="basemap-select"
                                    value={basemap}
                                    onChange={(e) => setBasemap(e.target.value)}
                                >
                                    {Object.entries(BASEMAPS).map(([key, bm]) => (
                                        <option key={key} value={key}>{bm.name}</option>
                                    ))}
                                </select>
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <button className="btn-reset" onClick={resetView}>
                                איפוס תצוגה
                            </button>
                            <button className="btn-reset" onClick={() => {
                                const all = {};
                                Object.values(LAYER_CONFIG).forEach(g =>
                                    g.layers.forEach(l => { all[l.id] = true; })
                                );
                                setLayers(all);
                            }} style={{marginTop: '4px'}}>
                                הצג הכל
                            </button>
                            <button className="btn-reset" onClick={() => {
                                const none = {};
                                Object.values(LAYER_CONFIG).forEach(g =>
                                    g.layers.forEach(l => { none[l.id] = false; })
                                );
                                setLayers(none);
                            }} style={{marginTop: '4px'}}>
                                הסתר הכל
                            </button>
                        </div>

                        <div className="status-bar">
                            {cursorPos && (
                                <span>{cursorPos.lat}, {cursorPos.lng}</span>
                            )}
                            <br />
                            <span>WMS: qgiscloud.com/OrHirschhorn/ORANIM</span>
                        </div>
                    </div>

                    <div className="map-container">
                        <button
                            className="toggle-btn"
                            onClick={() => {
                                setSidebarOpen(prev => !prev);
                                setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350);
                            }}
                            title={sidebarOpen ? 'הסתר תפריט' : 'הצג תפריט'}
                        >
                            {sidebarOpen ? '◀' : '▶'}
                        </button>
                        <div id="map" ref={mapRef}></div>
                        <div className={`loading-indicator ${loading ? 'visible' : ''}`}>
                            טוען שכבות...
                        </div>
                        {loadingBuildings && (
                            <div style={{
                                position: 'absolute',
                                bottom: '30px',
                                left: '50%',
                                transform: 'translateX(-50%)',
                                background: 'rgba(26,26,46,0.85)',
                                color: '#8ecae6',
                                padding: '6px 16px',
                                borderRadius: '16px',
                                fontSize: '13px',
                                zIndex: 1000,
                                backdropFilter: 'blur(4px)',
                                border: '1px solid rgba(142,202,230,0.3)',
                                animation: 'fadeIn 0.3s ease'
                            }}>
                                טוען שכבת מבנים...
                            </div>
                        )}
                        {mapScale && (
                            <div className="scale-display">{mapScale}</div>
                        )}
                    </div>

                    {legendPopup && (
                        <div className="legend-popup-overlay" onClick={() => setLegendPopup(null)}>
                            <div className="legend-popup" onClick={(e) => e.stopPropagation()}>
                                <button className="legend-popup-close" onClick={() => setLegendPopup(null)}>&times;</button>
                                <div className="legend-popup-title">{legendPopup.title}</div>
                                {legendPopup.items.map((item, i) => (
                                    <div className="legend-item" key={i}>
                                        {item.style === 'hatch' ? (
                                            <div className="legend-color" style={{
                                                background: `repeating-linear-gradient(-45deg, transparent, transparent 3px, ${item.color} 3px, ${item.color} 4.5px)`,
                                                border: `2px solid ${item.color}`
                                            }}></div>
                                        ) : item.style === 'outline' ? (
                                            <div className="legend-color" style={{
                                                background: 'transparent',
                                                border: `3px solid ${item.color}`
                                            }}></div>
                                        ) : (
                                            <div className="legend-color" style={{background: item.color}}></div>
                                        )}
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

                        { key: 'conditions', label: 'במילוי תנאים להפקדה', color: '#FF9800',
                          match: ['במילוי תנאים להפקדה','תכנית עומדת בתנאי סף'] },
                        { key: 'open', label: 'פתיחת תיק / בדיקה', color: '#F44336',
                          match: ['נפתח תיק למתכנן','נפתח תיק תבע','בבדיקה תכנונית','נקלטה מקובץ מבאת'] },
                    ];
                    function getStatusGroup(status) {
                        for (const g of STATUS_GROUPS) {
                            if (g.match.includes(status)) return g.key;
                        }
                        return null;
                    }
                    const TYPE_GROUPS = [
                        { key: 'התחדשות עירונית', label: 'התחדשות עירונית', color: '#4CAF50' },
                        { key: 'עיבוי ובניה חדשה', label: 'עיבוי ובניה חדשה', color: '#2196F3' },
                    ];
                    function getTypeGroup(planType) {
                        const pt = normalizePlanType(planType || '');
                        if (pt.includes('התחדשות')) return 'התחדשות עירונית';
                        if (pt.includes('עיבוי')) return 'עיבוי ובניה חדשה';
                        if (pt && pt !== 'תשתיות' && pt !== 'מוסתר') return pt; // keep other types as-is
                        return null;
                    }
                    const emptyRow = () => ({ units_in: 0, units_add: 0, renewal: 0, densification: 0, byStatus: {}, byType: {} });
                    const plansByCell = {}; // { minahak: { statusKey: [planInfo, ...] } }
                    const plansBySub = {}; // { minahak: { sub: { status: [planInfo, ...] } } }
                    const plansByType = {}; // { minahak: { typeKey: [planInfo, ...] } }
                    const plansBySubType = {}; // { minahak: { sub: { typeKey: [planInfo, ...] } } }
                    minahakOrder.forEach(m => {
                        byMinahak[m] = emptyRow();
                        bySub[m] = {};
                        plansByCell[m] = {};
                        plansBySub[m] = {};
                        plansByType[m] = {};
                        plansBySubType[m] = {};
                    });

                    // Plans (from Google Sheets CSV)
                    planRows.forEach(p => {
                        const m = (p.minahak || '').trim();
                        if (!byMinahak[m]) { byMinahak[m] = emptyRow(); bySub[m] = {}; }
                        // Skip rejected/archived plans for units_add
                        const status = (p.status_mavat || '').trim();
                        const isRejected = status === 'נגנזה/נדחתה' || status === 'נגנזה' || status === 'נדחתה';
                        const addVal = isRejected ? 0 : (parseInt(p.units_add) || 0);
                        const inVal = parseInt(p.units_in) || 0;
                        byMinahak[m].units_in += inVal;
                        byMinahak[m].units_add += addVal;

                        const pt = (p.plan_type || '').trim();
                        if (pt.includes('התחדשות')) {
                            byMinahak[m].renewal += addVal;
                        } else if (pt.includes('עיבוי')) {
                            byMinahak[m].densification += addVal;
                        }

                        // Per-status group breakdown
                        if (!isRejected && addVal > 0 && status) {
                            const grp = getStatusGroup(status);
                            const stageRaw = (p.stage || p.Stage || '').trim();
                            // Normalize double-space variant
                            const stageVal = stageRaw.replace(/\s+/g, ' ');
                            const planInfo = { plan_name: p.plan_name || '', plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', units_add: addVal, status_mavat: status, stage: stageVal };
                            // If approved and has a stage value, use stage instead of status
                            if (grp === 'approved' && stageVal) {
                                byMinahak[m].byStatus[stageVal] = (byMinahak[m].byStatus[stageVal] || 0) + addVal;
                                if (!plansByCell[m]) plansByCell[m] = {};
                                if (!plansByCell[m][stageVal]) plansByCell[m][stageVal] = [];
                                if (!plansByCell[m][stageVal].some(x => x.plan_name === planInfo.plan_name)) plansByCell[m][stageVal].push(planInfo);
                            } else if (grp) {
                                byMinahak[m].byStatus[grp] = (byMinahak[m].byStatus[grp] || 0) + addVal;
                                if (!plansByCell[m]) plansByCell[m] = {};
                                if (!plansByCell[m][grp]) plansByCell[m][grp] = [];
                                if (!plansByCell[m][grp].some(x => x.plan_name === planInfo.plan_name)) plansByCell[m][grp].push(planInfo);
                            }
                        }

                        // Per-type group breakdown
                        if (!isRejected && addVal > 0) {
                            const typeGrp = getTypeGroup(pt);
                            if (typeGrp) {
                                byMinahak[m].byType[typeGrp] = (byMinahak[m].byType[typeGrp] || 0) + addVal;
                                if (!plansByType[m]) plansByType[m] = {};
                                if (!plansByType[m][typeGrp]) plansByType[m][typeGrp] = [];
                                const planInfoT = { plan_name: p.plan_name || '', plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', units_add: addVal, status_mavat: status, stage: (p.stage || p.Stage || '').trim().replace(/\s+/g, ' ') };
                                if (!plansByType[m][typeGrp].some(x => x.plan_name === planInfoT.plan_name)) plansByType[m][typeGrp].push(planInfoT);
                            }
                        }

                        // Per sub-neighborhood breakdown
                        const subRaw = (p.sub_neighborhood || p.neighborhood || 'אחר').trim() || 'אחר';
                        const sub = SUB_NORMALIZE[subRaw] || subRaw;
                        if (!bySub[m][sub]) bySub[m][sub] = emptyRow();
                        bySub[m][sub].units_in += inVal;
                        bySub[m][sub].units_add += addVal;
                        if (pt.includes('התחדשות')) {
                            bySub[m][sub].renewal += addVal;
                        } else if (pt.includes('עיבוי')) {
                            bySub[m][sub].densification += addVal;
                        }
                        if (!isRejected && addVal > 0 && status) {
                            bySub[m][sub].byStatus[status] = (bySub[m][sub].byStatus[status] || 0) + addVal;
                            // Collect plan details per sub-neighborhood + status
                            if (!plansBySub[m]) plansBySub[m] = {};
                            if (!plansBySub[m][sub]) plansBySub[m][sub] = {};
                            if (!plansBySub[m][sub][status]) plansBySub[m][sub][status] = [];
                            const planKey = p.plan_name || '';
                            if (!plansBySub[m][sub][status].some(x => x.plan_name === planKey)) {
                                plansBySub[m][sub][status].push({ plan_name: planKey, plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', units_add: addVal, status_mavat: status, stage: (p.stage || p.Stage || '').trim().replace(/\s+/g, ' ') });
                            }
                        }
                        // Per sub-neighborhood + type breakdown
                        if (!isRejected && addVal > 0) {
                            const typeGrp2 = getTypeGroup(pt);
                            if (typeGrp2) {
                                bySub[m][sub].byType[typeGrp2] = (bySub[m][sub].byType[typeGrp2] || 0) + addVal;
                                if (!plansBySubType[m]) plansBySubType[m] = {};
                                if (!plansBySubType[m][sub]) plansBySubType[m][sub] = {};
                                if (!plansBySubType[m][sub][typeGrp2]) plansBySubType[m][sub][typeGrp2] = [];
                                const planKey2 = p.plan_name || '';
                                if (!plansBySubType[m][sub][typeGrp2].some(x => x.plan_name === planKey2)) {
                                    plansBySubType[m][sub][typeGrp2].push({ plan_name: planKey2, plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', units_add: addVal, status_mavat: status, stage: (p.stage || p.Stage || '').trim().replace(/\s+/g, ' ') });
                                }
                            }
                        }
                    });

                    // Tama38 — add to units_add and to renewal (התחדשות עירונית)
                    tamaMap.forEach(p => {
                        const neighborho = (p.neighborho || '').trim();
                        const m = NEIGHBORHOOD_TO_MINAHAK[neighborho] || '';
                        if (!m) return;
                        if (!byMinahak[m]) { byMinahak[m] = emptyRow(); bySub[m] = {}; }
                        const tose = parseInt(p.units_tose) || 0;
                        byMinahak[m].units_add += tose;
                        byMinahak[m].renewal += tose; // tama38 = התחדשות עירונית

                        // Per sub-neighborhood: use neighborho as sub name
                        const subRaw2 = neighborho || 'אחר';
                        const sub = SUB_NORMALIZE[subRaw2] || subRaw2;
                        if (!bySub[m][sub]) bySub[m][sub] = emptyRow();
                        bySub[m][sub].units_add += tose;
                        bySub[m][sub].renewal += tose;
                    });

                    // Fixed units_in values provided by user (per minahak)
                    const fixedUnitsIn = {
                        'בית צפאפא': 4262,
                        'גוננים': 9235,
                        'בקעה רבתי': 11521,
                        'גינות העיר': 16569,
                        'מינהל מוסדי מלחה': 0,
                        'א.ת. תלפיות': 643,
                    };
                    Object.entries(fixedUnitsIn).forEach(([m, val]) => {
                        if (byMinahak[m]) byMinahak[m].units_in = val;
                    });

                    // Fixed units_in per sub-neighborhood
                    const fixedSubUnitsIn = {
                        'בקעה רבתי': {
                            'מקור חיים': 1019, 'בקעה': 3614, 'גבעת חנניה - אבו תור': 1579,
                            'צפון תלפיות': 873, 'תלפיות ארנונה': 3250, 'שיכוני תלפיות': 1186,
                        },
                        'גוננים': {
                            'גוננים': 4253, 'פת': 700, 'קטמונים': 2208, 'רסקו': 2074,
                        },
                        'גינות העיר': {
                            'המושבה הגרמנית': 1293, 'המושבה היוונית': 1055, 'ניות': 788, 'טלביה': 2511,
                            'קטמון הישנה': 4343, 'קרית שמואל': 3423, 'רחביה': 3156,
                        },
                    };
                    Object.entries(fixedSubUnitsIn).forEach(([m, subs]) => {
                        if (!bySub[m]) bySub[m] = {};
                        Object.entries(subs).forEach(([s, val]) => {
                            if (!bySub[m][s]) bySub[m][s] = emptyRow();
                            bySub[m][s].units_in = val;
                        });
                    });

                    const EXCLUDE_MINAHAK = ['גבעת המטוס'];
                    const minahaks = minahakOrder.filter(m => byMinahak[m] && !EXCLUDE_MINAHAK.includes(m));
                    Object.keys(byMinahak).forEach(m => {
                        if (!minahaks.includes(m) && m && !EXCLUDE_MINAHAK.includes(m)) minahaks.push(m);
                    });

                    // Collect all type groups that have data
                    const allTypeKeys = new Set();
                    Object.values(byMinahak).forEach(d => Object.keys(d.byType).forEach(k => allTypeKeys.add(k)));
                    // Build final type groups: known ones first, then any additional
                    const knownTypeKeys = TYPE_GROUPS.map(g => g.key);
                    const extraTypeKeys = [...allTypeKeys].filter(k => !knownTypeKeys.includes(k)).sort();
                    const typeColors = ['#FF9800', '#9C27B0', '#00BCD4', '#795548', '#607D8B'];
                    const finalTypeGroups = [
                        ...TYPE_GROUPS.filter(g => allTypeKeys.has(g.key)),
                        ...extraTypeKeys.map((k, i) => ({ key: k, label: k, color: typeColors[i % typeColors.length] }))
                    ];
                    const ud = { minahaks, byMinahak, bySub, statusGroups: STATUS_GROUPS, typeGroups: finalTypeGroups, plansByCell, plansBySub, plansByType, plansBySubType };
                    setUnitsData(ud);
                    window.__unitsData = ud;
                    window.__unitsFetching = false;
                    if (window.__unitsDataCallbacks) {
                        window.__unitsDataCallbacks.forEach(cb => cb(ud));
                        window.__unitsDataCallbacks = [];
                    }
                    setUnitsLoading(false);
                });
            }, []);

            // GeoJSON rendering: add/remove L.geoJSON layers based on state
            useEffect(() => {
                const map = mapInstanceRef.current;
                const gd = geoDataRef.current;
                if (!map || !dataLoaded) return;

                // Remove all previous geo layers + label markers
                function cleanupLayer(ll) {
                    if (ll.eachLayer) ll.eachLayer(sub => {
                        if (sub._planNumMarker) map.removeLayer(sub._planNumMarker);
                        if (sub._labelMarker) map.removeLayer(sub._labelMarker);
                        if (sub._minahakLabel) map.removeLayer(sub._minahakLabel);
                        if (sub._subLabel) map.removeLayer(sub._subLabel);
                        if (sub._hatchClone) { sub._hatchClone.remove(); sub._hatchClone = null; }
                    });
                    map.removeLayer(ll);
                }
                // Also remove any orphaned hatch overlays from SVG
                document.querySelectorAll('.hatch-overlay').forEach(el => el.remove());
                Object.values(geoLayersRef.current).forEach(l => {
                    if (Array.isArray(l)) l.forEach(ll => cleanupLayer(ll));
                    else if (l) cleanupLayer(l);
                });
                geoLayersRef.current = {};

                // Minahak filter
                const adminLayers = LAYER_CONFIG.admin.layers;
                const selectedMinahaks = adminLayers.filter(l => layers[l.id]).map(l => l.minahak);
                const allAdminOn = adminLayers.every(l => layers[l.id]);
                const selectedSubs = selectedMinahaks.flatMap(m => MINAHAK_SUBS[m] || []);

                function planInMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedMinahaks.length === 0) return false;
                    const m = props.minahak || '';
                    return selectedMinahaks.includes(m);
                }
                function tama38InMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedSubs.length === 0) return false;
                    const n = (props.neighborho || '').trim();
                    return selectedSubs.includes(n);
                }

                // --- District outline + white mask outside (always on) ---
                if (gd.district_oranim) {
                    // Create an inverted polygon: world bounds with district as hole
                    const districtFeature = gd.district_oranim.features[0];
                    if (districtFeature) {
                        // World outer ring (covers entire map)
                        const worldRing = [[-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]];
                        // District inner ring (hole) — reverse winding
                        const distCoords = districtFeature.geometry.coordinates[0];
                        const holeRing = distCoords.map(c => [c[1], c[0]]); // GeoJSON [lng,lat] → Leaflet [lat,lng]
                        const maskPolygon = L.polygon([worldRing, holeRing], {
                            pane: 'districtPane',
                            color: 'transparent', weight: 0,
                            fillColor: '#ffffff', fillOpacity: 0.2
                        }).addTo(map);
                        geoLayersRef.current.districtMask = maskPolygon;
                    }
                }

                // --- Roads (show at z15 by default, toggle manually at other zooms) ---
                const showRoads = layers['roads'] && gd.roads;
                if (showRoads) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.roads = L.geoJSON(gd.roads, {
                        pane: 'roadsPane',
                        style: { color: '#666', weight: zoom >= 17 ? 1.5 : 1.0, opacity: 0.6 },
                        interactive: false
                    }).addTo(map);
                }

                // --- Sub-neighborhoods (always on) — green outline, green label ---
                if (gd.sub_neighborhoods && layers['sub_neighborhoods']) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.sub_neighborhoods = L.geoJSON(gd.sub_neighborhoods, {
                        pane: 'subNeighborhoodPane',
                        style: { color: 'rgba(17,199,64,1)', weight: zoom >= 18 ? 2.5 : zoom >= 17 ? 2.0 : 1.0, fillOpacity: 0, dashArray: '6,6' },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.schn_nama || f.properties.SCHN_NAMA || f.properties.Name || f.properties.name || '';
                            if (name) {
                                layer.bindTooltip(name, {
                                    permanent: true,
                                    direction: 'center',
                                    className: 'sub-tooltip',
                                    offset: [0, 15]
                                });
                            }
                        }
                    }).addTo(map);
                }

                // --- Minahak boundaries — green outline, white bold label ---
                const minahakLayers = [];
                adminLayers.forEach(l => {
                    if (!layers[l.id]) return;
                    const geoKey = MINAHAK_LAYER_MAP[l.id];
                    if (geoKey && gd[geoKey]) {
                        const ml = L.geoJSON(gd[geoKey], {
                            pane: 'minahakPane',
                            style: { color: 'rgba(17,199,64,1)', weight: 3, fillOpacity: 0 },
                            onEachFeature: (f, layer) => {
                                const name = f.properties.shem_1 || f.properties.SHEM_1 || f.properties.Name || l.name;
                                if (name && f.geometry) {
                                    const center = visualCenter(f.geometry);
                                    const marker = L.marker(center, {
                                        icon: L.divIcon({
                                            className: 'minahak-name-label',
                                            html: '<div class="label-inner">' + name + '</div>',
                                            iconSize: [0, 0],
                                            iconAnchor: [0, 0]
                                        }),
                                        interactive: false,
                                        pane: 'minahakLabelsPane'
                                    }).addTo(map);
                                    layer._minahakLabel = marker;
                                }
                            }
                        }).addTo(map);
                        minahakLayers.push(ml);
                    }
                });
                geoLayersRef.current.minahak = minahakLayers;

                // --- Plans layer ---
                if (layers['plans'] && gd.plans && !showHeatMap) {
                    const zoom = map.getZoom();
                    // Auto-wrap text at ~20 chars (QGIS autoWrapLength=20)
                    function autoWrap(txt, maxLen) {
                        if (!txt || txt.length <= maxLen) return txt;
                        const words = txt.split(/\s+/);
                        let line = '', lines = [];
                        for (const w of words) {
                            if (line && (line + ' ' + w).length > maxLen) {
                                lines.push(line);
                                line = w;
                            } else {
                                line = line ? line + ' ' + w : w;
                            }
                        }
                        if (line) lines.push(line);
                        return lines.join('\n');
                    }

                    // Zoom 16: show labels for all plans with 100+ units_add
                    const z16MinUnits = 100;

                    // Track filtered count
                    let filteredPlanCount = 0;
                    const totalPlanCount = gd.plans.features.filter(f => {
                        if (!planInMinahak(f.properties)) return false;
                        const s = normalizeStatus((f.properties.status_mavat || '').trim());
                        if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                        if (['תשתיות','מוסתר'].includes(normalizePlanType(f.properties.plan_type || ''))) return false;
                        return true;
                    }).length;

                    const plansLayer = L.geoJSON(gd.plans, {
                        pane: 'plansPane',
                        renderer: L.svg({ pane: 'plansPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const s = normalizeStatus((f.properties.status_mavat || '').trim());
                            if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                            if (['תשתיות','מוסתר'].includes(normalizePlanType(f.properties.plan_type || ''))) return false;
                            // Advanced filters
                            const af = filters;
                            // Units range
                            const units = parseFloat(f.properties.units_add) || 0;
                            if (af.minUnits !== '' && units < parseFloat(af.minUnits)) return false;
                            if (af.maxUnits !== '' && units > parseFloat(af.maxUnits)) return false;
                            // Plan type filter
                            if (af.planTypes.length > 0) {
                                const pt = normalizePlanType(f.properties.plan_type || '');
                                if (!af.planTypes.includes(pt)) return false;
                            }
                            // Status filter (check both status_mavat and stage field)
                            if (af.statuses.length > 0) {
                                const sg = getFilterStatusGroup(s);
                                const stageVal = (f.properties.stage || '').trim();
                                const sgStage = getFilterStatusGroup(stageVal);
                                if ((!sg || !af.statuses.includes(sg)) && (!sgStage || !af.statuses.includes(sgStage))) return false;
                            }
                            // Free text search
                            if (af.freeText) {
                                const q = af.freeText.toLowerCase();
                                const searchFields = [
                                    f.properties.plan_summary || '',
                                    f.properties.plan_name || '',
                                    f.properties.architect || '',
                                    f.properties.developer || '',
                                ].join(' ').toLowerCase();
                                if (!searchFields.includes(q)) return false;
                            }
                            filteredPlanCount++;
                            return true;
                        },
                        style: f => {
                            const status = normalizeStatus(f.properties.status_mavat || '');
                            const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                            const statusColor = STATUS_COLORS[status] || '#888';
                            const isSatellite = basemap === 'satellite';
                            const shavazActive = layers['shavaz_kayam'] || layers['future_shavaz'];
                            const landuseActive = layers['landuse_xplan'];
                            if (landuseActive) {
                                return { color: statusColor, weight: 2.5, fillColor: 'transparent', fillOpacity: 0, dashArray: '' };
                            }
                            if (shavazActive) {
                                return { color: statusColor, weight: 1.5, fillColor: fillColor, fillOpacity: 0.07, dashArray: '4,2' };
                            }
                            return { color: 'rgba(67,67,227,1)', weight: 1.5, fillColor: fillColor, fillOpacity: isSatellite ? 1 : opacity * 0.3, dashArray: '4,2' };
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                // Suppress popups during area/measure drawing or landuse compare or shatzaf
                                if (areaModeRef.current) return;
                                if (landuseCompareModeRef.current) return;
                                if (shatzafModeRef.current) return;
                                // When shavaz is active, try to open shavaz popup first
                                const shavazOn = layersRef.current['shavaz_kayam'] || layersRef.current['future_shavaz'];
                                if (shavazOn) {
                                    const clickLatLng = e.latlng;
                                    const allShavaz = [];
                                    ['shavaz_kayam', 'future_shavaz'].forEach(key => {
                                        const sl = geoLayersRef.current[key];
                                        if (!sl) return;
                                        sl.eachLayer(slayer => {
                                            if (!slayer.feature || !slayer.getBounds) return;
                                            try {
                                                if (!slayer.getBounds().contains(clickLatLng)) return;
                                                if (leafletPip(slayer, clickLatLng)) {
                                                    allShavaz.push({ properties: slayer.feature.properties, isFuture: key === 'future_shavaz' });
                                                }
                                            } catch(ex) {}
                                        });
                                    });
                                    if (allShavaz.length > 0) {
                                        openShavazPopup(allShavaz, clickLatLng, 0);
                                        return;
                                    }
                                }
                                // Find all overlapping plans at click point
                                const clickLatLng = e.latlng;
                                const allFeatures = [];
                                const plansLayer = geoLayersRef.current.plans;
                                if (plansLayer) {
                                    plansLayer.eachLayer(pl => {
                                        if (!pl.feature || !pl.getBounds) return;
                                        try {
                                            if (!pl.getBounds().contains(clickLatLng)) return;
                                            const contains = leafletPip(pl, clickLatLng);
                                            if (contains) {
                                                const m = mapPlanProps(pl.feature.properties);
                                                allFeatures.push({ properties: m, type: 'plan' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                // Also check tama38 nearby
                                const tama38Layer = geoLayersRef.current.tama38;
                                if (tama38Layer) {
                                    tama38Layer.eachLayer(tl => {
                                        try {
                                            if (tl.getLatLng && tl.feature && clickLatLng.distanceTo(tl.getLatLng()) < 30) {
                                                allFeatures.push({ properties: tl.feature.properties, type: 'tama38' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                if (allFeatures.length === 0) {
                                    const mapped = mapPlanProps(f.properties);
                                    allFeatures.push({ properties: mapped, type: 'plan' });
                                }
                                const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                                const first = allFeatures[0];
                                const content = first.type === 'tama38'
                                    ? buildTama38Popup(first.properties, navInfo)
                                    : buildPlanPopup(first.properties, { properties: first.properties }, navInfo);
                                const popup = L.popup({ maxWidth: 340, className: 'plan-popup' })
                                    .setLatLng(clickLatLng)
                                    .setContent(content);
                                popup.openOn(map);
                                bindPopupEvents(popup, allFeatures, 0);
                            });
                            layer.on('mouseover', () => {
                                const isSat = basemap === 'satellite';
                                const shavazOn = layersRef.current['shavaz_kayam'] || layersRef.current['future_shavaz'];
                                const landuseOn = layersRef.current['landuse_xplan'];
                                if (landuseOn) {
                                    layer.setStyle({ weight: 4, fillOpacity: 0 });
                                } else if (shavazOn) {
                                    layer.setStyle({ weight: 3, fillOpacity: 0.12 });
                                } else {
                                    layer.setStyle({ weight: 3, fillOpacity: isSat ? 1 : opacity * 0.5 });
                                }
                            });
                            layer.on('mouseout', () => {
                                const status = normalizeStatus(f.properties.status_mavat || '');
                                const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                                const statusColor = STATUS_COLORS[status] || '#888';
                                const isSat = basemap === 'satellite';
                                const shavazOn = layersRef.current['shavaz_kayam'] || layersRef.current['future_shavaz'];
                                const landuseOn = layersRef.current['landuse_xplan'];
                                if (landuseOn) {
                                    layer.setStyle({ weight: 2.5, fillOpacity: 0, fillColor: 'transparent', color: statusColor });
                                } else if (shavazOn) {
                                    layer.setStyle({ weight: 1.5, fillOpacity: 0.07, fillColor: fillColor, color: statusColor });
                                } else {
                                    layer.setStyle({ weight: 1.5, fillOpacity: isSat ? 1 : opacity * 0.3, fillColor: fillColor });
                                }
                            });
                            // Labels: zoom-dependent with fit-in-polygon check
                            const shortName = f.properties.plan_summary || '';
                            const add = parseFloat(f.properties.units_add) || 0;
                            const zoom = map.getZoom();

                            // Zoom 15: no labels at all
                            if (zoom >= 16) {
                                // Zoom 16: only plans with 100+ units
                                if (zoom === 16 && add < z16MinUnits) {
                                    // skip label
                                } else if (shortName || add > 0) {
                                    const bounds = layer.getBounds();
                                    const sw = map.latLngToContainerPoint(bounds.getSouthWest());
                                    const ne = map.latLngToContainerPoint(bounds.getNorthEast());
                                    const pxW = Math.abs(ne.x - sw.x);
                                    const pxH = Math.abs(ne.y - sw.y);

                                    let labelText = '';
                                    if (zoom >= 17) {
                                        labelText = autoWrap(shortName, 20);
                                        if (add > 0) labelText += '\n+' + add + " יח\"ד";
                                    } else {
                                        // zoom 16: units on one line, יח"ד on next
                                        if (add > 0) labelText = '+' + add + "\nיח\"ד";
                                    }

                                    // Check if label fits inside polygon
                                    const lines = labelText.split('\n');
                                    const maxLineLen = Math.max(...lines.map(l => l.length));
                                    const fontSize = zoom >= 18 ? 11 : zoom === 16 ? 9 : 8;
                                    const charW = fontSize * 0.75; // approx px per char
                                    const lineH = fontSize * 1.5;
                                    const estLabelW = maxLineLen * charW;
                                    const estLabelH = lines.length * lineH;

                                    const fitRatio = zoom >= 18 ? 0.85 : zoom >= 17 ? 0.75 : 0.65;
                                    if (estLabelW <= pxW * fitRatio && estLabelH <= pxH * fitRatio) {
                                        let labelClass = 'plan-label-center';
                                        if (zoom >= 18) labelClass += ' plan-label-z18';
                                        if (add >= 30) labelClass += ' plan-label-large';
                                        else labelClass += ' plan-label-small';

                                        const center = f.geometry ? visualCenter(f.geometry) : layer.getBounds().getCenter();
                                        const labelMarker = L.marker(center, {
                                            icon: L.divIcon({
                                                className: labelClass,
                                                html: '<div class="label-inner">' + labelText.replace(/\n/g, '<br>') + '</div>',
                                                iconSize: [0, 0],
                                                iconAnchor: [0, 0]
                                            }),
                                            interactive: false,
                                            pane: 'labelsPane'
                                        }).addTo(map);
                                        layer._labelMarker = labelMarker;
                                    }
                                }
                            }
                            // Plan number along longest edge (in pixels), rotated to match
                            const planNum = f.properties.plan_name || '';
                            if (zoom >= 17 && planNum && f.geometry && f.geometry.coordinates) {
                                let coords;
                                try { coords = f.geometry.type === 'MultiPolygon'
                                    ? f.geometry.coordinates[0][0]
                                    : f.geometry.coordinates[0]; } catch(ex) { coords = null; }
                                if (!coords || !coords.length) return;
                                let maxPxLen = 0, bestMid = null, bestAngle = 0;
                                for (let ei = 0; ei < coords.length - 1; ei++) {
                                    const a = coords[ei], b = coords[ei + 1];
                                    // Convert to pixel coordinates for accurate length
                                    const pa = map.latLngToContainerPoint([a[1], a[0]]);
                                    const pb = map.latLngToContainerPoint([b[1], b[0]]);
                                    const pxLen = Math.sqrt((pb.x-pa.x)*(pb.x-pa.x) + (pb.y-pa.y)*(pb.y-pa.y));
                                    if (pxLen > maxPxLen) {
                                        maxPxLen = pxLen;
                                        bestMid = [(a[1]+b[1])/2, (a[0]+b[0])/2]; // [lat, lng]
                                        let ang = Math.atan2(pb.y-pa.y, pb.x-pa.x) * 180 / Math.PI;
                                        // Keep text readable (not upside down)
                                        if (ang > 90) ang -= 180;
                                        if (ang < -90) ang += 180;
                                        bestAngle = ang;
                                    }
                                }
                                const numCharW = (zoom >= 18 ? 9 : 7) * 0.75;
                                const numTextLen = planNum.length * numCharW;
                                const numH = 12; // approx text height in px
                                if (bestMid && maxPxLen >= 40 && numTextLen <= maxPxLen * 0.9) {
                                    const numMarker = L.marker(bestMid, {
                                        icon: L.divIcon({
                                            className: 'plan-number-label',
                                            html: '<span class="pn-text" style="transform:rotate(' + bestAngle + 'deg)">' + planNum + '</span>',
                                            iconSize: [Math.ceil(numTextLen), numH],
                                            iconAnchor: [Math.ceil(numTextLen/2), Math.ceil(numH/2)]
                                        }),
                                        interactive: false,
                                        pane: 'labelsPane'
                                    }).addTo(map);
                                    layer._planNumMarker = numMarker;
                                }
                            }
                        }
                    }).addTo(map);
                    geoLayersRef.current.plans = plansLayer;
                }

                // --- Topics overlay ---
                if (gd.plans && (planningTopics.overlapping || planningTopics.densification || planningTopics.objections || planningTopics.infrastructure || planningTopics.archived || planningTopics.shavaz_demolition)) {
                    // Inject SVG hatch patterns into map's SVG defs
                    const svgEl = map.getRenderer(L.geoJSON())._container || map.getPane('overlayPane').querySelector('svg');
                    if (svgEl) {
                        let defs = svgEl.querySelector('defs');
                        if (!defs) { defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs'); svgEl.insertBefore(defs, svgEl.firstChild); }
                        // Blue hatch for overlapping
                        if (!defs.querySelector('#hatch-blue')) {
                            defs.innerHTML += `
                                <pattern id="hatch-blue" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#3366ff" stroke-width="2" stroke-opacity="0.6"/>
                                </pattern>
                                <pattern id="hatch-orange" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(-45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#ff8c00" stroke-width="2" stroke-opacity="0.6"/>
                                </pattern>
                                <pattern id="hatch-red" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#ff4444" stroke-width="2" stroke-opacity="0.7"/>
                                </pattern>`;
                        }
                    }

                    const topicsLayer = L.geoJSON(gd.plans, {
                        pane: 'topicsPane',
                        renderer: L.svg({ pane: 'topicsPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const p = f.properties;
                            if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0) return true;
                            if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') return true;
                            if (planningTopics.objections && (p.status_mavat || '').includes('הפקדה להתנגדויות')) {
                                const endDate = p.objection_end_date || '';
                                if (!endDate) return true; // no date = show (assume open)
                                const parts = endDate.split('/');
                                if (parts.length === 3) {
                                    const end = new Date(parts[2], parts[1]-1, parts[0]);
                                    if (end >= new Date()) return true; // still open
                                } else return true;
                            }
                            return false;
                        },
                        style: f => {
                            const p = f.properties;
                            if (planningTopics.objections && (p.status_mavat || '').includes('הפקדה להתנגדויות'))
                                return { color: '#1976d2', weight: 3, fillColor: '#1976d2', fillOpacity: 0.15 };
                            if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים')
                                return { color: '#ff8c00', weight: 2, fillOpacity: 0 };
                            if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0)
                                return { color: '#3366ff', weight: 2, fillOpacity: 0 };
                            return {};
                        },
                        onEachFeature: (f, layer) => {
                            const p = f.properties;
                            // Apply SVG hatch pattern fill after rendering
                            layer.on('add', () => {
                                const el = layer.getElement();
                                if (!el) return;
                                if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0) {
                                    el.setAttribute('fill', 'url(#hatch-blue)');
                                    el.setAttribute('fill-opacity', '1');
                                } else if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') {
                                    el.setAttribute('fill', 'url(#hatch-orange)');
                                    el.setAttribute('fill-opacity', '1');
                                }
                            });
                        }
                    }).addTo(map);

                    // Apply hatch to already-rendered paths
                    topicsLayer.eachLayer(layer => {
                        const el = layer.getElement();
                        const p = layer.feature.properties;
                        if (!el) return;
                        if (planningTopics.overlapping && (parseFloat(p.overlapping_plans) || 0) > 0) {
                            el.setAttribute('fill', 'url(#hatch-blue)');
                            el.setAttribute('fill-opacity', '1');
                        } else if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') {
                            el.setAttribute('fill', 'url(#hatch-orange)');
                            el.setAttribute('fill-opacity', '1');
                        }
                    });

                    geoLayersRef.current.topics = topicsLayer;
                }

                // --- Infrastructure layer (below plans) ---
                if (gd.plans && planningTopics.infrastructure) {
                    const infraLayer = L.geoJSON(gd.plans, {
                        pane: 'infrastructurePane',
                        renderer: L.svg({ pane: 'infrastructurePane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            return normalizePlanType(f.properties.plan_type || '') === 'תשתיות';
                        },
                        style: () => ({ color: '#7b2d8e', weight: 2, fillColor: '#9b59b6', fillOpacity: 0.4 }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => { const el = layer.getElement(); if (el) el.style.pointerEvents = 'auto'; });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: 340 })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.infrastructure = infraLayer;
                }

                // --- Plan 77/78 layer (below plans) ---
                if (gd.plans && planningTopics.plan7778) {
                    const plan7778Layer = L.geoJSON(gd.plans, {
                        pane: 'plan7778Pane',
                        renderer: L.svg({ pane: 'plan7778Pane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const st = normalizeStatus(f.properties.status_mavat || '');
                            return st === 'הכנת הודעה 77/78';
                        },
                        style: () => ({ color: '#c0392b', weight: 2, fillColor: '#e74c3c', fillOpacity: 0.4, dashArray: '6 4' }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => { const el = layer.getElement(); if (el) el.style.pointerEvents = 'auto'; });
                            layer.on('click', () => {
                                const mapped = mapPlanProps(f.properties);
                                const popup = L.popup({ maxWidth: 340 })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildPlanPopup(mapped, { properties: mapped, type: 'plan' }));
                                popup.openOn(map);
                                bindPopupEvents(popup, [{ properties: mapped, type: 'plan' }], 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.plan7778 = plan7778Layer;
                }

                // --- Archived layer (below plans) ---
                if (gd.plans && planningTopics.archived) {
                    const archivedLayer = L.geoJSON(gd.plans, {
                        pane: 'archivedPane',
                        renderer: L.svg({ pane: 'archivedPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const st = (f.properties.status_mavat || '').trim();
                            return st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה';
                        },
                        style: () => ({ color: '#888', weight: 2, fillColor: '#999', fillOpacity: 0.5, dashArray: '4,4' }),
                        interactive: false
                    }).addTo(map);
                    geoLayersRef.current.archived = archivedLayer;
                }

                // --- Shavaz demolition overlay (public buildings overlapping active plans) ---
                if (planningTopics.shavaz_demolition && gd.shavaz_kayam && gd.plans) {
                    const activePlans = gd.plans.features.filter(f => {
                        const s = normalizeStatus((f.properties.status_mavat || '').trim());
                        return s !== 'נגנזה' && s !== 'נדחתה' && s !== 'נגנזה/נדחתה';
                    });
                    function pipCheck(coords, lng, lat) {
                        let inside = false;
                        for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
                            const xi = coords[i][0], yi = coords[i][1];
                            const xj = coords[j][0], yj = coords[j][1];
                            if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi) inside = !inside;
                        }
                        return inside;
                    }
                    function getOuterRing(geo) {
                        if (geo.type === 'MultiPolygon') return geo.coordinates[0][0];
                        if (geo.type === 'Polygon') return geo.coordinates[0];
                        return null;
                    }
                    function shavazOverlapsPlan(sf) {
                        const sb = L.geoJSON(sf).getBounds();
                        const sCoords = getOuterRing(sf.geometry);
                        if (!sCoords) return false;
                        const sc = sb.getCenter();
                        for (const plan of activePlans) {
                            try {
                                const pb = L.geoJSON(plan).getBounds();
                                if (!sb.intersects(pb)) continue;
                                const pCoords = getOuterRing(plan.geometry);
                                if (!pCoords) continue;
                                const pc = pb.getCenter();
                                if (pipCheck(sCoords, pc.lng, pc.lat)) return true;
                                if (pipCheck(pCoords, sc.lng, sc.lat)) return true;
                            } catch(ex) {}
                        }
                        return false;
                    }
                    const overlapping = { type: 'FeatureCollection', features: gd.shavaz_kayam.features.filter(shavazOverlapsPlan) };
                    const demolitionLayer = L.geoJSON(overlapping, {
                        pane: 'topicsPane',
                        renderer: L.svg({ pane: 'topicsPane' }),
                        style: () => ({ color: '#ff4444', weight: 2, fillOpacity: 0 }),
                        onEachFeature: (f, layer) => {
                            layer.on('add', () => {
                                const el = layer.getElement();
                                if (el) { el.setAttribute('fill', 'url(#hatch-red)'); el.setAttribute('fill-opacity', '1'); el.style.pointerEvents = 'auto'; }
                            });
                            layer.on('click', () => {
                                const popup = L.popup({ maxWidth: 340, className: shavazPopupClass(false) })
                                    .setLatLng(layer.getBounds().getCenter())
                                    .setContent(buildShavazPopup(f.properties, false));
                                popup.openOn(map);
                                bindShavazPopupEvents(popup, f.properties, layer.getBounds().getCenter());
                            });
                        }
                    }).addTo(map);
                    demolitionLayer.eachLayer(layer => {
                        const el = layer.getElement();
                        if (el) { el.setAttribute('fill', 'url(#hatch-red)'); el.setAttribute('fill-opacity', '1'); }
                    });
                    geoLayersRef.current.shavaz_demolition = demolitionLayer;
                }

                // Helper: find all overlapping shavaz features at a click point
                function findOverlappingShavaz(clickLatLng) {
                    const allShavaz = [];
                    const checkLayer = (layerGroup, isFut) => {
                        if (!layerGroup) return;
                        layerGroup.eachLayer(sl => {
                            if (!sl.feature || !sl.getBounds) return;
                            try {
                                if (!sl.getBounds().contains(clickLatLng)) return;
                                const contains = leafletPip(sl, clickLatLng);
                                if (contains) allShavaz.push({ properties: sl.feature.properties, isFuture: isFut });
                            } catch(ex) {}
                        });
                    };
                    checkLayer(geoLayersRef.current.shavaz_kayam, false);
                    checkLayer(geoLayersRef.current.future_shavaz, true);
                    return allShavaz;
                }

                function shavazPopupClass(isFuture) {
                    return 'plan-popup shavaz-popup ' + (isFuture ? 'shavaz-future-popup' : 'shavaz-kayam-popup');
                }

                function openShavazPopup(allShavaz, latlng, startIdx) {
                    const idx = startIdx || 0;
                    const entry = allShavaz[idx];
                    const navInfo = allShavaz.length > 1 ? { current: idx, total: allShavaz.length } : null;
                    const popup = L.popup({ maxWidth: 340, className: shavazPopupClass(entry.isFuture) })
                        .setLatLng(latlng)
                        .setContent(buildShavazPopup(entry.properties, entry.isFuture, false, navInfo));
                    popup.openOn(map);
                    bindShavazPopupEvents(popup, entry.properties, latlng, null, allShavaz, idx);
                }

                // --- Shavaz Kayam (existing public buildings) ---
                if (layers['shavaz_kayam'] && gd.shavaz_kayam) {
                    const shavazKayamLayer = L.geoJSON(gd.shavaz_kayam, {
                        pane: 'shavazPane',
                        style: () => ({ fillColor: '#8B4513', fillOpacity: 0.8, color: '#8B4513', weight: 1 }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const allShavaz = findOverlappingShavaz(e.latlng);
                                if (allShavaz.length === 0) allShavaz.push({ properties: f.properties, isFuture: false });
                                openShavazPopup(allShavaz, e.latlng, 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.shavaz_kayam = shavazKayamLayer;
                }

                // --- Future Shavaz (planned public buildings) ---
                if (layers['future_shavaz'] && gd.future_shavaz) {
                    const futureShavazLayer = L.geoJSON(gd.future_shavaz, {
                        pane: 'shavazPane',
                        filter: f => {
                            const s = normalizeStatus((f.properties.Mavat_Status || f.properties.status_mavat || '').trim());
                            if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                            const name = f.properties.MAVAT_NAME || '';
                            if (name.includes('מגורים')) return false;
                            if (f.properties.MAVAT_CODE === 1576) return false;
                            return true;
                        },
                        style: () => ({ fillColor: '#D2B48C', fillOpacity: 0.4, color: '#8B4513', weight: 1 }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const allShavaz = findOverlappingShavaz(e.latlng);
                                if (allShavaz.length === 0) allShavaz.push({ properties: f.properties, isFuture: true });
                                openShavazPopup(allShavaz, e.latlng, 0);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.future_shavaz = futureShavazLayer;
                }

                // --- Hafrashah from future_shavaz (מגורים features as points) ---
                if (layers['hafrashah_future'] && gd.future_shavaz) {
                    const hafrashah = gd.future_shavaz.features.filter(f => {
                        const s = normalizeStatus((f.properties.Mavat_Status || '').trim());
                        if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                        return (f.properties.MAVAT_NAME || '').includes('מגורים') || f.properties.MAVAT_CODE === 1576;
                    });
                    // Convert polygons to centroid points
                    const pointFeatures = hafrashah.map(f => {
                        const ring = f.geometry.type === 'MultiPolygon'
                            ? f.geometry.coordinates[0][0]
                            : f.geometry.coordinates[0];
                        // Use bbox center — more likely inside polygon than coordinate average
                        let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
                        ring.forEach(c => {
                            if (c[0] < minLng) minLng = c[0]; if (c[0] > maxLng) maxLng = c[0];
                            if (c[1] < minLat) minLat = c[1]; if (c[1] > maxLat) maxLat = c[1];
                        });
                        const centroid = [(minLng + maxLng) / 2, (minLat + maxLat) / 2];
                        return { type: 'Feature', properties: f.properties, geometry: { type: 'Point', coordinates: centroid } };
                    });
                    const pointCollection = { type: 'FeatureCollection', features: pointFeatures };
                    const hafrashaLayer = L.geoJSON(pointCollection, {
                        pane: 'shavazPane',
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                            radius: 5, fillColor: '#D2B48C', fillOpacity: 0.8, color: '#8B4513', weight: 1
                        }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', () => {
                                if (areaModeRef.current) return;
                                const popup = L.popup({ maxWidth: 340, className: shavazPopupClass(true) })
                                    .setLatLng(layer.getLatLng())
                                    .setContent(buildShavazPopup(f.properties, true, false, null, true));
                                popup.openOn(map);
                                bindShavazPopupEvents(popup, f.properties, layer.getLatLng());
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.hafrashah_future = hafrashaLayer;
                }

                // --- Yiud Karka Kayam (existing land use - Jerusalem municipality) ---
                if (layers['yiud_karka_kayam'] && gd.yiud_karka_kayam) {
                    const xplanAlsoOn = layers['landuse_xplan'];
                    const yiudKayamLayer = L.geoJSON(gd.yiud_karka_kayam, {
                        pane: 'landusePane',
                        style: f => {
                            const name = (f.properties.Descr || '').trim();
                            const c = getLanduseColor(name);
                            return { fillColor: c, fillOpacity: xplanAlsoOn ? 0.35 : 0.65, color: xplanAlsoOn ? '#999' : '#333', weight: 0.15 };
                        },
                        interactive: !layers['plans'],
                        onEachFeature: !layers['plans'] ? (f, layer) => {

                // --- Landuse XPLAN (land use from MAVAT/XPLAN) ---

                // --- Tama38 ---
                if (layers['tama38'] && gd.tama38) {

                        pane: 'tama38Pane',
                        filter: f => tama38InMinahak(f.properties),

                            const rawStatus = (f.properties.status || '').trim();

                // --- Rakal line colors ---
                const RAKAL_COLORS = {

                // --- Rakal (light rail lines) ---

                // --- Stations (colored by rakal line) ---

                    geoLayersRef.current.stations = stationsLayer;
                }

                // Heat map layer — colored polygons by density (total units / dunam)
                if (showHeatMap && gd.plans) {
                    // Helper: compute polygon area in sq meters using geodesic formula
                    function geojsonAreaSqm(geom) {
                        const toRad = d => d * Math.PI / 180;
                        function ringArea(coords) {
                            let area = 0;
                            for (let i = 0; i < coords.length - 1; i++) {
                                const p1 = coords[i], p2 = coords[i + 1];
                                area += toRad(p2[0] - p1[0]) * (2 + Math.sin(toRad(p1[1])) + Math.sin(toRad(p2[1])));
                            }
                            return Math.abs(area * 6378137 * 6378137 / 2);
                        }
                        if (geom.type === 'Polygon') return ringArea(geom.coordinates[0]);
                        if (geom.type === 'MultiPolygon') return geom.coordinates.reduce((s, p) => s + ringArea(p[0]), 0);
                        return 0;
                    }
                    // Color scale: density → color
                    const densityColors = [
                        [0,   '#fee5d9'],
                        [5,   '#fcbba1'],
                        [15,  '#fc9272'],
                        [30,  '#fb6a4a'],
                        [50,  '#ef3b2c'],
                        [80,  '#cb181d'],
                        [110, '#99000d'],
                        [150, '#67000d']
                    ];
                    function densityToColor(d) {
                        for (let i = densityColors.length - 1; i >= 0; i--) {
                            if (d >= densityColors[i][0]) return densityColors[i][1];
                        }
                        return densityColors[0][1];
                    }
                    const heatLayer = L.geoJSON(gd.plans, {
                        pane: 'plansPane',

                            const total = parseFloat(f.properties.units_total) || 0;
                            const st = normalizeStatus((f.properties.status_mavat || '').trim());

                            if (total <= 0 || !f.geometry) return false;
                            if (st === 'נגנזה/נדחתה' || st === 'נגנזה' || st === 'נדחתה') return false;
                            if (minahak === 'גבעת המטוס') return false;
                            return true;
                        },
                        style: f => {
                            const total = parseFloat(f.properties.units_total) || 0;
                            const areaSqm = geojsonAreaSqm(f.geometry);
                            const areaDunam = areaSqm / 1000;
                            const density = areaDunam > 0 ? total / areaDunam : 0;
                            return {
                                fillColor: densityToColor(density),
                                fillOpacity: 0.7,
                                color: '#333',
                                weight: 0.5
                            };
                        },
                        onEachFeature: (f, layer) => {
                            const total = parseFloat(f.properties.units_total) || 0;
                            const areaSqm = geojsonAreaSqm(f.geometry);
                            const areaDunam = areaSqm / 1000;
                            const density = areaDunam > 0 ? (total / areaDunam).toFixed(1) : '—';
                            const tip = `<b>${density}</b> יח"ד/דונם`;
                            layer.bindTooltip(tip, { sticky: true, className: 'heatmap-tip', direction: 'right', offset: [15, 0] });
                            // Click opens plan popup
                            layer.on('click', (e) => {
                                if (areaModeRef.current) return;
                                const mapped = mapPlanProps(f.properties);
                                const content = buildPlanPopup(mapped, { properties: mapped }, null);
                                L.popup({ maxWidth: 340, className: 'plan-popup' })
                                    .setLatLng(e.latlng)
                                    .setContent(content)
                                    .openOn(map);
                            });
                        }
                    }).addTo(map);
                    geoLayersRef.current.heatmap = heatLayer;
                }

                window.__geoLayersForPrint = geoLayersRef.current;
                console.log('[GeoJSON] Rendered layers:', Object.keys(geoLayersRef.current).join(', '));
            }, [layers, opacity, basemap, planningTopics, dataLoaded, zoomLevel, filters, showHeatMap]);

            // Build the plan popup HTML
            function getStatusColor(status) {

            function buildNavBar(navInfo) {

            function buildPlanPopup(props, featureData, navInfo, originShavazProps) {

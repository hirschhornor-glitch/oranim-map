<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אורנים - תכנון עירוני</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
            overflow: hidden;
            height: 100vh;
        }

        #root { height: 100vh; display: flex; }

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: margin-right 0.3s ease;
            z-index: 1000;
            position: relative;
        }

        .sidebar.collapsed {
            margin-right: -320px;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }

        .sidebar-header h1 {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85em;
            color: #a0a0b0;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
        }

        .sidebar-section h3 {
            font-size: 0.9em;
            color: #e94560;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .layer-group-title {
            font-size: 0.8em;
            color: #8888aa;
            margin: 10px 0 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .layer-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }

        .layer-item:hover { background: #2a2a4a; }

        .layer-item input[type="checkbox"] {
            margin-left: 10px;
            accent-color: #e94560;
            width: 16px;
            height: 16px;
            min-width: 16px;
            min-height: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: #1a1a3a;
            border: 2px solid #555;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .layer-item input[type="checkbox"]:checked {
            background: #e94560;
            border-color: #e94560;
        }
        .layer-item input[type="checkbox"]:checked::after {
            content: '✓';
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            line-height: 1;
        }

        .layer-item label {
            cursor: pointer;
            font-size: 0.9em;
            flex: 1;
        }

        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        .leaflet-control-attribution {
            font-size: 10px !important;
            opacity: 0.5 !important;
        }

        .wms-overlay {
            transition: opacity 0.3s ease;
        }

        .toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: #1a1a2e;
            color: white;
            border: 2px solid #e94560;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-btn:hover { background: #e94560; }

        .leaflet-popup-content {
            direction: rtl;
            text-align: right;
            margin: 0 !important;
            width: 300px !important;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            padding: 0;
            overflow: hidden;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .leaflet-popup-tip { border-top-color: #1a1a2e; }

        .popup-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .popup-header-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 2px;
        }

        .popup-header-subtitle {
            font-size: 12px;
            color: #8899bb;
            font-family: monospace;
        }

        .popup-body {
            padding: 12px 16px;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .popup-row:last-child { border-bottom: none; }

        .popup-row-label {
            font-size: 12px;
            color: #8888aa;
        }

        .popup-row-value {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .popup-footer {
            padding: 10px 16px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .popup-link {
            display: block;
            text-align: center;
            color: #5dade2;
            font-size: 13px;
            text-decoration: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-link:hover { background: #2a2a4a; }

        .popup-btn-permit {
            display: block;
            text-align: center;
            background: #e94560;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-permit:hover { background: #c73650; }

        .popup-btn-back {
            display: block;
            text-align: center;
            background: transparent;
            color: #5dade2;
            font-size: 12px;
            padding: 6px;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-btn-back:hover { background: #2a2a4a; }

        .popup-status-badge {
            display: inline-block;
            background: #0f3460;
            color: #5dade2;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .permit-detail-header {
            background: linear-gradient(135deg, #2d1a3e, #3d1a2e);
            padding: 14px 16px 10px;
            border-bottom: 2px solid #e94560;
        }

        .leaflet-popup-close-button {
            color: #8888aa !important;
            font-size: 18px !important;
            top: 6px !important;
            right: auto !important;
            left: 8px !important;
        }

        .leaflet-popup-close-button:hover { color: #e94560 !important; }

        .layer-legend-btn {
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            margin-right: auto;
        }
        .layer-legend-btn:hover { color: #e94560; }

        .legend-popup {
            position: fixed;
            top: 50%;
            right: 330px;
            transform: translateY(-50%);
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 16px 20px;
            z-index: 2000;
            min-width: 220px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: #fff;
        }
        .legend-popup-title {
            font-size: 14px;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 12px;
            text-align: center;
        }
        .legend-popup-close {
            position: absolute;
            top: 8px;
            left: 8px;
            background: none;
            border: none;
            color: #8888aa;
            font-size: 18px;
            cursor: pointer;
        }
        .legend-popup-close:hover { color: #e94560; }
        .legend-popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
        }

        .scale-display {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(255,255,255,0.85);
            color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            z-index: 800;
            pointer-events: none;
        }

        .plan-search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .plan-search-input {
            width: 100%;
            padding: 10px 36px 10px 12px;
            border-radius: 8px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.95em;
            direction: rtl;
        }

        .plan-search-input::placeholder { color: #6a6a8a; }
        .plan-search-input:focus { outline: none; border-color: #e94560; }

        .plan-search-clear {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6a6a8a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .plan-search-clear:hover { color: #e94560; }

        .plan-search-results {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: #1e1e36;
            border: 1px solid #3a3a5a;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1100;
            direction: rtl;
        }

        .plan-search-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.15s;
        }

        .plan-search-item:hover { background: #2a2a4a; }

        .plan-search-item-name {
            font-size: 13px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .plan-search-item-num {
            font-size: 11px;
            color: #6a6a8a;
            font-family: monospace;
        }

        .plan-search-empty {
            padding: 12px;
            text-align: center;
            color: #6a6a8a;
            font-size: 13px;
        }

        .opacity-slider {
            width: 100%;
            margin-top: 8px;
            accent-color: #e94560;
            cursor: pointer;
        }

        .opacity-label {
            font-size: 0.8em;
            color: #8888aa;
            display: flex;
            justify-content: space-between;
        }

        .loading-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            z-index: 1000;
            display: none;
        }

        .loading-indicator.visible { display: block; }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85em;
            white-space: nowrap;
            color: #fff;
        }

        .legend-color {
            width: 16px;
            min-width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-left: 8px;
            border: 1px solid #555;
        }

        .basemap-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            cursor: pointer;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            font-size: 0.9em;
            direction: rtl;
            margin-bottom: 8px;
        }

        .search-input::placeholder { color: #6a6a8a; }
        .search-input:focus { outline: none; border-color: #e94560; }

        .status-bar {
            padding: 10px 20px;
            background: #0f0f1e;
            font-size: 0.75em;
            color: #6a6a8a;
            border-top: 1px solid #2a2a4a;
            margin-top: auto;
        }

        .btn-reset {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-reset:hover {
            background: #e94560;
            color: white;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Popup navigation for multiple features */
        .popup-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 6px 16px;
            background: #0f0f1e;
            border-bottom: 1px solid #2a2a4a;
            font-size: 12px;
            color: #8888aa;
        }
        .popup-nav-btn {
            background: #2a2a4a;
            border: none;
            color: #e0e0e0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .popup-nav-btn:hover { background: #e94560; }

        /* GeoJSON layers get pointer cursor automatically via Leaflet */

        #map.leaflet-dragging,
        #map.leaflet-dragging *,
        #map.leaflet-dragging .leaflet-grab { cursor: grabbing !important; }

        /* Controls & popup elements */
        .leaflet-control-zoom a, .leaflet-control a { cursor: pointer !important; }
        .leaflet-popup-close-button { cursor: pointer !important; }
        .popup-link, .popup-btn-permit, .popup-btn-back { cursor: pointer !important; }

        /* Sidebar interactive elements */
        .layer-item, .layer-item label, .layer-item input[type="checkbox"] { cursor: pointer; }
        .layer-legend-btn { cursor: pointer; }
        .plan-search-item { cursor: pointer; }
        .plan-search-clear { cursor: pointer; }
        .btn-reset { cursor: pointer; }
        .basemap-select { cursor: pointer; }
        .toggle-btn { cursor: pointer; }

        /* ── Mobile sidebar close button (inside sidebar) ── */
        .sidebar-close-mobile {
            display: none;
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.3em;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sidebar-close-mobile:hover { background: #c73650; }

        /* ── Mobile overlay when sidebar is open ── */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        /* ── Mobile responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 85vw;
                max-width: 320px;
                min-width: unset;
                z-index: 1100;
                box-shadow: -4px 0 20px rgba(0,0,0,0.5);
                transition: transform 0.3s ease;
            }
            .sidebar.collapsed {
                margin-right: 0;
                transform: translateX(100%);
            }
            .sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            .sidebar-close-mobile {
                display: flex;
            }
            .sidebar-overlay.visible {
                display: block;
            }
            .toggle-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4em;
            }
            .map-toolbar {
                top: 60px;
                padding: 3px 4px;
            }
            .toolbar-btn {
                padding: 6px 8px !important;
            }
            .toolbar-label {
                font-size: 9px !important;
            }
        }

        /* ── Map Toolbar ── */
        .map-toolbar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            gap: 0;
            background: rgba(15, 15, 30, 0.94);
            backdrop-filter: blur(10px);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 4px 6px;
            direction: rtl;
        }
        .toolbar-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #8888aa;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
        }
        .toolbar-btn:hover { background: #2a2a4a; color: #e0e0ff; border-color: #3a3a5a; }
        .toolbar-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
        .toolbar-btn svg, .toolbar-btn .toolbar-icon { width: 20px; height: 20px; font-size: 20px; line-height: 1; }
        .toolbar-btn .toolbar-label { font-size: 10px; letter-spacing: 0.3px; }
        .toolbar-sep {
            width: 1px;
            background: #2a2a4a;
            margin: 6px 2px;
            align-self: stretch;
        }

        /* Toolbar dropdown (shared) */
        .toolbar-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 50%;
            transform: translateX(50%);
            background: #16162e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 4px 0;
            min-width: 170px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .toolbar-dropdown-item {
            padding: 9px 16px;
            color: #c0c0dd;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
            white-space: nowrap;
            font-family: inherit;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            direction: rtl;
        }
        .toolbar-dropdown-item:hover { background: #2a2a4a; color: #fff; }

        /* ── Shared modal styles ── */
        .modal-close {
            background: none; border: none; color: #8888aa; font-size: 22px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
        }
        .modal-close:hover { color: #e94560; background: #2a2a4a; }
        .modal-action-btn {
            background: #2a2a4a; border: 1px solid #3a3a5a; color: #c0c0dd;
            padding: 6px 16px; border-radius: 7px; cursor: pointer;
            font-size: 12px; font-family: inherit; transition: all 0.15s;
        }
        .modal-action-btn:hover { background: #3a3a5a; color: #fff; }
        .modal-action-btn.primary { background: #e94560; border-color: #e94560; color: #fff; }
        .modal-action-btn.primary:hover { background: #d6375a; }

        /* ── Print Modal ── */
        .print-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .print-modal {
            background: #16162e; border: 1px solid #2a2a4a; border-radius: 14px;
            width: 420px; max-width: 90vw; direction: rtl;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .print-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #2a2a4a;
        }
        .print-header h2 { margin: 0; font-size: 16px; color: #e0e0ff; }
        .print-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .print-field label {
            display: block; color: #8888aa; font-size: 12px; margin-bottom: 4px;
        }
        .print-field input[type="text"] {
            width: 100%; background: #1a1a3a; border: 1px solid #2a2a4a;
            border-radius: 7px; padding: 8px 12px; color: #e0e0ff;
            font-size: 13px; font-family: inherit; direction: rtl;
        }
        .print-field input[type="text"]:focus {
            outline: none; border-color: #4a69d1;
        }
        .print-checkbox {
            display: flex; align-items: center; gap: 8px;
            color: #c0c0dd; font-size: 13px; cursor: pointer;
        }
        .print-checkbox input { cursor: pointer; accent-color: #e94560; }
        .print-actions {
            padding: 14px 20px; border-top: 1px solid #2a2a4a;
            display: flex; gap: 8px; justify-content: flex-start;
        }

        /* ── Units Summary Modal ── */
        .units-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .units-modal {
            background: #16162e; border: 1px solid #2a2a4a; border-radius: 14px;
            width: 95vw; max-width: 1000px; max-height: 85vh;
            display: flex; flex-direction: column; direction: rtl;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        .units-watermark {

        // GeoJSON data files
        // Find the best label point inside a polygon (visual center)
        function pointInPolygon(pt, ring) {
            let inside = false;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                const xi = ring[i][0], yi = ring[i][1];
                const xj = ring[j][0], yj = ring[j][1];
                if ((yi > pt[1]) !== (yj > pt[1]) && pt[0] < (xj - xi) * (pt[1] - yi) / (yj - yi) + xi)
                    inside = !inside;
            }
            return inside;
        }

        function visualCenter(geometry) {
            // For MultiPolygon, find the largest part by area
            let ring;
            if (geometry.type === 'MultiPolygon') {
                let maxArea = 0;
                ring = geometry.coordinates[0][0];
                for (const poly of geometry.coordinates) {
                    const r = poly[0];
                    let a = 0;
                    for (let i = 0, j = r.length - 1; i < r.length; j = i++) {
                        a += r[j][0] * r[i][1] - r[i][0] * r[j][1];
                    }
                    a = Math.abs(a);
                    if (a > maxArea) { maxArea = a; ring = r; }
                }
            } else {
                ring = geometry.coordinates[0];
            }
            // Proper polygon centroid using signed area formula
            let area = 0, cx = 0, cy = 0;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                const a = ring[j][0] * ring[i][1] - ring[i][0] * ring[j][1];
                area += a;
                cx += (ring[j][0] + ring[i][0]) * a;
                cy += (ring[j][1] + ring[i][1]) * a;
            }
            area *= 0.5;
            if (Math.abs(area) > 1e-12) { cx /= (6 * area); cy /= (6 * area); }
            else { cx = ring[0][0]; cy = ring[0][1]; }
            if (pointInPolygon([cx, cy], ring)) return [cy, cx];
            // Bbox
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const c of ring) {
                if (c[0] < minX) minX = c[0]; if (c[1] < minY) minY = c[1];
                if (c[0] > maxX) maxX = c[0]; if (c[1] > maxY) maxY = c[1];
            }
            // Iterative grid search (polylabel-like): 4 rounds, each 12x12
            let bestPt = [cy, cx], bestDist = -1;
            let sMinX = minX, sMinY = minY, sMaxX = maxX, sMaxY = maxY;
            for (let round = 0; round < 4; round++) {
                const N = 12;
                const stepX = (sMaxX - sMinX) / N, stepY = (sMaxY - sMinY) / N;
                for (let xi = 0; xi < N; xi++) {
                    const gx = sMinX + (xi + 0.5) * stepX;
                    for (let yi = 0; yi < N; yi++) {
                        const gy = sMinY + (yi + 0.5) * stepY;
                        if (!pointInPolygon([gx, gy], ring)) continue;
                        let minEdgeDist = Infinity;
                        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                            const ax = ring[j][0], ay = ring[j][1];
                            const bx = ring[i][0], by = ring[i][1];
                            const abx = bx-ax, aby = by-ay;
                            const ab2 = abx*abx + aby*aby;
                            const t = ab2 > 0 ? Math.max(0, Math.min(1, ((gx-ax)*abx+(gy-ay)*aby)/ab2)) : 0;
                            const d = (gx-ax-t*abx)*(gx-ax-t*abx)+(gy-ay-t*aby)*(gy-ay-t*aby);
                            if (d < minEdgeDist) minEdgeDist = d;
                        }
                        if (minEdgeDist > bestDist) { bestDist = minEdgeDist; bestPt = [gy, gx]; }
                    }
                }
                // Zoom into area around best point for next round
                const r = Math.max(stepX, stepY);
                sMinX = bestPt[1] - r; sMaxX = bestPt[1] + r;
                sMinY = bestPt[0] - r; sMaxY = bestPt[0] + r;
            }
            return bestPt; // [lat, lng]

        // Minahak -> sub-neighborhoods mapping (for tama38 filtering)
        const MINAHAK_SUBS = {

            'גוננים': ['גוננים א-ו', 'פת', 'קטמונים', 'רסקו'],

            'מינהל מוסדי מלחה': ['מרכז ספורט מנחת - מלחה'],

        // Merge duplicate sub-neighborhood names
        const SUB_NORMALIZE = {
            'קטמונים ח-ט': 'קטמונים',
            'רסקו - גבעת הורדים': 'רסקו',
            'ארנונה': 'תלפיות ארנונה',
            'תלפיות': 'תלפיות ארנונה',
            'עמק רפאים - המושבה הגרמנית': 'המושבה הגרמנית',
            'קוממיות - טלביה': 'טלביה',
        };

        const CENTER = [31.7530, 35.2100];
        const DEFAULT_ZOOM = 15;

        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [layers, setLayers] = useState(() => {
                const initial = {};
                Object.values(LAYER_CONFIG).forEach(group => {
                    group.layers.forEach(l => { initial[l.id] = l.on; });
                });
                return initial;
            });
            const [opacity, setOpacity] = useState(0.85);
            const [basemap, setBasemap] = useState('cartoLight');
            const [loading, setLoading] = useState(true);
            const [dataLoaded, setDataLoaded] = useState(false);
            const [cursorPos, setCursorPos] = useState(null);
            const [searchText, setSearchText] = useState('');
            const [planSearch, setPlanSearch] = useState('');
            const [planIndex, setPlanIndex] = useState([]);
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [planningTopics, setPlanningTopics] = useState({
                overlapping: false,   // תבעות כפולות על אותו מרחב
                densification: false, // תכניות לעיבוי שטחים חומים
                objections: false,     // תכניות המופקדות להתנגדויות
                infrastructure: false
            });
            const [legendPopup, setLegendPopup] = useState(null); // { title, items }
            const [mapScale, setMapScale] = useState('');
            const [zoomLevel, setZoomLevel] = useState(15);
            const [measureMode, setMeasureMode] = useState(null); // null | 'distance' | 'area'
            const [measureDropdown, setMeasureDropdown] = useState(false);
            const [measureResult, setMeasureResult] = useState(null); // { type, value, unit }
            const measureRef = useRef({ points: [], layers: [], tooltip: null, guideLine: null });
            const [showPrint, setShowPrint] = useState(false);
            const [printTitle, setPrintTitle] = useState('');
            const [printShowLegend, setPrintShowLegend] = useState(true);
            const [printShowTitle, setPrintShowTitle] = useState(true);
            const [activeDropdown, setActiveDropdown] = useState(null); // 'measure' | null
            const [showUnits, setShowUnits] = useState(false);
            const [unitsData, setUnitsData] = useState(null); // { minahaks, byMinahak }
            const [unitsLoading, setUnitsLoading] = useState(false);
            const [unitsExpanded, setUnitsExpanded] = useState(null); // null | 'type' | 'status'
            const [unitsDrilldown, setUnitsDrilldown] = useState(null); // minahak name for drill-down view

            // Load plan search index
            useEffect(() => {
                fetch('plans_index.json')
                    .then(res => res.json())
                    .then(data => setPlanIndex(data))
                    .catch(err => console.error('Failed to load plan index:', err));
            }, []);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const geoDataRef = useRef({});
            const geoLayersRef = useRef({});
            const baseTileRef = useRef(null);
            const layersRef = useRef(layers);


            // Initialize map
            useEffect(() => {
                if (mapInstanceRef.current) return;

                const map = L.map('map', {
                    center: CENTER,
                    zoom: DEFAULT_ZOOM,
                    zoomControl: false,
                    maxZoom: 22,
                    minZoom: 13
                });

                L.control.zoom({ position: 'topleft' }).addTo(map);
                L.control.scale({ position: 'bottomleft', imperial: false }).addTo(map);

                map.on('mousemove', (e) => {
                    setCursorPos({ lat: e.latlng.lat.toFixed(5), lng: e.latlng.lng.toFixed(5) });
                });

                // Scale indicator
                const updateScale = () => {
                    const center = map.getCenter();
                    const metersPerPixel = 40075016.686 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, map.getZoom() + 8);
                    const dpi = 96;
                    const metersPerInch = metersPerPixel * dpi;
                    const scale = Math.round(metersPerInch * 39.3701);
                    setMapScale('1:' + scale.toLocaleString());
                };
                map.on('zoomend moveend', updateScale);
                map.on('zoomend', () => setZoomLevel(map.getZoom()));
                setTimeout(updateScale, 200);

                mapInstanceRef.current = map;
                window.__map = map;

                // Ensure map fills container after initial render
                setTimeout(() => map.invalidateSize(), 100);

                // Create custom panes for z-ordering
                map.createPane('districtPane').style.zIndex = 200;
                map.createPane('subNeighborhoodPane').style.zIndex = 250;
                map.createPane('minahakPane').style.zIndex = 270;
                map.createPane('plansPane').style.zIndex = 300;
                map.createPane('topicsPane').style.zIndex = 350;
                map.createPane('permitsPane').style.zIndex = 400;
                map.createPane('tama38Pane').style.zIndex = 450;
                map.createPane('stationsPane').style.zIndex = 500;
                const labelsP = map.createPane('labelsPane');
                labelsP.style.zIndex = 550;
                labelsP.style.pointerEvents = 'none';

                // Load all GeoJSON data
                const entries = Object.entries(GEOJSON_FILES);
                Promise.all(entries.map(([key, url]) =>
                    fetch(url).then(r => r.json()).then(data => [key, data]).catch(() => [key, null])
                )).then(results => {
                    const gd = {};
                    results.forEach(([key, data]) => { if (data) gd[key] = data; });
                    geoDataRef.current = gd;
                    setDataLoaded(true);
                    setLoading(false);
                    console.log('[GeoJSON] Loaded:', Object.keys(gd).join(', '));
                });

                return () => { map.remove(); mapInstanceRef.current = null; };
            }, []);

            // Update basemap
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                if (baseTileRef.current) {
                    map.removeLayer(baseTileRef.current);
                    baseTileRef.current = null;
                }

                const bm = BASEMAPS[basemap];
                if (bm.url) {
                    baseTileRef.current = L.tileLayer(bm.url, {
                        attribution: bm.attribution,
                        maxZoom: 22
                    }).addTo(map);
                    baseTileRef.current.bringToBack();
                }
            }, [basemap]);

            // Keep refs in sync
            useEffect(() => { layersRef.current = layers; }, [layers]);
            // GeoJSON layers have built-in pointer cursor on hover — no probe needed

            // ── Measurement tool logic ──
            const clearMeasurement = useCallback(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const m = measureRef.current;
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);
            }, []);

            const stopMeasure = useCallback(() => {
                clearMeasurement();
                setMeasureMode(null);
                const map = mapInstanceRef.current;
                if (map) map.getContainer().classList.remove('measuring');
            }, [clearMeasurement]);

            // Format distance in m/km
            function fmtDist(m) {
                if (m >= 1000) return (m / 1000).toFixed(2) + ' ק"מ';
                return Math.round(m) + ' מ\'';
            }
            // Format area in dunam / sqm
            function fmtArea(sqm) {
                const dunam = sqm / 1000;
                if (dunam >= 1) return dunam.toFixed(2) + ' דונם' + ' (' + Math.round(sqm).toLocaleString() + ' מ"ר)';
                return Math.round(sqm).toLocaleString() + ' מ"ר';
            }
            // Compute total polyline distance
            function polylineDist(pts) {
                let d = 0;
                for (let i = 1; i < pts.length; i++) d += pts[i - 1].distanceTo(pts[i]);
                return d;
            }
            // Compute polygon area using Shoelace on projected coords
            function polygonArea(pts) {
                if (pts.length < 3) return 0;
                // Use L.GeometryUtil if available, otherwise Gauss's formula on EPSG:4326
                // Spherical excess method for better accuracy
                const toRad = Math.PI / 180;
                const R = 6378137;
                let area = 0;
                const n = pts.length;
                for (let i = 0; i < n; i++) {
                    const j = (i + 1) % n;
                    const k = (i + 2) % n;
                    area += (pts[j].lng * toRad - pts[i].lng * toRad) *
                        (2 + Math.sin(pts[i].lat * toRad) + Math.sin(pts[j].lat * toRad));
                }
                area = Math.abs(area * R * R / 2);
                return area;
            }

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const container = map.getContainer();

                if (!measureMode) {
                    container.classList.remove('measuring');
                    return;
                }

                container.classList.add('measuring');
                const m = measureRef.current;
                // Clear any previous measurement
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);

                const lineStyle = { color: '#e94560', weight: 2, dashArray: '6 4' };
                const fillStyle = { color: '#e94560', fillColor: 'rgba(233,69,96,0.15)', weight: 2, dashArray: '6 4' };
                const vertexStyle = { radius: 5, color: '#e94560', fillColor: '#fff', fillOpacity: 1, weight: 2 };

                function updateTooltip(latlng, text) {
                    if (m.tooltip) {
                        m.tooltip.setLatLng(latlng).setContent(text);
                    } else {
                        m.tooltip = L.tooltip({
                            permanent: true,
                            direction: 'top',
                            offset: [0, -10],
                            className: 'measure-tooltip'
                        }).setLatLng(latlng).setContent(text).addTo(map);
                    }
                }

                function onMapClick(e) {
                    // Ignore clicks on controls/popups
                    if (e.originalEvent && (
                        e.originalEvent.target.closest('.leaflet-control') ||
                        e.originalEvent.target.closest('.leaflet-popup') ||
                        e.originalEvent.target.closest('.map-toolbar') ||
                        e.originalEvent.target.closest('.measure-result')
                    )) return;

                    const pt = e.latlng;
                    m.points.push(pt);

                    // Add vertex marker
                    const marker = L.circleMarker(pt, vertexStyle).addTo(map);
                    m.layers.push(marker);

                    if (measureMode === 'distance') {
                        if (m.points.length > 1) {
                            const line = L.polyline(m.points, lineStyle).addTo(map);
                            // Remove old line if exists
                            if (m.mainLine) map.removeLayer(m.mainLine);
                            m.mainLine = line;
                            m.layers.push(line);
                        }
                        const dist = polylineDist(m.points);
                        if (dist > 0) {
                            updateTooltip(pt, fmtDist(dist));
                            setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        }
                    } else {
                        // Area mode
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        if (m.points.length >= 2) {
                            const poly = L.polygon(m.points, fillStyle).addTo(map);
                            m.mainPoly = poly;
                            m.layers.push(poly);
                        }
                        if (m.points.length >= 3) {
                            const area = polygonArea(m.points);
                            updateTooltip(pt, fmtArea(area));
                            setMeasureResult({ type: 'area', value: fmtArea(area) });
                        } else {
                            updateTooltip(pt, 'לחצו נקודות נוספות');
                        }
                    }
                }

                function onMouseMove(e) {
                    if (m.points.length === 0) return;
                    const lastPt = m.points[m.points.length - 1];
                    // Draw guide line from last point to cursor
                    if (m.guideLine) map.removeLayer(m.guideLine);
                    m.guideLine = L.polyline([lastPt, e.latlng], {
                        color: '#8888aa', weight: 1, dashArray: '4 4'
                    }).addTo(map);

                    // Show running measurement in tooltip
                    if (measureMode === 'distance') {
                        const totalDist = polylineDist(m.points) + lastPt.distanceTo(e.latlng);
                        updateTooltip(e.latlng, fmtDist(totalDist));
                    } else if (m.points.length >= 2) {
                        const tempPts = [...m.points, e.latlng];
                        const area = polygonArea(tempPts);
                        updateTooltip(e.latlng, fmtArea(area));
                    }
                }

                function onDblClick(e) {
                    L.DomEvent.stopPropagation(e);
                    L.DomEvent.preventDefault(e);
                    // Finish measurement
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }

                    if (measureMode === 'distance' && m.points.length >= 2) {
                        // Finalize line — solid
                        if (m.mainLine) map.removeLayer(m.mainLine);
                        const finalLine = L.polyline(m.points, { color: '#e94560', weight: 3 }).addTo(map);
                        m.layers.push(finalLine);
                        const dist = polylineDist(m.points);
                        setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        updateTooltip(m.points[m.points.length - 1], fmtDist(dist));
                    } else if (measureMode === 'area' && m.points.length >= 3) {
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        const finalPoly = L.polygon(m.points, {
                            color: '#e94560', fillColor: 'rgba(233,69,96,0.2)', weight: 3
                        }).addTo(map);
                        m.layers.push(finalPoly);
                        const area = polygonArea(m.points);
                        setMeasureResult({ type: 'area', value: fmtArea(area) });
                        updateTooltip(m.points[m.points.length - 1], fmtArea(area));
                    }

                    // Stop listening but keep result visible
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);
                    container.classList.remove('measuring');
                }

                function onKeyDown(e) {
                    if (e.key === 'Escape') {
                        stopMeasure();
                        document.removeEventListener('keydown', onKeyDown);
                    }
                }

                // Disable double-click zoom while measuring
                map.doubleClickZoom.disable();

                map.on('click', onMapClick);
                map.on('mousemove', onMouseMove);
                map.on('dblclick', onDblClick);
                document.addEventListener('keydown', onKeyDown);

                return () => {
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);
                    document.removeEventListener('keydown', onKeyDown);
                    map.doubleClickZoom.enable();
                    container.classList.remove('measuring');
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }
                };
            }, [measureMode, stopMeasure]);

            // ── Print function ──
            const [printScale, setPrintScale] = useState('current'); // 'current' | '1:2500' | '1:5000' | ...
            const PRINT_SCALES = [
                { value: 'current', label: 'קנ"מ נוכחי' },
                { value: '1:2500', label: '1:2,500', denom: 2500 },
                { value: '1:5000', label: '1:5,000', denom: 5000 },
                { value: '1:10000', label: '1:10,000', denom: 10000 },
                { value: '1:15000', label: '1:15,000', denom: 15000 },
                { value: '1:25000', label: '1:25,000', denom: 25000 },
            ];

            const handlePrint = useCallback(async () => {
                const map = mapInstanceRef.current;
                if (!map) return;

                const title = printShowTitle ? (printTitle || 'מפת אורנים - תכנון עירוני') : '';

                // Build legend HTML with print-safe colors
                let legendHtml = '';
                if (printShowLegend) {
                    legendHtml = '<div style="margin-top:12px;border:1px solid #ccc;border-radius:8px;padding:12px;background:#f9f9f9;direction:rtl;print-color-adjust:exact;-webkit-print-color-adjust:exact">';
                    legendHtml += '<div style="font-weight:bold;font-size:14px;margin-bottom:8px;border-bottom:1px solid #ddd;padding-bottom:6px">מקרא</div>';
                    legendHtml += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
                    PLANS_LEGEND.forEach(item => {
                        legendHtml += `<div style="display:flex;align-items:center;gap:4px;font-size:11px">` +
                            `<span style="width:14px;height:14px;min-width:14px;min-height:14px;border-radius:3px;background:${item.color};display:inline-block;border:1px solid #aaa;print-color-adjust:exact;-webkit-print-color-adjust:exact"></span>` +
                            `${item.label}</div>`;
                    });
                    legendHtml += '</div></div>';
                }

                // Determine map bounds based on selected scale
                const mapContainer = map.getContainer();
                const mapRect = mapContainer.getBoundingClientRect();
                const center = map.getCenter();

                let printBounds, printScaleLabel;
                const selectedScale = PRINT_SCALES.find(s => s.value === printScale);

                if (printScale !== 'current' && selectedScale && selectedScale.denom) {
                    // Calculate bounds for exact scale
                    // At this scale, 1 cm on paper = denom cm in reality
                    // Print area ~ A4 landscape = ~27cm x 17cm
                    const paperWidthCm = 27;
                    const paperHeightCm = 17;
                    const metersWide = (selectedScale.denom * paperWidthCm) / 100;
                    const metersHigh = (selectedScale.denom * paperHeightCm) / 100;

                    // Convert meters to degrees (approximate at Jerusalem latitude ~31.75)
                    const lat = center.lat;
                    const mPerDegLat = 111320;
                    const mPerDegLng = 111320 * Math.cos(lat * Math.PI / 180);
                    const dLat = (metersHigh / 2) / mPerDegLat;
                    const dLng = (metersWide / 2) / mPerDegLng;

                    printBounds = L.latLngBounds(
                        [center.lat - dLat, center.lng - dLng],
                        [center.lat + dLat, center.lng + dLng]
                    );
                    printScaleLabel = selectedScale.label;
                } else {
                    printBounds = map.getBounds();
                    // Calculate current scale
                    const centerPx = map.latLngToContainerPoint(center);
                    const rightPx = L.point(centerPx.x + 100, centerPx.y);
                    const rightLL = map.containerPointToLatLng(rightPx);
                    const distM = center.distanceTo(rightLL);
                    const dpi = 96;
                    const distCm = 100 / dpi * 2.54;
                    const scaleDenom = Math.round((distM * 100) / distCm);
                    printScaleLabel = '1:' + scaleDenom.toLocaleString('he-IL');
                }

                // Capture map as canvas image for print
                const bSw = printBounds.getSouthWest();
                const bNe = printBounds.getNorthEast();
                const printRect = mapContainer.getBoundingClientRect();
                const printW = Math.round(printRect.width);
                const printH = Math.round(printRect.height);

                // Use html2canvas to capture the map
                let mapImgUrl = '';
                if (window.html2canvas) {
                    const canvas = await window.html2canvas(mapContainer, { useCORS: true, allowTaint: true, logging: false });
                    mapImgUrl = canvas.toDataURL('image/png');
                } else {
                    // Fallback: just take a screenshot of current view
                    const canvasEl = document.createElement('canvas');
                    canvasEl.width = printW;
                    canvasEl.height = printH;
                    const ctx = canvasEl.getContext('2d');
                    ctx.fillStyle = '#e8e8e8';
                    ctx.fillRect(0, 0, printW, printH);
                    ctx.font = '20px sans-serif';
                    ctx.fillStyle = '#333';
                    ctx.textAlign = 'center';
                    ctx.fillText('נא לטעון html2canvas להדפסה', printW / 2, printH / 2);
                    mapImgUrl = canvasEl.toDataURL('image/png');
                }

                // Scale bar: compute a nice round distance
                function niceScaleBar(boundsWidthM, imgWidthPx) {
                    const mPerPx = boundsWidthM / imgWidthPx;
                    const targetPx = 150;
                    const targetM = targetPx * mPerPx;
                    const nice = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000];
                    let bestM = nice[0];
                    for (const n of nice) { if (n <= targetM * 1.5) bestM = n; }
                    const barPx = Math.round(bestM / mPerPx);
                    const label = bestM >= 1000 ? (bestM / 1000) + ' ק"מ' : bestM + ' מ\'';
                    return { barPx, label };
                }
                const boundsWidthM = bSw.distanceTo(L.latLng(bSw.lat, bNe.lng));
                const scaleBar = niceScaleBar(boundsWidthM, printW);

                const printWin = window.open('', '_blank');
                if (!printWin) { alert('נא לאפשר חלונות קופצים להדפסה'); return; }

                printWin.document.write(`<!DOCTYPE html><html lang="he" dir="rtl"><head>
                    <meta charset="UTF-8">
                    <title>${title || 'הדפסת מפה'}</title>
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; padding: 20px; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
                        @media print { body { padding: 5mm; } .no-print { display: none !important; } @page { size: landscape; margin: 8mm; } }
                        .print-title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 6px; color: #1a1a2e; }
                        .print-date { font-size: 11px; color: #666; text-align: center; margin-bottom: 10px; }
                        .map-container { position: relative; width: 100%; border: 2px solid #333; border-radius: 4px; overflow: hidden; background: #e8e8e8; }
                        .map-container img { width: 100%; height: auto; display: block; }
                        .scale-bar-box { position: absolute; bottom: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 4px; font-size: 11px; color: #333; border: 1px solid #999; }
                        .scale-bar-line { height: 4px; background: #333; margin-top: 3px; border-radius: 1px; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
                        .scale-label { font-size: 12px; font-weight: bold; position: absolute; bottom: 10px; right: 10px; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 4px; color: #333; border: 1px solid #999; }
                        .print-actions { margin-top: 16px; text-align: center; }
                        .print-actions button { padding: 8px 24px; font-size: 14px; cursor: pointer; background: #e94560; color: #fff; border: none; border-radius: 6px; font-family: inherit; }
                    </style>
                </head><body>
                    ${title ? `<div class="print-title">${title}</div>` : ''}
                    <div class="print-date">${new Date().toLocaleDateString('he-IL')} | ${printScaleLabel}</div>
                    <div class="map-container">
                        <img src="${mapImgUrl}" alt="מפה" />
                        <div class="scale-bar-box">
                            <div>${scaleBar.label}</div>
                            <div class="scale-bar-line" style="width:${scaleBar.barPx * (100 / printW) * 100}%"></div>
                        </div>
                        <div class="scale-label">${printScaleLabel}</div>
                    </div>
                    ${legendHtml}
                    <div class="print-actions no-print">
                        <button onclick="window.print()">🖨️ הדפס</button>
                    </div>
                </body></html>`);
                printWin.document.close();
                setShowPrint(false);
            }, [printTitle, printShowLegend, printShowTitle, printScale, layers]);

            // ── Units summary: fetch plans + tama38 and aggregate by minahak ──
            // Map tama38 neighborho → minahak
            const NEIGHBORHOOD_TO_MINAHAK = {
                'טלביה': 'גינות העיר', 'רחביה': 'גינות העיר',
                'קטמון הישנה': 'גינות העיר', 'גבעת הורדים': 'גוננים',
                'גבעת הורדים - רסקו': 'גוננים',
                'עמק רפאים': 'גינות העיר', 'עמק רפאים - המושבה הגרמנית': 'גינות העיר',
                'עמק רפאים- המושבה הגרמנית': 'גינות העיר',
                'ארנונה': 'בקעה רבתי',
                'תלפיות': 'בקעה רבתי',
                'בית צפאפא': 'בית צפאפא',
                'מלחה': 'מינהל מוסדי מלחה',
            };

            const fetchUnitsData = useCallback(() => {
                if (unitsData) { setShowUnits(true); return; } // cached
                setUnitsLoading(true);
                setShowUnits(true);

                const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJU2Odzsa_d789A5545sSFnUGsrXuW2VTj3xCNEtV1sOM13VNVeepGhzraHoQgLWBaGTCitS-4j7Sy/pub?output=csv';

                // Parse CSV (handles quoted fields with commas)
                function parseCSV(text) {
                    const rows = [];
                    let row = []; let field = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const ch = text[i];
                        if (inQuotes) {
                            if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
                            else if (ch === '"') { inQuotes = false; }
                            else { field += ch; }
                        } else {
                            if (ch === '"') { inQuotes = true; }
                            else if (ch === ',') { row.push(field); field = ''; }
                            else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
                                row.push(field); field = '';
                                if (row.length > 1) rows.push(row);
                                row = [];
                                if (ch === '\r') i++;
                            } else { field += ch; }
                        }
                    }
                    if (field || row.length) { row.push(field); rows.push(row); }
                    return rows;
                }

                // Fetch plans from Google Sheets + tama38 from WMS grid
                const plansPromise = fetch(sheetUrl).then(r => r.text()).then(csv => {
                    const rows = parseCSV(csv);
                    const header = rows[0];
                    return rows.slice(1).map(r => {
                        const obj = {};
                        header.forEach((h, i) => { obj[h] = r[i] || ''; });
                        return obj;
                    });
                }).catch(() => []);

                // Tama38: read directly from loaded GeoJSON
                const gd = geoDataRef.current;
                const tamaMap = new Map();
                if (gd.tama38) {
                    gd.tama38.features.forEach(f => {
                        const id = f.properties.fid;
                        if (id != null && !tamaMap.has(id)) tamaMap.set(id, f.properties);
                    });
                }

                plansPromise.then(planRows => {
                    // Aggregate
                    const minahakOrder = ['גינות העיר', 'בית צפאפא', 'גוננים', 'בקעה רבתי', 'מינהל מוסדי מלחה', 'א.ת. תלפיות'];
                    const byMinahak = {};
                    const bySub = {}; // { minahak: { subNeighborhood: { ... } } }
                    const STATUS_GROUPS = [
                        { key: 'ו-גמר בנייה', label: 'גמר בנייה', color: '#494CC2', match: [] },
                        { key: 'ה-בבנייה', label: 'בבנייה', color: '#4a69d1', match: [] },
                        { key: 'ד-היתר בנייה', label: 'היתר בנייה', color: '#4b85e0', match: [] },
                        { key: 'ג-רישוי בתהליך', label: 'רישוי בתהליך', color: '#4ba1f0', match: [] },
                        { key: 'approved', label: 'אישור / מאושרת', color: '#4CAF50',
                          match: ['אישור','מאושרת','תבע מאושרת','תחילת תוקף'] },
                        { key: 'in_approval', label: 'בהליך אישור', color: '#66BB6A',
                          match: ['בהליך אישור','תבע - טרום אישור'] },
                        { key: 'objections', label: 'התנגדויות', color: '#FDD835',
                          match: ['דיון בהתנגדויות ותיקונים'] },
                        { key: 'deposit', label: 'הפקדה', color: '#FDD835',
                          match: ['הפקדה להתנגדויות/השגות'] },
                        { key: 'conditions', label: 'במילוי תנאים להפקדה', color: '#FF9800',
                          match: ['במילוי תנאים להפקדה','תכנית עומדת בתנאי סף'] },
                        { key: 'open', label: 'פתיחת תיק / בדיקה', color: '#F44336',
                          match: ['נפתח תיק למתכנן','נפתח תיק תבע','בבדיקה תכנונית','נקלטה מקובץ מבאת'] },
                    ];
                    function getStatusGroup(status) {
                        for (const g of STATUS_GROUPS) {
                            if (g.match.includes(status)) return g.key;
                        }
                        return null;
                    }
                    const emptyRow = () => ({ units_in: 0, units_add: 0, renewal: 0, densification: 0, byStatus: {} });
                    minahakOrder.forEach(m => {
                        byMinahak[m] = emptyRow();
                        bySub[m] = {};
                    });

                    // Plans (from Google Sheets CSV)
                    planRows.forEach(p => {
                        const m = (p.minahak || '').trim();
                        if (!byMinahak[m]) { byMinahak[m] = emptyRow(); bySub[m] = {}; }
                        // Skip rejected/archived plans for units_add
                        const status = (p.Status_Mavat || p.status_mavat || '').trim();
                        const isRejected = status === 'נגנזה/נדחתה' || status === 'נגנזה' || status === 'נדחתה';
                        const addVal = isRejected ? 0 : (parseInt(p.Units_add || p.units_add) || 0);
                        const inVal = parseInt(p.Units_in || p.units_in) || 0;
                        byMinahak[m].units_in += inVal;
                        byMinahak[m].units_add += addVal;

                        const pt = (p.plan_type || '').trim();
                        if (pt.includes('התחדשות')) {
                            byMinahak[m].renewal += addVal;
                        } else if (pt.includes('עיבוי')) {
                            byMinahak[m].densification += addVal;
                        }

                        // Per-status group breakdown
                        if (!isRejected && addVal > 0 && status) {
                            const grp = getStatusGroup(status);
                            const stageRaw = (p.stage || p.Stage || '').trim();
                            // Normalize double-space variant
                            const stageVal = stageRaw.replace(/\s+/g, ' ');
                            // If approved and has a stage value, use stage instead of status
                            if (grp === 'approved' && stageVal) {
                                byMinahak[m].byStatus[stageVal] = (byMinahak[m].byStatus[stageVal] || 0) + addVal;
                            } else if (grp) {
                                byMinahak[m].byStatus[grp] = (byMinahak[m].byStatus[grp] || 0) + addVal;
                            }
                        }

                        // Per sub-neighborhood breakdown
                        const subRaw = (p.sub_neighborhood || p.neighborhood || 'אחר').trim() || 'אחר';
                        const sub = SUB_NORMALIZE[subRaw] || subRaw;
                        if (!bySub[m][sub]) bySub[m][sub] = emptyRow();
                        bySub[m][sub].units_in += inVal;
                        bySub[m][sub].units_add += addVal;
                        if (pt.includes('התחדשות')) {
                            bySub[m][sub].renewal += addVal;
                        } else if (pt.includes('עיבוי')) {
                            bySub[m][sub].densification += addVal;
                        }
                        if (!isRejected && addVal > 0 && status) {
                            bySub[m][sub].byStatus[status] = (bySub[m][sub].byStatus[status] || 0) + addVal;
                        }
                    });

                    // Tama38 — add to units_add and to renewal (התחדשות עירונית)
                    tamaMap.forEach(p => {
                        const neighborho = (p.neighborho || '').trim();
                        const m = NEIGHBORHOOD_TO_MINAHAK[neighborho] || '';
                        if (!m) return;
                        if (!byMinahak[m]) { byMinahak[m] = emptyRow(); bySub[m] = {}; }
                        const tose = parseInt(p.units_tose) || 0;
                        byMinahak[m].units_add += tose;
                        byMinahak[m].renewal += tose; // tama38 = התחדשות עירונית

                        // Per sub-neighborhood: use neighborho as sub name
                        const subRaw2 = neighborho || 'אחר';
                        const sub = SUB_NORMALIZE[subRaw2] || subRaw2;
                        if (!bySub[m][sub]) bySub[m][sub] = emptyRow();
                        bySub[m][sub].units_add += tose;
                        bySub[m][sub].renewal += tose;
                    });

                    // Fixed units_in values provided by user (per minahak)
                    const fixedUnitsIn = {
                        'בית צפאפא': 4262,
                        'גוננים': 9235,
                        'בקעה רבתי': 11521,
                        'גינות העיר': 16569,
                        'מינהל מוסדי מלחה': 0,
                        'א.ת. תלפיות': 643,
                    };
                    Object.entries(fixedUnitsIn).forEach(([m, val]) => {
                        if (byMinahak[m]) byMinahak[m].units_in = val;
                    });

                    // Fixed units_in per sub-neighborhood
                    const fixedSubUnitsIn = {
                        'בקעה רבתי': {
                            'מקור חיים': 1019, 'בקעה': 3614, 'גבעת חנניה - אבו תור': 1579,
                            'צפון תלפיות': 873, 'תלפיות ארנונה': 3250, 'שיכוני תלפיות': 1186,
                        },
                        'גוננים': {
                            'גוננים א-ו': 4253, 'פת': 700, 'קטמונים': 2208, 'רסקו': 2074,
                        },
                        'גינות העיר': {
                            'המושבה הגרמנית': 1293, 'המושבה היוונית': 1055, 'ניות': 788, 'טלביה': 2511,
                            'קטמון הישנה': 4343, 'קרית שמואל': 3423, 'רחביה': 3156,
                        },
                    };
                    Object.entries(fixedSubUnitsIn).forEach(([m, subs]) => {
                        if (!bySub[m]) bySub[m] = {};
                        Object.entries(subs).forEach(([s, val]) => {
                            if (!bySub[m][s]) bySub[m][s] = emptyRow();
                            bySub[m][s].units_in = val;
                        });
                    });

                    const minahaks = minahakOrder.filter(m => byMinahak[m]);
                    Object.keys(byMinahak).forEach(m => {
                        if (!minahaks.includes(m) && m) minahaks.push(m);
                    });

                    setUnitsData({ minahaks, byMinahak, bySub, statusGroups: STATUS_GROUPS });
                    setUnitsLoading(false);
                });
            }, [unitsData]);

            // GeoJSON rendering: add/remove L.geoJSON layers based on state
            useEffect(() => {
                const map = mapInstanceRef.current;
                const gd = geoDataRef.current;
                if (!map || !dataLoaded) return;

                // Remove all previous geo layers + label markers
                function cleanupLayer(ll) {
                    if (ll.eachLayer) ll.eachLayer(sub => {
                        if (sub._planNumMarker) map.removeLayer(sub._planNumMarker);
                        if (sub._labelMarker) map.removeLayer(sub._labelMarker);
                        if (sub._minahakLabel) map.removeLayer(sub._minahakLabel);
                        if (sub._subLabel) map.removeLayer(sub._subLabel);
                    });
                    map.removeLayer(ll);
                }
                Object.values(geoLayersRef.current).forEach(l => {
                    if (Array.isArray(l)) l.forEach(ll => cleanupLayer(ll));
                    else if (l) cleanupLayer(l);
                });
                geoLayersRef.current = {};

                // Minahak filter
                const adminLayers = LAYER_CONFIG.admin.layers;
                const selectedMinahaks = adminLayers.filter(l => layers[l.id]).map(l => l.minahak);
                const allAdminOn = adminLayers.every(l => layers[l.id]);
                const selectedSubs = selectedMinahaks.flatMap(m => MINAHAK_SUBS[m] || []);

                function planInMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedMinahaks.length === 0) return false;
                    const m = props['מינה"ק'] || props.minahak || '';
                    return selectedMinahaks.includes(m);
                }
                function tama38InMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedSubs.length === 0) return false;
                    const n = (props.neighborho || '').trim();
                    return selectedSubs.includes(n);
                }

                // --- District outline + white mask outside (always on) ---
                if (gd.district_oranim) {
                    // Create an inverted polygon: world bounds with district as hole
                    const districtFeature = gd.district_oranim.features[0];
                    if (districtFeature) {
                        // World outer ring (covers entire map)
                        const worldRing = [[-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]];
                        // District inner ring (hole) — reverse winding
                        const distCoords = districtFeature.geometry.coordinates[0];
                        const holeRing = distCoords.map(c => [c[1], c[0]]); // GeoJSON [lng,lat] → Leaflet [lat,lng]
                        const maskPolygon = L.polygon([worldRing, holeRing], {
                            pane: 'districtPane',
                            color: 'transparent', weight: 0,
                            fillColor: '#ffffff', fillOpacity: 0.2
                        }).addTo(map);
                        geoLayersRef.current.districtMask = maskPolygon;
                    }
                }

                // --- Sub-neighborhoods (always on) — green outline, green label ---
                if (gd.sub_neighborhoods) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.sub_neighborhoods = L.geoJSON(gd.sub_neighborhoods, {
                        pane: 'subNeighborhoodPane',
                        style: { color: 'rgba(17,199,64,1)', weight: zoom >= 18 ? 2.5 : zoom >= 17 ? 2.0 : 1.0, fillOpacity: 0, dashArray: '5,2' },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.SCHN_NAMA || f.properties.Name || f.properties.name || '';
                            if (name && f.geometry) {
                                const subClass = 'sub-neighborhood-label' + (zoom >= 18 ? ' sub-label-z18' : zoom >= 17 ? ' sub-label-z17' : zoom >= 16 ? ' sub-label-z16' : '');
                                const center = visualCenter(f.geometry);
                                const marker = L.marker(center, {
                                    icon: L.divIcon({
                                        className: subClass,
                                        html: '<div class="label-inner">' + name + '</div>',
                                        iconSize: [0, 0],
                                        iconAnchor: [0, 0]
                                    }),
                                    interactive: false,
                                    pane: 'labelsPane'
                                }).addTo(map);
                                layer._subLabel = marker;
                            }
                        }
                    }).addTo(map);
                }

                // --- Minahak boundaries — green outline, white bold label ---
                const minahakLayers = [];
                adminLayers.forEach(l => {
                    if (!layers[l.id]) return;
                    const geoKey = MINAHAK_LAYER_MAP[l.id];
                    if (geoKey && gd[geoKey]) {
                        const ml = L.geoJSON(gd[geoKey], {
                            pane: 'minahakPane',
                            style: { color: 'rgba(17,199,64,1)', weight: 3, fillOpacity: 0 },
                            onEachFeature: (f, layer) => {
                                const name = f.properties.SHEM_1 || f.properties.Name || l.name;
                                if (name && f.geometry) {
                                    const center = visualCenter(f.geometry);
                                    const marker = L.marker(center, {
                                        icon: L.divIcon({
                                            className: 'minahak-name-label',
                                            html: '<div class="label-inner">' + name + '</div>',
                                            iconSize: [0, 0],
                                            iconAnchor: [0, 0]
                                        }),
                                        interactive: false,
                                        pane: 'labelsPane'
                                    }).addTo(map);
                                    layer._minahakLabel = marker;
                                }
                            }
                        }).addTo(map);
                        minahakLayers.push(ml);
                    }
                });
                geoLayersRef.current.minahak = minahakLayers;

                // --- Plans layer ---
                if (layers['plans'] && gd.plans) {
                    const zoom = map.getZoom();
                    // Auto-wrap text at ~20 chars (QGIS autoWrapLength=20)
                    function autoWrap(txt, maxLen) {
                        if (!txt || txt.length <= maxLen) return txt;
                        const words = txt.split(/\s+/);
                        let line = '', lines = [];
                        for (const w of words) {
                            if (line && (line + ' ' + w).length > maxLen) {
                                lines.push(line);
                                line = w;
                            } else {
                                line = line ? line + ' ' + w : w;
                            }
                        }
                        if (line) lines.push(line);
                        return lines.join('\n');
                    }

                    // Zoom 16: show labels for all plans with 100+ units_add
                    const z16MinUnits = 100;

                    const plansLayer = L.geoJSON(gd.plans, {
                        pane: 'plansPane',
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const s = normalizeStatus((f.properties.Status_Mavat || '').trim());
                            if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                            if ((f.properties['סוג תכנית'] || '') === 'תשתיות') return false;
                            return true;
                        },
                        style: f => {
                            const status = normalizeStatus(f.properties.Status_Mavat || '');
                            const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                            return { color: 'rgba(67,67,227,1)', weight: 1.5, fillColor: fillColor, fillOpacity: opacity * 0.3, dashArray: '4,2' };
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                // Find all overlapping plans at click point
                                const clickLatLng = e.latlng;
                                const allFeatures = [];
                                const plansLayer = geoLayersRef.current.plans;
                                if (plansLayer) {
                                    plansLayer.eachLayer(pl => {
                                        if (!pl.feature || !pl.getBounds) return;
                                        try {
                                            if (!pl.getBounds().contains(clickLatLng)) return;
                                            const contains = leafletPip(pl, clickLatLng);
                                            if (contains) {
                                                const m = mapPlanProps(pl.feature.properties);
                                                allFeatures.push({ properties: m, type: 'plan' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                // Also check tama38 nearby
                                const tama38Layer = geoLayersRef.current.tama38;
                                if (tama38Layer) {
                                    tama38Layer.eachLayer(tl => {
                                        try {
                                            if (tl.getLatLng && tl.feature && clickLatLng.distanceTo(tl.getLatLng()) < 30) {
                                                allFeatures.push({ properties: tl.feature.properties, type: 'tama38' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                if (allFeatures.length === 0) {
                                    const mapped = mapPlanProps(f.properties);
                                    allFeatures.push({ properties: mapped, type: 'plan' });
                                }
                                const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                                const first = allFeatures[0];
                                const content = first.type === 'tama38'
                                    ? buildTama38Popup(first.properties, navInfo)

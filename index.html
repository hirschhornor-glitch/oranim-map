            // ── Measurement tool logic ──
            const clearMeasurement = useCallback(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const m = measureRef.current;
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                if (m.mainCircle) { map.removeLayer(m.mainCircle); m.mainCircle = null; }
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);
            }, []);

            const stopMeasure = useCallback(() => {
                clearMeasurement();
                setMeasureMode(null);
                const map = mapInstanceRef.current;
                if (map) map.getContainer().classList.remove('measuring');
            }, [clearMeasurement]);

            // Format distance in m/km
            function fmtDist(m) {
                if (m >= 1000) return (m / 1000).toFixed(2) + ' ק"מ';
                return Math.round(m) + ' מ\'';
            }
            // Format area in dunam / sqm
            function fmtArea(sqm) {
                const dunam = sqm / 1000;
                if (dunam >= 1) return dunam.toFixed(2) + ' דונם' + ' (' + Math.round(sqm).toLocaleString() + ' מ"ר)';
                return Math.round(sqm).toLocaleString() + ' מ"ר';
            }
            // Compute total polyline distance
            function polylineDist(pts) {
                let d = 0;
                for (let i = 1; i < pts.length; i++) d += pts[i - 1].distanceTo(pts[i]);
                return d;
            }
            // Compute polygon area using Shoelace on projected coords
            function polygonArea(pts) {
                if (pts.length < 3) return 0;
                // Use L.GeometryUtil if available, otherwise Gauss's formula on EPSG:4326
                // Spherical excess method for better accuracy
                const toRad = Math.PI / 180;
                const R = 6378137;
                let area = 0;
                const n = pts.length;
                for (let i = 0; i < n; i++) {
                    const j = (i + 1) % n;
                    const k = (i + 2) % n;
                    area += (pts[j].lng * toRad - pts[i].lng * toRad) *
                        (2 + Math.sin(pts[i].lat * toRad) + Math.sin(pts[j].lat * toRad));
                }
                area = Math.abs(area * R * R / 2);
                return area;
            }

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const container = map.getContainer();

                if (!measureMode) {
                    container.classList.remove('measuring');
                    return;
                }

                container.classList.add('measuring');
                const m = measureRef.current;
                // Clear any previous measurement
                m.layers.forEach(l => map.removeLayer(l));
                if (m.tooltip) map.removeLayer(m.tooltip);
                if (m.guideLine) map.removeLayer(m.guideLine);
                m.points = [];
                m.layers = [];
                m.tooltip = null;
                m.guideLine = null;
                setMeasureResult(null);

                const lineStyle = { color: '#e94560', weight: 2, dashArray: '6 4' };
                const fillStyle = { color: '#e94560', fillColor: 'rgba(233,69,96,0.15)', weight: 2, dashArray: '6 4' };
                const vertexStyle = { radius: 5, color: '#e94560', fillColor: '#fff', fillOpacity: 1, weight: 2 };

                function updateTooltip(latlng, text) {
                    if (m.tooltip) {
                        m.tooltip.setLatLng(latlng).setContent(text);
                    } else {
                        m.tooltip = L.tooltip({
                            permanent: true,
                            direction: 'top',
                            offset: [0, -10],
                            className: 'measure-tooltip'
                        }).setLatLng(latlng).setContent(text).addTo(map);
                    }
                }

                function onMapClick(e) {
                    // Ignore clicks on controls/popups
                    if (e.originalEvent && (
                        e.originalEvent.target.closest('.leaflet-control') ||
                        e.originalEvent.target.closest('.leaflet-popup') ||
                        e.originalEvent.target.closest('.map-toolbar') ||
                        e.originalEvent.target.closest('.measure-result')
                    )) return;

                    const pt = e.latlng;
                    m.points.push(pt);

                    // Add vertex marker
                    const marker = L.circleMarker(pt, vertexStyle).addTo(map);
                    m.layers.push(marker);

                    if (measureMode === 'distance') {
                        if (m.points.length > 1) {
                            const line = L.polyline(m.points, lineStyle).addTo(map);
                            // Remove old line if exists
                            if (m.mainLine) map.removeLayer(m.mainLine);
                            m.mainLine = line;
                            m.layers.push(line);
                        }
                        const dist = polylineDist(m.points);
                        if (dist > 0) {
                            updateTooltip(pt, fmtDist(dist));
                            setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        }
                    } else if (measureMode === 'radius') {
                        // Radius mode: first click = center, second click = edge
                        if (m.points.length === 1) {
                            updateTooltip(pt, 'לחצו על נקודת הקצה');
                        } else if (m.points.length === 2) {
                            const center = m.points[0];
                            const edge = m.points[1];
                            const radius = center.distanceTo(edge);
                            if (m.mainCircle) map.removeLayer(m.mainCircle);
                            const circle = L.circle(center, { radius, color: '#e94560', fillColor: 'rgba(233,69,96,0.15)', weight: 3, dashArray: null }).addTo(map);
                            m.mainCircle = circle;
                            m.layers.push(circle);
                            // Also draw radius line
                            const radLine = L.polyline([center, edge], { color: '#e94560', weight: 2, dashArray: '6 4' }).addTo(map);
                            m.layers.push(radLine);
                            const radiusText = fmtDist(radius);
                            updateTooltip(edge, 'רדיוס: ' + radiusText);
                            setMeasureResult({ type: 'radius', value: radiusText });
                            // Done — stop listening
                            if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }
                            map.off('click', onMapClick);
                            map.off('mousemove', onMouseMove);
                            map.off('dblclick', onDblClick);
                            container.classList.remove('measuring');
                        }
                    } else {
                        // Area mode
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        if (m.points.length >= 2) {
                            const poly = L.polygon(m.points, fillStyle).addTo(map);
                            m.mainPoly = poly;
                            m.layers.push(poly);
                        }
                        if (m.points.length >= 3) {
                            const area = polygonArea(m.points);
                            updateTooltip(pt, fmtArea(area));
                            setMeasureResult({ type: 'area', value: fmtArea(area) });
                        } else {
                            updateTooltip(pt, 'לחצו נקודות נוספות');
                        }
                    }
                }

                function onMouseMove(e) {
                    if (m.points.length === 0) return;
                    const lastPt = m.points[m.points.length - 1];
                    // Draw guide line from last point to cursor
                    if (m.guideLine) map.removeLayer(m.guideLine);
                    m.guideLine = L.polyline([lastPt, e.latlng], {
                        color: '#8888aa', weight: 1, dashArray: '4 4'
                    }).addTo(map);

                    // Show running measurement in tooltip
                    if (measureMode === 'distance') {
                        const totalDist = polylineDist(m.points) + lastPt.distanceTo(e.latlng);
                        updateTooltip(e.latlng, fmtDist(totalDist));
                    } else if (measureMode === 'radius') {
                        // Show growing circle from center to cursor
                        const center = m.points[0];
                        const radius = center.distanceTo(e.latlng);
                        if (m.mainCircle) map.removeLayer(m.mainCircle);
                        m.mainCircle = L.circle(center, { radius, color: '#e94560', fillColor: 'rgba(233,69,96,0.1)', weight: 1.5, dashArray: '6 4' }).addTo(map);
                        updateTooltip(e.latlng, 'רדיוס: ' + fmtDist(radius));
                    } else if (m.points.length >= 2) {
                        const tempPts = [...m.points, e.latlng];
                        const area = polygonArea(tempPts);
                        updateTooltip(e.latlng, fmtArea(area));
                    }
                }

                function onDblClick(e) {
                    L.DomEvent.stopPropagation(e);
                    L.DomEvent.preventDefault(e);
                    // Finish measurement
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }

                    if (measureMode === 'distance' && m.points.length >= 2) {
                        // Finalize line — solid
                        if (m.mainLine) map.removeLayer(m.mainLine);
                        const finalLine = L.polyline(m.points, { color: '#e94560', weight: 3 }).addTo(map);
                        m.layers.push(finalLine);
                        const dist = polylineDist(m.points);
                        setMeasureResult({ type: 'distance', value: fmtDist(dist) });
                        updateTooltip(m.points[m.points.length - 1], fmtDist(dist));
                    } else if (measureMode === 'area' && m.points.length >= 3) {
                        if (m.mainPoly) map.removeLayer(m.mainPoly);
                        const finalPoly = L.polygon(m.points, {
                            color: '#e94560', fillColor: 'rgba(233,69,96,0.2)', weight: 3
                        }).addTo(map);
                        m.layers.push(finalPoly);
                        const area = polygonArea(m.points);
                        setMeasureResult({ type: 'area', value: fmtArea(area) });
                        updateTooltip(m.points[m.points.length - 1], fmtArea(area));
                    }

                    // Stop listening but keep result visible
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);
                    container.classList.remove('measuring');
                }

                function onKeyDown(e) {
                    if (e.key === 'Escape') {
                        stopMeasure();
                        document.removeEventListener('keydown', onKeyDown);
                    }
                }

                // Disable double-click zoom while measuring
                map.doubleClickZoom.disable();

                map.on('click', onMapClick);
                map.on('mousemove', onMouseMove);
                map.on('dblclick', onDblClick);
                document.addEventListener('keydown', onKeyDown);

                return () => {
                    map.off('click', onMapClick);
                    map.off('mousemove', onMouseMove);
                    map.off('dblclick', onDblClick);
                    document.removeEventListener('keydown', onKeyDown);
                    map.doubleClickZoom.enable();
                    container.classList.remove('measuring');
                    if (m.guideLine) { map.removeLayer(m.guideLine); m.guideLine = null; }
                };
            }, [measureMode, stopMeasure]);

            // ── Print function ──
            const [printScale, setPrintScale] = useState('fit'); // 'fit' | 'current' | '1:2500' | ...
            const [printPageSize, setPrintPageSize] = useState('A4'); // 'A4' | 'A3'
            const [printOrientation, setPrintOrientation] = useState('landscape'); // 'landscape' | 'portrait'
            const PRINT_SCALES = [
                { value: 'fit', label: 'מותאם לדף' },
                { value: 'current', label: 'קנ"מ נוכחי' },
                { value: '1:2500', label: '1:2,500', denom: 2500 },
                { value: '1:5000', label: '1:5,000', denom: 5000 },
                { value: '1:10000', label: '1:10,000', denom: 10000 },
                { value: '1:15000', label: '1:15,000', denom: 15000 },
                { value: '1:25000', label: '1:25,000', denom: 25000 },
            ];

            const handlePrint = useCallback(async () => {
                const map = mapInstanceRef.current;
                if (!map) return;

                const title = printShowTitle ? (printTitle || 'מפת אורנים - תכנון עירוני') : '';

                // Build legend HTML with print-safe colors
                let legendHtml = '';
                if (printShowLegend) {
                    legendHtml = '<div style="margin-top:12px;border:1px solid #ccc;border-radius:8px;padding:12px;background:#f9f9f9;direction:rtl;print-color-adjust:exact;-webkit-print-color-adjust:exact">';
                    legendHtml += '<div style="font-weight:bold;font-size:14px;margin-bottom:8px;border-bottom:1px solid #ddd;padding-bottom:6px">מקרא</div>';
                    // Plans legend section (only when plans layer is on)
                    if (layers['plans']) {
                        legendHtml += '<div style="font-weight:bold;font-size:12px;margin-bottom:4px;color:#555">תב"עות - סטטוס</div>';

            // ── Units summary: fetch plans + tama38 and aggregate by minahak ──
            // Map tama38 neighborho → minahak
            const NEIGHBORHOOD_TO_MINAHAK = {
                'טלביה': 'גינות העיר', 'רחביה': 'גינות העיר',

                // Parse CSV (handles quoted fields with commas)
                function parseCSV(text) {
                    const rows = [];
                    let row = []; let field = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const ch = text[i];
                        if (inQuotes) {
                            if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
                            else if (ch === '"') { inQuotes = false; }
                            else { field += ch; }
                        } else {
                            if (ch === '"') { inQuotes = true; }
                            else if (ch === ',') { row.push(field); field = ''; }
                            else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
                                row.push(field); field = '';
                                if (row.length > 1) rows.push(row);
                                row = [];
                                if (ch === '\r') i++;
                            } else { field += ch; }

                    // Plans (from Google Sheets CSV)

                                if (!plansByType[m]) plansByType[m] = {};

                                const planInfoT = { plan_name: p.plan_name || '', plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', units_add: addVal, status_mavat: status, stage: (p.stage || p.Stage || '').trim().replace(/\s+/g, ' ') };

            // Commerce/Employment table — fetch + aggregate

            const fetchCommerceDataInternal = useCallback(() => {

                function parseCSV(text) {
                    const rows = [];
                    let row = []; let field = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const ch = text[i];
                        if (inQuotes) {
                            if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
                            else if (ch === '"') { inQuotes = false; }
                            else { field += ch; }
                        } else {
                            if (ch === '"') { inQuotes = true; }
                            else if (ch === ',') { row.push(field); field = ''; }
                            else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
                                row.push(field); field = '';
                                if (row.length > 1) rows.push(row);
                                row = [];
                                if (ch === '\r') i++;
                            } else { field += ch; }
                        }

                    if (field || row.length) { row.push(field); rows.push(row); }
                    return rows;

                            bs.co += coVal;
                            bs.emp += empVal;
                            if (!plansByCell[m]) plansByCell[m] = {};
                            if (!plansByCell[m][grp]) plansByCell[m][grp] = [];
                            const planInfo = { plan_name: p.plan_name || '', plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', commerce_out: coVal, employment: empVal, status_mavat: status };

                            bs2.co += coVal;
                            bs2.emp += empVal;
                            if (!plansBySub[m]) plansBySub[m] = {};
                            if (!plansBySub[m][sub]) plansBySub[m][sub] = {};
                            if (!plansBySub[m][sub][grp]) plansBySub[m][sub][grp] = [];
                            const planInfo2 = { plan_name: p.plan_name || '', plan_name_he: p.plan_name_he || '', plan_summary: p.plan_summary || '', commerce_out: coVal, employment: empVal, status_mavat: status };
                            if (!plansBySub[m][sub][grp].some(x => x.plan_name === planInfo2.plan_name)) plansBySub[m][sub][grp].push(planInfo2);
                        }
                    });

                    const minahaks = minahakOrder.filter(m => byMinahak[m] && !COMMERCE_HIDE_MINAHAKS.includes(m));
                    // Add any minahaks not in the predefined order (excluding hidden ones)

                    setCommerceData(result);

            }, []);

            // ══════════════════════════════════════════
            // Mimush (Realization) model — constants & calculation
            // ══════════════════════════════════════════
            const MIMUSH_STAGES = [
                { index: 0, label: 'פתיחת תיק → מתן תוקף', shortLabel: 'תכנון', months: 42, mimushPct: 80, color: '#F44336' },
                { index: 1, label: 'מתן תוקף → רישוי', shortLabel: 'תוקף', months: 6, mimushPct: 86, color: '#4CAF50' },
                { index: 2, label: 'רישוי → היתר הריסה', shortLabel: 'רישוי', months: 7, mimushPct: 100, color: '#4ba1f0' },
                { index: 3, label: 'התארגנות לביצוע', shortLabel: 'התארגנות', months: 6, mimushPct: 100, color: '#4b85e0' },
                { index: 4, label: 'היתר בנייה', shortLabel: 'היתר', months: 15, mimushPct: 100, color: '#4b85e0' },
                { index: 5, label: 'ביצוע → אכלוס', shortLabel: 'בנייה', months: 54, mimushPct: 100, color: '#4a69d1' },
                { index: 6, label: 'הושלם', shortLabel: 'הושלם', months: 0, mimushPct: 100, color: '#494CC2' },
            ];
            const MIMUSH_TAIL_RULES = [
                { phase: 'planning', thresholdMonths: 48, mimushPct: 50, extraMonths: 12, reason: 'תכנון מעל 4 שנה' },
                { phase: 'planning', thresholdMonths: 60, mimushPct: 30, extraMonths: 24, reason: 'תכנון מעל 5 שנה' },
                { phase: 'licensing', thresholdMonths: 30, mimushPct: 70, extraMonths: 12, reason: 'רישוי מעל 2.5 שנה' },
                { phase: 'licensing', thresholdMonths: 42, mimushPct: 30, extraMonths: 12, reason: 'רישוי מעל 3.5 שנה' },
            ];

            function getStageFromStatus(statusMavat, stage) {
                const s = (statusMavat || '').trim();
                const st = (stage || '').trim();
                if (s === 'נגנזה' || s === 'נדחתה') return -1; // excluded
                if (st === 'ו-גמר בנייה') return 6;
                if (st === 'ה-בבנייה') return 5;
                if (st === 'ד-היתר בנייה') return 4;
                if (st === 'ג-רישוי בתהליך') return 2; // stages 2-3 combined
                // Approved without stage → stage 1 (tokef → licensing)
                if (['אישור','מאושרת','תבע מאושרת','תחילת תוקף','בהליך אישור','תבע - טרום אישור'].includes(s)) return 1;
                // Planning stages → stage 0
                if (['נפתח תיק למתכנן','נפתח תיק תבע','בבדיקה תכנונית','נקלטה מקובץ מבאת',
                     'במילוי תנאים להפקדה','תכנית עומדת בתנאי סף',
                     'הפקדה להתנגדויות/השגות','דיון בהתנגדויות ותיקונים'].includes(s)) return 0;
                return s ? 0 : -1; // unknown status → planning; empty → exclude
            }

            function calcMimush(props) {
                const stageIdx = getStageFromStatus(props.status_mavat, props.stage);
                if (stageIdx < 0) return null;
                const stageDef = MIMUSH_STAGES[stageIdx];

                // Parse mavat_date to calculate time in stage
                let monthsInStage = 0;
                const dateStr = props.mavat_date || '';
                const dp = dateStr.split('/');
                if (dp.length === 3) {
                    const d = new Date(parseInt(dp[2]), parseInt(dp[1]) - 1, parseInt(dp[0]));
                    if (!isNaN(d.getTime())) {
                        const now = new Date();
                        monthsInStage = Math.max(0, (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth()));
                    }
                }

                // Calculate remaining months from current stage onward
                let monthsRemaining = 0;
                for (let i = stageIdx; i < 6; i++) {
                    monthsRemaining += MIMUSH_STAGES[i].months;
                }
                // Subtract time already spent in current stage
                monthsRemaining = Math.max(0, monthsRemaining - monthsInStage);

                // Add extra months for large plans
                const totalUnits = parseInt(props.units_total) || 0;
                if (totalUnits > 500) monthsRemaining += 12;
                else if (totalUnits > 300) monthsRemaining += 6;

                // Check tail rules
                let mimushPct = stageDef.mimushPct;
                let isTail = false;
                let tailReason = '';
                const phase = stageIdx <= 0 ? 'planning' : (stageIdx >= 2 && stageIdx <= 4) ? 'licensing' : null;
                if (phase) {
                    // Apply most severe matching rule
                    const matchingRules = MIMUSH_TAIL_RULES.filter(r => r.phase === phase && monthsInStage >= r.thresholdMonths);
                    if (matchingRules.length > 0) {
                        const worstRule = matchingRules[matchingRules.length - 1]; // sorted by severity
                        mimushPct = worstRule.mimushPct;
                        monthsRemaining += worstRule.extraMonths;
                        isTail = true;
                        tailReason = worstRule.reason;
                    }
                }
                if (stageIdx === 6) { mimushPct = 100; monthsRemaining = 0; }

                // Estimated completion date
                const est = new Date();
                est.setMonth(est.getMonth() + monthsRemaining);
                const estimatedDate = (est.getMonth() + 1).toString().padStart(2, '0') + '/' + est.getFullYear();

                const estimatedYear = est.getFullYear() + (est.getMonth() >= 6 ? 1 : 0); // round to nearest year

                return {
                    stageIndex: stageIdx,
                    stageLabel: stageDef.shortLabel,
                    stageLabelFull: stageDef.label,
                    stageColor: stageDef.color,
                    mimushPct,
                    monthsInStage,
                    monthsRemaining,
                    estimatedDate,
                    estimatedYear,
                    isTail,
                    tailReason,
                    unitsAdd: parseFloat(props.units_add) || 0,
                    unitsTotal: totalUnits,
                };
            }

            // Build mimush aggregation data
            const buildMimushData = useCallback(() => {
                const gd = geoDataRef.current;
                if (!gd || !gd.plans) return null;
                const minahakOrder = ['גינות העיר', 'בית צפאפא', 'גוננים', 'בקעה רבתי', 'מינהל מוסדי מלחה', 'א.ת. תלפיות'];
                const byMinahak = {};
                const bySub = {};
                const plansByCell = {};   // { minahak: { stageIndex: [plan...] } }
                const plansBySub = {};    // { minahak: { sub: { stageIndex: [plan...] } } }
                const tailPlans = [];

                const MILESTONE_YEARS = [2030, 2035, 2040];
                minahakOrder.forEach(m => {
                    byMinahak[m] = { total: 0, byStage: {}, weightedMimush: 0, planCount: 0, tailCount: 0, byYear: {} };
                    MILESTONE_YEARS.forEach(y => { byMinahak[m].byYear[y] = 0; });
                    MIMUSH_STAGES.forEach((_, i) => { byMinahak[m].byStage[i] = 0; });
                    bySub[m] = {};
                    plansByCell[m] = {};
                    plansBySub[m] = {};
                    MIMUSH_STAGES.forEach((_, i) => { plansByCell[m][i] = []; });
                });

                const MIMUSH_MINAHAK_NORMALIZE = { 'אזור תעשייה תלפיות': 'א.ת. תלפיות', 'אזור תעשיה תלפיות': 'א.ת. תלפיות' };
                gd.plans.features.forEach(f => {
                    const p = f.properties;
                    const m = MIMUSH_MINAHAK_NORMALIZE[p.minahak] || p.minahak || '';
                    if (!byMinahak[m]) return;
                    const result = calcMimush(p);
                    if (!result) return;
                    const ua = result.unitsAdd || 0;
                    if (ua <= 0) return;

                    byMinahak[m].total += ua;
                    byMinahak[m].byStage[result.stageIndex] = (byMinahak[m].byStage[result.stageIndex] || 0) + ua;
                    byMinahak[m].weightedMimush += ua * result.mimushPct;
                    byMinahak[m].planCount++;
                    if (result.isTail) byMinahak[m].tailCount++;
                    const effectiveUnits = ua * result.mimushPct / 100;
                    MILESTONE_YEARS.forEach(y => { if (result.estimatedYear <= y) byMinahak[m].byYear[y] += effectiveUnits; });

                    const planInfo = {
                        plan_name: p.plan_name || '',
                        plan_name_he: p.plan_name_he || p.plan_summary || '',
                        units_add: ua,
                        stageIndex: result.stageIndex,
                        stageLabel: result.stageLabel,
                        stageColor: result.stageColor,
                        mimushPct: result.mimushPct,
                        estimatedDate: result.estimatedDate,
                        monthsInStage: result.monthsInStage,
                        monthsRemaining: result.monthsRemaining,
                        isTail: result.isTail,
                        tailReason: result.tailReason,
                        status_mavat: p.status_mavat || '',
                        sub_neighborhood: p.sub_neighborhood || '',
                        geometry: f.geometry,
                    };
                    plansByCell[m][result.stageIndex].push(planInfo);
                    if (result.isTail) tailPlans.push({ ...planInfo, minahak: m });

                    // Sub-neighborhood
                    const sub = p.sub_neighborhood || 'לא ידוע';
                    if (!bySub[m][sub]) {
                        bySub[m][sub] = { total: 0, byStage: {}, weightedMimush: 0, planCount: 0, tailCount: 0, byYear: {} };
                        MILESTONE_YEARS.forEach(y => { bySub[m][sub].byYear[y] = 0; });
                        MIMUSH_STAGES.forEach((_, i) => { bySub[m][sub].byStage[i] = 0; });
                        plansBySub[m][sub] = {};
                        MIMUSH_STAGES.forEach((_, i) => { plansBySub[m][sub][i] = []; });
                    }
                    bySub[m][sub].total += ua;
                    bySub[m][sub].byStage[result.stageIndex] = (bySub[m][sub].byStage[result.stageIndex] || 0) + ua;
                    bySub[m][sub].weightedMimush += ua * result.mimushPct;
                    bySub[m][sub].planCount++;
                    if (result.isTail) bySub[m][sub].tailCount++;
                    MILESTONE_YEARS.forEach(y => { if (result.estimatedYear <= y) bySub[m][sub].byYear[y] += effectiveUnits; });
                    plansBySub[m][sub][result.stageIndex].push(planInfo);
                });

                // Calculate weighted average mimush per minahak
                minahakOrder.forEach(m => {
                    const d = byMinahak[m];
                    d.avgMimush = d.total > 0 ? Math.round(d.weightedMimush / d.total) : 0;
                    Object.values(bySub[m]).forEach(sd => {
                        sd.avgMimush = sd.total > 0 ? Math.round(sd.weightedMimush / sd.total) : 0;
                    });
                });

                // Totals row
                const totals = { total: 0, byStage: {}, avgMimush: 0, planCount: 0, tailCount: 0, weightedMimush: 0, byYear: {} };
                MIMUSH_STAGES.forEach((_, i) => { totals.byStage[i] = 0; });
                MILESTONE_YEARS.forEach(y => { totals.byYear[y] = 0; });
                minahakOrder.forEach(m => {
                    const d = byMinahak[m];
                    totals.total += d.total;
                    totals.weightedMimush += d.weightedMimush;
                    totals.planCount += d.planCount;
                    totals.tailCount += d.tailCount;
                    MIMUSH_STAGES.forEach((_, i) => { totals.byStage[i] += d.byStage[i] || 0; });
                    MILESTONE_YEARS.forEach(y => { totals.byYear[y] += d.byYear[y] || 0; });
                });
                totals.avgMimush = totals.total > 0 ? Math.round(totals.weightedMimush / totals.total) : 0;

                return { minahaks: minahakOrder, byMinahak, bySub, plansByCell, plansBySub, tailPlans, totals, stages: MIMUSH_STAGES, milestoneYears: MILESTONE_YEARS };
            }, [dataLoaded]);

            const openMimushModal = useCallback(() => {
                const data = buildMimushData();
                if (data) {
                    setMimushData(data);
                    setShowMimush(true);
                    setMimushDrilldown(null);
                    setMimushExpanded(null);
                    setMimushCellReport(null);
                }
            }, [buildMimushData]);

            // GeoJSON rendering: add/remove L.geoJSON layers based on state
            useEffect(() => {
                const map = mapInstanceRef.current;
                const gd = geoDataRef.current;
                if (!map || !dataLoaded) return;

                // Shared filter used by plans layer AND the "overlapping" topic —
                // keeps both in sync so overlap-highlighting matches visible plans.
                function isPlanVisibleInLayer(p) {
                    if (!planInMinahak(p)) return false;
                    const s = normalizeStatus((p.status_mavat || '').trim());
                    if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                    if (s === 'הכנת הודעה 77/78') return false;
                    if (['תשתיות','מוסתר'].includes(normalizePlanType(p.plan_type || ''))) return false;
                    // Exclude consolidation-and-division plans from overlap logic
                    // (they cover the same area as building plans but are procedural).
                    // Use startsWith on summary (short title), not includes (summary may be long body text).
                    if (normalizePlanType(p.plan_type || '') === 'איחוד וחלוקה') return false;
                    if ((p.plan_summary || '').trim().startsWith('איחוד וחלוקה')) return false;
                    const shk = window.__shouldHideKayam;
                    if (shk) {
                        const t = String(p.taba || '').trim();
                        if (t && shk(t)) return false;
                    }
                    const af = filters;
                    const units = parseFloat(p.units_add) || 0;
                    if (af.minUnits !== '' && units < parseFloat(af.minUnits)) return false;
                    if (af.maxUnits !== '' && units > parseFloat(af.maxUnits)) return false;
                    if (af.planTypes.length > 0) {
                        const pt = normalizePlanType(p.plan_type || '');
                        if (!af.planTypes.includes(pt)) return false;
                    }
                    if (af.statuses.length > 0) {
                        const sg = getFilterStatusGroup(s);
                        const stageVal = (p.stage || '').trim();
                        const sgStage = getFilterStatusGroup(stageVal);
                        if ((!sg || !af.statuses.includes(sg)) && (!sgStage || !af.statuses.includes(sgStage))) return false;
                    }
                    if (af.freeText) {
                        const q = af.freeText.toLowerCase();
                        const searchFields = [
                            p.plan_summary || '', p.plan_name || '',
                            p.architect || '', p.developer || '',
                        ].join(' ').toLowerCase();
                        if (!searchFields.includes(q)) return false;
                    }
                    return true;
                }

                // Remove all previous geo layers + label markers
                function cleanupLayer(ll) {
                    if (ll.eachLayer) ll.eachLayer(sub => {
                        if (sub._planNumMarker) map.removeLayer(sub._planNumMarker);
                        if (sub._labelMarker) map.removeLayer(sub._labelMarker);
                        if (sub._minahakLabel) map.removeLayer(sub._minahakLabel);
                        if (sub._subLabel) map.removeLayer(sub._subLabel);
                        if (sub._hatchClone) { sub._hatchClone.remove(); sub._hatchClone = null; }
                    });
                    map.removeLayer(ll);
                }
                // Also remove any orphaned hatch overlays from SVG
                document.querySelectorAll('.hatch-overlay').forEach(el => el.remove());
                Object.values(geoLayersRef.current).forEach(l => {
                    if (Array.isArray(l)) l.forEach(ll => cleanupLayer(ll));
                    else if (l) cleanupLayer(l);
                });
                geoLayersRef.current = {};

                // Minahak filter
                const adminLayers = LAYER_CONFIG.admin.layers;
                const selectedMinahaks = adminLayers.filter(l => layers[l.id]).map(l => l.minahak);
                const allAdminOn = adminLayers.every(l => layers[l.id]);
                const selectedSubs = selectedMinahaks.flatMap(m => MINAHAK_SUBS[m] || []);

                function planInMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedMinahaks.length === 0) return false;
                    const m = props.minahak || '';
                    return selectedMinahaks.includes(m);
                }
                function tama38InMinahak(props) {
                    if (allAdminOn) return true;
                    if (selectedSubs.length === 0) return false;
                    const n = (props.neighborho || '').trim();
                    return selectedSubs.includes(n);
                }

                // --- District outline + white mask outside (always on) ---
                if (gd.district_oranim) {
                    // Create an inverted polygon: world bounds with district as hole
                    const districtFeature = gd.district_oranim.features[0];
                    if (districtFeature) {
                        // World outer ring (covers entire map)
                        const worldRing = [[-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]];
                        // District inner ring (hole) — reverse winding
                        const distCoords = districtFeature.geometry.coordinates[0];
                        const holeRing = distCoords.map(c => [c[1], c[0]]); // GeoJSON [lng,lat] → Leaflet [lat,lng]
                        // Additional hole for גבעת המטוס area (plan 657593 outside main district)
                        const givatHamatosHole = [[31.7330,35.2070],[31.7330,35.2150],[31.7445,35.2150],[31.7445,35.2070]];
                        const maskPolygon = L.polygon([worldRing, holeRing, givatHamatosHole], {
                            pane: 'districtPane',
                            color: 'transparent', weight: 0,
                            fillColor: '#ffffff', fillOpacity: 0.2
                        }).addTo(map);
                        geoLayersRef.current.districtMask = maskPolygon;
                    }
                }

                // --- Roads (show at z15 by default, toggle manually at other zooms) ---
                const showRoads = layers['roads'] && gd.roads;
                if (showRoads) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.roads = L.geoJSON(gd.roads, {
                        pane: 'roadsPane',
                        style: { color: '#666', weight: zoom >= 17 ? 1.5 : 1.0, opacity: 0.6 },
                        interactive: false
                    }).addTo(map);
                }

                // --- Sub-neighborhoods (always on) — green outline, green label ---
                if (gd.sub_neighborhoods && layers['sub_neighborhoods']) {
                    const zoom = map.getZoom();
                    geoLayersRef.current.sub_neighborhoods = L.geoJSON(gd.sub_neighborhoods, {
                        pane: 'subNeighborhoodPane',
                        style: { color: 'rgba(17,199,64,1)', weight: zoom >= 18 ? 2.5 : zoom >= 17 ? 2.0 : 1.0, fillOpacity: 0, dashArray: '6,6' },
                        onEachFeature: (f, layer) => {
                            const name = f.properties.schn_nama || f.properties.SCHN_NAMA || f.properties.Name || f.properties.name || '';
                            if (name) {
                                layer.bindTooltip(name, {
                                    permanent: true,
                                    direction: 'center',
                                    className: 'sub-tooltip',
                                    offset: [0, 15]
                                });
                            }
                        }
                    }).addTo(map);
                }

                // --- Minahak boundaries — green outline, white bold label ---
                const minahakLayers = [];
                adminLayers.forEach(l => {
                    if (!layers[l.id]) return;
                    const geoKey = MINAHAK_LAYER_MAP[l.id];
                    if (geoKey && gd[geoKey]) {
                        const ml = L.geoJSON(gd[geoKey], {
                            pane: 'minahakPane',
                            style: { color: 'rgba(17,199,64,1)', weight: 3, fillOpacity: 0 },
                            onEachFeature: (f, layer) => {
                                const name = f.properties.shem_1 || f.properties.SHEM_1 || f.properties.Name || l.name;
                                if (name && f.geometry) {
                                    const center = visualCenter(f.geometry);
                                    const marker = L.marker(center, {
                                        icon: L.divIcon({
                                            className: 'minahak-name-label',
                                            html: '<div class="label-inner">' + name + '</div>',
                                            iconSize: [0, 0],
                                            iconAnchor: [0, 0]
                                        }),
                                        interactive: false,
                                        pane: 'minahakLabelsPane'
                                    }).addTo(map);
                                    layer._minahakLabel = marker;
                                }
                            }
                        }).addTo(map);
                        minahakLayers.push(ml);
                    }
                });
                geoLayersRef.current.minahak = minahakLayers;

                // --- Plans layer ---
                if (layers['plans'] && gd.plans && !showHeatMap && !showCommerceHeatMap) {
                    const zoom = map.getZoom();
                    // Auto-wrap text at ~20 chars (QGIS autoWrapLength=20)
                    function autoWrap(txt, maxLen) {
                        if (!txt || txt.length <= maxLen) return txt;
                        const words = txt.split(/\s+/);
                        let line = '', lines = [];
                        for (const w of words) {
                            if (line && (line + ' ' + w).length > maxLen) {
                                lines.push(line);
                                line = w;
                            } else {
                                line = line ? line + ' ' + w : w;
                            }
                        }
                        if (line) lines.push(line);
                        return lines.join('\n');
                    }

                    // Zoom 16: show labels for all plans with 100+ units_add
                    const z16MinUnits = 100;

                    // Track filtered count
                    let filteredPlanCount = 0;
                    const totalPlanCount = gd.plans.features.filter(f => {
                        if (!planInMinahak(f.properties)) return false;
                        const s = normalizeStatus((f.properties.status_mavat || '').trim());
                        if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                        if (['תשתיות','מוסתר'].includes(normalizePlanType(f.properties.plan_type || ''))) return false;
                        // Filter already-implemented plans (no permits + date <= 2019)
                        const shk = window.__shouldHideKayam;
                        if (shk) {
                            const t = String(f.properties.taba || '').trim();
                            if (t && shk(t)) return false;
                        }
                        return true;
                    }).length;

                    const plansLayer = L.geoJSON(gd.plans, {
                        pane: 'plansPane',
                        renderer: L.svg({ pane: 'plansPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const s = normalizeStatus((f.properties.status_mavat || '').trim());
                            if (s === 'נגנזה' || s === 'נדחתה' || s === 'נגנזה/נדחתה') return false;
                            if (s === 'הכנת הודעה 77/78') return false;
                            if (['תשתיות','מוסתר'].includes(normalizePlanType(f.properties.plan_type || ''))) return false;
                            // Filter already-implemented plans (no permits + date <= 2019)
                            const shk = window.__shouldHideKayam;
                            if (shk) {
                                const t = String(f.properties.taba || '').trim();
                                if (t && shk(t)) return false;
                            }
                            // Advanced filters
                            const af = filters;
                            // Units range
                            const units = parseFloat(f.properties.units_add) || 0;
                            if (af.minUnits !== '' && units < parseFloat(af.minUnits)) return false;
                            if (af.maxUnits !== '' && units > parseFloat(af.maxUnits)) return false;
                            // Plan type filter
                            if (af.planTypes.length > 0) {
                                const pt = normalizePlanType(f.properties.plan_type || '');
                                if (!af.planTypes.includes(pt)) return false;
                            }
                            // Status filter (check both status_mavat and stage field)
                            if (af.statuses.length > 0) {
                                const sg = getFilterStatusGroup(s);
                                const stageVal = (f.properties.stage || '').trim();
                                const sgStage = getFilterStatusGroup(stageVal);
                                if ((!sg || !af.statuses.includes(sg)) && (!sgStage || !af.statuses.includes(sgStage))) return false;
                            }
                            // Free text search
                            if (af.freeText) {
                                const q = af.freeText.toLowerCase();
                                const searchFields = [
                                    f.properties.plan_summary || '',
                                    f.properties.plan_name || '',
                                    f.properties.architect || '',
                                    f.properties.developer || '',
                                ].join(' ').toLowerCase();
                                if (!searchFields.includes(q)) return false;
                            }
                            filteredPlanCount++;
                            return true;
                        },
                        style: f => {
                            const status = normalizeStatus(f.properties.status_mavat || '');
                            const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                            const statusColor = STATUS_COLORS[status] || '#888';
                            const isSatellite = basemap === 'satellite';
                            const shavazActive = layers['shavaz_kayam'] || layers['future_shavaz'];
                            const landuseActive = layers['landuse_xplan'];
                            // When any master plan layer is on: hide plans inside an active
                            // master plan (drawn by that layer); show others as outline only
                            const activeMpKeys = ['master_plan_moshavot','master_plan_rasko','master_plan_baka','master_plan_arnona'].filter(k => layers[k]);
                            if (activeMpKeys.length > 0) {
                                const MP_NAME_BY_KEY = { master_plan_moshavot:'מושבות', master_plan_rasko:'רסקו', master_plan_baka:'בקעה', master_plan_arnona:'ארנונה' };
                                const activeMpNames = new Set(activeMpKeys.map(k => MP_NAME_BY_KEY[k]));
                                const c = (window.__masterPlanCompliance || {})[f.properties.plan_name];
                                if (c && activeMpNames.has(c.mp_match)) {
                                    return { color: 'transparent', weight: 0, fillOpacity: 0, opacity: 0 };
                                }
                                return { color: statusColor, weight: 1.5, fillColor: 'transparent', fillOpacity: 0, dashArray: '' };
                            }
                            if (landuseActive) {
                                return { color: statusColor, weight: 2.5, fillColor: 'transparent', fillOpacity: 0, dashArray: '' };
                            }
                            if (shavazActive) {
                                return { color: statusColor, weight: 1.5, fillColor: fillColor, fillOpacity: 0.07, dashArray: '4,2' };
                            }
                            return { color: 'rgba(67,67,227,1)', weight: 1.5, fillColor: fillColor, fillOpacity: isSatellite ? 1 : opacity * 0.3, dashArray: '4,2' };
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => {
                                // Suppress popups during area/measure drawing or landuse compare or shatzaf/tree
                                if (areaModeRef.current) return;
                                if (landuseCompareModeRef.current) return;
                                if (shatzafModeRef.current) return;
                                if (treeModeRef.current) return;
                                // When shavaz is active, try to open shavaz popup first
                                const shavazOn = layersRef.current['shavaz_kayam'] || layersRef.current['future_shavaz'];
                                if (shavazOn) {
                                    const clickLatLng = e.latlng;
                                    const allShavaz = [];
                                    ['shavaz_kayam', 'future_shavaz'].forEach(key => {
                                        const sl = geoLayersRef.current[key];
                                        if (!sl) return;
                                        sl.eachLayer(slayer => {
                                            if (!slayer.feature || !slayer.getBounds) return;
                                            try {
                                                if (!slayer.getBounds().contains(clickLatLng)) return;
                                                if (leafletPip(slayer, clickLatLng)) {
                                                    allShavaz.push({ properties: slayer.feature.properties, isFuture: key === 'future_shavaz' });
                                                }
                                            } catch(ex) {}
                                        });
                                    });
                                    if (allShavaz.length > 0) {
                                        openShavazPopup(allShavaz, clickLatLng, 0);
                                        return;
                                    }
                                }
                                // Find all overlapping plans at click point
                                const clickLatLng = e.latlng;
                                const allFeatures = [];
                                const plansLayer = geoLayersRef.current.plans;
                                if (plansLayer) {
                                    plansLayer.eachLayer(pl => {
                                        if (!pl.feature || !pl.getBounds) return;
                                        try {
                                            if (!pl.getBounds().contains(clickLatLng)) return;
                                            const contains = leafletPip(pl, clickLatLng);
                                            if (contains) {
                                                const m = mapPlanProps(pl.feature.properties);
                                                allFeatures.push({ properties: m, type: 'plan' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                // Also check tama38 nearby
                                const tama38Layer = geoLayersRef.current.tama38;
                                if (tama38Layer) {
                                    tama38Layer.eachLayer(tl => {
                                        try {
                                            if (tl.getLatLng && tl.feature && clickLatLng.distanceTo(tl.getLatLng()) < 30) {
                                                allFeatures.push({ properties: tl.feature.properties, type: 'tama38' });
                                            }
                                        } catch(ex) {}
                                    });
                                }
                                if (allFeatures.length === 0) {
                                    const mapped = mapPlanProps(f.properties);
                                    allFeatures.push({ properties: mapped, type: 'plan' });
                                }
                                // Sort: newest plan first (by mavat_date descending)
                                allFeatures.sort((a, b) => {
                                    const dA = (a.properties.mavat_date || '').split('/');
                                    const dB = (b.properties.mavat_date || '').split('/');
                                    const tA = dA.length === 3 ? (dA[2] + dA[1] + dA[0]) : '00000000';
                                    const tB = dB.length === 3 ? (dB[2] + dB[1] + dB[0]) : '00000000';
                                    return tB.localeCompare(tA);
                                });
                                const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                                const first = allFeatures[0];
                                const content = first.type === 'tama38'
                                    ? buildTama38Popup(first.properties, navInfo)
                                    : buildPlanPopup(first.properties, { properties: first.properties }, navInfo);
                                const popup = L.popup({ maxWidth: popupMaxWidth(), className: 'plan-popup' })
                                    .setLatLng(clickLatLng)
                                    .setContent(content);
                                popup.openOn(map);
                                bindPopupEvents(popup, allFeatures, 0);
                            });
                            layer.on('mouseover', () => {
                                const isSat = basemap === 'satellite';
                                const shavazOn = layersRef.current['shavaz_kayam'] || layersRef.current['future_shavaz'];
                                const landuseOn = layersRef.current['landuse_xplan'];
                                if (landuseOn) {
                                    layer.setStyle({ weight: 4, fillOpacity: 0 });
                                } else if (shavazOn) {
                                    layer.setStyle({ weight: 3, fillOpacity: 0.12 });
                                } else {
                                    layer.setStyle({ weight: 3, fillOpacity: isSat ? 1 : opacity * 0.5 });
                                }
                            });
                            layer.on('mouseout', () => {
                                const status = normalizeStatus(f.properties.status_mavat || '');
                                const fillColor = STATUS_COLORS[status] || '#f0e0d0';
                                const statusColor = STATUS_COLORS[status] || '#888';
                                const isSat = basemap === 'satellite';
                                const shavazOn = layersRef.current['shavaz_kayam'] || layersRef.current['future_shavaz'];
                                const landuseOn = layersRef.current['landuse_xplan'];
                                if (landuseOn) {
                                    layer.setStyle({ weight: 2.5, fillOpacity: 0, fillColor: 'transparent', color: statusColor });
                                } else if (shavazOn) {
                                    layer.setStyle({ weight: 1.5, fillOpacity: 0.07, fillColor: fillColor, color: statusColor });
                                } else {
                                    layer.setStyle({ weight: 1.5, fillOpacity: isSat ? 1 : opacity * 0.3, fillColor: fillColor });
                                }
                            });
                            // Labels: zoom-dependent with fit-in-polygon check
                            const shortName = f.properties.plan_summary || '';
                            const add = parseFloat(f.properties.units_add) || 0;
                            const zoom = map.getZoom();

                            // Zoom 15: no labels at all
                            if (zoom >= 16) {
                                // Zoom 16: only plans with 100+ units
                                if (zoom === 16 && add < z16MinUnits) {
                                    // skip label
                                } else if (shortName || add > 0) {
                                    const bounds = layer.getBounds();
                                    const sw = map.latLngToContainerPoint(bounds.getSouthWest());
                                    const ne = map.latLngToContainerPoint(bounds.getNorthEast());
                                    const pxW = Math.abs(ne.x - sw.x);
                                    const pxH = Math.abs(ne.y - sw.y);

                                    let labelText = '';
                                    if (zoom >= 17) {
                                        labelText = autoWrap(shortName, 20);
                                        if (add > 0) labelText += '\n+' + add + " יח\"ד";
                                    } else {
                                        // zoom 16: units on one line, יח"ד on next
                                        if (add > 0) labelText = '+' + add + "\nיח\"ד";
                                    }

                                    // For overlapping plans, compute exclude rings before fit check
                                    let excludeRings = null;
                                    if ((parseFloat(f.properties.overlapping_plans) || 0) > 0 && f.geometry) {
                                        excludeRings = [];
                                        const myRing = f.geometry.type === 'MultiPolygon'
                                            ? f.geometry.coordinates[0][0] : f.geometry.coordinates[0];
                                        const gd = geoDataRef.current;
                                        if (gd.plans) gd.plans.features.forEach(other => {
                                            if (other === f || !other.geometry) return;
                                            const otherRing = other.geometry.type === 'MultiPolygon'
                                                ? other.geometry.coordinates[0][0] : other.geometry.coordinates[0];
                                            if (polygonsOverlap(myRing, otherRing)) {
                                                excludeRings.push(otherRing);
                                            }
                                        });
                                        if (!excludeRings.length) excludeRings = null;
                                    }

                                    // Check if label fits — use non-overlapping area bbox when overlapping
                                    let fitW = pxW, fitH = pxH;
                                    if (excludeRings && f.geometry) {
                                        const ring = f.geometry.type === 'MultiPolygon'
                                            ? f.geometry.coordinates[0][0] : f.geometry.coordinates[0];
                                        // Sample grid points to find bbox of non-excluded area
                                        let fMinX = Infinity, fMinY = Infinity, fMaxX = -Infinity, fMaxY = -Infinity;
                                        let bMinX = Infinity, bMinY = Infinity, bMaxX = -Infinity, bMaxY = -Infinity;
                                        for (const c of ring) { if (c[0]<bMinX) bMinX=c[0]; if (c[1]<bMinY) bMinY=c[1]; if (c[0]>bMaxX) bMaxX=c[0]; if (c[1]>bMaxY) bMaxY=c[1]; }
                                        const N = 10;
                                        const sx = (bMaxX-bMinX)/N, sy = (bMaxY-bMinY)/N;
                                        let found = false;
                                        for (let xi=0; xi<N; xi++) { for (let yi=0; yi<N; yi++) {
                                            const px = bMinX+(xi+0.5)*sx, py = bMinY+(yi+0.5)*sy;
                                            if (!pointInPolygon([px,py], ring)) continue;
                                            if (excludeRings.some(er => pointInPolygon([px,py], er))) continue;
                                            if (px<fMinX) fMinX=px; if (py<fMinY) fMinY=py;
                                            if (px>fMaxX) fMaxX=px; if (py>fMaxY) fMaxY=py;
                                            found = true;
                                        }}
                                        if (found) {
                                            const sw2 = map.latLngToContainerPoint([fMinY, fMinX]);
                                            const ne2 = map.latLngToContainerPoint([fMaxY, fMaxX]);
                                            fitW = Math.abs(ne2.x - sw2.x);
                                            fitH = Math.abs(ne2.y - sw2.y);
                                        }
                                    }

                                    const lines = labelText.split('\n');
                                    const maxLineLen = Math.max(...lines.map(l => l.length));
                                    const fontSize = zoom >= 18 ? 11 : zoom === 16 ? 9 : 8;
                                    const charW = fontSize * 0.75; // approx px per char
                                    const lineH = fontSize * 1.5;
                                    const estLabelW = maxLineLen * charW;
                                    const estLabelH = lines.length * lineH;

                                    const fitRatio = zoom >= 18 ? 0.85 : zoom >= 17 ? 0.75 : 0.65;
                                    if (estLabelW <= fitW * fitRatio && estLabelH <= fitH * fitRatio) {
                                        let labelClass = 'plan-label-center';
                                        if (zoom >= 18) labelClass += ' plan-label-z18';
                                        if (add >= 30) labelClass += ' plan-label-large';
                                        else labelClass += ' plan-label-small';

                                        const center = f.geometry ? visualCenter(f.geometry, excludeRings) : layer.getBounds().getCenter();
                                        const labelMarker = L.marker(center, {
                                            icon: L.divIcon({
                                                className: labelClass,
                                                html: '<div class="label-inner">' + labelText.replace(/\n/g, '<br>') + '</div>',
                                                iconSize: [0, 0],
                                                iconAnchor: [0, 0]
                                            }),
                                            interactive: false,
                                            pane: 'labelsPane'
                                        }).addTo(map);
                                        layer._labelMarker = labelMarker;
                                    }
                                }
                            }
                            // Plan number along longest edge (in pixels), rotated to match
                            const planNum = f.properties.plan_name || '';
                            if (zoom >= 17 && planNum && f.geometry && f.geometry.coordinates) {
                                let coords;
                                try { coords = f.geometry.type === 'MultiPolygon'
                                    ? f.geometry.coordinates[0][0]
                                    : f.geometry.coordinates[0]; } catch(ex) { coords = null; }
                                if (!coords || !coords.length) return;
                                let maxPxLen = 0, bestMid = null, bestAngle = 0;
                                for (let ei = 0; ei < coords.length - 1; ei++) {
                                    const a = coords[ei], b = coords[ei + 1];
                                    // Convert to pixel coordinates for accurate length
                                    const pa = map.latLngToContainerPoint([a[1], a[0]]);
                                    const pb = map.latLngToContainerPoint([b[1], b[0]]);
                                    const pxLen = Math.sqrt((pb.x-pa.x)*(pb.x-pa.x) + (pb.y-pa.y)*(pb.y-pa.y));
                                    if (pxLen > maxPxLen) {
                                        maxPxLen = pxLen;
                                        bestMid = [(a[1]+b[1])/2, (a[0]+b[0])/2]; // [lat, lng]
                                        let ang = Math.atan2(pb.y-pa.y, pb.x-pa.x) * 180 / Math.PI;
                                        // Keep text readable (not upside down)
                                        if (ang > 90) ang -= 180;
                                        if (ang < -90) ang += 180;
                                        bestAngle = ang;
                                    }
                                }
                                const numCharW = (zoom >= 18 ? 9 : 7) * 0.75;
                                const numTextLen = planNum.length * numCharW;
                                const numH = 12; // approx text height in px
                                if (bestMid && maxPxLen >= 40 && numTextLen <= maxPxLen * 0.9) {
                                    const numMarker = L.marker(bestMid, {
                                        icon: L.divIcon({
                                            className: 'plan-number-label',
                                            html: '<span class="pn-text" style="transform:rotate(' + bestAngle + 'deg)">' + planNum + '</span>',

                                            iconAnchor: [Math.ceil(numTextLen/2), Math.ceil(numH/2)]
                                        }),
                                        interactive: false,
                                        pane: 'labelsPane'
                                    }).addTo(map);
                                    layer._planNumMarker = numMarker;
                                }
                            }
                        }
                    }).addTo(map);
                    geoLayersRef.current.plans = plansLayer;

                    // Deep-link: jump to plan from ?plan=XXX in URL hash (first load only)
                    if (!planJumpedRef.current) {
                        const hp = initialHashRef.current;
                        if (hp && hp.plan) {
                            const target = String(hp.plan).trim();
                            const targetNum = target.replace(/[^\d]/g, '');
                            let matched = null;
                            plansLayer.eachLayer(layer => {
                                if (matched) return;
                                const t = String((layer.feature.properties.taba || layer.feature.properties.TABA || '')).trim();
                                if (t === target || (targetNum && t === targetNum)) matched = layer;
                            });
                            if (matched) {
                                planJumpedRef.current = true;
                                const b = matched.getBounds();
                                map.fitBounds(b, { padding: [60, 60], maxZoom: 18, animate: false });
                                // Fire click after a short delay to let layers stabilize
                                setTimeout(() => {
                                    const cur = geoLayersRef.current.plans;
                                    if (!cur) return;
                                    let m = null;
                                    cur.eachLayer(l => {
                                        if (m) return;
                                        const t = String((l.feature.properties.taba || l.feature.properties.TABA || '')).trim();
                                        if (t === target || (targetNum && t === targetNum)) m = l;
                                    });
                                    if (m) try { m.fire('click', { latlng: b.getCenter() }); } catch(e){}
                                }, 300);
                            }
                        }
                    }
                }

                // --- Topics overlay ---
                if (gd.plans && (planningTopics.overlapping || planningTopics.densification || planningTopics.objections || planningTopics.infrastructure || planningTopics.archived || planningTopics.shavaz_demolition)) {
                    // Inject SVG hatch patterns into map's SVG defs
                    const svgEl = map.getRenderer(L.geoJSON())._container || map.getPane('overlayPane').querySelector('svg');
                    if (svgEl) {
                        let defs = svgEl.querySelector('defs');
                        if (!defs) { defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs'); svgEl.insertBefore(defs, svgEl.firstChild); }
                        // Blue hatch for overlapping
                        if (!defs.querySelector('#hatch-blue')) {
                            defs.innerHTML += `
                                <pattern id="hatch-blue" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#3366ff" stroke-width="2" stroke-opacity="0.6"/>
                                </pattern>
                                <pattern id="hatch-orange" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(-45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#ff8c00" stroke-width="2" stroke-opacity="0.6"/>
                                </pattern>
                                <pattern id="hatch-red" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
                                    <line x1="0" y1="0" x2="0" y2="8" stroke="#ff4444" stroke-width="2" stroke-opacity="0.7"/>
                                </pattern>`;
                        }
                    }

                    const topicsLayer = L.geoJSON(gd.plans, {
                        pane: 'topicsPane',
                        renderer: L.svg({ pane: 'topicsPane' }),
                        filter: f => {
                            if (!planInMinahak(f.properties)) return false;
                            const shk = window.__shouldHideKayam;
                            if (shk) {
                                const t = String(f.properties.taba || '').trim();
                                if (t && shk(t)) return false;
                            }
                            const p = f.properties;
                            if (planningTopics.overlapping && (() => {
                                const oMap = overlapMapRef.current;
                                if (!oMap) return false;
                                const taba = String(p.taba || '').trim();
                                if (!taba) return false;
                                const partners = oMap.get(taba);
                                if (!partners || !partners.size) return false;
                                if (!isPlanVisibleInLayer(p)) return false;
                                // At least one overlap partner must also be visible
                                const byTaba = window.__planByTaba || null;
                                for (const otherTaba of partners) {
                                    const op = byTaba ? byTaba[otherTaba] : null;
                                    if (op && isPlanVisibleInLayer(op)) return true;
                                }
                                return false;
                            })()) return true;
                            if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') return true;
                            if (planningTopics.objections && (p.status_mavat || '').includes('הפקדה להתנגדויות')) {
                                const isLocal = (p.authority || '').includes('מקומית');
                                const endDate = p.objection_end_date || '';
                                const endFuture = endDate && (() => { const pts = endDate.split('/'); return pts.length === 3 && new Date(pts[2], pts[1]-1, pts[0]) >= new Date(); })();
                                if (isLocal && endFuture) return true;
                                if (p.has_objection_btn) {
                                    const md = (p.mavat_date || '').split('/');
                                    if (md.length === 3) { const sd = new Date(md[2], md[1]-1, md[0]); const co = new Date(); co.setDate(co.getDate() - 60); if (sd < co) return false; }
                                    return true;
                                }
                                return false;
                            }
                            return false;
                        },
                        style: f => {
                            const p = f.properties;
                            if (planningTopics.objections && (p.status_mavat || '').includes('הפקדה להתנגדויות'))
                                return { color: '#dd0000', weight: 3, fillOpacity: 0 };
                            if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים')
                                return { color: '#ff8c00', weight: 2, fillOpacity: 0 };
                            if (planningTopics.overlapping && (() => {
                                const oMap = overlapMapRef.current;
                                if (!oMap) return false;
                                const taba = String(p.taba || '').trim();
                                if (!taba) return false;
                                const partners = oMap.get(taba);
                                if (!partners || !partners.size) return false;
                                if (!isPlanVisibleInLayer(p)) return false;
                                // At least one overlap partner must also be visible
                                const byTaba = window.__planByTaba || null;
                                for (const otherTaba of partners) {
                                    const op = byTaba ? byTaba[otherTaba] : null;
                                    if (op && isPlanVisibleInLayer(op)) return true;
                                }
                                return false;
                            })())
                                return { color: '#3366ff', weight: 2, fillOpacity: 0 };
                            return {};
                        },
                        onEachFeature: (f, layer) => {
                            const p = f.properties;
                            // Apply SVG hatch pattern fill after rendering
                            layer.on('add', () => {
                                const el = layer.getElement();
                                if (!el) return;
                                if (planningTopics.overlapping && (() => {
                                const oMap = overlapMapRef.current;
                                if (!oMap) return false;
                                const taba = String(p.taba || '').trim();
                                if (!taba) return false;
                                const partners = oMap.get(taba);
                                if (!partners || !partners.size) return false;
                                if (!isPlanVisibleInLayer(p)) return false;
                                // At least one overlap partner must also be visible
                                const byTaba = window.__planByTaba || null;
                                for (const otherTaba of partners) {
                                    const op = byTaba ? byTaba[otherTaba] : null;
                                    if (op && isPlanVisibleInLayer(op)) return true;
                                }
                                return false;
                            })()) {
                                    el.setAttribute('fill', 'url(#hatch-blue)');
                                    el.setAttribute('fill-opacity', '1');
                                } else if (planningTopics.densification && normalizePlanType(p.plan_type || '') === 'עיבוי שטחים חומים') {
                                    el.setAttribute('fill', 'url(#hatch-orange)');
                                    el.setAttribute('fill-opacity', '1');
                                }
                            });
                        }
                    }).addTo(map);

                    // Apply hatch to already-rendered paths
                    topicsLayer.eachLayer(layer => {
                        const el = layer.getElement();
                        const p = layer.feature.properties;
                        if (!el) return;
                        if (planningTopics.overlapping && (() => {
                                const oMap = overlapMapRef.current;
                                if (!oMap) return false;
                                const taba = String(p.taba || '').trim();
                                if (!taba) return false;
                                const partners = oMap.get(taba);
                                if (!partners || !partners.size) return false;
                                if (!isPlanVisibleInLayer(p)) return false;
                                // At least one overlap partner must also be visible
                                const byTaba = window.__planByTaba || null;
                                for (const otherTaba of partners) {
                                    const op = byTaba ? byTaba[otherTaba] : null;
                                    if (op && isPlanVisibleInLayer(op)) return true;
                                }
                                return false;

                            el.setAttribute('fill', 'url(#hatch-blue)');
                            el.setAttribute('fill-opacity', '1');

                            el.setAttribute('fill', 'url(#hatch-orange)');
                            el.setAttribute('fill-opacity', '1');

                    });

                    geoLayersRef.current.topics = topicsLayer;

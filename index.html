            // Fix reversed Hebrew text (chars reversed within each word by PDF extraction)
            function fixHebrewText(text) {
                if (!text) return text;
                if (!/[\u0590-\u05FF]/.test(text)) return text;
                const REVERSED = ['חטש','יחטש','ירוגמ','רחסמ','הקוסעת','ןוינח','תויונח','ךוניח','תוברת','הליהק','תואירב','ס"נתמ','ןועמ','תותיכ','ירפס','תדסומ','ןודעומ','םינבמ','רוביצ','תלצה','ןועמ'];
                const charsRev = REVERSED.some(m => text.includes(m));
                let result = text;
                if (charsRev) {
                    result = text.split(';').map(seg =>
                        seg.split(' ').map(w => w.split('').reverse().join('')).join(' ')
                    ).join('; ');
                    result = result.replace(/ס"נתמ/g, 'מתנ"ס').replace(/ד"חי/g, 'יח"ד');
                }
                const FINAL = new Set('םןףךץ');
                const words = result.trim().split(/\s+/);
                if (words.length >= 2) {
                    const fc = words[0].replace(/^[.,;:()\-]+/, '');
                    if ('.,;:'.includes(result.trim()[0])) {
                        result = [...words].reverse().join(' ');
                    } else if (fc && FINAL.has(fc[0])) {
                        result = [...words].reverse().join(' ');
                    }
                }
                return result;
            }

            // Build shavaz (public buildings) popup HTML
            function cleanNull(v) { return (v == null || v === 'NULL' || v === 'null' || v === 'None') ? '' : v; }

            function buildShavazPopup(props, isFuture, hasOriginPlan, navInfo, isHafrashah) {
                const buildingName = cleanNull(props.building_name);
                const buildingTypeRaw = cleanNull(props.building_type) || cleanNull(props.Descriptio) || '';
                // Aggregate duplicate uses: "בית כנסת; בית כנסת" → "2 בתי כנסת"
                const buildingType = (function(raw) {
                    if (!raw) return '';
                    const items = raw.split(/[;,]/).map(s => s.trim()).filter(Boolean);
                    const counts = {};
                    items.forEach(i => { counts[i] = (counts[i] || 0) + 1; });
                    return Object.entries(counts).map(([name, count]) => {
                        if (count === 1) return name;
                        return count + ' ' + name;
                    }).join('; ');
                })(buildingTypeRaw);
                const planNameHe = fixHebrewText(cleanNull(props.plan_name_he) || '');
                const title = isFuture
                    ? (planNameHe || fixHebrewText(cleanNull(props.MAVAT_NAME) || 'שב"צ עתידי'))
                    : fixHebrewText(buildingName || planNameHe || cleanNull(props.Descriptio) || cleanNull(props.MAVAT_NAME) || 'שב"צ');
                const taba = cleanNull(props.TABA) || cleanNull(props.taba) || '';
                const lotNum = cleanNull(props.MIGRASH) || cleanNull(props.migrash) || '';
                const status = normalizeStatus(props.Mavat_Status || props.status_mavat || '');
                const statusColor = getStatusColor(status);
                const boldStyle = !isFuture ? 'font-weight:700' : '';
                const subtitle = !isFuture ? (planNameHe || '') : '';
                const tabaLot = [taba, lotNum].filter(Boolean).join(' / ');
                // For future_shavaz use POLY_AREA (always sqm, freshly computed from geometry).
                // LEGAL_AREA is inconsistent — sometimes sqm, sometimes dunams.
                const lotArea = isFuture
                    ? (props.POLY_AREA || props.LEGAL_AREA || props.area || null)
                    : (props.LEGAL_AREA || props.area || null);
                const lotAreaDunam = lotArea ? (parseFloat(lotArea) / 1000).toFixed(2) : '-';
                const builtSqm = cleanNull(props.BUILD_AREA) || null;
                // Generic land-use designations — zoning types, not specific uses
                // Uses starts-with matching to catch all variants (לחינוך, לבריאות, לחרום, etc.)
                const DESIG_PREFIXES = /^(מבנים|מוסדות|שטחים|שטח ציבורי|מגורים|חניון|מסחר|תעסוקה|משרדים|מדורים|תעשיי?ה|תחבורה|דרך|חינוך, תרבות|חינוך,תרבות)/;
                function isGenericDesig(s) {
                    const clean = s.replace(/\s*\(\d+\)\s*$/, '').trim();
                    return DESIG_PREFIXES.test(clean);
                }
                const rawUsesParts = (cleanNull(props.uses) || '').split(';').map(s => s.trim()).filter(Boolean);
                // Separate generic entries (designation only) from specific uses
                const genericParts = rawUsesParts.filter(s => isGenericDesig(s));
                const specificParts = rawUsesParts.filter(s => !isGenericDesig(s));
                // Derive built area from generic parts if BUILD_AREA is missing
                let derivedBuilt = null;
                if (!builtSqm && genericParts.length > 0) {
                    const total = genericParts.reduce((sum, s) => {
                        const m = s.match(/\((\d+)\)/);
                        return sum + (m ? parseInt(m[1]) : 0);
                    }, 0);
                    if (total > 0) derivedBuilt = total;
                }
                const builtDisplay = builtSqm
                    ? Math.round(parseFloat(builtSqm)).toLocaleString()
                    : (derivedBuilt ? derivedBuilt.toLocaleString() : '-');
                const allowedUses = cleanNull(props.uses) || cleanNull(props.YEUD) || '-';
                const actualUses = cleanNull(props['Actual uses']) || '-';
                const planId = taba || '';
                const note = window.__annotations ? (window.__annotations['shavaz_' + planId + '_' + lotNum] || '') : '';

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Color scheme: kayam = dark brown, future = light brown
                const bodyBg = isFuture ? '#3d2a1a' : '#2e1a0e';
                const rowBorder = isFuture ? '#5a3d2a' : '#4a2e1a';
                const labelColor = isFuture ? '#d4a87a' : '#c4956a';
                const headerBg = isFuture
                    ? 'linear-gradient(135deg, #C4956A, #D2B48C)'
                    : 'linear-gradient(135deg, #5C2E0A, #8B4513)';
                const headerBorder = status ? statusColor : '#D2691E';
                const titleColor = isFuture ? '#2e1a0e' : '#fff';
                const subtitleColor = isFuture ? '#4a2e1a' : '#c4956a';
                html += `<div class="popup-header" style="position:relative;background:${headerBg};border-bottom:3px solid ${headerBorder}">`;
                html += `<div class="popup-header-title" style="color:${titleColor}">${title}</div>`;
                if (subtitle) {
                    html += `<div class="popup-header-subtitle" style="color:${subtitleColor};${boldStyle}">${subtitle}</div>`;
                }
                // Note button
                html += '<button class="popup-btn-permit" data-action="add-note" data-plan="shavaz_' + planId + '_' + lotNum + '" style="position:absolute;bottom:6px;left:6px;background:transparent;border:none;color:' + (note ? '#ffeaa7' : (isFuture ? '#5a3d2a' : '#886')) + ';font-size:16px;padding:2px;min-width:auto;cursor:pointer" title="' + (note || 'הוסף הערה') + '">📝</button>';
                html += '</div>';
                // Status badge row
                if (status) {
                    html += `<div style="padding:6px 16px;background:${bodyBg};border-bottom:1px solid ${rowBorder}">`;
                    html += `<span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor};font-size:11px">${status}</span>`;
                    html += '</div>';
                }
                html += `<div class="popup-body" style="background:${bodyBg}">`;
                if (tabaLot) {
                    html += `<div class="popup-row" style="border-bottom-color:${rowBorder};${boldStyle}"><span class="popup-row-label" style="color:${labelColor}">תכנית / מגרש</span><span class="popup-row-value">${tabaLot}</span></div>`;
                }
                if (buildingType) {
                    html += `<div class="popup-row" style="border-bottom-color:${rowBorder}"><span class="popup-row-label" style="color:${labelColor}">שימושים בפועל</span><span class="popup-row-value">${buildingType}</span></div>`;
                }
                if (!isHafrashah) {
                    html += `<div class="popup-row" style="border-bottom-color:${rowBorder}"><span class="popup-row-label" style="color:${labelColor}">שטח מגרש</span><span class="popup-row-value">${lotAreaDunam} דונם</span></div>`;
                }
                html += `<div class="popup-row" style="border-bottom-color:${rowBorder}"><span class="popup-row-label" style="color:${labelColor}">מ"ר בנוי</span><span class="popup-row-value">${builtDisplay}</span></div>`;
                // Show only specific uses (not generic designation types like מסחר/מבנים ומוסדות ציבור)
                // Format: "גן ילדים - 200 מ״ר" — suppress sqm if it equals the total built area
                const builtNum = derivedBuilt || (builtSqm ? Math.round(parseFloat(builtSqm)) : 0);
                // For isFuture: if specificParts is empty, fall back to genericParts
                // (prefer public-related parts; if none, show all genericParts)
                let usesPartsForDisplay = specificParts;
                if (isFuture && usesPartsForDisplay.length === 0 && genericParts.length > 0) {
                    const PUBLIC_KW = /ציבור|חינוך|דת|בריאות|רווחה|תרבות|קהילה|ספורט|חרום|הצלה/;
                    const publicGeneric = genericParts.filter(s => PUBLIC_KW.test(s));
                    usesPartsForDisplay = publicGeneric.length > 0 ? publicGeneric : genericParts;
                }
                const formattedUses = usesPartsForDisplay.map(part => {
                    const m = part.match(/^(.*?)\s*\((\d+)\)\s*$/);
                    if (m) {
                        const name = m[1].trim();
                        const sqm = parseInt(m[2]);
                        if (builtNum && Math.abs(sqm - builtNum) < 2) return name;
                        return `${name} - ${sqm.toLocaleString()} מ"ר`;
                    }
                    return part;
                }).filter(Boolean);
                if (formattedUses.length) {
                    html += `<div class="popup-row" style="border-bottom-color:${rowBorder}"><span class="popup-row-label" style="color:${labelColor}">שימושים מותרים</span><span class="popup-row-value" style="font-size:11px;max-width:200px;word-wrap:break-word">${formattedUses.join('<br>')}</span></div>`;
                }
                html += '</div>';
                // Footer — only show jump-to-plan if matching plan exists
                const tabaNum = taba.replace(/[^\d]/g, '');
                const gd = geoDataRef.current;
                const hasPlan = taba && gd && gd.plans && gd.plans.features.some(f => {
                    const pt = (f.properties.taba || '').toString();
                    return pt === taba || pt === tabaNum || pt.startsWith(tabaNum);
                });
                if (hasPlan) {
                    html += `<div class="popup-footer" style="flex-direction:row;background:${bodyBg};border-top-color:${rowBorder}">`;
                    html += `<button class="popup-icon-btn" data-action="jump-to-plan" data-taba="${taba}" title="לתב״ע">🏠</button>`;
                    html += '</div>';
                }
                if (note) html += '<div style="background:#ffeaa7;padding:6px;border-radius:4px;margin-top:6px;font-size:11px;color:#2d3436">📝 ' + note + '</div>';
                html += '</div>';
                return html;
            }

            // Build the permit details popup HTML
            function buildPermitPopup(props, featureData, navInfo) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const planName = props.plan_name || props.taba || '';
                const permitNum = props.building_permit || '-';
                const subtitle = [planName, permitNum !== '-' ? permitNum : null].filter(Boolean).join(' | ');
                const stage = props.stage || '-';
                const stageColor = STAGE_COLORS[stage] || '#5dade2';
                const requestType = props.request_type || props.mahut_bakasha || '-';
                const permitDate = props.permit_date || props.permit_date_data || '-';
                const permitAddition = props.permit_addition || '-';
                const permitAddDisplay = permitAddition !== '-' && permitAddition !== 0 ? '+' + permitAddition : permitAddition;

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Header
                html += '<div class="permit-detail-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">שלב</span><span class="popup-status-badge" style="background:${stageColor}33;color:${stageColor};border:1px solid ${stageColor}">${stage}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">מהות הבקשה</span><span class="popup-row-value" style="font-size:11px;max-width:180px;text-align:left">${requestType}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך היתר</span><span class="popup-row-value">${permitDate}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת בהיתר</span><span class="popup-row-value">${permitAddDisplay}</span></div>`;
                html += '</div>';
                // Footer - back button styled red with left arrow
                html += '<div class="popup-footer">';
                html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}' data-action="back-to-plan">\u2192 לתב"ע</button>`;
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Build the tama38 popup HTML
            function buildTama38Popup(props, navInfo) {
                const title = props.address || 'תמ"א 38';
                const subtitle = props.neighborho ? `שכונה: ${props.neighborho}` : '';
                const status = props.status || '';
                const status1 = props.status_1 || '';
                const displayStatus = status || status1 || '-';
                const harisaa = props.harisaa || '-';
                const unitsExist = props.units_exis != null ? props.units_exis : '-';
                const unitsTose = props.units_tose != null ? props.units_tose : '-';
                const tik = props.tik || '-';
                const dateOpen = props.open_ || '-';
                const dateApproval = props.date || '-';
                const comment = props.comment || '';

                // Status color for tama38
                const statusColor = displayStatus.includes('היתר') ? '#50d25a' :
                    displayStatus.includes('אושר') ? '#50d25a' :
                    displayStatus.includes('הופק') ? '#50d25a' :
                    displayStatus.includes('בנייה') ? '#4a69d1' :
                    displayStatus.includes('נפתח') ? '#f56e05' :
                    displayStatus.includes('בתהליך') ? '#4ba1f0' :
                    '#5dade2';

                let html = '<div>';
                html += buildNavBar(navInfo);
                html += '<div class="popup-header" style="border-right:4px solid #e94560">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += `<div class="popup-header-subtitle" style="font-size:10px;opacity:0.6">תמ"א 38</div>`;
                html += '</div>';
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${displayStatus}</span></div>`;
                if (status1 && status1 !== status && status1 !== '-') {
                    html += `<div class="popup-row"><span class="popup-row-label">סטטוס משני</span><span class="popup-row-value">${status1}</span></div>`;
                }
                html += `<div class="popup-row"><span class="popup-row-label">הריסה</span><span class="popup-row-value">${harisaa}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד קיימות</span><span class="popup-row-value">${unitsExist}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsTose !== '-' ? '+' + unitsTose : '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תיק</span><span class="popup-row-value">${tik}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך פתיחה</span><span class="popup-row-value">${dateOpen}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך אישור</span><span class="popup-row-value">${dateApproval}</span></div>`;
                if (comment) {
                    const shortComment = comment.length > 120 ? comment.substring(0, 120) + '...' : comment;
                    html += `<div class="popup-row" style="flex-direction:column;align-items:flex-start"><span class="popup-row-label" style="margin-bottom:4px">הערות</span><span class="popup-row-value" style="font-size:11px;line-height:1.4;text-align:right;white-space:pre-wrap;max-width:100%">${shortComment}</span></div>`;
                }
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Bind popup navigation and permit/back button events
            // Bind shavaz popup events (notes + jump to plan)
            function shavazPopupClassOuter(isFuture) {
                return 'plan-popup shavaz-popup ' + (isFuture ? 'shavaz-future-popup' : 'shavaz-kayam-popup');
            }

            function bindShavazPopupEvents(popup, shavazProps, latlng, originPlanProps, allShavaz, currentShavazIdx) {
                let shavazIdx = currentShavazIdx || 0;
                const el = popup.getElement();
                if (!el) return;
                // Remove any previous handler
                if (el._popupHandler) el.removeEventListener('click', el._popupHandler);
                el._popupHandler = function handler(ev) {
                    // Nav buttons for paging between overlapping shavaz
                    const navBtn = ev.target.closest('.popup-nav-btn');
                    if (navBtn && allShavaz && allShavaz.length > 1) {
                        ev.stopPropagation();
                        if (navBtn.dataset.nav === 'next') shavazIdx = (shavazIdx + 1) % allShavaz.length;
                        else shavazIdx = (shavazIdx - 1 + allShavaz.length) % allShavaz.length;
                        const entry = allShavaz[shavazIdx];
                        const navInfo = { current: shavazIdx, total: allShavaz.length };
                        popup.options.className = shavazPopupClassOuter(entry.isFuture);
                        popup.setContent(buildShavazPopup(entry.properties, entry.isFuture, !!originPlanProps, navInfo));
                        shavazProps = entry.properties;
                        return;
                    }
                    const btn = ev.target.closest('.popup-btn-permit') || ev.target.closest('.popup-icon-btn');
                    if (!btn) return;
                    ev.stopPropagation();
                    if (btn.dataset.action === 'add-note') {
                        const planId = btn.dataset.plan;
                        const current = window.__annotations[planId] || '';
                        const note = prompt('הערה:', current);
                        if (note !== null) {
                            window.__annotations[planId] = note;
                            localStorage.setItem('plan_annotations', JSON.stringify(window.__annotations));
                            const isFuture = !!(shavazProps.Mavat_Status || shavazProps.MAVAT_NAME);
                            const navInfo = allShavaz && allShavaz.length > 1 ? { current: shavazIdx, total: allShavaz.length } : null;
                            popup.setContent(buildShavazPopup(shavazProps, isFuture, !!originPlanProps, navInfo));
                        }
                        return;
                    }
                    if (btn.dataset.action === 'jump-to-plan') {
                        const taba = btn.dataset.taba;
                        if (!taba) return;
                        const gd = geoDataRef.current;
                        if (!gd.plans) return;
                        // Strip Hebrew letters for matching (e.g. "1013א" → "1013")
                        const tabaNum = taba.replace(/[^\d]/g, '');
                        const matching = gd.plans.features.filter(f => {
                            const pt = (f.properties.taba || f.properties.TABA || '').toString();
                            return pt === taba || pt === tabaNum || pt.startsWith(tabaNum);
                        });
                        if (matching.length > 0) {
                            const mapped = mapPlanProps(matching[0].properties);
                            const allFeatures = matching.map(f => ({ properties: mapPlanProps(f.properties), type: 'plan' }));
                            const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                            popup.setContent(buildPlanPopup(mapped, { properties: mapped }, navInfo, shavazProps));
                            popup.options.className = 'plan-popup';
                            bindPopupEvents(popup, allFeatures, 0, shavazProps);
                        }
                        return;
                    }
                    if (btn.dataset.action === 'back-to-plan' && originPlanProps) {
                        const gd = geoDataRef.current;
                        const taba = originPlanProps.taba || originPlanProps.TABA || '';
                        const matching = gd.plans ? gd.plans.features.filter(f => (f.properties.taba || f.properties.TABA || '') === taba) : [];
                        if (matching.length > 0) {
                            const mapped = mapPlanProps(matching[0].properties);
                            const allFeatures = matching.map(f => ({ properties: mapPlanProps(f.properties), type: 'plan' }));
                            const navInfo = allFeatures.length > 1 ? { current: 0, total: allFeatures.length } : null;
                            popup.setContent(buildPlanPopup(mapped, { properties: mapped }, navInfo));
                            popup.options.className = 'plan-popup';
                            bindPopupEvents(popup, allFeatures, 0);
                        }
                        return;
                    }
                };
                el.addEventListener('click', el._popupHandler);
            }

            function bindPopupEvents(popup, allFeatures, startIdx, originShavazProps) {
                let currentIdx = startIdx || 0;
                function buildForIndex(idx) {
                    const entry = allFeatures[idx];
                    const navInfo = allFeatures.length > 1 ? { current: idx, total: allFeatures.length } : null;
                    if (entry.type === 'permit') return buildPermitPopup(entry.properties, { properties: entry.properties }, navInfo);
                    if (entry.type === 'tama38') return buildTama38Popup(entry.properties, navInfo);
                    return buildPlanPopup(entry.properties, { properties: entry.properties }, navInfo);
                }
                const el = popup.getElement();
                if (!el) return;
                if (el._popupHandler) el.removeEventListener('click', el._popupHandler);
                el._popupHandler = function(ev) {
                    const navBtn = ev.target.closest('.popup-nav-btn');
                    if (navBtn) {
                        ev.stopPropagation();
                        if (navBtn.dataset.nav === 'next') currentIdx = (currentIdx + 1) % allFeatures.length;
                        else currentIdx = (currentIdx - 1 + allFeatures.length) % allFeatures.length;
                        popup.setContent(buildForIndex(currentIdx));
                        return;
                    }
                    const permitBtn = ev.target.closest('.popup-btn-permit') || ev.target.closest('.popup-icon-btn');
                    if (permitBtn && permitBtn.dataset.action === 'add-note') {
                        ev.stopPropagation();
                        const planId = permitBtn.dataset.plan;
                        const current = window.__annotations[planId] || '';
                        const note = prompt('\u05d4\u05e2\u05e8\u05d4 \u05dc\u05ea\u05db\u05e0\u05d9\u05ea:', current);
                        if (note !== null) {
                            window.__annotations[planId] = note;
                            localStorage.setItem('plan_annotations', JSON.stringify(window.__annotations));
                            popup.setContent(buildForIndex(currentIdx));
                        }
                        return;
                    }
                    if (permitBtn && permitBtn.dataset.action === 'jump-to-shavaz') {
                        ev.stopPropagation();
                        const taba = permitBtn.dataset.taba;
                        if (!taba) return;
                        const gd = geoDataRef.current;
                        const shavazFeatures = [];
                        [gd.shavaz_kayam, gd.future_shavaz].forEach((dataset, di) => {
                            if (!dataset) return;
                            dataset.features.forEach(f => {
                                const ft = f.properties.TABA || f.properties.taba || '';
                                if (ft === taba) shavazFeatures.push({ properties: f.properties, isFuture: di === 1 });
                            });
                        });
                        if (shavazFeatures.length > 0) {
                            const sf = shavazFeatures[0];
                            // Store current plan props for back navigation
                            const currentPlanProps = allFeatures[currentIdx] ? allFeatures[currentIdx].properties : null;
                            const navInfo = shavazFeatures.length > 1 ? { current: 0, total: shavazFeatures.length } : null;
                            popup.options.className = shavazPopupClassOuter(sf.isFuture != null ? sf.isFuture : !!(originShavazProps && (originShavazProps.Mavat_Status || originShavazProps.MAVAT_NAME)));
                            popup.setContent(buildShavazPopup(sf.properties, sf.isFuture, true, navInfo));
                            bindShavazPopupEvents(popup, sf.properties, popup.getLatLng(), currentPlanProps, shavazFeatures, 0);
                            setLayers(prev => ({ ...prev, shavaz_kayam: true, future_shavaz: true }));
                        }
                        return;
                    }
                    if (permitBtn && permitBtn.dataset.action === 'back-to-shavaz' && originShavazProps) {
                        ev.stopPropagation();
                        const fut = !!(originShavazProps.Mavat_Status || originShavazProps.MAVAT_NAME);
                        popup.options.className = shavazPopupClassOuter(fut);
                        popup.setContent(buildShavazPopup(originShavazProps, fut, false));
                        bindShavazPopupEvents(popup, originShavazProps, popup.getLatLng(), null, null, 0);
                        return;
                    }
                    if (permitBtn) {
                        ev.stopPropagation();
                        const fd = JSON.parse(permitBtn.dataset.feature);
                        const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                        if (permitBtn.dataset.action === 'back-to-plan') {
                            popup.setContent(buildPlanPopup(fd.properties, fd, navInfo));
                            setTimeout(() => setLayers(prev => ({
                                ...prev,
                                plans: !prev.plans ? true : prev.plans,
                                permits: false
                            })), 100);
                        } else {
                            popup.setContent(buildPermitPopup(fd.properties, fd, navInfo));
                            setTimeout(() => setLayers(prev => ({
                                ...prev,
                                permits: !prev.permits,
                                plans: prev.permits ? true : false
                            })), 100);
                        }
                    }
                };
                el.addEventListener('click', el._popupHandler);
            }

            const toggleLayer = (id) => {
                setLayers(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetView = () => {
                mapInstanceRef.current?.setView(CENTER, DEFAULT_ZOOM);
            };

            const goBackView = () => {
                const hist = viewHistoryRef.current;
                if (hist.length <= 1) return;
                hist.pop(); // remove current view
                const prev = hist[hist.length - 1];
                isGoingBackRef.current = true;
                mapInstanceRef.current.setView([prev.lat, prev.lng], prev.zoom, {animate: false});
                setViewHistoryLen(hist.length);
            };

            // Keep goBackView ref for stable access
            const goBackViewRef = useRef(goBackView);
            goBackViewRef.current = goBackView;

            // Plan search results
            const searchResults = planSearch.length >= 2
                ? planIndex.filter(p =>
                    (p.t && p.t.includes(planSearch)) || (p.n && p.n.includes(planSearch))
                ).slice(0, 15)
                : [];

            const handleSearchSelect = (plan) => {
                const map = mapInstanceRef.current;
                if (!map) return;
                setPlanSearch('');
                setShowSearchResults(false);
                // Zoom to plan location and query for popup
                map.setView(plan.c, 18);
                setTimeout(() => {
                    const gd = geoDataRef.current;
                    if (!gd.plans) return;
                    const match = gd.plans.features.find(f =>
                        f.properties.plan_name === plan.n || f.properties.taba === plan.n
                    );
                    if (!match) return;
                    const mapped = mapPlanProps(match.properties);
                    const popup = L.popup({ maxWidth: 320, minWidth: 300, closeButton: true })
                        .setLatLng(plan.c)
                        .setContent(buildPlanPopup(mapped, { properties: mapped }))
                        .openOn(map);
                    bindPopupEvents(popup, [{ type: 'plan', properties: mapped }], 0);
                }, 500);
            };

            const activeCount = Object.values(layers).filter(Boolean).length;

            const filteredConfig = {};
            Object.entries(LAYER_CONFIG).forEach(([key, group]) => {
                const filtered = group.layers.filter(l =>
                    !searchText || l.name.includes(searchText) || l.id.includes(searchText)
                );
                if (filtered.length > 0) {
                    filteredConfig[key] = { ...group, layers: filtered };
                }
            });

            return (
                <>
                    {/* Mobile overlay — click to close sidebar */}
                    <div
                        className={`sidebar-overlay ${sidebarOpen ? 'visible' : ''}`}
                        onClick={() => { setSidebarOpen(false); setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350); }}
                    ></div>

                    <div className={`sidebar ${sidebarOpen ? '' : 'collapsed'}`}>
                        {/* Mobile close button */}
                        <button
                            className="sidebar-close-mobile"
                            onClick={() => { setSidebarOpen(false); setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350); }}
                        >&times;</button>
                        <div className="sidebar-header">
                            <h1>אורנים</h1>
                            <p>כלי תכנון עירוני - ירושלים</p>
                        </div>

                        <div className="sidebar-section">
                            <h3>חיפוש תוכניות</h3>
                            <div className="plan-search-wrap">
                                <input
                                    className="plan-search-input"
                                    type="text"
                                    placeholder='חיפוש תכנית או מספר...'
                                    value={planSearch}
                                    onChange={(e) => {
                                        setPlanSearch(e.target.value);
                                        setShowSearchResults(true);
                                    }}
                                    onFocus={() => planSearch.length >= 2 && setShowSearchResults(true)}
                                />
                                {planSearch && (
                                    <button
                                        className="plan-search-clear"
                                        onClick={() => { setPlanSearch(''); setShowSearchResults(false); }}
                                    >&times;</button>
                                )}
                                {showSearchResults && planSearch.length >= 2 && (
                                    <div className="plan-search-results">
                                        {searchResults.length > 0 ? searchResults.map((plan, i) => (
                                            <div
                                                key={i}
                                                className="plan-search-item"
                                                onClick={() => handleSearchSelect(plan)}
                                            >
                                                <div className="plan-search-item-name">{plan.h}</div>
                                                {plan.s && <div className="plan-search-item-summary">{plan.s}</div>}
                                                <div className="plan-search-item-num">{plan.n}</div>
                                            </div>
                                        )) : (
                                            <div className="plan-search-empty">לא נמצאו תוצאות</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <h3>חיפוש כתובת</h3>
                            <div className="plan-search-wrap">
                                <input
                                    className="plan-search-input"
                                    type="text"
                                    placeholder='הקלד כתובת...'
                                    value={addressSearch}
                                    onChange={(e) => setAddressSearch(e.target.value)}
                                    onKeyDown={(e) => {

                                                        <td style={{color: '#8ecae6', fontWeight: 700, background: '#141440'}}>

                                                        </td>

                                                    {unitsExpanded === 'type' && unitsData.typeGroups && unitsData.typeGroups.map(tg => {

                                                                    return (

                                {(() => {
                                    const gd = geoDataRef.current;
                                    if (!gd.plans) return <p>טוען...</p>;
                                    const rejectedStatuses = ['נגנזה/נדחתה','נגנזה','נדחתה'];
                                    const approvedStatuses = ['אישור','מאושרת','תבע מאושרת','תחילת תוקף'];
                                    const seenPlans = new Set();
                                    const plans = gd.plans.features.filter(f => {
                                        const m = f.properties.minahak || '';
                                        if (m !== minahakReport) return false;
                                        const st = (f.properties.status_mavat || '').trim();
                                        const planId = f.properties.plan_name || '';
                                        // Deduplicate MultiPolygon features (after minahak check)
                                        if (seenPlans.has(planId)) return false;
                                        seenPlans.add(planId);
                                        // Exclude rejected
                                        if (rejectedStatuses.includes(st)) return false;
                                        // Approved statuses: only from 2020+ (by mavat_date)
                                        if (approvedStatuses.includes(st)) {
                                            const dateStr = f.properties.mavat_date || '';
                                            if (dateStr) {
                                                const parts = dateStr.split('/');
                                                const year = parseInt(parts[parts.length - 1]) || 0;
                                                if (year < 2020) return false;
                                            }
                                        }
                                        return true;
                                    });
                                    const totalAdd = plans.reduce((s, f) => s + (parseFloat(f.properties.units_add) || 0), 0);

                                            printWin.document.close();
                                            printWin.focus();
                                        }} style={{background:'#e94560',color:'#fff',border:'none',borderRadius:6,padding:'8px 20px',cursor:'pointer',fontSize:13,fontWeight:600}}>
                                            &#128424; הדפסה / שמירה
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>);
                    })()}

                    {legendPopup && (
                        <div className="legend-popup-overlay" onClick={() => setLegendPopup(null)}>
                            <div className="legend-popup" onClick={(e) => e.stopPropagation()}>
                                <button className="legend-popup-close" onClick={() => setLegendPopup(null)}>&times;</button>
                                <div className="legend-popup-title">{legendPopup.title}</div>
                                {legendPopup.items.map((item, i) => (
                                    <div className="legend-item" key={i}>
                                        {item.style === 'hatch' ? (
                                            <div className="legend-color" style={{
                                                background: `repeating-linear-gradient(-45deg, transparent, transparent 3px, ${item.color} 3px, ${item.color} 4.5px)`,
                                                border: `2px solid ${item.color}`
                                            }}></div>
                                        ) : item.style === 'outline' ? (
                                            <div className="legend-color" style={{
                                                background: 'transparent',
                                                border: `3px solid ${item.color}`
                                            }}></div>
                                        ) : (
                                            <div className="legend-color" style={{background: item.color}}></div>
                                        )}
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

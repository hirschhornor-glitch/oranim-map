                    const subs = selectedMinahaks.flatMap(m => MINAHAK_SUBS[m] || []);
                    if (subs.length > 0) {
                        minahakTama38Ogc = ogcOr(subs.map(s => ogcEq('neighborho', s)));
                    }
                } else if (selectedMinahaks.length === 0) {
                    // None selected - impossible filter to hide all
                    minahakPlansOgc = ogcEq('minahak', '__NONE__');
                    minahakTama38Ogc = ogcEq('neighborho', '__NONE__');
                }

                // Plans OGC filter: only minahak spatial filter (topics are separate hatching overlay)
                const plansOgc = minahakPlansOgc || null;
                const tama38Ogc = minahakTama38Ogc;

                // Build multi-layer FILTER param
                const filterMap = {};
                if (plansOgc) filterMap['plans'] = plansOgc;
                if (tama38Ogc) filterMap['tama38'] = tama38Ogc;
                const mainOgcFilter = buildMultiFilter(mainLayers.join(','), filterMap);

                const mainCsv = mainLayers.join(',');
                let size = map.getSize();
                // Skip if map not yet sized (initial render)
                if (size.x === 0 || size.y === 0) {
                    const retry = setTimeout(() => {
                        map.invalidateSize();
                        // Trigger re-render by firing moveend
                        map.fire('moveend');
                    }, 300);
                    return () => clearTimeout(retry);
                }
                const bounds = map.getBounds();

                console.log('[WMS] Main layers:', mainCsv);
                console.log('[WMS] OGC FILTER:', mainOgcFilter || '(none)');
                if (showPermits) console.log('[WMS] Permits ON with SLD_BODY');

                // --- High priority: main layers (plans, always-on, roads, etc.) ---
                let mainFront = null, mainBack = null;
                if (mainLayers.length > 0) {
                    mainFront = L.imageOverlay(
                        buildWmsUrl(WMS_URL, mainCsv, bounds, size, mainOgcFilter), bounds,
                        { opacity, interactive: false, className: 'wms-overlay' }
                    ).addTo(map);
                }

                // --- Low priority: buildings (delayed 1s) ---
                let bldgFront = null, bldgBack = null;
                const bldgTimerRef = { current: null };
                if (showBuildings) {
                    setLoadingBuildings(true);
                    bldgTimerRef.current = setTimeout(() => {
                        bldgFront = L.imageOverlay(
                            buildWmsUrl(WMS_URL, 'buildings', bounds, size), bounds,
                            { opacity, interactive: false, className: 'wms-overlay' }
                        ).addTo(map);
                        bldgFront.bringToBack();
                        // Update the mutable ref so moveend handler and cleanup can track it
                        bf.current = bldgFront;
                        const el = bldgFront.getElement();
                        if (el) {
                            el.onload = () => setLoadingBuildings(false);
                            el.onerror = () => setLoadingBuildings(false);
                        }
                    }, 1000);
                }

                // --- Topics overlay (zIndex 450, above plans, below permits) ---
                // Uses FILTER to pre-filter features + SLD for coloring + CSS mask for hatching
                let hatchFront = null, hatchBack = null;
                const topicDefs = getTopicDefs(planningTopics);
                const topicsSLD = buildTopicsSLD(topicDefs, minahakPlansOgc);
                const topicsFilter = buildTopicsFilter(topicDefs, minahakPlansOgc);
                const hasHatchTopics = topicDefs.some(t => t.style === 'hatch');
                if (topicsSLD) {
                    console.log('[WMS] Topics ON, FILTER:', topicsFilter);
                    hatchFront = L.imageOverlay(
                        buildWmsUrl(WMS_URL, 'plans', bounds, size, topicsFilter, { sldBody: topicsSLD }),
                        bounds, { opacity: 1, interactive: false, className: 'wms-overlay wms-hatch', zIndex: 450 }
                    ).addTo(map);
                    const hatchEl = hatchFront.getElement();
                    if (hatchEl) {
                        hatchEl.style.zIndex = '450';
                        if (hasHatchTopics) {
                            hatchEl.style.maskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                            hatchEl.style.webkitMaskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                        }
                    }
                }

                // --- Permits overlay (solid opaque fill via SLD_BODY, above everything, zIndex 500) ---
                let permitFront = null, permitBack = null;
                const permitSLD = buildPermitsSLD(minahakPlansOgc);
                if (showPermits) {
                    console.log('[WMS] Permits ON with SLD solid fill');
                    permitFront = L.imageOverlay(
                        buildWmsUrl(WMS_URL, 'plans', bounds, size, null, { sldBody: permitSLD }),
                        bounds, { opacity: 1, interactive: false, className: 'wms-overlay wms-permits', zIndex: 500 }
                    ).addTo(map);
                    const permitEl = permitFront.getElement();
                    if (permitEl) permitEl.style.zIndex = '500';
                }

                let debounceTimer = null;

                // Helper: double-buffer swap for an overlay pair
                function swapOverlay(url, b, frontRef, backRef, onSwapped) {
                    if (backRef.current) map.removeLayer(backRef.current);
                    backRef.current = L.imageOverlay(url, b, {
                        opacity: 0, interactive: false, className: 'wms-overlay'
                    }).addTo(map);
                    const el = backRef.current.getElement();
                    if (el) {
                        el.onload = () => {
                            backRef.current.setOpacity(opacity);
                            if (frontRef.current) map.removeLayer(frontRef.current);
                            frontRef.current = backRef.current;
                            backRef.current = null;
                            onSwapped();
                        };
                        el.onerror = () => {
                            if (backRef.current) map.removeLayer(backRef.current);
                            backRef.current = null;
                            onSwapped();
                        };
                    }
                }

                // Mutable refs for the swap helper
                const mf = { current: mainFront }, mb = { current: mainBack };
                const bf = { current: bldgFront }, bb = { current: bldgBack };
                const pf = { current: permitFront }, pb = { current: permitBack };
                const hf = { current: hatchFront }, hb = { current: hatchBack };

                function onMoveEnd() {
                    clearTimeout(debounceTimer);
                    clearTimeout(bldgTimerRef.current);
                    debounceTimer = setTimeout(() => {
                        const b = map.getBounds();
                        const s = map.getSize();
                        if (s.x === 0 || s.y === 0) return;

                        let pending = 0;
                        const checkDone = () => { if (--pending <= 0) setLoading(false); };
                        setLoading(true);

                        // High priority: main layers
                        if (mainLayers.length > 0) {
                            pending++;
                            swapOverlay(buildWmsUrl(WMS_URL, mainCsv, b, s, mainOgcFilter), b, mf, mb, checkDone);
                        }

                        // Topics overlay (zIndex 450, FILTER+SLD+CSS mask)
                        if (topicsSLD) {
                            pending++;
                            swapOverlay(
                                buildWmsUrl(WMS_URL, 'plans', b, s, topicsFilter, { sldBody: topicsSLD }),
                                b, hf, hb, () => {
                                    if (hf.current) {
                                        const el = hf.current.getElement();
                                        if (el) {
                                            el.style.zIndex = '450';
                                            if (hasHatchTopics) {
                                                el.style.maskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                                                el.style.webkitMaskImage = 'repeating-linear-gradient(-45deg, black 0px, black 2px, transparent 2px, transparent 8px)';
                                            }
                                        }
                                        hf.current.setOpacity(1);
                                    }
                                    checkDone();
                                }
                            );
                        }

                        // Permits (solid fill above everything, zIndex 500)
                        if (showPermits) {
                            pending++;
                            swapOverlay(
                                buildWmsUrl(WMS_URL, 'plans', b, s, null, { sldBody: permitSLD }),
                                b, pf, pb, () => {
                                    if (pf.current) {
                                        const el = pf.current.getElement();
                                        if (el) el.style.zIndex = '500';
                                        pf.current.setOpacity(1);
                                    }
                                    checkDone();
                                }
                            );
                        }

                        if (pending === 0) setLoading(false);

                        // Low priority: buildings with 1s delay
                        if (showBuildings) {
                            setLoadingBuildings(true);
                            bldgTimerRef.current = setTimeout(() => {
                                swapOverlay(
                                    buildWmsUrl(WMS_URL, 'buildings', b, s), b, bf, bb,
                                    () => setLoadingBuildings(false)
                                );
                                if (bf.current) bf.current.bringToBack();
                            }, 1000);
                        }
                    }, 300);
                }

                map.on('moveend', onMoveEnd);

                wmsLayerRef.current = {
                    get mainFront() { return mf.current; },
                    get mainBack() { return mb.current; },
                    get bldgFront() { return bf.current; },
                    get bldgBack() { return bb.current; },
                    get permitFront() { return pf.current; },
                    get permitBack() { return pb.current; },
                    get hatchFront() { return hf.current; },
                    get hatchBack() { return hb.current; },
                    handler: onMoveEnd,
                    debounceTimer,
                    bldgTimerRef
                };
            }, [layers, opacity, planningTopics]);

            // Build the plan popup HTML
            function getStatusColor(status) {
                return STATUS_COLORS[status] || '#5dade2';
            }

            function buildNavBar(navInfo) {
                if (!navInfo || navInfo.total <= 1) return '';
                return `<div class="popup-nav">` +
                    `<button class="popup-nav-btn" data-nav="prev">▶</button>` +
                    `<span>${navInfo.current + 1} / ${navInfo.total}</span>` +
                    `<button class="popup-nav-btn" data-nav="next">◀</button>` +
                    `</div>`;
            }

            function buildPlanPopup(props, featureData, navInfo) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const subtitle = props.plan_name || props.taba || '';
                const status = props.status_mavat || '';
                const statusColor = getStatusColor(status);
                const unitsIn = props.units_in || '-';
                const unitsTotal = props.units_total || '-';
                const unitsAdd = props.units_add != null ? props.units_add : '-';
                const unitsAddDisplay = unitsAdd !== '-' && unitsAdd !== 0 ? '+' + unitsAdd : unitsAdd;
                const mavatUrl = props.mavat_url || '';
                const hasPermit = props.stage && props.stage.trim() !== '';

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Header
                html += '<div class="popup-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${status || '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד נכנס</span><span class="popup-row-value">${unitsIn}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד יוצא</span><span class="popup-row-value">${unitsTotal}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsAddDisplay}</span></div>`;
                html += '</div>';
                // Footer
                html += '<div class="popup-footer">';
                if (mavatUrl) {
                    html += `<a class="popup-link" href="${mavatUrl}" target="_blank" rel="noopener">\u2190 צפה במבא"ת</a>`;
                }
                if (hasPermit) {
                    html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}'>להיתר \u2190</button>`;
                }
                html += `<button class="popup-btn-permit" data-action="add-compare" data-props='${JSON.stringify(props).replace(/'/g, "&#39;")}' style="background:#2a2a4a;border-color:#3a3a5a;color:#8ecae6;font-size:11px">📊 השוואה</button>`;
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Build the permit details popup HTML
            function buildPermitPopup(props, featureData, navInfo) {
                const title = props.plan_name_he || props.plan_summary || 'תוכנית';
                const planName = props.plan_name || props.taba || '';
                const permitNum = props.building_permit || '-';
                const subtitle = [planName, permitNum !== '-' ? permitNum : null].filter(Boolean).join(' | ');
                const stage = props.stage || '-';
                const stageColor = STAGE_COLORS[stage] || '#5dade2';
                const requestType = props.request_type || props.mahut_bakasha || '-';
                const permitDate = props.permit_date || props.permit_date_data || '-';
                const permitAddition = props.permit_addition || '-';
                const permitAddDisplay = permitAddition !== '-' && permitAddition !== 0 ? '+' + permitAddition : permitAddition;

                let html = '<div>';
                html += buildNavBar(navInfo);
                // Header
                html += '<div class="permit-detail-header">';
                html += `<div class="popup-header-title">${title}</div>`;
                html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += '</div>';
                // Body
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">שלב</span><span class="popup-status-badge" style="background:${stageColor}33;color:${stageColor};border:1px solid ${stageColor}">${stage}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">מהות הבקשה</span><span class="popup-row-value" style="font-size:11px;max-width:180px;text-align:left">${requestType}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך היתר</span><span class="popup-row-value">${permitDate}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת בהיתר</span><span class="popup-row-value">${permitAddDisplay}</span></div>`;
                html += '</div>';
                // Footer - back button styled red with left arrow
                html += '<div class="popup-footer">';
                html += `<button class="popup-btn-permit" data-feature='${JSON.stringify(featureData).replace(/'/g, "&#39;")}' data-action="back-to-plan">\u2192 לתב"ע</button>`;
                html += '</div>';
                html += '</div>';
                return html;
            }

            // Build the tama38 popup HTML
            function buildTama38Popup(props, navInfo) {
                const title = props.address || 'תמ"א 38';
                const subtitle = props.neighborho ? `שכונה: ${props.neighborho}` : '';
                const status = props.status || '';
                const status1 = props.status_1 || '';
                const displayStatus = status || status1 || '-';
                const harisaa = props.harisaa || '-';
                const unitsExist = props.units_exis != null ? props.units_exis : '-';
                const unitsTose = props.units_tose != null ? props.units_tose : '-';
                const tik = props.tik || '-';
                const dateOpen = props.open_ || '-';
                const dateApproval = props.date || '-';
                const comment = props.comment || '';

                // Status color for tama38
                const statusColor = displayStatus.includes('היתר') ? '#50d25a' :
                    displayStatus.includes('אושר') ? '#50d25a' :
                    displayStatus.includes('הופק') ? '#50d25a' :
                    displayStatus.includes('בנייה') ? '#4a69d1' :
                    displayStatus.includes('נפתח') ? '#f56e05' :
                    displayStatus.includes('בתהליך') ? '#4ba1f0' :
                    '#5dade2';

                let html = '<div>';
                html += buildNavBar(navInfo);
                html += '<div class="popup-header" style="border-right:4px solid #e94560">';
                html += `<div class="popup-header-title">${title}</div>`;
                if (subtitle) html += `<div class="popup-header-subtitle">${subtitle}</div>`;
                html += `<div class="popup-header-subtitle" style="font-size:10px;opacity:0.6">תמ"א 38</div>`;
                html += '</div>';
                html += '<div class="popup-body">';
                html += `<div class="popup-row"><span class="popup-row-label">סטטוס</span><span class="popup-status-badge" style="background:${statusColor}33;color:${statusColor};border:1px solid ${statusColor}">${displayStatus}</span></div>`;
                if (status1 && status1 !== status && status1 !== '-') {
                    html += `<div class="popup-row"><span class="popup-row-label">סטטוס משני</span><span class="popup-row-value">${status1}</span></div>`;
                }
                html += `<div class="popup-row"><span class="popup-row-label">הריסה</span><span class="popup-row-value">${harisaa}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד קיימות</span><span class="popup-row-value">${unitsExist}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">יח"ד תוספת</span><span class="popup-row-value">${unitsTose !== '-' ? '+' + unitsTose : '-'}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תיק</span><span class="popup-row-value">${tik}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך פתיחה</span><span class="popup-row-value">${dateOpen}</span></div>`;
                html += `<div class="popup-row"><span class="popup-row-label">תאריך אישור</span><span class="popup-row-value">${dateApproval}</span></div>`;
                if (comment) {
                    const shortComment = comment.length > 120 ? comment.substring(0, 120) + '...' : comment;
                    html += `<div class="popup-row" style="flex-direction:column;align-items:flex-start"><span class="popup-row-label" style="margin-bottom:4px">הערות</span><span class="popup-row-value" style="font-size:11px;line-height:1.4;text-align:right;white-space:pre-wrap;max-width:100%">${shortComment}</span></div>`;
                }
                html += '</div>';
                html += '</div>';
                return html;
            }

            const handleMapClick = useCallback((e, map) => {
                // Don't open popups while measuring
                if (measureMode) return;

                const size = map.getSize();
                const bounds = map.getBounds();
                const sw = bounds.getSouthWest();
                const ne = bounds.getNorthEast();
                const showPlans = layers['plans'];
                const showPermits = layers['permits'];
                const showTama38 = layers['tama38'];
                const isComparing = showCompareRef.current;

                // Global rule: only query layers that are toggled ON (but always allow plans when comparing)
                if (!showPlans && !showPermits && !showTama38 && !isComparing) return;

                const bboxStr = `${sw.lat},${sw.lng},${ne.lat},${ne.lng}`;
                const commonParams = {
                    SERVICE: 'WMS',
                    VERSION: '1.3.0',
                    REQUEST: 'GetFeatureInfo',
                    CRS: 'EPSG:4326',
                    BBOX: bboxStr,
                    WIDTH: size.x,
                    HEIGHT: size.y,
                    I: Math.round(e.containerPoint.x),
                    J: Math.round(e.containerPoint.y),
                    INFO_FORMAT: 'application/json',
                    FEATURE_COUNT: 10
                };

                // Build fetch promises only for active layers
                const fetches = [];

                if (showPlans || showPermits || isComparing) {
                    const params = new URLSearchParams({ ...commonParams, LAYERS: 'plans', QUERY_LAYERS: 'plans' });
                    fetches.push(
                        fetch(`${WMS_URL}?${params.toString()}`).then(r => r.json()).then(d => ({ layer: 'plans', data: d }))
                    );
                }

                if (showTama38) {
                    const params = new URLSearchParams({ ...commonParams, LAYERS: 'tama38', QUERY_LAYERS: 'tama38' });
                    fetches.push(
                        fetch(`${WMS_URL}?${params.toString()}`).then(r => r.json()).then(d => ({ layer: 'tama38', data: d }))
                    );
                }

                Promise.all(fetches)
                    .then(results => {
                        const plansResult = results.find(r => r.layer === 'plans');
                        const tama38Result = results.find(r => r.layer === 'tama38');

                        const plansFeatures = (plansResult && plansResult.data.features) || [];
                        const tama38Features = (tama38Result && tama38Result.data.features) || [];

                        console.log('[GetFeatureInfo] plans:', plansFeatures.length, 'tama38:', tama38Features.length);

                        // Collect all displayable features into a unified list
                        // Each entry: { type: 'plan'|'permit'|'tama38', props, featureData }
                        const allFeatures = [];

                        if (showPermits && plansFeatures.length > 0) {
                            plansFeatures.forEach(f => {
                                const props = f.properties;
                                const fd = { properties: props };
                                if (props.stage && props.stage.trim()) {
                                    allFeatures.push({ type: 'permit', props, featureData: fd });
                                } else if (showPlans || isComparing) {
                                    allFeatures.push({ type: 'plan', props, featureData: fd });
                                }
                            });
                        } else if ((showPlans || isComparing) && plansFeatures.length > 0) {
                            plansFeatures.forEach(f => {
                                const props = f.properties;
                                const fd = { properties: props };
                                allFeatures.push({ type: 'plan', props, featureData: fd });
                            });
                        }

                        if (showTama38 && tama38Features.length > 0) {
                            tama38Features.forEach(f => {
                                allFeatures.push({ type: 'tama38', props: f.properties, featureData: null });
                            });
                        }

                        if (allFeatures.length === 0) return;

                        // When compare panel is open, auto-add all plan features at click point
                        if (showCompareRef.current) {
                            const planEntries = allFeatures.filter(f => f.type === 'plan');
                            if (planEntries.length > 0 && window.__addToCompare) {
                                planEntries.forEach(entry => window.__addToCompare(entry.props));
                                return; // Don't open popup — just add to comparison
                            }
                        }

                        // Build popup HTML for a given feature index
                        let currentIdx = 0;

                        function buildForIndex(idx) {
                            const entry = allFeatures[idx];
                            const navInfo = allFeatures.length > 1 ? { current: idx, total: allFeatures.length } : null;
                            if (entry.type === 'permit') {
                                return buildPermitPopup(entry.props, entry.featureData, navInfo);
                            } else if (entry.type === 'plan') {
                                return buildPlanPopup(entry.props, entry.featureData, navInfo);
                            } else {
                                return buildTama38Popup(entry.props, navInfo);
                            }
                        }

                        const popup = L.popup({
                            maxWidth: 320,
                            minWidth: 300,
                            className: 'dark-popup',
                            closeButton: true
                        })
                            .setLatLng(e.latlng)
                            .setContent(buildForIndex(0))
                            .openOn(map);

                        // Bind click for nav buttons and permit/back buttons
                        popup.getElement().addEventListener('click', function(ev) {
                            // Nav buttons
                            const navBtn = ev.target.closest('.popup-nav-btn');
                            if (navBtn) {
                                ev.stopPropagation();
                                const dir = navBtn.dataset.nav;
                                if (dir === 'next') {
                                    currentIdx = (currentIdx + 1) % allFeatures.length;
                                } else {
                                    currentIdx = (currentIdx - 1 + allFeatures.length) % allFeatures.length;
                                }
                                popup.setContent(buildForIndex(currentIdx));
                                return;
                            }

                            // Compare button
                            const compareBtn = ev.target.closest('[data-action="add-compare"]');
                            if (compareBtn) {
                                ev.stopPropagation();
                                const p = JSON.parse(compareBtn.dataset.props);
                                if (window.__addToCompare) window.__addToCompare(p);
                                return;
                            }

                            // Permit/back buttons
                            const permitBtn = ev.target.closest('.popup-btn-permit');
                            if (permitBtn) {
                                ev.stopPropagation();
                                const fd = JSON.parse(permitBtn.dataset.feature);
                                const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                                if (permitBtn.dataset.action === 'back-to-plan') {
                                    popup.setContent(buildPlanPopup(fd.properties, fd, navInfo));
                                    setTimeout(() => setLayers(prev => ({ ...prev, plans: true, permits: false })), 100);
                                } else {
                                    popup.setContent(buildPermitPopup(fd.properties, fd, navInfo));
                                    setTimeout(() => setLayers(prev => ({ ...prev, permits: true })), 100);
                                }
                            }
                        });
                    })
                    .catch(err => console.error('GetFeatureInfo error:', err));
            }, [layers, measureMode]);

            // Re-bind click handler when layers change
            const clickHandlerRef = useRef(null);
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                // Remove only our previous handler, not all click handlers
                if (clickHandlerRef.current) {
                    map.off('click', clickHandlerRef.current);
                }
                const handler = (e) => handleMapClick(e, map);
                clickHandlerRef.current = handler;
                map.on('click', handler);
                return () => { map.off('click', handler); };
            }, [handleMapClick]);

            const toggleLayer = (id) => {
                setLayers(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetView = () => {
                mapInstanceRef.current?.setView(CENTER, DEFAULT_ZOOM);
            };

            // Plan search results
            const searchResults = planSearch.length >= 2
                ? planIndex.filter(p =>
                    p.h.includes(planSearch) || p.n.includes(planSearch)
                ).slice(0, 15)
                : [];

            const handleSearchSelect = (plan) => {
                const map = mapInstanceRef.current;
                if (!map) return;
                setPlanSearch('');
                setShowSearchResults(false);
                // Zoom to plan location and query for popup
                map.setView(plan.c, 18);
                // After map settles, trigger GetFeatureInfo at the plan center
                setTimeout(() => {
                    const size = map.getSize();
                    const bounds = map.getBounds();
                    const sw = bounds.getSouthWest();
                    const ne = bounds.getNorthEast();
                    const point = map.latLngToContainerPoint(plan.c);
                    const params = new URLSearchParams({
                        SERVICE: 'WMS', VERSION: '1.3.0', REQUEST: 'GetFeatureInfo',
                        LAYERS: 'plans', QUERY_LAYERS: 'plans', CRS: 'EPSG:4326',
                        BBOX: `${sw.lat},${sw.lng},${ne.lat},${ne.lng}`,
                        WIDTH: size.x, HEIGHT: size.y,
                        I: Math.round(point.x), J: Math.round(point.y),
                        INFO_FORMAT: 'application/json', FEATURE_COUNT: 5
                    });
                    fetch(`${WMS_URL}?${params.toString()}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!data.features || data.features.length === 0) return;
                            const allFeatures = data.features.map(f => ({
                                type: 'plan', props: f.properties, featureData: { properties: f.properties }
                            }));
                            let currentIdx = 0;
                            function buildForIndex(idx) {
                                const entry = allFeatures[idx];
                                const navInfo = allFeatures.length > 1 ? { current: idx, total: allFeatures.length } : null;
                                return buildPlanPopup(entry.props, entry.featureData, navInfo);
                            }
                            const popup = L.popup({ maxWidth: 320, minWidth: 300, closeButton: true })
                                .setLatLng(plan.c)
                                .setContent(buildForIndex(0))
                                .openOn(map);
                            popup.getElement().addEventListener('click', function(ev) {
                                const navBtn = ev.target.closest('.popup-nav-btn');
                                if (navBtn) {
                                    ev.stopPropagation();
                                    if (navBtn.dataset.nav === 'next') {
                                        currentIdx = (currentIdx + 1) % allFeatures.length;
                                    } else {
                                        currentIdx = (currentIdx - 1 + allFeatures.length) % allFeatures.length;
                                    }
                                    popup.setContent(buildForIndex(currentIdx));
                                    return;
                                }
                                const compareBtn = ev.target.closest('[data-action="add-compare"]');
                                if (compareBtn) {
                                    ev.stopPropagation();
                                    const p = JSON.parse(compareBtn.dataset.props);
                                    if (window.__addToCompare) window.__addToCompare(p);
                                    return;
                                }
                                const permitBtn = ev.target.closest('.popup-btn-permit');
                                if (permitBtn) {
                                    ev.stopPropagation();
                                    const fd = JSON.parse(permitBtn.dataset.feature);
                                    const navInfo = allFeatures.length > 1 ? { current: currentIdx, total: allFeatures.length } : null;
                                    if (permitBtn.dataset.action === 'back-to-plan') {
                                        popup.setContent(buildPlanPopup(fd.properties, fd, navInfo));
                                        setTimeout(() => setLayers(prev => ({ ...prev, plans: true, permits: false })), 100);
                                    } else {
                                        popup.setContent(buildPermitPopup(fd.properties, fd, navInfo));
                                        setTimeout(() => setLayers(prev => ({ ...prev, permits: true })), 100);
                                    }
                                }
                            });
                        })
                        .catch(err => console.error('Search popup error:', err));
                }, 1000);
            };

            const activeCount = Object.values(layers).filter(Boolean).length;

            const filteredConfig = {};
            Object.entries(LAYER_CONFIG).forEach(([key, group]) => {
                const filtered = group.layers.filter(l =>
                    !searchText || l.name.includes(searchText) || l.id.includes(searchText)
                );
                if (filtered.length > 0) {
                    filteredConfig[key] = { ...group, layers: filtered };
                }
            });

            return (
                <>
                    <div className={`sidebar ${sidebarOpen ? '' : 'collapsed'}`}>
                        <div className="sidebar-header">
                            <h1>אורנים</h1>
                            <p>כלי תכנון עירוני - ירושלים</p>
                        </div>

                        <div className="sidebar-section">
                            <h3>חיפוש תוכניות</h3>
                            <div className="plan-search-wrap">
                                <input
                                    className="plan-search-input"
                                    type="text"
                                    placeholder='חיפוש תכנית או מספר...'
                                    value={planSearch}
                                    onChange={(e) => {
                                        setPlanSearch(e.target.value);
                                        setShowSearchResults(true);
                                    }}
                                    onFocus={() => planSearch.length >= 2 && setShowSearchResults(true)}
                                />
                                {planSearch && (
                                    <button
                                        className="plan-search-clear"
                                        onClick={() => { setPlanSearch(''); setShowSearchResults(false); }}
                                    >&times;</button>
                                )}
                                {showSearchResults && planSearch.length >= 2 && (
                                    <div className="plan-search-results">
                                        {searchResults.length > 0 ? searchResults.map((plan, i) => (
                                            <div
                                                key={i}
                                                className="plan-search-item"
                                                onClick={() => handleSearchSelect(plan)}
                                            >
                                                <div className="plan-search-item-name">{plan.h}</div>
                                                <div className="plan-search-item-num">{plan.n}</div>
                                            </div>
                                        )) : (
                                            <div className="plan-search-empty">לא נמצאו תוצאות</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <h3>שכבות ({activeCount} פעילות)</h3>
                            <input
                                className="search-input"
                                type="text"
                                placeholder="חיפוש שכבה..."
                                value={searchText}
                                onChange={(e) => setSearchText(e.target.value)}
                            />

                            {Object.entries(filteredConfig).map(([groupKey, group]) => (
                                <div key={groupKey}>
                                    <div className="layer-group-title">{group.title}</div>
                                    {group.layers.map(layer => (
                                        <div className="layer-item" key={layer.id}
                                             title={layer.desc || ''}>
                                            <input
                                                type="checkbox"
                                                checked={layers[layer.id] || false}
                                                onChange={() => toggleLayer(layer.id)}
                                                onClick={(e) => e.stopPropagation()}
                                            />
                                            <label onClick={() => toggleLayer(layer.id)}>{layer.name}</label>
                                            {layer.id === 'plans' && (
                                                <button className="layer-legend-btn" title="מקרא סטטוס"
                                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא תב"ע - סטטוס תכנית', items: PLANS_LEGEND }); }}>⋯</button>
                                            )}
                                            {layer.id === 'permits' && (
                                                <button className="layer-legend-btn" title="מקרא שלבים"
                                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא היתרים - שלב', items: PERMITS_LEGEND }); }}>⋯</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            <div className="layer-group-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                <span>נושאים תכנוניים</span>
                                <button className="layer-legend-btn" title="מקרא נושאים תכנוניים"
                                    onClick={(e) => { e.stopPropagation(); setLegendPopup({ title: 'מקרא נושאים תכנוניים', items: TOPICS_LEGEND }); }}
                                    style={{fontSize:'14px',margin:0}}>⋯</button>
                            </div>
                            <div className="layer-item"
                                 title='הצגת תוכניות שחופפות מרחבית לתוכניות אחרות'
                                 onClick={() => setPlanningTopics(prev => ({...prev, overlapping: !prev.overlapping}))}>
                                <input type="checkbox" checked={planningTopics.overlapping} onChange={() => {}} />
                                <label>תבעות כפולות על אותו מרחב</label>
                            </div>
                            <div className="layer-item"
                                 title='תוכניות לעיבוי שטחים חומים - תוספת יח"ד בשטחים מאושרים'
                                 onClick={() => setPlanningTopics(prev => ({...prev, densification: !prev.densification}))}>
                                <input type="checkbox" checked={planningTopics.densification} onChange={() => {}} />
                                <label>תכניות לעיבוי שטחים חומים</label>
                            </div>
                            <div className="layer-item"
                                 title='תוכניות בשלב הפקדה להתנגדויות'
                                 onClick={() => setPlanningTopics(prev => ({...prev, objections: !prev.objections}))}>
                                <input type="checkbox" checked={planningTopics.objections} onChange={() => {}} />
                                <label>תכניות המופקדות להתנגדויות</label>
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <h3>שקיפות שכבות</h3>
                            <input
                                className="opacity-slider"
                                type="range"
                                min="0"
                                max="1"
                                step="0.05"
                                value={opacity}
                                onChange={(e) => setOpacity(parseFloat(e.target.value))}
                            />
                            <div className="opacity-label">
                                <span>שקוף</span>
                                <span>{Math.round(opacity * 100)}%</span>
                                <span>אטום</span>
                            </div>

                            <div style={{marginTop: '12px'}}>
                                <div className="opacity-label" style={{marginBottom: '6px'}}><span>מפת רקע</span></div>
                                <select
                                    className="basemap-select"
                                    value={basemap}
                                    onChange={(e) => setBasemap(e.target.value)}
                                >
                                    {Object.entries(BASEMAPS).map(([key, bm]) => (
                                        <option key={key} value={key}>{bm.name}</option>
                                    ))}
                                </select>
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <button className="btn-reset" onClick={resetView}>
                                איפוס תצוגה
                            </button>
                            <button className="btn-reset" onClick={() => {
                                const all = {};
                                Object.values(LAYER_CONFIG).forEach(g =>
                                    g.layers.forEach(l => { all[l.id] = true; })
                                );
                                setLayers(all);
                            }} style={{marginTop: '4px'}}>
                                הצג הכל
                            </button>
                            <button className="btn-reset" onClick={() => {
                                const none = {};
                                Object.values(LAYER_CONFIG).forEach(g =>
                                    g.layers.forEach(l => { none[l.id] = false; })
                                );
                                setLayers(none);
                            }} style={{marginTop: '4px'}}>
                                הסתר הכל
                            </button>
                        </div>

                        <div className="status-bar">
                            {cursorPos && (
                                <span>{cursorPos.lat}, {cursorPos.lng}</span>
                            )}
                            <br />
                            <span>WMS: qgiscloud.com/OrHirschhorn/ORANIM</span>
                        </div>
                    </div>

                    <div className="map-container">
                        <button
                            className="toggle-btn"
                            onClick={() => {
                                setSidebarOpen(prev => !prev);
                                setTimeout(() => mapInstanceRef.current?.invalidateSize(), 350);
                            }}
                            title={sidebarOpen ? 'הסתר תפריט' : 'הצג תפריט'}
                        >
                            {sidebarOpen ? '◀' : '▶'}
                        </button>
                        <div id="map" ref={mapRef}></div>

                        {/* ── Map Toolbar ── */}
                        <div className="map-toolbar">
                            {/* מדידה */}
                            <button
                                className={`toolbar-btn ${measureMode ? 'active' : ''}`}
                                onClick={() => {
                                    if (measureMode) {
                                        stopMeasure();
                                        setActiveDropdown(null);
                                    } else {
                                        setActiveDropdown(prev => prev === 'measure' ? null : 'measure');
                                    }
                                }}
                                title="מדידה"
                            >
                                <svg className="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M2 20L20 2" />
                                    <path d="M5.5 16.5L8 14" />
                                    <path d="M9.5 12.5L12 10" />
                                    <path d="M13.5 8.5L16 6" />
                                    <path d="M2 20h4v-4" />
                                    <path d="M20 2h-4v4" />
                                </svg>
                                <span className="toolbar-label">{measureMode === 'distance' ? 'מרחק' : measureMode === 'area' ? 'שטח' : 'מדידה'}</span>
                                {activeDropdown === 'measure' && !measureMode && (
                                    <div className="toolbar-dropdown" onClick={e => e.stopPropagation()}>
                                        <button className="toolbar-dropdown-item" onClick={() => {
                                            clearMeasurement();
                                            setMeasureMode('distance');
                                            setActiveDropdown(null);
                                        }}>
                                            📏 מדידת מרחק
                                        </button>
                                        <button className="toolbar-dropdown-item" onClick={() => {
                                            clearMeasurement();
                                            setMeasureMode('area');
                                            setActiveDropdown(null);
                                        }}>
                                            📐 מדידת שטח
                                        </button>
                                    </div>
                                )}
                            </button>

                            <div className="toolbar-sep" />

                            {/* טבלת השוואה */}
                            <button
                                className={`toolbar-btn ${showCompare ? 'active' : ''}`}
                                onClick={() => {
                                    setShowCompare(true);
                                    setActiveDropdown(null);
                                }}
                                title="טבלת השוואה"
                            >
                                <svg className="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                    <line x1="3" y1="9" x2="21" y2="9" />
                                    <line x1="3" y1="15" x2="21" y2="15" />
                                    <line x1="12" y1="3" x2="12" y2="21" />
                                </svg>
                                <span className="toolbar-label">השוואה</span>
                            </button>

                            <div className="toolbar-sep" />

                            {/* הדפסה */}
                            <button
                                className="toolbar-btn"
                                onClick={() => {
                                    setShowPrint(true);
                                    setActiveDropdown(null);
                                }}
                                title="הדפסה"
                            >
                                <svg className="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <polyline points="6 9 6 2 18 2 18 9" />
                                    <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2" />
                                    <rect x="6" y="14" width="12" height="8" />
                                </svg>
                                <span className="toolbar-label">הדפסה</span>
                            </button>

                            <div className="toolbar-sep" />

                            {/* תוספת יח"ד */}
                            <button
                                className={`toolbar-btn ${showUnits ? 'active' : ''}`}
                                onClick={() => {
                                    fetchUnitsData();
                                    setActiveDropdown(null);
                                }}
                                title='תוספת יח"ד'
                            >
                                <svg className="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M3 21h18" />
                                    <path d="M5 21V7l5-4 5 4v14" />
                                    <path d="M9 21v-4h2v4" />
                                    <path d="M19 21V11l-4-3" />
                                    <path d="M8 9h1" />
                                    <path d="M11 9h1" />
                                    <path d="M8 13h1" />
                                    <path d="M11 13h1" />
                                </svg>
                                <span className="toolbar-label">יח"ד</span>
                            </button>
                        </div>

                        {/* Measurement result panel */}
                        {measureResult && (
                            <div className="measure-result">
                                <div>
                                    <div className="measure-result-label">
                                        {measureResult.type === 'distance' ? 'מרחק' : 'שטח'}
                                    </div>
                                    <div className="measure-result-value">{measureResult.value}</div>
                                </div>
                                <button className="measure-result-btn" onClick={() => {
                                    clearMeasurement();
                                    setMeasureMode(null);
                                }}>
                                    ✕ נקה
                                </button>
                            </div>
                        )}

                        <div className={`loading-indicator ${loading ? 'visible' : ''}`}>
                            טוען שכבות...
                        </div>
                        {loadingBuildings && (
                            <div style={{
                                position: 'absolute',
                                bottom: '30px',
                                left: '50%',
                                transform: 'translateX(-50%)',
                                background: 'rgba(26,26,46,0.85)',
                                color: '#8ecae6',
                                padding: '6px 16px',
                                borderRadius: '16px',
                                fontSize: '13px',
                                zIndex: 1000,
                                backdropFilter: 'blur(4px)',
                                border: '1px solid rgba(142,202,230,0.3)',
                                animation: 'fadeIn 0.3s ease'
                            }}>
                                טוען שכבת מבנים...
                            </div>
                        )}
                        {mapScale && (
                            <div className="scale-display">{mapScale}</div>
                        )}

                        {/* ── Comparison Side Panel ── */}
                        {showCompare && (
                            <div className="compare-panel">
                                <div className="compare-header">
                                    <h2>📊 השוואת תוכניות</h2>
                                    <button className="compare-close" onClick={() => setShowCompare(false)}>&times;</button>
                                </div>
                                <div className="compare-hint-bar">
                                    לחצו על תוכניות במפה כדי להוסיף להשוואה
                                </div>
                                <div className="compare-body">
                                    {compareFeatures.length === 0 ? (
                                        <div className="compare-hint">
                                            <p style={{fontSize: '40px', marginBottom: '12px'}}>📋</p>
                                            <p>לחצו על תוכנית במפה</p>
                                            <p style={{marginTop: '4px'}}>התוכנית תתווסף אוטומטית</p>
                                        </div>
                                    ) : (
                                        compareFeatures.map((f, i) => {
                                            const status = f.status_mavat || '-';
                                            const statusColor = getStatusColor(status);
                                            return (
                                                <div className="compare-card" key={f.pl_number || i}>
                                                    <button className="compare-card-remove" onClick={() => {
                                                        setCompareFeatures(prev => prev.filter((_, j) => j !== i));
                                                    }} title="הסר">&times;</button>
                                                    <div className="compare-card-title">
                                                        {f.plan_name_he || f.plan_summary || f.pl_name || `תוכנית ${i + 1}`}
                                                    </div>
                                                    <div className="compare-card-num">{f.pl_number || '-'}</div>
                                                    <div style={{marginBottom: '8px'}}>
                                                        <span className="compare-card-status" style={{
                                                            background: statusColor + '22',
                                                            color: statusColor,
                                                            border: `1px solid ${statusColor}`
                                                        }}>{status}</span>
                                                    </div>
                                                    <div className="compare-card-rows">
                                                        <div className="compare-card-row">
                                                            <span className="compare-card-row-label">יח"ד נכנס</span>
                                                            <span className="compare-card-row-value">{f.units_in != null ? f.units_in : '-'}</span>
                                                        </div>
                                                        <div className="compare-card-row">
                                                            <span className="compare-card-row-label">יח"ד יוצא</span>
                                                            <span className="compare-card-row-value">{f.units_total != null ? f.units_total : '-'}</span>
                                                        </div>
                                                        <div className="compare-card-row">
                                                            <span className="compare-card-row-label">תוספת</span>
                                                            <span className="compare-card-row-value" style={{color: '#8ecae6'}}>
                                                                {f.units_add != null && f.units_add !== 0 ? '+' + f.units_add : (f.units_add === 0 ? '0' : '-')}
                                                            </span>
                                                        </div>
                                                        <div className="compare-card-row">
                                                            <span className="compare-card-row-label">שכונה</span>
                                                            <span className="compare-card-row-value">{f.neighborho || '-'}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                                {compareFeatures.length > 0 && (
                                    <div className="compare-actions">
                                        <button className="compare-action-btn" onClick={() => setCompareFeatures([])}>
                                            🗑️ נקה הכל
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* ── Print Modal ── */}
                    {showPrint && (
                        <div className="print-overlay" onClick={() => setShowPrint(false)}>
                            <div className="print-modal" onClick={e => e.stopPropagation()}>
                                <div className="print-header">
                                    <h2>🖨️ הדפסת מפה</h2>
                                    <button className="compare-close" onClick={() => setShowPrint(false)}>&times;</button>
                                </div>
                                <div className="print-body">
                                    <div className="print-field">
                                        <label>כותרת המפה</label>
                                        <input
                                            type="text"
                                            placeholder="מפת אורנים - תכנון עירוני"
                                            value={printTitle}
                                            onChange={e => setPrintTitle(e.target.value)}
                                        />
                                    </div>
                                    <label className="print-checkbox">
                                        <input type="checkbox" checked={printShowTitle} onChange={e => setPrintShowTitle(e.target.checked)} />
                                        הצג כותרת
                                    </label>
                                    <label className="print-checkbox">
                                        <input type="checkbox" checked={printShowLegend} onChange={e => setPrintShowLegend(e.target.checked)} />
                                        הצג מקרא
                                    </label>
                                </div>
                                <div className="print-actions">
                                    <button className="compare-action-btn primary" onClick={handlePrint}>
                                        🖨️ הדפס
                                    </button>
                                    <button className="compare-action-btn" onClick={() => setShowPrint(false)}>
                                        ביטול
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Units Summary Modal ── */}
                    {showUnits && (
                        <div className="units-overlay" onClick={() => setShowUnits(false)}>
                            <div className="units-modal" onClick={e => e.stopPropagation()}>
                                <div className="units-watermark"><span>טבלה בעבודה</span></div>
                                <div className="units-header">
                                    {unitsDrilldown ? (
                                        <>
                                            <button className="units-back-btn" onClick={() => setUnitsDrilldown(null)}>
                                                → חזרה
                                            </button>
                                            <h2>🏠 {unitsDrilldown} — פירוט לפי תת שכונה</h2>
                                        </>
                                    ) : (
                                        <h2>🏠 תוספת יח"ד לפי מינהל קהילתי</h2>
                                    )}
                                    <button className="compare-close" onClick={() => { setShowUnits(false); setUnitsDrilldown(null); }}>&times;</button>
                                </div>
                                <div className="units-body">
                                    {unitsLoading || !unitsData ? (
                                        <div className="units-loading">
                                            <p style={{fontSize: '28px', marginBottom: '10px'}}>⏳</p>
                                            <p>טוען נתוני תוכניות...</p>
                                        </div>
                                    ) : unitsDrilldown ? (() => {
                                        const subData = unitsData.bySub[unitsDrilldown] || {};
                                        const subs = Object.keys(subData).sort();
                                        if (subs.length === 0) return <div className="units-loading"><p>אין נתוני תת-שכונות עבור {unitsDrilldown}</p></div>;
                                        return (
                                            <table className="units-table">
                                                <thead>
                                                    <tr>
                                                        <th></th>
                                                        {subs.map(s => <th key={s}>{s}</th>)}
                                                        <th style={{background: '#141440', color: '#e94560'}}>סה"כ</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr>
                                                        <td>יח"ד תוספת</td>
                                                        {subs.map(s => (
                                                            <td key={s} style={{color: '#8ecae6', fontWeight: 600}}>
                                                                {subData[s].units_add.toLocaleString()}
                                                            </td>
                                                        ))}
                                                        <td style={{color: '#8ecae6', fontWeight: 700, background: '#141440'}}>
                                                            {Object.values(subData).reduce((sum, d) => sum + d.units_add, 0).toLocaleString()}
                                                        </td>
                                                    </tr>
                                                    <tr className="units-toggle-row">
                                                        <td colSpan={subs.length + 2}>
                                                            <div className="units-toggle-btns">
                                                                <button className={`units-toggle-btn ${unitsExpanded === 'type' ? 'active' : ''}`}
                                                                    onClick={() => setUnitsExpanded(prev => prev === 'type' ? null : 'type')}>
                                                                    סוג
                                                                </button>
                                                                <button className={`units-toggle-btn ${unitsExpanded === 'status' ? 'active' : ''}`}
                                                                    onClick={() => setUnitsExpanded(prev => prev === 'status' ? null : 'status')}>
                                                                    סטטוס
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    {unitsExpanded === 'type' && (
                                                        <>
                                                            <tr className="units-sub-row">
                                                                <td>התחדשות עירונית</td>
                                                                {subs.map(s => <td key={s}>{subData[s].renewal.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.renewal, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                            <tr className="units-sub-row">
                                                                <td>עיבוי ובניה חדשה</td>
                                                                {subs.map(s => <td key={s}>{subData[s].densification.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.densification, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                        </>
                                                    )}
                                                    {unitsExpanded === 'status' && (
                                                        <>
                                                            <tr className="units-sub-row">
                                                                <td>פתיחת תיק</td>
                                                                {subs.map(s => <td key={s}>{subData[s].status_open.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.status_open, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                            <tr className="units-sub-row">
                                                                <td>מאושר</td>
                                                                {subs.map(s => <td key={s}>{subData[s].status_approved.toLocaleString()}</td>)}
                                                                <td style={{background: '#12122a'}}>
                                                                    {Object.values(subData).reduce((sum, d) => sum + d.status_approved, 0).toLocaleString()}
                                                                </td>
                                                            </tr>
                                                        </>
                                                    )}
                                                </tbody>
                                            </table>
                                        );
                                    })() : (
                                        <table className="units-table">
                                            <thead>
                                                <tr>
                                                    <th></th>
                                                    {unitsData.minahaks.map(m => (
                                                        <th key={m}
                                                            className="units-minahak-clickable"
                                                            onClick={() => setUnitsDrilldown(m)}
                                                            title={`לחץ לפירוט תת-שכונות ${m}`}
                                                        >{m}</th>
                                                    ))}
                                                    <th style={{background: '#141440', color: '#e94560'}}>סה"כ</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {/* יח"ד קיימות */}
                                                <tr>
                                                    <td>יח"ד קיימות</td>
                                                    {unitsData.minahaks.map(m => (
                                                        <td key={m}>{unitsData.byMinahak[m].units_in.toLocaleString()}</td>
                                                    ))}
                                                    <td style={{background: '#141440'}}>
                                                        {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.units_in, 0).toLocaleString()}
                                                    </td>
                                                </tr>

                                                {/* יח"ד תוספת row */}
                                                <tr>
                                                    <td style={{verticalAlign: 'top'}}>
                                                        <div>יח"ד תוספת</div>
                                                        <div className="units-toggle-btns" style={{marginTop: 4}}>
                                                            <button className={`units-toggle-btn ${unitsExpanded === 'type' ? 'active' : ''}`}
                                                                onClick={() => setUnitsExpanded(prev => prev === 'type' ? null : 'type')}>
                                                                סוג
                                                            </button>
                                                            <button className={`units-toggle-btn ${unitsExpanded === 'status' ? 'active' : ''}`}
                                                                onClick={() => setUnitsExpanded(prev => prev === 'status' ? null : 'status')}>
                                                                סטטוס
                                                            </button>
                                                        </div>
                                                    </td>
                                                    {unitsData.minahaks.map(m => (
                                                        <td key={m} style={{color: '#8ecae6', fontWeight: 600}}>
                                                            {unitsData.byMinahak[m].units_add.toLocaleString()}
                                                        </td>
                                                    ))}
                                                    <td style={{color: '#8ecae6', fontWeight: 700, background: '#141440'}}>
                                                        {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.units_add, 0).toLocaleString()}
                                                    </td>
                                                </tr>

                                                {/* Sub-rows by type */}
                                                {unitsExpanded === 'type' && (
                                                    <>
                                                        <tr className="units-sub-row">
                                                            <td>התחדשות עירונית</td>
                                                            {unitsData.minahaks.map(m => (
                                                                <td key={m}>{unitsData.byMinahak[m].renewal.toLocaleString()}</td>
                                                            ))}
                                                            <td style={{background: '#12122a'}}>
                                                                {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.renewal, 0).toLocaleString()}
                                                            </td>
                                                        </tr>
                                                        <tr className="units-sub-row">
                                                            <td>עיבוי ובניה חדשה</td>
                                                            {unitsData.minahaks.map(m => (
                                                                <td key={m}>{unitsData.byMinahak[m].densification.toLocaleString()}</td>
                                                            ))}
                                                            <td style={{background: '#12122a'}}>
                                                                {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.densification, 0).toLocaleString()}
                                                            </td>
                                                        </tr>
                                                    </>
                                                )}

                                                {/* Sub-rows by status group */}
                                                {unitsExpanded === 'status' && unitsData.statusGroups && unitsData.statusGroups.map(g => (
                                                    <tr key={g.key} className="units-sub-row">
                                                        <td><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:g.color,marginLeft:6,verticalAlign:'middle'}}></span> {g.label}</td>
                                                        {unitsData.minahaks.map(m => (
                                                            <td key={m}>{(unitsData.byMinahak[m].byStatus[g.key] || 0).toLocaleString()}</td>
                                                        ))}
                                                        <td style={{background: '#12122a'}}>
                                                            {Object.values(unitsData.byMinahak).reduce((s, d) => s + (d.byStatus[g.key] || 0), 0).toLocaleString()}
                                                        </td>
                                                    </tr>
                                                ))}

                                                {/* סה"כ */}
                                                <tr className="total-row">
                                                    <td>סה"כ</td>
                                                    {unitsData.minahaks.map(m => {
                                                        const d = unitsData.byMinahak[m];
                                                        return <td key={m}>{(d.units_in + d.units_add).toLocaleString()}</td>;
                                                    })}
                                                    <td style={{background: '#141440'}}>
                                                        {Object.values(unitsData.byMinahak).reduce((s, d) => s + d.units_in + d.units_add, 0).toLocaleString()}
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {legendPopup && (
                        <div className="legend-popup-overlay" onClick={() => setLegendPopup(null)}>
                            <div className="legend-popup" onClick={(e) => e.stopPropagation()}>
                                <button className="legend-popup-close" onClick={() => setLegendPopup(null)}>&times;</button>
                                <div className="legend-popup-title">{legendPopup.title}</div>
                                {legendPopup.items.map((item, i) => (
                                    <div className="legend-item" key={i}>
                                        {item.style === 'hatch' ? (
                                            <div className="legend-color" style={{
                                                background: `repeating-linear-gradient(-45deg, transparent, transparent 3px, ${item.color} 3px, ${item.color} 4.5px)`,
                                                border: `2px solid ${item.color}`
                                            }}></div>
                                        ) : item.style === 'outline' ? (
                                            <div className="legend-color" style={{
                                                background: 'transparent',
                                                border: `3px solid ${item.color}`
                                            }}></div>
                                        ) : (
                                            <div className="legend-color" style={{background: item.color}}></div>
                                        )}
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

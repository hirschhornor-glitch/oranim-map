name: Validate data

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/validate_data.py'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/validate_data.py'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run data validation
        run: python scripts/validate_data.py
